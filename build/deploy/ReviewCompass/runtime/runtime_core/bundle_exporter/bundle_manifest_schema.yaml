# bundle_manifest_schema.yaml
# 可搬証拠束マニフェスト（bundle_manifest.yaml）の必須項目集合（runtime tasks.md T-010）。
#
# 輸出マニフェストは来歴の包絡であり、中央側の取り込み判定そのものではない（要件 9 受入 4）。
# 来歴情報（source_repository_id／source_revision／review_mode）は run_manifest と同一性を保つ。
#
# 対応設計節：design.md §可搬証拠束輸出 §束形状
# 対応要件：Requirement 9 受入 2・3

version: "1.0"

# 必須 8 項目（design.md §束形状）。
required_fields:
  - bundle_id               # 束の識別子
  - run_id                  # 採取元実行の識別子
  - source_repository_id    # 来歴：採取元リポジトリ識別子（要件 9 受入 2）
  - source_revision         # 来歴：採取時の改訂版識別子（要件 9 受入 2）
  - review_mode             # 来歴：レビューモード由来情報の同一性（要件 9 受入 3）
  - exported_at             # 輸出時刻
  - export_runtime_version  # 輸出を行った runtime の版
  - included_artifact_refs  # 束に含めた成果物の参照一覧

# 来歴同一性を保つ項目（run_manifest.yaml と一致させる）。
provenance_fields:
  - source_repository_id
  - source_revision
  - review_mode
