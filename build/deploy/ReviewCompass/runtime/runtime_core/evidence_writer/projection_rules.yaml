# projection_rules.yaml
# steps/*.json ／ decisions/*.json → review_case.json の投影規約 7 項目（runtime tasks.md T-008）。
#
# review_case.json を唯一の横断正本とし、生段証拠と決定証拠から機械的に投影する
# （design.md §証拠出力モデル「主要な投影対応」7 項目）。投影は欠落した来歴を捏造しない。
#
# 対応設計節：design.md §証拠出力モデル §生証拠と派生証拠の分離
# 対応要件：Requirement 4 受入 1〜5

version: "1.0"

projections:
  - id: step_status
    source: "steps/*.json#step_outcome"
    target: "review_case.step_records[].step_status"
    note: step_outcome 3 値正本を step_status の値域として実体化する
  - id: step_identifiers
    source: "steps/*.json#{step_id,step_name,step_prompt_artifact_id,step_started_at,step_closed_at}"
    target: "review_case.step_records[]"
    note: 段別識別子（step_prompt_artifact_id は prompt_id を充てる）
  - id: findings
    source: "steps/*.json#findings"
    target: "review_case.findings[]"
    note: finding.step_id を介して step_records と紐付く
  - id: decision_unit_link
    source: "decisions/decision_units.json#finding_refs"
    target: "review_case.findings[].decision_unit_id"
    note: 決定単位の finding_refs から各所見へ decision_unit_id を逆引きする
  - id: validator_result_refs
    source: "validation/validator_result.json"
    target: "review_case.validator_result_refs[]"
    note: 検証成果物が無ければ空配列（欠落を捏造しない）
  - id: invalidation_marker_refs
    source: "validation/invalidation_markers.json"
    target: "review_case.invalidation_marker_refs[]"
    note: 無効化標識が無ければ空配列
  - id: integration_summary
    source: "steps/step_d_integration.json#integration_summary"
    target: "review_case.integration_summary"
    note: Step D の統合本体
