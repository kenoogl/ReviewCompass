# step_outcome_vocab.yaml
# step_outcome（段結果）の 3 値正本（runtime tasks.md T-004）。
#
# 各段の実行状態を表す runtime 所有の語彙（design.md §treatment × 段実行マトリクス）。
# foundation §5 段別再演モデルの step_records[].step_status の値域として機能する
# （foundation の step_status 値域未確定を本機能の正本で実体化する役割分担）。
#
# 対応設計節：design.md §treatment × 段実行マトリクス
# 対応要件：Requirement 1 受入 4

version: "1.0"

# 3 値正本。
step_outcome:
  - executed              # 段を通常実行した
  - skipped_by_treatment  # treatment 選択により意図的に実行しない
  - failed                # 実行されたが失敗
