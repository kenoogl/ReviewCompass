# phase_profile_vocab.yaml
# フェーズ・プロファイル（phase_profile）の 4 値正本（runtime tasks.md T-003）。
#
# phase_profile は「何を見るか」のレビュー強調点を変える軸（design.md §セッションモデル §4）。
# 値語彙は runtime 所有（foundation §3 により phase_profile／treatment は runtime 所有）。
# 強調点（emphasis）は design.md §フェーズ対応レビュープロファイル に従う。状態機械は変えない。
#
# 対応設計節：design.md §セッションモデル §4、§フェーズ対応レビュープロファイル
# 対応要件：Requirement 8 受入 1〜4

version: "1.0"

# 4 値正本。emphasis は当該フェーズのレビュー強調点（状態機械は不変）。
phase_profiles:
  intent:
    emphasis:
      - 目標の曖昧さ
      - 範囲外の漏れ込み
  requirements:
    emphasis:
      - 範囲の逸脱
      - 要件の不整合
  design:
    emphasis:
      - 責務境界
      - 依存不整合
      - 失敗様式の欠落
  tasks:
    emphasis:
      - 範囲漏れ
      - 順序リスク
      - 検証不能なタスク分解
