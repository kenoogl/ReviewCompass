response_text: "最終判断を下す前に、最適な選択肢（または適切な別案）を特定するため、実行環境や対象データの性質について3点質問させてください。\n\n\
  1. **「依存成果物の `stale` 変化」の具体的な表現形式は何ですか？**\n   - 独立したファイル（例：`stale.json` のようなメタデータファイル）の更新なのか、それとも、ある共有データ（JSONやDB）の特定プロパティ（フラグ）の書き換えでしょうか。\n\
  \n2. **「ReviewCompass」およびこの分析機能（analysis）の想定実行環境はどのようなものですか？**\n   - 同一のローカル環境や単一のCIコンテナ内など、共通のファイルシステム上で動作することを前提としていますか？（クロック差による誤検出のリスク評価に影響します）\n\
  \n3. **入力成果物のデータ規模や、再生成プロセスの実行頻度はどの程度を想定していますか？**\n   - ハッシュ計算コストがボトルネックになるほどの巨大な成果物、あるいは超高頻度な更新が発生する仕様でしょうか。それとも、ドキュメントの生成に伴う、比較的軽量かつ低頻度な実行でしょうか。"
