comment_to_human:
  - 追跡表の修正時に「全タスク（スコープ前提）」を削除して具体タスクに置き換える際、
    漏れがないかを担当者が一度全体を見渡すことを推奨します
  - T-013 の整合チェックを実装する前にこの修正を完了させると、チェック実装時の手間が省けます
