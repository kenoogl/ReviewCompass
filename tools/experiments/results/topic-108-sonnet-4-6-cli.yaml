comment_to_human:
  - T-004 の完了条件に追加する際は、new_discipline の「関係の明示」に対応するスキーマフィールドが
    proposal.schema.json に存在することを先に確認してください
  - update の差分フィールド名（例：diff_description や before_after_table）が設計 §8.8 に記載されているか確認し、
    テスト観点をできるだけ具体的に書いてください
