decision: "採用：案 1"
rationale: |
  候補案が 1 つだけの所見であり、設計 §8.8 が 5 種別すべてに追加要件を定めている以上、
  テストも 5 種別すべてを網羅すべきというのは自然な結論である。
  update の「変更箇所の差分（または変更前後の対照表）」と、
  new_discipline の「ドラフト＋関係の明示」は、どちらも機械的に検証しやすい要件である。
  特に差分・対照表は YAML のフィールド存在チェック、関係の明示はキーワード検索で対応できる。
  should-fix 分類（実装段で補える範囲）の中で、tasks への追記という最小修正で対処できる。
  深掘り事項として「new_discipline の関係明示が機械検証可能か」が挙げられているが、
  これは実装段で詳細を決められる内容であり、tasks では「種別固有テストを追加する」という方針だけを明記すれば十分である。
confidence: 0.88
turns_used: 1
uncertainty_factors:
  - new_discipline の「関係の明示」が実際に grep できる特定のフィールド名・キーワードで表現されているかどうか
  - update の「差分または対照表」のどちらを必須要件とするか（どちらでも許容か両方必須か）が不明
assumed_context:
  - 設計 §8.8 の「5 種別それぞれに追加要件あり」という記述は正確であり、update と new_discipline にも追加要件がある
  - 機械検証の具体的な手法（フィールド名・パターン）は T-004 の実装段で確定する
case_scores:
