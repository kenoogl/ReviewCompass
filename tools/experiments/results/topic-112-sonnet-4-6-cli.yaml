decision: "採用：案 1"
rationale: |
  A-011 ／ A-012 の対処済み状態は pending 正本（166 行・190 行）と tasks.md の双方に記録されており、
  事実として確定している。設計 §20.1 だけが「消化予定（未対処）」と古いまま残るのは
  ドキュメント間の矛盾であり、後続の機能横断段で「未消化」と誤認して二重処理が発生するリスクがある。
  同型の self-improvement 事例でも設計本文を更新する対処を採っており、
  プロジェクトの一貫した方針と合致する。
  案 1 は「状態の正本（pending ファイル）に設計を合わせる」という最小かつ正確な修正であり、
  §14.3 ／ §14.5 の A-011 参照も対処済み前提に整える包括的対処になっている。
  追加の選択肢を検討する必要はなく、案 1 を採用する。
confidence: 0.95
turns_used: 1
uncertainty_factors:
  - §20.1 以外に同種の陳腐化記述が設計書全体に残っている可能性があり、
    今回の修正だけで全体の整合が取れるか確認が必要
  - 承認済み設計の遡及修正として再オープン手続きが必要な場合、
    その手続きコストが想定より大きくなる可能性がある
assumed_context:
