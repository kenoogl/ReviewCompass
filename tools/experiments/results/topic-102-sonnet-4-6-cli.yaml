decision: "採用：案 1"
rationale: |
  設計の複数箇所（§12.1、§8.6、tasks T-008 完了条件 2）が「分子は approved のみ」と一貫して示しており、
  §12.5 手順 3 だけが「approved ＋ superseded」という異なる式を使っている。
  superseded は「後続提案で上書きされ無効化された過去の承認」であり、
  これを採用として数えることは意味的に不自然である（無効化された承認を成功と見なすことになる）。
  §8.6 の設計意図「決定済み提案のうちの採用率を計算する」にも、案 1 の approved のみが合致する。
  案 2（§12.5 に合わせて分子を approved ＋ superseded にする）は孤立した一箇所の記述を
  正として他の複数箇所を書き換えることになり、労力も大きく意味論的整合も悪化する。
  §12.5 は確定済み設計のため再オープン手続きが必要になる可能性があるが、
  修正内容は「§12.5 手順 3 の分子を approved に修正」という 1 行の訂正であり規模は小さい。
confidence: 0.90
turns_used: 1
uncertainty_factors:
  - superseded を採用率の分子に含める設計意図が §12.5 作成時に何らかの理由で意図的に書かれた可能性を排除していない
  - §12.5 の「4 ステップ再現可能」という T-008 完了条件 5 を維持しつつ修正する場合の整合確認が残る
assumed_context:
  - §12.5 の分子 approved ＋ superseded は意図的設計ではなく誤記・混入であると判断する
  - 「決定済み提案の採用率」という設計意図は pending を除外する方向性であり、superseded 含有は矛盾する
case_scores:
  case_1: 9
  case_2: 2
comment_to_human:
  - 修正時は T-008 完了条件 5（§12.5 の 4 ステップ再現可能）が修正後の §12.5 を参照していることを確認してください
  - §12.5 は確定済み設計のため再オープン手続きの要否を確認してから修正してください
