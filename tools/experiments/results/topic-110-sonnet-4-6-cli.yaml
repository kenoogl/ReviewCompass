decision: "採用：案 1"
rationale: |
  案 1（空の場合はスキップ、値があるときだけ実在検査する）が適切である。
  materialization_commit_hash が空であることは「まだ workflow-management が実体化していない状態」を
  意味しており、これは設計上の正常な状態である（§13.5 が書き込み主体を workflow-management と定めているため、
  第 1 期は必然的に空になる）。
  fail-closed 原則（§17.3）は「検査に失敗したら遮断する」であり、
  「検査対象データが存在しない」は「検査失敗」とは異なる。存在しないものを「失敗」として遮断するのは
  過剰反応であり、第 1 期の運用を実質的に不可能にしてしまう。
  案 2（MV-3 を第 1 期スコープ外とする）は、検査自体を先送りにするため、
  workflow-management が実装された後に MV-3 を追加実装するコストが発生する。
  案 1 は MV-3 の仕組みを今のうちに作りつつ、空値の扱いを明確に定義するものであり、
  段階的な成熟に適した方針である。
confidence: 0.83
turns_used: 1
uncertainty_factors:
  - 空（null）とブランク文字列（""）の両方を「未実体化」として扱うかどうかが不明
  - fail-closed 原則との整合について、「空値はスキップ」という例外が他の MV 検査にも設けられているかどうか
assumed_context:
  - materialization_commit_hash の空値は「未設定・未実体化」を意味し、workflow-management が設定するまでの間は正常な状態である
  - 第 1 期において workflow-management の実体化機能は未実装であり、MV-3 が空値を遮断するとシステムが使えなくなる
case_scores:
  case_1: 8
  case_2: 5
comment_to_human:
  - 「空値はスキップ」という例外仕様を tasks と設計 §17.1 の両方に追記するとともに、
    他の MV 検査に同種の空値例外が必要かどうかも確認してください
  - 将来 workflow-management が実体化機能を実装した後、MV-3 が実際に git cat-file で検査できることを
    統合テストで確認する手順を T-009 の完了条件に追加することも検討してください
