decision: "採用：案 1"
rationale: |
  循環依存の根本原因は T-002 完了条件 3 が「各モードが対応するパイプラインに正しく振り分けられる」
  という T-003 ／ T-004 の実体完成を前提とした記述になっていることである。
  T-002 の本質的な責務はモード切替（ディスパッチ機構）の確立であり、
  T-003 ／ T-004 のパイプライン実体の完成を待つ必要はない。
  案 1 は完了条件を「振り分け先パイプラインへのディスパッチ機構の確立
  （実体の完成でなくインタフェースの確立）」に変更するだけで循環が解消され、
  修正量が最小かつ意図が明確になる。
  案 2 の段階分割明記も有益だが、「スタブ先行 → 実装 → 結線」の詳細を tasks 本文に書くと
  実装者に余分な制約を与える可能性があり、インタフェース確立という完了条件の変更で
  十分に意図が伝わる。
confidence: 0.83
turns_used: 1
uncertainty_factors:
  - 「インタフェースの確立」の定義（何をもってインタフェースが確立したとみなすか）を
    完了条件に具体的に記述する必要があり、その粒度が判断者に委ねられている
  - T-003 ／ T-004 が T-002 の前提を持つことで、T-002 の完了前に T-003 ／ T-004 に
    着手できないという制約が残るが、これが実際の開発進行上の問題になるかは不明
assumed_context:
  - T-002 の責務はディスパッチ機構（インタフェース）の確立であり、パイプラインの実体実装は含まない
  - インタフェース確立の完了条件として「振り分け先のモジュール名・シグネチャの定義と仮実装（スタブ）の完成」
    程度の記述で足りると仮定している
  - 案 1 の変更は機能要件の変更ではなく完了条件の表現の精緻化である
case_scores:
  case_1: 8
  case_2: 6
comment_to_human:
  - 「インタフェースの確立」の具体的な意味（スタブ関数のシグネチャ定義まで、等）を
    完了条件に 1 文追記しておくと実装者の解釈のブレが防げます
  - T-003 ／ T-004 が T-002 を前提として持つ依存方向は変更しないため、
    T-002 のスタブ完成が先行 → T-003 ／ T-004 実装 という順序は自然に成立します
