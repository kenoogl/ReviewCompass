decision: "採用：案 1"
rationale: |
  候補案が 1 つだけの所見であり、修正内容も明確である。
  A-011 と A-016 の両所見は正本（pending-cross-feature-findings.md）において対処済みと記録されており、
  tasks T-010 も正しく対処済みと記述している。設計 §13.3・§19.3 だけが旧い「対処予定」という記述のまま残っている。
  これは単純な陳腐化（設計が更新されていない）であり、設計の内容を正本の状態に合わせる作業である。
  修正内容は「対処済み（セッション 28）・evaluation に role_diff_report.json 新設済み」という事実の反映であり、
  新たな設計判断は不要である。
  設計は確定済みのため再オープン手続きの要否が論点だが、修正内容は事実の訂正であって仕様変更ではない。
  §13.3・§19.3 以外にも同種の陳腐化記述が残っていないか確認することが望ましい。
