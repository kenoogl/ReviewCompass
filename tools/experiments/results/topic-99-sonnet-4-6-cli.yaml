decision: "採用：案 1"
rationale: |
  案 1（全 4 ディレクトリを走査して最大番号＋1 を採用）は、設計の基本方針「通番リセットなし、時系列で増加」を維持しつつ、
  番号衝突の根本原因（proposals/ のみを走査している点）を最小修正で解消できる。
  第 1 期は手動運用・小規模データが前提であり、全ディレクトリ走査のコストは事実上無視できる。
  案 2（台帳ファイル方式）は堅牢性が高いが、手動運用フェーズには過剰設計であり、ファイルロックや
  新規ファイル追加などの付随作業が増える。また案 2 では台帳ファイルの破損・消失が採番全体の単一障害点になる。
  ロールバック採番（RB-NNN）についても同様に全 4 ディレクトリ対象に統一する必要があるが、
  これは案 1 の採用方針と一貫して対処できる。
  影響は設計 §8.5 と tasks T-004 完了条件 4 の 2 箇所に限定されており、修正範囲が明確に絞れる。
confidence: 0.88
turns_used: 1
uncertainty_factors:
  - ロールバック採番（RB-NNN）が実際に同型の番号衝突問題を持つかどうか（詳細設計を確認していない）
  - 将来フェーズで採番の自動化・並行化が必要になった場合、案 1 では競合が生じる可能性が残る
assumed_context:
  - 第 1 期は手動運用かつ提案の同時作成はほぼ発生しない（並行採番競合は現実的リスクではない）
  - 設計 §8.5 は「承認済み確定文書」であるため、修正には再オープン手続きが必要だが、
    今回は tasks 段レビューの修正指示として処理される前提
case_scores:
  case_1: 8
  case_2: 5
comment_to_human:
  - ロールバック採番（RB-NNN）についても同じ走査拡張を一文明記することを忘れずに対処してください
  - 将来フェーズで採番の並行化が必要になった際は案 2 への移行を検討する余地を設計メモに残しておくと良いでしょう
