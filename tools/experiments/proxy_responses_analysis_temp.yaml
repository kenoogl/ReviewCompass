  # ========== 他機能カテゴリ 3 件 ==========

  - topic: 53
    model: sonnet-4-6-api
    finding_id: A-001
    category: 他機能
    question_summary: foundation/evaluation T-001 のスキーマ定義と空雛形の分担方式は？
    response: |
      foundation T-001（.reviewcompass/specs/foundation/tasks.md 行 32-50）の責務記述（行 36）：
      「runtime/foundation/ ／ runtime/schemas/ ／ runtime/prompts/ ／ runtime/config/ ／ runtime/validators/contracts/ の 5 ディレクトリを新設し、各ディレクトリに配置目的を記す README を置く。アプリ側 <対象アプリ>/.reviewcompass/ 規約を docs/operations/FOUNDATION.md に記述。テスト関連の初期フォルダ tests/foundation/ も配置規約に従って作成」

      foundation T-001 の成果物（行 39-43）は 5 つの README（runtime/foundation/README.md、runtime/schemas/README.md、runtime/prompts/README.md、runtime/config/README.md、runtime/validators/contracts/README.md）。
      具体的なスキーマ（.schema.json）の定義は foundation T-001 ではなく後続タスク（T-003 metadata_contract、T-005 validator_result／invalidation_marker、T-004 schemas など）で行われています。

      evaluation T-001（.reviewcompass/specs/evaluation/tasks.md 行 33-50）の責務：「分析成果物配置の構造と命名規約」。完了条件 2（行 45）：「配置の運用ルール（生実行証拠と分析成果物の分離、analysis_run_manifest.yaml の必須項目、版被覆記録）が docs/operations/EVALUATION.md に記述された上で、README または EVALUATION.md の人間レビューで承認されていること」。
      evaluation T-001 でも具体スキーマファイル（.schema.json）は T-001 ではなく後続タスク（T-006 などのメトリクス導出関連）で生成されます。

      まとめ：両機能とも T-001 はディレクトリ準備と配置規約（README ／ docs/operations/<機能>.md）の記述に責務を限定し、スキーマ定義は別タスクで行うパターンです。
    sources:
      - .reviewcompass/specs/foundation/tasks.md 行 32-50（T-001）
      - .reviewcompass/specs/evaluation/tasks.md 行 33-50（T-001）

