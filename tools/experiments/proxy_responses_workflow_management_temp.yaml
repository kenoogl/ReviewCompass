  - topic: 89
    model: gemini-3-5-flash
    finding_id: F-016
    category: 仕組み・接合面確認
    question_summary: DVT の検証方法は？依存マップの自動再評価マーキングはあるか？A-019 の接合面修正方針は？
    response: |
      ご質問の 3 点について、事実をお伝えします。

      1. DVT の仕組み：DVT は「遅延確認事項テーブル（Deferred Verification Table）」で、tasks.md 内の Markdown 表（L313-318）です。未確定上流仕様や将来確定予定の事項を ID ／ 関連タスク ／ 遅延内容 ／ 解除トリガー ／ 状態の列で管理します。T-011 の完了条件で「DVT 内の未解除項目がない（または延期理由が明記されている）」をゲート化します。§13.5 との契約整合（DVT-W003）を具体的にどう機械検証するか（スキーマ比較等）の方法は、規律変更の所定手続きの段集合が未確定のため、文書上は確定していません（「段集合の詳細確定後に最終確認」）。
      2. 依存マップの自動再評価マーキング：design.md §機能依存マップ §6（L694 付近）に「depends_on_resolves_correctly 述語は値域チェックのみを担い、依存先の変更検知と recheck の更新発火は別の機構（tasks 段で実装、本設計時点ではフェーズ 2 以降の宿題）が担う」と記述されています。つまり、ある機能の仕様更新を受けて依存先タスク／検証を自動で「要再評価」とマークするメタ機構は、現在の design／tasks には含まれておらず、フェーズ 2 以降の宿題です（この点は所見 A-006 が指摘）。
      3. A-019 の接合面修正方針：A-019（approved_update スキーマの不一致）は持ち越し所見として機能横断段で消化予定です。共通スキーマへの切り出しや共有ライブラリ化といった具体的方向は、tasks.md／design.md／pending ファイルに記述がありません（文書上未確定）。pending の対処方針は「self-improvement design §8.4 の正本スキーマを確認し、本機能 tasks.md T-010 のスキーマ記述を同期更新する」とのみ記載されています。
    sources:
      - .reviewcompass/specs/workflow-management/tasks.md DVT（L309-322）, T-010 完了条件 4（L213）
      - .reviewcompass/specs/workflow-management/design.md §機能依存マップ §6（L694 付近）
      - .reviewcompass/pending-cross-feature-findings.md A-019

  - topic: 91
    model: gemini-3-5-flash
    finding_id: F-018
    category: 命名規則・範囲確認
    question_summary: プロジェクトの命名標準はあるか？stage_schema.json も同時にリネームしてよいか？
    response: |
      ご質問の 2 点について、事実をお伝えします。

      1. 命名標準：ReviewCompass プロジェクト全体または workflow-management 機能において、ファイル名の命名規則（ケバブケース／スネークケース）の公式標準やガイドラインを定めた文書は、本実験で参照した範囲（tasks.md／design.md）には見当たりません（文書上未確定）。現状は混在しています：`feature-dependency.schema.json`（ハイフン、T-002 成果物）、`stage_schema.json`（アンダースコア、T-003 成果物）、`in_progress.schema.json`（アンダースコア、T-008 成果物）。ディレクトリ名は `stages/in-progress/`（ハイフン、design.md）です。
      2. stage_schema.json の同時リネームの可否：これを禁止する規則も必須とする規則も文書上にありません。F-018 所見自体の対象は `in_progress.schema.json` の命名と design 配置ツリー未記載です。stage_schema.json まで含めて命名規則を全体統一するかどうかは、所見 F-018 の範囲（in_progress.schema.json 単体）を超える判断になります。どこまでを修正範囲とするかの判断は、最終判断者であるあなたに委ねられています。
    sources:
      - .reviewcompass/specs/workflow-management/tasks.md T-002 成果物（L65 付近）, T-003 成果物（L89）, T-008 成果物（L174）
      - .reviewcompass/specs/workflow-management/design.md §全体構造（L59）

  - topic: 98
    model: gemini-3-5-flash
    finding_id: A-010
    category: 仕組み確認
    question_summary: 成果物リストは機械パースされるか？重複に例外処理が要るか？T-001 で実ファイル配置が必要か？
    response: |
      ご質問の 3 点について、事実をお伝えします。

      1. 成果物リストの機械パース：T-011 の完了条件（L223・L287）に「各タスクの成果物配置が design.md §全体構造 と一致」「要件追跡表の双方向整合が機械チェックされる」とあります。つまり成果物配置と要件追跡表については機械チェックが想定されています。ただし、tasks.md の成果物リストそのものを構文解析してタスク間の依存・存在チェックに使う具体的なパーサ実装の詳細は文書上に明記されていません（チェックの存在は記述、実装方式は未詳細）。
      2. 重複に対する機械検証の制約：同一ファイルパスが複数タスクの成果物に登録されている場合に検証スクリプト側でどのような例外処理が必要になるかは、tasks.md／design.md に記述がありません（文書上未確定）。A-010 所見自体が「同一パスの二重列挙が成果物配置の一意性の機械判定を曖昧にする」という指摘です。
      3. T-001 での実ファイル配置の要否：T-001 は雛形（`templates/review/reopen_classification_template.md`）の配置を成果物とし、T-007 がその内容を確定する、という分担で記述されています（要件追跡表 L253「Requirement 5 受入 5：種別判定根拠の保存 → T-001（雛形配置）＋ T-007（読み込み機構）」）。T-001 の段階で空または仮のファイルを実在させるか、内容確定まで作成を遅延できるかについては、tasks.md に明示的な可否の記述がありません（文書上未確定）。この分担の重複列挙そのものが A-010 の対象です。
    sources:
      - .reviewcompass/specs/workflow-management/tasks.md T-011 完了条件（L223）, 完成判定基準（L287）, 要件追跡 L253, T-001／T-007 成果物（L48・L158）
