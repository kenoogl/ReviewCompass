  - topic: 85
    model: sonnet-4-6-api
    finding_id: F-007
    category: タスク構造確認
    question_summary: T-008 完了条件 4（current_blocker 読み取り）は主要条件か補足条件か？
    response: |
      T-008 完了条件 4 の文書上の記述をお伝えします。

      - T-008 完了条件 4（L180）の文言：「進行中状態ファイル自体の更新（次ステップ進行 ／ 人間承認の記録）は遮断対象外であることが機械検証される」。これは T-008 の 4 つの完了条件（L177-180）の 1 つとして並列に記載されており、補足・例外という位置づけの注記ではありません。
      - `current_blocker` というフィールドは、T-008 責務（L170）で「任意フィールド（classification_basis ／ current_blocker ／ escalation_status）を許容」と列挙されています。つまり T-008 は current_blocker を「許容する任意フィールド」として扱います。
      - ただし完了条件 4 の文言自体は「current_blocker を読んで自己更新の許容を区別する」とは書いておらず、「進行中ファイル自体の更新は遮断対象外」という一般的な記述です。「current_blocker を読んで区別する」という処理は F-007 所見側の解釈（reopen 連動を T-008 が内包するという見方）であり、T-008 本文に明示された文言ではありません。
      - 補足：reopen 待機ファイルに current_blocker（人間承認待ち）を書き込むのは T-007（reopen 機械強制）の責務です。
    sources:
