- severity: WARN
  target_location: §2 確認項目表「操縦 LLM」行
  description: Claude Code と Codex CLI 以外の LLM を使う場合の案内が §11 への参照のみで、§2 の表内には「それ以外の
    LLM の場合は §11 のフォールバックに従う」という括弧書きがあるが、§11 の見出しは「操縦 LLM 別の既定 variant」であり、フォールバック手順として読むには見出しと内容のミスマッチが生じている。
  rationale: §11 の最終段落にフォールバック相当の記述はあるが、見出しが variant 選択に特化しているため、§2 から §11 を「フォールバック手順書」として参照した利用者が手順の全体像を把握しにくい。見出しを「操縦
    LLM 別の既定 variant とフォールバック」等に変更するか、§2 の参照先説明を補足するとよい。
- severity: WARN
  target_location: §3.1 手順 6 および §3.2 手順 6
  description: パターン 1・2 の進め方に「hook 導入（§10、強く推奨）」が列挙されているが、§10 の手順 1〜5 の中で実施前に利用者承認を明示求めるステップが記されていない。§4
    の表では `.claude/`／`.codex/` に書き込む旨が記載されているが、hook 導入自体の承認取得タイミングが不明確である。
  rationale: §2 の確認項目で hook 導入意思を確認するフローがあるものの、§10 の手順本文には「利用者の明示判断を取る」旨の記述がなく、LLM
    が §10 の手順を自動的に実行する可能性がある。§1 の原則 2「対象アプリに書き込む前に書き込み先を利用者へ説明する」と整合させるため、§10 に承認取得ステップを明示すべきである。
- severity: INFO
  target_location: §8 手順 1
  description: AGENT_ENTRY.md の実体化手順で「冒頭の記入欄（実体化日、実体化元の配布物）と §2 の『配布物の場所』（絶対パス）を記入する」とあるが、テンプレート内の
    §2 という表現が配布物テンプレート内の節番号なのか本文書の §2 なのかが一読では判別しにくい。
  rationale: 本文書の §2 は「最初に確認すること」であり配布物の場所に関する確認項目を含むが、AGENT_ENTRY.template.md 内の構造は読者には見えていない。「テンプレート内
    §2 の『配布物の場所』欄」のように出典を明示するとLLMが誤解するリスクを減らせる。
- severity: INFO
  target_location: §10 手順 3
  description: 「hooks キーだけを既存へ合流させる」という操作の具体的な方法（JSON のマージ方針、配列の重複除去など）が記載されていない。
  rationale: JSON 設定ファイルの構造によって「合流」の実装が異なる。LLM が独自の解釈でマージを行い、既存 hooks 設定を破壊するリスクがある。マージの原則（既存エントリを変更しない、ReviewCompass
    エントリを末尾追記する等）を明示することで安全性が高まる。
