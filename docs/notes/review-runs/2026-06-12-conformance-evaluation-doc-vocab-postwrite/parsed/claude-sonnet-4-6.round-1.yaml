findings:
- severity: WARN
  target_location: §7 依存関係の特殊構造（Requirement 7）
  description: feature_order における conformance-evaluation の位置付けが「最後」とだけ記載されており、具体的な順序値または隣接機能との相対順序が明示されていない。
  rationale: Requirement 7 は feature_order の最後への位置付けを定めるが、他機能との相対順序（例：self-improvement
    との前後関係）が不明確だと、stages/feature-dependency.yaml 更新時に誤配置が生じるリスクがある。
- severity: WARN
  target_location: §4 6 criteria の検査構造（Requirement 4）
  description: 照合対象から除外する階層として feature-partitioning・intent・tasks を列挙しているが、intent が「参考情報として推察」と§4
    本文で言及されているのに対し、§5 文書生成モードでは intent-reference.md の生成が示されており、「対象外」と「推察生成」の扱いに揺れがある。
  rationale: criteria の対象外と文書生成モードでの出力対象は別概念だが、本文書内で両者の区別が明示されていないため、実装者が intent の扱いを誤解する恐れがある。
- severity: INFO
  target_location: §6 評価記録の配置（Requirement 6）および §9.1 cross-feature drift workflow
  description: §6 のパス規則では評価記録を `<対象アプリ>/.reviewcompass/specs/<feature>/conformance/`
    以下に置くと定義しているが、§9.1 では `_cross_feature` の check record を `.reviewcompass/specs/_cross_feature/conformance/`
    に保存するとしており、通常 feature と cross-feature の配置規則が同一文書内に分散記載されている。
  rationale: パス規則の一覧性が低く、後続の design.md 作成時や機械検査 MV-3 の実装時に参照箇所の確認コストが増す。§6 にクロスフィーチャー用パスの注記を加えるか、§9.1
    に §6 への相互参照を付けることが望ましい。
- severity: INFO
  target_location: §6.1 機械検査 MV-6
  description: MV-6 の検査条件として「既存上流文書パス（例 intent.md、requirements.md、design.md）の不在確認」と記載されているが、tasks.md
    や feature-partitioning 関連ファイルが例示に含まれていない。
  rationale: 上流文書の列挙が不完全な場合、tasks.md 等が推定役プロンプトに混入してもチェックをすり抜ける可能性がある。例示の網羅性を確認し、必要であれば明示的に列挙するか「上流文書一覧は
    foundation 正本を参照」と誘導することが望ましい。
