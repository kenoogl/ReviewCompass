    LLM 利用者が自分のケースをここで申告しにくくなる。一貫性のために表の確認内容を「Claude Code、Codex CLI、またはその他の LLM」のように開いておくべき。
- severity: WARN
  target_location: '## 10. hook 導入（強く推奨）、手順 3'
  description: '`.claude/settings.json` について「既存があれば hooks キーだけ合流」と書かれているが、`.codex/hooks.json`
    側には同様の合流指示がなく、上書き扱いかどうかが不明確。'
  rationale: 対象アプリがすでに `.codex/hooks.json` を持つ場合に、既存エントリを消す可能性がある。hooks.json 側も既存ファイルの扱い方針を明示しないと、利用者が意図せず既存設定を失うリスクがある。
- severity: WARN
  target_location: '## 8. 入口の合流、手順 4'
  description: 「既存入口の規律と AGENT_ENTRY の規律が衝突している場合は、作業を進めず利用者へ提示する」とあるが、衝突の判断基準や例が示されていない。LLM
    が何を衝突とみなすかの定義が曖昧である。
  rationale: 衝突の定義が抽象的なままだと、LLM ごとに判断がばらつき、衝突を見逃すか、衝突でないものを衝突として止めるかの誤判定が起こりやすい。最低限「同じ入口ファイルに読み込み順・優先度・禁止事項が逆の指示がある場合」といった例示があると精度が上がる。
- severity: INFO
