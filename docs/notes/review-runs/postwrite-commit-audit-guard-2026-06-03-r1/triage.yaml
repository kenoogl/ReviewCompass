  target_location: 'tools/check-workflow-action.py: cmd_audit_commit / validate_post_write_completion_for_targets'
  plain_language_summary: When `commit_file_sha256` returns `None` (e.g., the file
    was deleted in that commit), the hash is stored as `None` in `commit_hashes`,
    passed to `validate_post_write_completion_for_targets`, and then propagated into
    `actual_hashes`. Inside `manifest_hashes_match_values`, a `None` hash will never
    equal the manifest's stored hash, causing a false-positive DEVIATION for legitimate
    deletions of post-write targets.
  final_label: leave-as-is
  decision_status: decided
  decision_actor: codex
  decision_actor_type: human
  decision_at: '2026-06-03T09:07:14.697096+00:00'
  decision_reason: post-write 対象文書の削除は内容 sha256 を持たないため現行監査では fail-closed になる。削除を許可する別ポリシーは今回スコープ外であり、誤って通すより遮断側が安全。
  applied_files: []
  superseded_by: null
