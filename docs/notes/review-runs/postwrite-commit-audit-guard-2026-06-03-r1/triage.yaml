  target_location: 'tests/tools/test_check_workflow_action.py: test_audit_commit_accepts_post_write_target_with_matching_manifest'
  plain_language_summary: The test writes the completed manifest *after* the commit
    is made, meaning the manifest sha256 is computed against the file as it exists
    on disk (written by `_stage_file` and then committed). This works incidentally
    because `_stage_file` writes the file to disk before staging and committing, so
    the on-disk content still matches. However, if `_stage_file` were to clean up
    the working-tree file after staging, the test would silently break.
  final_label: leave-as-is
  decision_status: decided
  decision_actor: codex
