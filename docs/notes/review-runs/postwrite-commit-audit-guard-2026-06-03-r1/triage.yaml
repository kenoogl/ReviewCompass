  plain_language_summary: 'The function filters `target_files` for post-write targets
    internally, but `cmd_commit` already passes all staged_files (not pre-filtered),
    while `cmd_audit_commit` passes only pre-filtered `post_write_targets`. This asymmetry
    is harmless but creates potential confusion: double-filtering occurs for `commit`
    path (the function re-filters), whereas for `audit-commit` the list is filtered
    before passing and then the function re-filters again needlessly.'
