schema_version: operation-contracts-v1
owner: workflow-management
description: >
  Operation contract authority for required_action execution semantics. The
  operation registry references these contracts and must not duplicate contract
  authority fields.
operations:
  - schema_version: operation-contract-v1
    operation_id: repair_workflow_state
    required_action: repair_workflow_state
    effect_kind: state_mutation
    approval_required: true
    approval_contract_refs:
      - human_only_workflow_state_repair
    phase_boundary: within_phase
    sequence:
      mode: serial_only
      internal_steps: []
    actor:
      kind: tool
      source: requirements.md#requirement-13
    branching:
      has_branches: false
      branches: []
    max_effect_kind: state_mutation
    preconditions:
      - id: state_evidence_present
        description: State evidence is available.
        check_kind: artifact_presence
        machine_checkable: true
        source_ref: design.md#req13-precondition-repair_workflow_state-state_evidence_present
        failure_verdict: DEVIATION
    postconditions:
      - id: state_consistency_restored
        description: Workflow state consistency is restored.
        check_kind: state_consistency
        machine_checkable: true
        source_ref: design.md#req13-postcondition-repair_workflow_state-state_consistency_restored
        failure_verdict: DEVIATION
    side_effects:
      - workflow_state_update
    commit_boundary:
      required: true
      reason: human-only workflow state repair must not bypass commit evidence
    workflow_state_effect:
      kind: repair
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: repair-workflow-state

