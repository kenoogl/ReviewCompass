  - schema_version: operation-contract-v1
    operation_id: run_maintenance
    required_action: run_maintenance
    effect_kind: state_mutation
    approval_required: true
    approval_contract_refs:
      - branch_dependent
    phase_boundary: within_phase
    sequence:
      mode: serial_only
      internal_steps: []
    actor:
      kind: mixed
      source: requirements.md#requirement-13
    branching:
      has_branches: true
      branches:
        - branch_id: read_only_diagnostic
          condition: maintenance_kind=read_only_diagnostic
          internal_steps:
            - step_id: read_target_materials
              effect_kind: read
              approval_required: false
              approval_contract_ref: none
              phase_boundary: none
              source_ref: design.md#req13-run-maintenance-step-read_target_materials
            - step_id: present_diagnostic_result
              effect_kind: read
              approval_required: false
              approval_contract_ref: none
              phase_boundary: none
              source_ref: design.md#req13-run-maintenance-step-present_diagnostic_result
          max_effect_kind: read
          approval_aggregation: all_false
          human_only_override_applies: true
          precondition_ids:
            - side_track_frame_present
          postcondition_ids:
            - return_condition_preserved
        - branch_id: working_note_or_decision_basis
          condition: maintenance_kind=working_note_or_decision_basis
          internal_steps:
            - step_id: read_decision_basis_sources
              effect_kind: read
              approval_required: false
              approval_contract_ref: none
              phase_boundary: none
              source_ref: design.md#req13-run-maintenance-step-read_decision_basis_sources
            - step_id: write_working_note
              effect_kind: write
              approval_required: false
              approval_contract_ref: none
              phase_boundary: within_phase
              source_ref: design.md#req13-run-maintenance-step-write_working_note
          max_effect_kind: write
          approval_aggregation: any_child_approval_required
          human_only_override_applies: true
          precondition_ids:
            - allowed_scope_bound
          postcondition_ids:
            - maintenance_evidence_saved
        - branch_id: workflow_state_repair
          condition: maintenance_kind=workflow_state_repair
          internal_steps:
            - step_id: read_state_evidence
              effect_kind: read
              approval_required: false
              approval_contract_ref: none
              phase_boundary: none
              source_ref: design.md#req13-run-maintenance-step-read_state_evidence
            - step_id: apply_state_repair
              effect_kind: state_mutation
              approval_required: true
              approval_contract_ref: repair_workflow_state
              phase_boundary: within_phase
              source_ref: design.md#req13-run-maintenance-step-apply_state_repair
            - step_id: validate_state_consistency
              effect_kind: read
              approval_required: false
              approval_contract_ref: none
              phase_boundary: none
              source_ref: design.md#req13-run-maintenance-step-validate_state_consistency
          max_effect_kind: state_mutation
          approval_aggregation: true
          human_only_override_applies: true
          precondition_ids:
            - branch_condition_resolved
          postcondition_ids:
            - maintenance_evidence_saved
    max_effect_kind: state_mutation
    preconditions:
      - id: side_track_frame_present
        description: Maintenance side-track frame is present.
        check_kind: state_ref
        machine_checkable: true
        source_ref: design.md#req13-precondition-run_maintenance-side_track_frame_present
        failure_verdict: DEVIATION
    postconditions:
      - id: return_condition_preserved
        description: Mainline return condition remains preserved.
        check_kind: state_ref
        machine_checkable: true
        source_ref: design.md#req13-postcondition-run_maintenance-return_condition_preserved
        failure_verdict: DEVIATION
    side_effects:
      - branch_dependent
    commit_boundary:
      required: false
    workflow_state_effect:
      kind: branch_dependent
    canonical_invocation:
      entrypoint: null

