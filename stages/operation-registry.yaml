schema_version: operation-registry-v1
owner: workflow-management
description: >
  Read-only operation registry for operation-preflight. Contract authority
  fields live in stages/operation-contracts.yaml; this registry references
  contract ID, schema version, and digest only.
operations:
  - operation_id: workflow_next_preflight
    operation_contract:
      operation_id: completed
      schema_version: operation-contract-v1
      digest: sha256:8fd32aaa88f6144a9ddc620af08f1e2f3d535ad7103e7b441665245c87ca2f07
    kind: workflow_state
    operation_family: workflow_cli
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: next
      options:
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - stages/feature-dependency.yaml
      - .reviewcompass/specs/{feature}/spec.json
    target_identity:
      - workflow_state
    planned_outputs: []
    sequence_mode: parallel_ok
    worktree_policy: allow_dirty_read_only
    pending_conflict_policy: allow_registered_pending_state
    artifact_policy: read_only
    family_required_checks:
      - parser_invocation
      - workflow_binding
      - next_active_state_dimensions
      - scope_consistency
    vocabulary_refs:
      - verdict
      - sequence_mode
      - workflow_stage

  - operation_id: review_run_create
    operation_contract:
      operation_id: run_workflow_stage
      schema_version: operation-contract-v1
      digest: sha256:4489da9cb18d9054b0ea9d9bd521ae71516c8dc9b5d1a1acd5b1f0137521db9d
    kind: review_artifact
    operation_family: review_artifact
    canonical_invocation:
      entrypoint: tools/api_providers/run_review.py
      subcommand: null
      options:
        - --target
        - --phase
        - --criteria
        - --review-run-dir
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: triad-review
      gate: null
      next_action_kind: reopen_in_progress
    required_inputs:
      - review-target.md
      - target-manifest.yaml
    target_identity:
      - review_run
    planned_outputs:
      - raw/
      - parsed/
      - rounds.yaml
      - model-result-summary.yaml
      - triage.yaml
    sequence_mode: serial_only
    worktree_policy: allow_dirty_read_only
    pending_conflict_policy: require_matching_review_gate
    artifact_policy: no_overwrite_without_explicit_run_id
    family_required_checks:
      - target_manifest_alignment
      - bundle_non_empty
      - criteria_alignment
      - document-type_alignment
      - approval_record_alignment
      - existing_artifact_drift
      - staged-vs-unstaged_target_selection
    vocabulary_refs:
      - severity
      - final_label
      - review_mode

  - operation_id: triage_decide
    operation_contract:
      operation_id: record_human_decision
      schema_version: operation-contract-v1
      digest: sha256:3e1a57fab95ffe441bbd4a20b452bc80350774b9fe18bf1145d698bbf3ff4fe7
    kind: review_artifact
    operation_family: review_artifact
    canonical_invocation:
      entrypoint: tools/api_providers/review_triage.py
      subcommand: decide
      options:
        - --review-run-dir
        - --finding-id
        - --final-label
        - --decision-reason
        - --decision-actor
        - --approval-record
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: triad-review
      gate: null
      next_action_kind: reopen_in_progress
    required_inputs:
      - triage.yaml
      - approval.yaml
    target_identity:
      - finding_id
      - final_label
    planned_outputs:
      - triage.yaml
    sequence_mode: serial_only
    worktree_policy: allow_dirty_read_only
    pending_conflict_policy: require_matching_review_gate
    artifact_policy: update_existing_triage_only
    family_required_checks:
      - target_manifest_alignment
      - bundle_non_empty
      - criteria_alignment
      - document-type_alignment
      - approval_record_alignment
      - existing_artifact_drift
      - staged-vs-unstaged_target_selection
    vocabulary_refs:
      - final_label

  - operation_id: reopen_finalize_preflight
    operation_contract:
      operation_id: finalize_reopen
      schema_version: operation-contract-v1
      digest: sha256:e23bd9cc2cda74c30d12e70995e95f22344eec68f54d8a78e50dc82242dd2591
    kind: workflow_state
    operation_family: workflow_cli
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: reopen-finalize
      options:
        - --file
        - --impacted-downstream-phase
        - --feature-impact
        - --new-feature-decision
        - --completed-step
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - stages/in-progress/reopen-procedure-{date}.yaml
      - feature_impact_decisions
      - new_feature_decision
      - impacted_downstream_phases
    target_identity:
      - reopen_procedure
      - completed_reopen_yaml
    planned_outputs:
      - stages/completed/reopen-procedure-{date}.yaml
    sequence_mode: serial_only
    worktree_policy: allow_dirty_structured_state_update
    pending_conflict_policy: require_matching_reopen_finalize
    artifact_policy: no_overwrite_existing_completed_reopen
    family_required_checks:
      - parser_invocation
      - workflow_binding
      - next_active_state_dimensions
      - scope_consistency
    vocabulary_refs:
      - verdict
      - workflow_stage

  - operation_id: reopen_advance_step_preflight
    operation_contract:
      operation_id: advance_reopen_after_approval_stop_point
      schema_version: operation-contract-v1
      digest: sha256:4760ee8f63c0e639b075aac83dacdc26e13c11ae82531e814703282c363c33f0
    kind: workflow_state
    operation_family: workflow_cli
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: reopen-advance-step
      options:
        - --file
        - --from-step
        - --completed-step
        - --rationale
        - --evidence
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - stages/in-progress/reopen-procedure-{date}.yaml
      - from_step
      - completed_step
      - rationale
      - evidence
    target_identity:
      - reopen_procedure
      - step_number
    planned_outputs:
      - stages/in-progress/reopen-procedure-{date}.yaml
    sequence_mode: serial_only
    worktree_policy: allow_dirty_structured_state_update
    pending_conflict_policy: require_matching_reopen_step
    artifact_policy: update_existing_reopen_in_progress_only
    family_required_checks:
      - parser_invocation
      - workflow_binding
      - next_active_state_dimensions
      - scope_consistency
    vocabulary_refs:
      - verdict
      - workflow_stage

  - operation_id: reopen_set_blocker_preflight
    operation_contract:
      operation_id: wait_for_human_decision
      schema_version: operation-contract-v1
      digest: sha256:c05fba307724b78b3735377e257f6824535f37100e34c1b64bcb4c961b7dcba8
    kind: workflow_state
    operation_family: workflow_cli
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: reopen-set-blocker
      options:
        - --file
        - --gate
        - --actor
        - --rationale
        - --evidence
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - stages/in-progress/reopen-procedure-{date}.yaml
      - approval_gate
      - actor
      - rationale
      - evidence
    target_identity:
      - reopen_procedure
      - current_blocker
    planned_outputs:
      - stages/in-progress/reopen-procedure-{date}.yaml
    sequence_mode: serial_only
    worktree_policy: allow_dirty_structured_state_update
    pending_conflict_policy: require_matching_reopen_blocker
    artifact_policy: update_existing_reopen_in_progress_only
    family_required_checks:
      - parser_invocation
      - workflow_binding
      - next_active_state_dimensions
      - scope_consistency
    vocabulary_refs:
      - verdict
      - workflow_stage

  - operation_id: commit_approval_chain_preflight
    operation_contract:
      operation_id: commit_stop_point
      schema_version: operation-contract-v1
      digest: sha256:e05c9551a644c0ed7bc448b09f3542fb88bf9d2732fb51824bdb820eec92ab0c
    kind: irreversible
    operation_family: commit_approval_chain
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: operation-preflight
      options:
        - --operation-id
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - .reviewcompass/runtime/approvals/commit-approval-challenge.json
      - .reviewcompass/runtime/approvals/commit-approval.json
      - .reviewcompass/runtime/approvals/commit-execution-delegation.json
    target_identity:
      - staged_file_set
      - target_digest
    planned_outputs: []
    sequence_mode: serial_only
    worktree_policy: require_staged_content_binding
    pending_conflict_policy: reject_unrelated_in_progress
    artifact_policy: read_only
    family_required_checks:
      - nonce
      - target_digest
      - staged_file_set_digest
      - staged_content_approval_digest
      - expiry
      - consume
      - invalidated
      - target
    vocabulary_refs:
      - verdict
      - approved_action

  - operation_id: session_record_capture_preflight
    operation_contract:
      operation_id: record_human_decision
      schema_version: operation-contract-v1
      digest: sha256:3e1a57fab95ffe441bbd4a20b452bc80350774b9fe18bf1145d698bbf3ff4fe7
    kind: evidence_capture
    operation_family: session_record_capture
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: operation-preflight
      options:
        - --operation-id
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - session_record_mode
      - current_session_id
      - target_session_id
    target_identity:
      - target_session_id
    planned_outputs: []
    sequence_mode: parallel_ok
    worktree_policy: allow_dirty_read_only
    pending_conflict_policy: allow_matching_capture
    artifact_policy: read_only
    family_required_checks:
      - session_record_mode
      - current_session_id
      - target_session_id
      - current_session_formal_output_forbidden
    vocabulary_refs:
      - session_record_mode

  - operation_id: nested_issue_preflight
    operation_contract:
      operation_id: run_maintenance
      schema_version: operation-contract-v1
      digest: sha256:44125796ce3335a00498d568785dd18d475bbd1664508d2429d838ab2c59e67d
    kind: workflow_state
    operation_family: nested_issue_control
    canonical_invocation:
      entrypoint: tools/check-workflow-action.py
      subcommand: operation-preflight
      options:
        - --operation-id
        - --json
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - parent_task
      - discovered_issue
      - relation
      - allowed_files
      - return_condition
    target_identity:
      - parent_task
      - discovered_issue
    planned_outputs: []
    sequence_mode: serial_only
    worktree_policy: allow_dirty_read_only
    pending_conflict_policy: require_side_track_or_blocker_record
    artifact_policy: read_only
    family_required_checks:
      - parent_task
      - discovered_issue
      - relation
      - allowed_files
      - return_condition
      - nesting_depth
    vocabulary_refs:
      - nested_issue_relation

  - operation_id: deployment_export_preflight
    operation_contract:
      operation_id: run_maintenance
      schema_version: operation-contract-v1
      digest: sha256:44125796ce3335a00498d568785dd18d475bbd1664508d2429d838ab2c59e67d
    kind: deployment_export
    operation_family: deployment_export
    canonical_invocation:
      entrypoint: tools/build-deploy-package.py
      subcommand: null
      options:
        - --out
        - --manifest
      positional_args: []
      execution_context: repo_root
    workflow_binding:
      phase: null
      stage: null
      gate: null
      next_action_kind: null
    required_inputs:
      - planned_outputs
      - overwrite_policy
      - external_output_root
      - target_app_root
    target_identity:
      - deployment_package
    planned_outputs: []
    sequence_mode: serial_only
    worktree_policy: allow_dirty_read_only
    pending_conflict_policy: reject_unrelated_in_progress
    artifact_policy: read_only
    family_required_checks:
      - planned_outputs
      - overwrite_policy
      - external_output_root
      - target_app_root
    vocabulary_refs:
      - deployment_target
