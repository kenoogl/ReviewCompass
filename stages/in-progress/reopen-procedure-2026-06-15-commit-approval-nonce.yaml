implementation_triad_review_clusters:
- cluster: C1 challenge consumption is incomplete
  proposed_label: must-fix
  summary: successful commit consumes approval record only; challenge record is not durably consumed, weakening single-use nonce semantics.
- cluster: C2 execution_delegation is embedded by default in nonce approval records
  proposed_label: must-fix
  summary: commit-approval record currently writes LLM execution delegation by default, conflating staged-content approval with execution delegation.
- cluster: C3 exact-index digest edge cases are under-tested and may be incomplete
  proposed_label: must-fix
  summary: rename/copy/mode/submodule/unusual path behavior and nonce-specific path-order coverage are insufficient.
- cluster: C4 malformed/no-partial-inference coverage is insufficient
  proposed_label: must-fix
  summary: malformed challenge/approval structures need fail-closed tests and behavior confirmation.
- cluster: C5 source_omission_reason null is ambiguous
  proposed_label: should-fix
  summary: storing redacted source text with source_omission_reason null is ambiguous for the omission enum contract.
- cluster: C6 legacy fallback invalidation interaction is unclear
  proposed_label: should-fix
  summary: nonce invalidation should not mutate frozen legacy approval records or leave failed records reusable.
- cluster: C7 commit_stop_point is under-constrained
  proposed_label: should-fix
  summary: commit_stop_point=true needs negative tests and documentation to avoid becoming a broad bypass.
- cluster: C8 normal git execution failure conditional retry
  proposed_label: leave-as-is
  summary: lower-priority follow-up unless approval criteria require full retry semantics now.
