source_protocol_text: |
  調べ直した結果、漏れがあります。しかも、私が直前に説明した手順でもまだ不足していました。
  正しい TRIAD review / API review-run の標準プロトコルは、少なくとも次です。

  1. next --json / effective prompt 確認
     - 現在 gate が requirements triad-review であることを確認
     - required disciplines / required inputs を読む
     - variant / role 割当が曖昧なら review-run を開始しない

  2. main preanalysis
     - main LLM がまず自分で対象を読む
     - claim ごとに target / source / out of scope を分ける
     - 必要な原文または構造化抜粋を決める
     - 未読資料、推測、機微情報リスクを記録する
     - behavior-path claim がある場合は、文書だけでなく runner / guard / preflight / tests まで source に含める

  3. preanalysis sufficiency audit
     - ここが漏れていました
     - main preanalysis をそのまま信用せず、別レビューで「材料選定・判断項目・分割・source selection が足りているか」を監査する
     - templates/review/main_preanalysis_sufficiency_audit_criteria_template.md を使う規律になっています

  4. API review criteria draft 作成
     - criteria と target を分離する
     - target は実審査対象本文、criteria はレビュー観点
     - source materials は path-only 禁止
     - requirements triad-review では、requirements.md を target、reopen 分類・計画・利用者判断・関連規律を source にする
     - design / tasks / implementation の correctness はこの段階の out of scope

  5. prompt quality review
     - ここも「1回投げる」では足りません
     - adversarial が欠落・誘導・材料不足を探す
     - main が修正する
     - judgment が「実 review-run に使ってよいか」を判定する
     - judgment が findings: [] の場合だけ実 review-run へ進む
     - finding があれば prompt を直して再度回す

  6. 実 TRIAD review-run
     - prompt quality 通過済み criteria を使う
     - raw / parsed / rounds / model-result-summary / triage を保存
     - target-manifest.yaml に実審査対象が入っていることを確認

  7. 利用者提示ゲート
     - ここも必須です
     - proxy_model 判断、実装修正、spec.json 更新、フェーズ移行の前に停止
     - variant、role/provider/model、raw概要、severity、同根クラスタ、三段階トリアージ案、must-fix 候補を提示する

  8. 必要なら proxy_model decision
     - proxy_model は重要件判断だけ
     - commit / push / spec.json 更新 / phase 移行は代行不可
     - proxy_model へ渡す材料にも raw 参照または抜粋が必要

  9. gate 完了処理
     - review 結果と判断が済んだ後に reopen-advance-gate
     - gate 完了後は commit stop point
     - phase / gate 完了は自動許可されない

  今回、私の前説明で漏れていた主な点は次です。
  - preanalysis sufficiency audit を明示していなかった
  - prompt quality review の adversarial → main修正 → judgment の順序を曖昧にしていた
  - judgment が findings: [] の場合だけ実 review-run に進める条件を言っていなかった
  - 実 review-run 後の利用者提示ゲートを、必須停止点として十分強く扱っていなかった
  - prompt-quality-run は gate 完了根拠ではなく、実 review-run の前提証跡にすぎない点を明示していなかった
  現在状態: requirements triad-review の入口で、まだ review-run を開始していません。
  次タスク: main preanalysis から開始し、その後 preanalysis sufficiency audit へ進む。
