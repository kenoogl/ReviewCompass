allowed_scope:
  - run_reopen_pending_gate が triad-review gate を扱うときの機械状態を定義する。
  - TRIAD review protocol の各段階が、成果物なしに次へ進まない fail-closed 条件を追加する。
  - prompt quality review と実 review-run を別工程として扱う。
  - 実 review-run 後、proxy decision、spec.json 更新、gate advance の前に利用者可視 triage gate で止める。
  - 既存の downstream phase 動的算出を壊さない回帰テストを追加する。
  - requirements/design/tasks/implementation 起点の downstream scope と flag policy をテストで固定する。
  - guidance は正本規律として参照する。実装中に不足が判明した場合だけ、利用者確認後に allowed_scope を更新して変更対象へ加える。
