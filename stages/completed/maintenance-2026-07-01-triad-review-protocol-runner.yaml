      - proxy_model 判断、実装修正、spec.json 更新、フェーズ移行の前に停止する
  - id: TRRP-M-14
    title: proxy decision が必要な場合の材料と禁止操作を定義する
    status: done
    requirements:
      - proxy decision は重要件判断だけを扱う
      - raw 参照または抜粋を材料に含める
      - commit / push / spec.json 更新 / phase 移行を代行しない
  - id: TRRP-M-15
    title: gate 完了処理の停止点を機械条件にする
    status: done
    requirements:
      - review 結果と判断が済んだ後に reopen-advance-gate へ進む
      - gate 完了後は commit stop point で止まる
      - phase / gate 完了は自動許可されない
  - id: TRRP-M-16
    title: run_reopen_pending_gate の次工程が protocol state に従って出る最小実装を行う
