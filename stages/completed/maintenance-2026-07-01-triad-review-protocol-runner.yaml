    spec.json と reopen-procedure 本線ファイルは触らない。
out_of_scope:
  - 現在の requirements triad-review を手作業で実行すること。
  - 既存の downstream phase 動的算出を固定表へ置き換えること。
  - SDD 本線の requirements/design/tasks/implementation 本文を変更すること。
  - 利用者確認なしに proxy decision、spec.json 更新、gate advance、commit、push を進めること。
completion_conditions:
  - next --json / effective prompt で現在 gate、required disciplines、required inputs、variant / role 割当を具体 field として確認できる。
  - next --json から run_reopen_pending_gate が要求されたとき、triad-review protocol の次工程が機械的に分かる。
  - main preanalysis なしに preanalysis sufficiency audit へ進めない。
  - preanalysis sufficiency audit 未通過のまま criteria draft または prompt quality review へ進めない。
  - preanalysis sufficiency audit は source materials から判断項目を独立再構成し、main preanalysis を正解として扱わない。
  - preanalysis sufficiency audit の required_prompt_changes を反映するまで prompt quality review へ進めない。
  - criteria draft は User Review Requirements を保持し、required checks / out of scope / finding policy / output contract に写像する。
  - prompt quality review は複数 claim の分解、1 prompt 1 judgment 原則、output contract と parser の一致を確認する。
  - '高リスクまたは behavior-path claim では、single-model findings: [] だけを完了根拠にしない。'
  - 'prompt quality judgment が findings: [] でない場合、実 review-run へ進めない。'
  - prompt quality review の成功だけを triad-review gate 完了根拠にできない。
  - 実 review-run は prompt quality 通過済み criteria だけを使い、raw / parsed / rounds / model-result-summary / prompt-manifest / triage を保存する。
  - target-manifest.yaml に実審査対象が入っていない review-run を有効扱いしない。
  - rounds.yaml の criteria は使用可判定済み criteria でなければならない。
  - 複数判断の raw / parsed / decision 証跡を一括 summary で上書きしない。
  - 実 review-run 後、利用者可視 triage gate なしに proxy decision、spec.json 更新、gate advance へ進めない。
  - review 結果と判断が済んだ後だけ reopen-advance-gate に進め、gate 完了後は commit stop point で止まる。
  - phase / gate 完了は自動許可されない。
  - downstream scope は edited phase から動的に算出され、requirements 固定になっていない。
  - full reopen downstream と impact-check-only downstream が混同されない。
  - 対象テストが成功し、next --json の状態が期待どおりである。
