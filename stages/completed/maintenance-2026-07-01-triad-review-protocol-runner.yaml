    status: done
  - id: TRRP-M-3
    title: API_REVIEW_PROMPT_QUALITY と SESSION_WORKFLOW_GUIDE の必須手順を実装対象に対応付ける
    status: done
  - id: TRRP-M-4
    title: next --json / effective prompt 確認を protocol の開始条件にする
    status: done
    requirements:
      - next_action.required_action が run_reopen_pending_gate であることを確認する
      - next_action.phase が requirements であることを確認する
      - next_action.stage が triad-review であることを確認する
      - next_action.next_pending_gate が stages/requirements.yaml#triad-review であることを確認する
      - next_action.required_disciplines を読む
      - next_action.required_inputs を読む
      - variant_role_assignment または同等 field に role / provider / model / prompt path がそろっていることを確認する
      - variant / role 割当が曖昧なら review-run を開始しない
      - 確認結果が欠落、不一致、曖昧な場合は fail-closed で停止する
  - id: TRRP-M-4A
    title: triad-review protocol state enum を定義する
    status: done
    states:
      - main_preanalysis_required
      - preanalysis_sufficiency_audit_required
      - preanalysis_required_changes_pending
      - criteria_draft_required
      - prompt_quality_review_required
      - prompt_quality_changes_pending
      - actual_review_run_required
      - review_run_artifact_validation_required
      - user_visible_triage_required
      - proxy_decision_optional
      - reopen_advance_gate_allowed
      - commit_stop_point_required
  - id: TRRP-M-5
    title: main preanalysis の成果物要件を定義する
    status: done
    requirements:
      - main LLM がまず自分で対象を読む
      - claim ごとの target / source / out of scope
      - 必要な原文または構造化抜粋
      - 未読資料、推測、機微情報リスク
      - behavior-path claim の場合の runner / guard / preflight / tests source
  - id: TRRP-M-6
    title: preanalysis sufficiency audit の成果物要件と未通過時の停止条件を定義する
    status: done
    requirements:
      - main preanalysis をそのまま信用しない
      - 材料選定、判断項目、分割、source selection の十分性を別レビューで監査する
      - templates/review/main_preanalysis_sufficiency_audit_criteria_template.md を使う
      - reviewer に source materials から judgment item を独立再構成させる
      - main preanalysis を正解として渡さない
      - required_prompt_changes を反映してから次へ進む
  - id: TRRP-M-7
    title: API review criteria draft の target / criteria / source materials 分離を機械条件にする
    status: done
    requirements:
      - User Review Requirements を保持する
      - 利用者要件を review task / required checks / out of scope / finding policy へ写す
      - target は実審査対象本文にする
      - criteria はレビュー観点にする
      - source materials は path-only 禁止にする
      - output contract を parser / triage が扱える形にする
      - 禁止操作を criteria に反映する
      - requirements triad-review では requirements.md を target にする
      - requirements triad-review では reopen 分類、計画、利用者判断、関連規律を source にする
      - design / tasks / implementation の correctness はこの段階の out of scope にする
  - id: TRRP-M-8
    title: prompt quality review の adversarial -> main 修正 -> judgment の順序を機械条件にする
    status: done
    requirements:
      - adversarial が欠落、誘導、材料不足を探す
      - main が指摘を反映して修正する
      - judgment が実 review-run に使ってよいかを判定する
      - finding があれば prompt を直して再度回す
      - review question を claim ごとに分解する
      - 1 prompt につき原則 1 judgment にする
      - 複数 claim を 1 prompt に押し込む場合は required checks を分離する
      - output contract と runner / parser の一致を確認する
      - '高リスクまたは behavior-path claim では single-model findings: [] だけを完了根拠にしない'
  - id: TRRP-M-9
    title: judgment findings が空でない場合に実 review-run へ進めないテストを追加する
    status: done
  - id: TRRP-M-10
    title: prompt quality review を gate 完了根拠にできないテストを追加する
    status: done
  - id: TRRP-M-11
    title: 実 TRIAD review-run の保存成果物と target manifest を機械条件にする
    status: done
    requirements:
      - prompt quality 通過済み criteria を使う
      - raw / parsed / rounds / model-result-summary / prompt-manifest / triage を保存する
      - target-manifest.yaml に実審査対象が入っていることを確認する
      - rounds.yaml の criteria が使用可判定済み criteria であることを確認する
      - 個別判断の raw / parsed / decision 証跡を一括 summary で上書きしない
  - id: TRRP-M-11A
    title: review-run 成果物不備を個別に fail-closed でテストする
    status: done
    test_cases:
      - preanalysis sufficiency audit 未通過なら criteria draft へ進めない
      - required_prompt_changes 未反映なら prompt quality review へ進めない
      - prompt-manifest.yaml がない review-run は有効扱いしない
      - target-manifest.yaml に実 target がない review-run は有効扱いしない
      - rounds.yaml の criteria が使用可判定済み criteria と一致しなければ有効扱いしない
      - raw / parsed / model-result-summary / triage のいずれかが欠けた review-run は利用者可視 gate へ進めない
  - id: TRRP-M-12
