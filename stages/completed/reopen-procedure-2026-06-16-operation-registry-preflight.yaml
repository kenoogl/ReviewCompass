      downstream impact decision で変更不要を記録する。
  rationale: 全 feature を impact review scope に含めることは、全 feature を reopen scope に含めることではない。今回の
    reopen scope は workflow-management のみであり、他 6 feature は consumer / derivative として契約変更要否を確認する。
