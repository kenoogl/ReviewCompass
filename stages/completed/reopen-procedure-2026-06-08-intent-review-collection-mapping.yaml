- feature: conformance-evaluation
  decision: reopen_existing_feature
  impact_basis: implementation_ownership
  rationale: 実装コードからの推定、既存上流文書との比較、契約所有候補、仕様更新草案を実装上の所有責務として持ち、レビュー収集を事前設定の写像にしない意図を直接受けるため。
  evidence:
  - .reviewcompass/specs/_cross_feature/reviews/2026-06-09-intent-feature-reopen-decision.md
  - .reviewcompass/specs/_cross_feature/reviews/2026-06-09-feature-impact-reopen-review-run/review_summary.md
