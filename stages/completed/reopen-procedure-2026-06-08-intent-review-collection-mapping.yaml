- feature: self-improvement
  decision: indirect_check_only
  impact_basis: consumer_or_derivative_only
  rationale: 観測事実と証跡を改善提案・履歴・ロールバックへ接続する後段であり、収集処理の判断主体ではないため。
  evidence:
  - .reviewcompass/specs/_cross_feature/reviews/2026-06-09-intent-feature-reopen-decision.md
  - .reviewcompass/specs/_cross_feature/reviews/2026-06-09-feature-impact-reopen-review-run/review_summary.md
