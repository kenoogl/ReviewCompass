    foundation 正本 `review_mode` に基づく比較データになっていません。
  rationale: Requirement 8 / T-009 では reports 出力に『レビューモード別比較データ』が必要で、design.md でも
    mode_comparison_report.json は evaluation の mode diff を加工したものとされています。しかし実装は `_count_by(evidence_entries,
    'mode')` を使っており、evidence_register の正式フィールド `review_mode` とも、mode_diff 系入力とも整合しません。入力
    evidence に `mode` が無ければ空集計になり得て、Required artifact を実質満たしません。
