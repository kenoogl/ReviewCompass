    などの analysis 所有語彙を定義したスキーマまで誤って foundation 再定義として扱います。
  rationale: T-011 は『foundation 7 語彙正本の参照のみ使用』の機械検証を完了条件にしていますが、このガードはスキーマ内のプロパティ名が
    foundation 語彙名と同じかだけを見るため、artifact_ref 内の `review_mode` 配列や evidence_register
