- severity: ERROR
  target_location: analysis/intake/intake_reader.py
  description: conformance-evaluation の読み込み失敗を conformance_evaluation_missing として記録しており、設計上求められる
    unreadable 系の取り込み失敗を区別できていません。
  rationale: design.md の Intake Failure Model は conformance-evaluation 成果物についても『欠落・読み込み失敗』を検知して構造化報告すると定めていますが、実装では
    _read_conformance_inputs() の JSON 読み込み失敗時も missing 扱いに丸められます。これにより上流欠落と形式不適合が識別不能になり、T-002
    の「欠落・読み込み失敗・陳腐化を検知」という完了条件と不整合です。
