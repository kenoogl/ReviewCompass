# yaml-audit 動作仕様
# レビューの仕組みの根幹を決める設定・動作仕様 yaml の書き込み後監査を定義する正本。デプロイ対象。
# 規律 docs/disciplines/discipline_yaml_audit.md と計画書 §5.8 補助層 E が本ファイルを参照する。

meta:
  name: yaml-audit-spec
  scope: 設定・動作仕様 yaml の書き込み後監査（対象範囲・観点・収束基準・初回検証・段階づけ）
  owner: workflow-management
  related:
    discipline: docs/disciplines/discipline_yaml_audit.md   # 行動規範
    plan: "docs/plan/reconstruction-plan-2026-05-21.md §5.8 補助層 E"  # 経緯・位置づけ（開発文書）
    sibling: .reviewcompass/specs/workflow-management/post-write-verification-spec.yaml  # md 用の姉妹監査
    config: "runtime/config/reviewcompass.yaml#review.yaml_audit"  # 設定値（検証者モデル・逐語リスト）【未整備：段階2以降に設ける予定の設定節】

scope_of_application:                    # 対象範囲（場所パターン方式）
  description: |
    5段ワークフローの成果物ではなく、5段の外側で直接編集される設定・動作仕様 yaml を対象とする。
    明示列挙ではなく場所と拡張子で機械判定する（対象が増えても自動で拾う）。
    specs 配下の yaml は動作仕様とみなす（5段成果物は md と spec.json。yaml を成果物にしない前提）。
    判定に迷う新規ファイル・新規ディレクトリは対象側に倒す。
  include:
    - "config/**/*.yaml"               # API などの設定
    - "runtime/config/**/*.yaml"       # reviewcompass.yaml などの設定
    - "stages/*.yaml"                  # 直下のみ。ワークフロー段の定義
    - ".reviewcompass/specs/**/*.yaml" # 各機能の動作仕様
  exclude:
    - "runtime/**/*.yaml"              # runtime 実装の成果物（ただし runtime/config/** は include 優先で対象、evaluation_rule 参照）
    - "tools/**/*.yaml"               # 実験データ
    - "docs/**/*.yaml"                # 記録
    - "stages/completed/**/*.yaml"    # 実行時の状態ファイル
    - "stages/in-progress/**/*.yaml"  # 実行時の状態ファイル
    - "**/*.md"                       # 5段成果物（別経路で検証）
    - "**/spec.json"                  # spec.json は補助層 C で検証
  evaluation_rule: |
    include に一致するファイルはすべて監査対象とする（exclude との重複がある場合も include が優先）。
    include に一致せず exclude に一致するファイルは監査対象外とする。
    runtime/config/**/*.yaml は include に明示されているため、exclude の runtime/**/*.yaml に
    形式上一致しても監査対象に残る。
    【実装注意 - 段階2以降】glob ライブラリによっては include/exclude 重複マッチで
    include 側が負けることがある。スクリプトは include を最終権限として処理すること。
  placement_rule: 設定ファイルは config/ か runtime/config/ に置く（置き場所のばらつきによる漏れ防止）

inspection_criteria:                    # 監査の観点（11 項目、2 系統）
  # 主キーは id（数値。promotion.targets が id を参照）。key は機械処理用の英語識別子。
  # A 系統：機械で静的に検査できる観点
  - id: 1
    key: syntax_validity
    series: A
    status: required
    name: 構文妥当性（yaml として壊れず読めるか）
  - id: 2
    key: structure_required_keys
    series: A
    status: required
    name: 構造・必須項目（期待する節・キーがそろっているか）
  - id: 3
    key: value_vocabulary
    series: A
    status: required
    name: 値の妥当性（列挙値が決められた語彙に収まるか）
  - id: 4
    key: reference_existence
    series: A
    status: required
    name: 参照の実在（他ファイルを指す参照先が実在するか）
  - id: 5
    key: discipline_plan_section_match
    series: A
    status: required
    name: 規律・計画書との節一致（参照される節が実物の yaml に存在するか）
  - id: 6
    key: single_source_consistency
    series: A
    status: required
    name: 単一正本・重複整合（同じ動作の重複値が一致するか）
  - id: 7
    key: downstream_code_test_impact
    series: A
    status: recommended            # 段階2で required に自動昇格（promotion 節）
    promote_when: machine_check_script_available
    name: 下流コード・テストへの波及（読むコード／テストが追従しているか）
  - id: 8
    key: verification_test_presence
    series: A
    status: recommended            # 段階2で required に自動昇格（promotion 節）
    promote_when: machine_check_script_available
    name: 検証テストの存在（構造・値を検査する自動テストがあるか）
  # B 系統：意味・原則の判断（独立検証で点検）
  - id: 9
    key: agreement_reflection
    series: B
    status: required
    name: 合意反映（値が利用者合意どおりか）
  - id: 10
    key: safe_default_discipline_consistency
    series: B
    status: required
    name: 安全側既定・規律との非矛盾（既定が安全側か、確定規律に反しないか）
  - id: 11
    key: deploy_dev_separation
    series: B
    status: required
    name: デプロイ／開発文書の分離（経緯の書きすぎ・動作定義の残置がないか）

promotion:                              # ⑦⑧の確実な必須化（3点セット）
  targets: [7, 8]
  current_status: recommended
  trigger: machine_check_script_available   # ⑦⑧それぞれの専用スクリプトが利用可能になったとき（①〜⑥とは別に整備）
  promoted_status: required
  forgetting_detector: |
    機械検査スクリプトが存在し、かつ id 7・8 が recommended のままの場合は、
    監査を warning（不合格）とする。必須化の漏れを機械的に検出する保険。
  reminders:                            # 同内容を 3 か所に多重記録
    - TODO_NEXT_SESSION.md
    - docs/disciplines/discipline_yaml_audit.md（段階づけの節）
    - .reviewcompass/specs/workflow-management/yaml-audit-spec.yaml（本ファイルの promotion 節）

verification:                           # 監査の方法
  independence: 起草者と別系統の検証者が行う（起草者の自己点検を禁止、起草者バイアス回避）
  method:
    A:                                  # A 系統（機械検査）の手段は段階で変わる
      stage1: independent_model_proxy   # 段階1：機械検査スクリプト未整備のため別系統モデルが代行
      stage2_plus: machine_check        # 段階2以降：機械検査スクリプト
    B: independent_review               # B 系統：post-write-verification の検証者を流用
  information_policy: 検証者には合意内容（決定の箇条書きのみ）と書き込み結果のみ渡す（情報最小化）
  on_incomplete_responses: escalate_to_human   # 必要な独立系統が揃わない場合は人へ
  same_family_substitute: requires_explicit_approval  # 同一系統内代替は既定で不可、明示承認時のみ

initial_verification:                   # 新規対象の組み入れ時（遡及とは別概念）
  rule: 新たに監査対象へ組み入れる yaml は、組み入れ時に全件を初回検証する
  rationale: |
    yaml はこれまで監査体制の外にあり一度も検証されていない。これは「過去への遡及」ではなく
    「これまで無監査だったものを初めて監査する初回適用」である。md 用書き込み後検証の
    「遡及しない原則」は既存監査体制の過去分の扱いであり、本初回検証とは別概念。
    ここで遡及しない原則を持ち出すのは筋違いで、監査されていないこと自体の悪影響を優先する。
  not_to_be_confused_with: post-write-verification の遡及しない原則

convergence_criterion:                  # 収束基準（md 用と同じ考え方）
  reuse_from: "post-write-verification-spec.yaml#convergence_criterion"  # 将来の機械処理向け参照注記。段階1では人が参照先の節を手動で確認する（機械的な継承・マージは未実装）。
  classify:
    - type: literal                     # 逐語的指摘
      action: skip                      # 収束を妨げない
    - type: substantive                 # 本質的指摘
      action: escalate_to_human         # 起草者が独断で修正せず人へ上げる
  tie_break: substantive                # 逐語か本質か迷えば本質側に倒す
  convergence_definition: 未解決の本質的指摘がゼロになれば収束。逐語的指摘だけが残る状況は実質収束。
  no_autonomous_loop: true              # 人なしの自律ループは設けない

implementation_stages:                  # 段階づけ（post-write-verification と同構造）
  stage1: 別系統モデルが観点①〜⑪を点検。阻止は起草者の自律判断（現状）
  stage2: A系統①〜⑥の機械検査スクリプト（tools/）＋自動テスト（tests/）整備。⑦⑧は専用スクリプト整備と同時に自動必須化（promotion 節の trigger 成立時に required へ昇格）。書き込み完了時に書き込み後フックで検証を起動し差し戻す（将来）
  stage3: commit／push 段で Git／IDE フックにより未検査の書き込みを機械的に差し戻す（将来。段階2の書き込み完了時フックに対し、本段は commit／push 時の最終関門）
