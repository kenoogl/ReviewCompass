criteria: "# Proxy Model Triage Decision Prompt: C1-C7\n\n## Role\n\nYou are acting\
  \ as `proxy_model` for a ReviewCompass implementation triad-review. Your task is\
  \ to make final triage decisions for finding clusters C1-C7.\n\nThis is not an implementation\
  \ request. Do not edit files. Decide the final triage label and explain the reasoning.\n\
  \n## Review Run\n\n- run_id: `2026-06-19-workflow-management-implementation-integrated-design-review-run`\n\
  - phase: `implementation`\n- gate: `stages/implementation.yaml#triad-review`\n-\
  \ review target: `.reviewcompass/specs/workflow-management/reviews/2026-06-19-workflow-management-implementation-integrated-design-review-run/review-target.md`\n\
  - triage summary: `.reviewcompass/specs/workflow-management/reviews/2026-06-19-workflow-management-implementation-integrated-design-review-run/raw-review-triage-summary.md`\n\
  - decisions input: `.reviewcompass/specs/workflow-management/reviews/2026-06-19-workflow-management-implementation-integrated-design-review-run/proxy-decisions/C1-C7.decisions-input.yaml`\n\
  \n## Source Raw Responses\n\nUse these raw responses as source evidence:\n\n- primary\
  \ / gpt-5.4: `raw/gpt-5.4.round-1.txt`\n- adversarial / claude-sonnet-4-6: `raw/claude-sonnet-4-6.round-1.txt`\n\
  - judgment / gemini-3.1-pro-preview: `raw/gemini-3.1-pro-preview.round-1.txt`\n\n\
  The parsed findings and cluster summary are in `raw-review-triage-summary.md`. If\
  \ a cluster summary overstates, understates, or misgroups the raw findings, adjust\
  \ the decision and explain why.\n\n## Current Context\n\nThe project is in reopen\
  \ procedure:\n\n- active gate: `stages/implementation.yaml#triad-review`\n- state\
  \ file: `stages/in-progress/reopen-procedure-2026-06-19.yaml`\n- scope: implementation\
  \ drafting review for approved Requirement 13 through Requirement 16 and tasks T-016\
  \ through T-019.\n\nDo not decide that the gate or phase is complete. This prompt\
  \ only asks for triage labels.\n\n## Labels\n\nUse the standard labels:\n\n- `must-fix`:\
  \ must be addressed before this implementation triad-review can be accepted.\n-\
  \ `should-fix`: should be addressed if practical before moving on; may be batched\
  \ into the review response.\n- `leave-as-is`: no change required; record only.\n\
  \nThese labels are operational labels, not closed reasoning choices. You may split\
  \ or merge clusters if the source evidence supports it, but each final cluster must\
  \ still receive one of these labels.\n\n## Cluster Proposals from Main Session\n\
  \n### C1: Drafting completion wording may imply premature state movement\n\nSource\
  \ finding ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-001`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-005`\n\
  \nDraft summary: The drafting document says implementation drafting is ready to\
  \ mark as complete and move to triad-review. That may be acceptable if it only records\
  \ drafting completion, but the wording may be read as letting implementation state\
  \ move too early.\n\nDraft label: `must-fix`\n\n### C2: T-017 lacks staged file\
  \ digest and proxy/human boundary test detail\n\nSource finding ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-002`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-002`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-gemini-3.1-pro-preview-judgment-001`\n\
  \nDraft summary: T-017 does not yet spell out concrete tests for staged file set\
  \ digest checks and the boundary between human-only decisions and proxy_model decisions.\n\
  \nDraft label: `must-fix`\n\n### C3: T-016 needs more concrete operation contract\
  \ and commit boundary tests\n\nSource finding ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-003`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-001`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-gemini-3.1-pro-preview-judgment-001`\n\
  \nDraft summary: T-016 names operation contract pieces, but does not list enough\
  \ concrete red tests for preconditions, postconditions, side effects, workflow-state\
  \ effects, and commit boundary bypass checks.\n\nDraft label: `should-fix`\n\n###\
  \ C4: T-018 needs review-run recording and migration boundary tests\n\nSource finding\
  \ ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-004`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-003`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-gemini-3.1-pro-preview-judgment-001`\n\
  \nDraft summary: T-018 should be clearer about how review-run records such as `rounds.yaml`\
  \ keep structured prompt manifest paths and hashes, and how old text-only records\
  \ are handled during migration.\n\nDraft label: `should-fix`\n\n### C5: T-019 needs\
  \ clearer phase and review-wave blocking tests\n\nSource finding ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-005`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-004`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-gemini-3.1-pro-preview-judgment-001`\n\
  \nDraft summary: T-019 should be clearer about Phase 0 through 6 entry and exit\
  \ conditions, forbidden operations, and checks that prevent review-wave consumer\
  \ impact from being marked complete too early.\n\nDraft label: `should-fix`\n\n\
  ### C6: Verification wording mixes executed checks and planned checks\n\nSource\
  \ finding ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-006`\n\
  \nDraft summary: The verification section can read as if planned checks were already\
  \ run.\n\nDraft label: `should-fix`\n\n### C7: Progress-reporting discipline and\
  \ current workflow records are consistent\n\nSource finding ids:\n\n- `2026-06-19-workflow-management-implementation-integrated-design-review-run-gpt-5.4-primary-007`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-006`\n\
  - `2026-06-19-workflow-management-implementation-integrated-design-review-run-claude-sonnet-4-6-adversarial-007`\n\
  \nDraft summary: The review found no problem with the new progress-reporting rule\
  \ or the current workflow records.\n\nDraft label: `leave-as-is`\n\n## Required\
  \ Output\n\nReturn YAML only:\n\n```yaml\nproxy_model_id: gemini-3.1-pro-preview\n\
  decisions:\n  - cluster_id: C1\n    final_label: must-fix | should-fix | leave-as-is\n\
  \    rationale: <decision rationale>\n    rejected_options:\n      must-fix: <why\
  \ rejected, if not selected>\n      should-fix: <why rejected, if not selected>\n\
  \      leave-as-is: <why rejected, if not selected>\n    apply_to_finding_ids:\n\
  \      - <source finding id>\n```\n\nIf you split or merge clusters, use stable\
  \ cluster ids such as `C1a` or `C2-C4` and include all affected `apply_to_finding_ids`.\n"
