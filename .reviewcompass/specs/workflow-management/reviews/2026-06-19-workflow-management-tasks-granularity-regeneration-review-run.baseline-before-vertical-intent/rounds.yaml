  \  - docs/reviews/reopen-classification-2026-06-19-wm-task-granularity-regeneration.md\n\
  ---\n\n# Review Target: workflow-management tasks / granularity regeneration\n\n\
  ## Review Purpose\n\nReview whether the regenerated `workflow-management` tasks\
  \ are now detailed enough to enter implementation drafting directly without a separate\
  \ `implementation-drafting.md` canonical artifact.\n\nThis review is limited to\
  \ the 2026-06-19 A-0 reopen scope: tasks.md task granularity for T-016 through T-019,\
  \ plus the state files that mark tasks drafting complete and keep later gates pending.\n\
  \n## Background\n\n- User requested continuation from `TODO_NEXT_SESSION.md`.\n\
  - Reopen classification was recorded as A-0 in `docs/reviews/reopen-classification-2026-06-19-wm-task-granularity-regeneration.md`.\n\
  - Commit `e239f6f4` saved the regenerated tasks and reopen state at the commit stop\
  \ point.\n- After the stop point was consumed, `spec.json` now marks only `workflow_state.tasks.drafting=true`;\
  \ tasks triad-review, review-wave, alignment, approval, and all implementation stages\
  \ remain false.\n- `stages/in-progress/reopen-procedure-2026-06-19.yaml` now records\
  \ `drafting_completed_gates: [stages/tasks.yaml#drafting]` and keeps the next gate\
  \ at `stages/tasks.yaml#triad-review`.\n\n## Target Files\n\n- `.reviewcompass/specs/workflow-management/requirements.md`\n\
  - `.reviewcompass/specs/workflow-management/design.md`\n- `.reviewcompass/specs/workflow-management/tasks.md`\n\
  - `.reviewcompass/specs/workflow-management/spec.json`\n- `stages/in-progress/reopen-procedure-2026-06-19.yaml`\n\
  - `docs/reviews/reopen-classification-2026-06-19-wm-task-granularity-regeneration.md`\n\
  \n## Required Checks\n\n1. Check whether T-016 through T-019 each contain enough\
  \ implementation-ready detail: implementation target files, first failing tests,\
  \ implementation order, completion conditions, verification commands, forbidden\
  \ actions, and stop conditions.\n2. Check whether the regenerated tasks let implementation\
  \ drafting proceed by writing tests and implementation code directly from `tasks.md`,\
  \ without requiring a separate canonical `implementation-drafting.md`.\n3. Check\
  \ whether T-016 correctly owns operation contract vocabulary, `required_action`\
  \ mapping, `effect_kind`, `phase_boundary`, operation contract schema, preconditions\
  \ / postconditions, side effects, and commit boundary enforcement without overwriting\
  \ T-014's operation registry / preflight responsibilities.\n4. Check whether T-017\
  \ gives implementation-ready coverage for approval gates, proxy_model / human decision\
  \ boundary, side track stack push / pop / current behavior, return conditions, workflow-state\
  \ snapshots, staged file set / digest checks, and drift detection.\n5. Check whether\
  \ T-018 gives implementation-ready coverage for structured effective prompt manifests,\
  \ language task I/O schema, prompt audit, source digest coverage, machine task separation,\
  \ `on_completion` constraints, and review-run recording compatibility.\n6. Check\
  \ whether T-019 gives implementation-ready coverage for Phase 0 through Phase 6\
  \ implementation plan, phase entry / exit criteria, forbidden operation checks,\
  \ proxy_model triage decision mechanization, human-required decision boundary, and\
  \ review-wave consumer impact blocking.\n7. Check whether T-016 through T-019 remain\
  \ traceable to requirements / design Requirement 13 through Requirement 16 and do\
  \ not introduce behavior that contradicts approved upstream documents.\n8. Check\
  \ whether `spec.json` and `stages/in-progress/reopen-procedure-2026-06-19.yaml`\
  \ accurately reflect only tasks drafting completion, without prematurely marking\
  \ tasks triad-review, review-wave, alignment, approval, implementation, commit,\
  \ or push complete.\n9. Check whether the task granularity discipline stated near\
  \ the top of `tasks.md` is actually satisfied by T-016 through T-019, including\
  \ the rule that each task can be worked from test to implementation to commit as\
  \ a coherent unit.\n\n## Out Of Scope\n\n- Do not request implementation code changes\
  \ during this tasks triad-review.\n- Do not judge unrelated older tasks unless they\
  \ directly contradict T-016 through T-019 or the task granularity policy.\n- Do\
  \ not reopen requirements or design unless T-016 through T-019 are untraceable or\
  \ contradictory against the already approved upstream documents.\n- Do not decide\
  \ proxy_model triage or apply fixes; this review only reports findings for human\
  \ presentation.\n\n## Finding Policy\n\n- Report `must-fix` for missing Requirement\
  \ 13 through 16 task coverage, task text that is not implementation-ready, stale\
  \ state that falsely claims an uncompleted gate, contradictions with approved requirements\
  \ / design, or any bypass of commit / approval / review boundaries.\n- Report `should-fix`\
  \ for ambiguity that is likely to cause manual judgment during implementation, unclear\
  \ task ownership, weak TDD starting tests, weak verification commands, or responsibility\
  \ overlap with earlier tasks.\n- Report `leave-as-is` or no finding when the regenerated\
  \ tasks are traceable, implementation-ready, and correctly scoped for a tasks drafting\
  \ artifact.\n"
