  target_location: 'Design Delta §2.2 — invalidation path: commit-approval invalidate
    + new prepare'
  plain_language_summary: The design requires issuing commit-approval invalidate followed
    by a new prepare in order to replace an abandoned delegation, but the design does
    not specify what happens to the existing approval record during invalidation.
    If invalidation consumes or mutates the approval record, a new prepare implies
    a new challenge cycle, which would break the nonce binding between the original
    staged-content approval and the new delegation.
