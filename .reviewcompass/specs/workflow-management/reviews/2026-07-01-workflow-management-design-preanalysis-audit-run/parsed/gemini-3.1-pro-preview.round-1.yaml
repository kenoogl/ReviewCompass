    of relying entirely on structured summaries.
  - The summary's list of 'Proposed judgment claims' omits explicit tracking of Req
    16 (active-scope) and Req 3 (proxy limits).
  unsupported_or_overconfident_parts: []
  bias_risks:
  - Using structured summaries for canonical source documents (like requirements.md)
    instead of their raw text introduces summary bias and risks missing subtle requirement
    nuances during a vertical transfer review.
