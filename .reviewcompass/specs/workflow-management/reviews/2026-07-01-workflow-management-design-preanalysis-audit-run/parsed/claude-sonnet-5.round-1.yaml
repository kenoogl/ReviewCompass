required_prompt_changes:
- Embed the full text (or verbatim relevant excerpts) of main-preanalysis.md in the
  bundle instead of a paraphrased summary, so its claims can be independently checked
  against sources rather than taken on faith.
- Add source material describing Requirement 12's content, or remove/replace the '§Req
  12 設計モデル §11' target location if it cannot be grounded in the provided requirements.md
  excerpts.
- Explicitly resolve and state whether the superseding-reopen-record policy (RPMR-Q3)
  is a settled requirement (with a specific requirement/acceptance ID) or remains
  an open policy question; if open, the future criteria question must not require
  design.md to encode it as already settled.
- Add an explicit target-location mapping in the manifest for the superseding-reopen-record-policy
  checklist item (checklist item 5), which currently has no corresponding design.md
  section listed.
- Add an explicit standalone checklist item for verifying transfer of the Requirement
  3 acceptance 5 proxy-authorization boundary, rather than leaving it implicit inside
  the compound primary question.
- Add a note in the future criteria draft that behavior-path source material (current
  code) is illustrative context only, not an authoritative definition of required
  design behavior, given that implementation is still pending triad-review under this
  reopen.
findings:
- severity: ERROR
  target_location: Main Preanalysis Under Audit section
  description: Only a paraphrased summary of main-preanalysis.md is included in the
    bundle; the actual preanalysis document content is not embedded.
  rationale: The audit criteria requires the bundle to contain 'the main session LLM
    preanalysis' so it can be independently compared against the source-material reconstruction;
    a summary prevents verifying whether specific preanalysis claims are grounded,
    overstated, or biased.
- severity: ERROR
  target_location: Review Target Manifest > Expected relevant target locations (design.md
    §Req 12 設計モデル §11)
  description: Requirement 12 is listed as an expected design.md target location but
    is never described in any embedded source material (requirements-contract or elsewhere).
  rationale: Without source content for Requirement 12, a reviewer cannot judge whether
    this design.md section faithfully transfers that requirement, making this target
    location unauditable as currently sourced.
- severity: ERROR
  target_location: Source Materials > reopen-protocol-mechanization-plan.open_policy_question
    (RPMR-Q3) vs requirements-contract.structured_summary
  description: The plan explicitly marks the superseding-reopen-record handling as
    an unresolved 'open_policy_question' (RPMR-Q3), while the requirements-contract
    summary states the same content as a settled must-requirement, with no reconciling
    citation or requirement/acceptance ID.
  rationale: If the policy is genuinely still open, the future review question must
    not hold design.md to a standard that has not been formally adopted; this contradiction
    must be resolved before the real review-run to avoid penalizing design.md for
    an unsettled requirement.
- severity: WARN
  target_location: Proposed Criteria Seed > required checks item 5 (superseding reopen
    record policy)
  description: None of the five listed 'Expected relevant target locations' in the
    Review Target Manifest clearly corresponds to the superseding-reopen-record-policy
    checklist item.
  rationale: Without a mapped target location, the future reviewer may not know where
    in design.md to look for this content, risking either a false 'missing' finding
    or an unfocused search across the whole file.
- severity: WARN
  target_location: Proposed Criteria Seed > primary question wording
  description: Requirement 3 acceptance 5 (proxy_model authorization boundary) is
    only referenced inside the compound primary question ('related active-scope/proxy-boundary
    contracts') and has no dedicated numbered checklist item like the other five focus
    areas.
  rationale: Leaving this check implicit increases the risk it is skipped or under-verified
    relative to the explicitly enumerated checklist items.
- severity: WARN
  target_location: Source Materials > behavior-path-source-summary
  description: Fail-closed detection order is sourced partly from current implementation
    code (tools/check-workflow-action.py), while current-reopen-state shows implementation
    triad-review as a still-pending gate.
  rationale: Using not-yet-approved implementation code as a normative source for
    what design.md 'should' specify risks anchoring the review to existing code behavior
    instead of the requirements contract, especially if the implementation itself
    needs to change under this reopen.
- severity: INFO
  target_location: Proposed Criteria Seed > required checks item 6
  description: Item 6 ('design-stage target/source/out-of-scope separation') is a
    meta-check about the reviewer's own scope discipline, mixed into a numbered list
    otherwise composed of design.md content-transfer checks.
  rationale: Separating meta/process checks from content-transfer checks in the eventual
    criteria draft would reduce ambiguity for whoever formalizes the prompt.
