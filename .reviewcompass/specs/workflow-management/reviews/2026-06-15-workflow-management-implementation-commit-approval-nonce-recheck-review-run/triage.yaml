  severity_original: ERROR
  severity_normalized: ERROR
  target_location: 'tools/check_workflow_action/commit_approval.py: consume_commit_approval
    (approval write before challenge consume)'
  plain_language_summary: 'consume_commit_approval writes the approval record as consumed
    first, then validates and consumes the nonce challenge. If challenge_path is missing/invalid
    or _mark_consumed fails, the function returns False but the approval record has
    already been persisted as consumed. This leaves an inconsistent state: approval
    marked consumed, challenge not consumed.'
  final_label: must-fix
  decision_status: decided
  decision_actor: user
  decision_actor_type: human
  decision_at: '2026-06-15T12:38:00Z'
  decision_reason: C1 intends atomic consumption of both approval and nonce challenge.
    A partial-success state (approval consumed, challenge live) can allow a stale
    challenge to remain reusable or, conversely, lock out a legitimate retry, undermining
    the single-use guarantee the recheck is meant to establish.
  applied_files: []
  superseded_by: null
