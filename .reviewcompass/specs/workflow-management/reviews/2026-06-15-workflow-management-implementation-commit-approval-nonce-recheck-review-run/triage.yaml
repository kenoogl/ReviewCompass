  target_location: 'tools/guarded-git-commit.py: consumption ordering relative to
    git commit'
  plain_language_summary: Per the description, consumption runs after a successful
    git commit, and consumption failures return non-zero after the commit has already
    landed. The recheck does not show how a non-zero exit after a successful commit
    is handled by callers, nor whether the commit is reconciled with the now-unconsumed/partially-consumed
    approval state.
  final_label: must-fix
  decision_status: decided
  decision_actor: user
  decision_actor_type: human
  decision_at: '2026-06-15T12:38:00Z'
  decision_reason: If the git commit succeeds but consumption fails (returning 2),
    the operation reports failure while the commit is permanent. This can mislead
    automation/users into retrying, and combined with the partial approval-write issue
    can leave approval/challenge records desynchronized from the actual repository
    state.
  applied_files: []
