  target_location: 'C3: tools/check_workflow_action/commit_approval.py _staged_status_map
    rename/copy parsing'
  plain_language_summary: The rename/copy branches use `i + 2 < len(parts)` and index
    `parts[i+1]`/`parts[i+2]`, advancing `i += 3`. The boundary condition `i + 2 <
    len(parts)` requires an element at index i+3 to exist; for a trailing R/C entry
    where i+2 is the last valid index, `i + 2 < len(parts)` is false and the entry
    would fall through to the else/default handling. No regression test demonstrates
    a rename/copy as the final staged entry.
  final_label: leave-as-is
  decision_status: decided
  decision_actor: user
  decision_actor_type: human
  decision_at: '2026-06-15T12:38:00Z'
  decision_reason: Off-by-one boundary handling on the last entry could mis-parse
    a trailing rename/copy, dropping the source deletion or mis-classifying the new
    path in the canonical target. C3 specifically targets exact-index digest edge
    cases, so trailing-entry rename/copy is exactly the kind of case that should be
    covered.
  applied_files: []
  superseded_by: null
