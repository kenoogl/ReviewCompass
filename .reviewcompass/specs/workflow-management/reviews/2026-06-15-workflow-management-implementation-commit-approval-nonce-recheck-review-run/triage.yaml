  target_location: 'C4: _require_target_digest digest validation'
  plain_language_summary: The digest validation accepts any 64-char hex string via
    int(digest, 16), which also accepts uppercase hex and a leading sign (e.g. '+'/'-'
    is rejected by length but not normalized for case). It does not enforce lowercase
    canonical form. If the canonical digest is produced lowercase but a challenge
    with uppercase hex of the same value is accepted, the subsequent string equality
    `challenge_digest.get('digest') != current['digest']` would reject it — but the
    validator passing uppercase masks intent.
  final_label: should-fix
  decision_status: decided
  decision_actor: user
  decision_actor_type: human
  decision_at: '2026-06-15T12:38:00Z'
  decision_reason: C4 aims to eliminate partial/loose inference. Accepting non-canonical
    digest casing at the validator layer is permissive; while the later equality check
    catches mismatches, the error surfaced would be a content-mismatch rather than
    a malformed-digest rejection, weakening diagnostic clarity for malformed input.
  applied_files: []
  superseded_by: null
