  target_location: 'tools/check-workflow-action.py: cmd_commit() / validate_commit_approval()'
  plain_language_summary: The commit gate reads a single static approval record at
    DEFAULT_COMMIT_APPROVAL_PATH (.reviewcompass/approvals/commit-approval.json) but
    does not verify that this record was created after the most recent staged file
    was modified. A stale approval record from a previous commit cycle that was not
    consumed (or was manually reset to consumed=false) will pass the gate even though
    it was issued for a different set of staged files.
  rationale: requirements.md Requirement 4 受入 2 states that '直前ゲートは毎回独立して走行する' and
    must re-detect state changes since session start. design.md §不可逆操作の直前ゲートモデル §2
    elaborates that the gate must not cache session-start results. A stale approval
    record undermines the independence guarantee. The test suite (test_commit_with_consumed_user_approval_returns_two)
    only checks the consumed flag, not whether the record post-dates the staged content.
  final_label: must-fix
  decision_status: decided
  decision_actor: gpt-5.5
  decision_actor_type: proxy_model
  decision_at: '2026-06-04T01:54:26.988276+00:00'
  important_gate_required: true
  applied_files: []
  superseded_by: null
  decision_reason: commit 承認が対象差分と強く結び付いていない場合、古い承認や別差分への承認流用が可能になり、レビュー済みでない内容が commit/push
    されるリスクが残る。staged file sha256 と作成時刻を approval record に記録し、commit/push 時に照合・監査できるようにする案が、承認の新鮮さと対象同一性を機械的に検証できるため最も妥当。push
    直前検査とも接続しやすく、ワークフロー上の安全性を直接改善する。
