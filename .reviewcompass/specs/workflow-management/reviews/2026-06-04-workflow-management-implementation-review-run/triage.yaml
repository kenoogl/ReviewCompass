    fields, but there is no requirement that raw API responses from each model be
    saved before triage proceeds. The design specifies that 'raw response を保存する' is
    a mandatory discipline, yet no field in the plan YAML or gate check enforces a
    raw_storage path or verifies that raw files exist prior to triage.
