    CRITICAL 相当の仕様不履行である。一方で stages/*.yaml の全パースおよび全 predicate 評価を即時実装するには影響範囲が広く、既存実装がどこまで対応済みかの確認なしに着手すると過剰改修や互換性破壊のリスクが高い。したがって、まず実装済み範囲との差分を確認し、completion_predicate
