  plain_language_summary: T-016 introduces stages/operation-contracts.yaml as the
    operation contract 正本 while T-014 already owns stages/operation-registry.yaml
    with operation contract fields (operation_id, kind, canonical_invocation, etc.).
    The tasks.md states T-014's registry is 参照側 and T-016 owns operation contract
    語彙/対応表, and T-016's 禁止事項 says 'T-014 の operation registry を operation contract
    正本として上書きしない'. However, design.md §Req 13 設計モデル §3 says 'stages/operation-registry.yaml
    は各 required_action について operation_contract を参照' — implying the registry references
    contracts, not a separate operation-contracts.yaml. The relationship between stages/operation-registry.yaml
    (T-014) and stages/operation-contracts.yaml (T-016) is not fully reconciled, and
    T-016's own 停止条件 flags this risk ('既存 preflight と contract の責務境界が衝突し、どちらを正本にするか判断が必要な場合').
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Required Check 3 asks whether T-016 owns operation contract vocabulary
    without overwriting T-014's responsibilities. The two YAML files (operation-registry.yaml
    and operation-contracts.yaml) create a potential dual-ownership ambiguity that
    the design suggests should be a single registry-referencing-contracts model. This
    is likely to cause manual judgment during implementation (which file is the contract
    正本). The task already records this as a stop condition, so it is recoverable,
    but the boundary should be clarified before implementation to avoid drift.
  applied_files: []
