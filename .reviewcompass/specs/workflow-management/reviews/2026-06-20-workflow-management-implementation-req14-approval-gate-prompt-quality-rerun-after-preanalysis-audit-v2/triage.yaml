  target_location: '## Review Target'
  plain_language_summary: The target manifest instruction correctly states that absent
    target path contents must trigger a CRITICAL finding. However, the instruction
    does not specify what constitutes 'absent' (empty file vs. path not injected vs.
    path yielding read error). Models may handle these three cases inconsistently,
    potentially treating an empty or minimal file as present and skipping the CRITICAL.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Without a clear definition of 'absent from the injected prompt,'
    the CRITICAL-on-absence safeguard may not fire for edge cases such as a zero-byte
    file or an injection error that substitutes a placeholder, leaving the review
    proceeding on incomplete target content.
  applied_files: []
  superseded_by: null
