  target_location: '## Required Checks / check 6'
  plain_language_summary: Check 6 contains an embedded negative instruction ('Do not
    report a violation merely because target code mentions or implements workflow-operation
    names') mixed with affirmative inspection guidance. This framing risks suppressing
    findings about code that both mentions and weakly implements an operation name
    when the weak implementation is the defect. The instruction may cause the model
    to undercount violations when operation names appear alongside incomplete boundary
    enforcement.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Negative framing intended to reduce false positives can inadvertently
    suppress legitimate findings about boundary defects when target code contains
    the right identifiers but wrong logic. The check should express this as a precision
    reminder rather than a finding-suppression rule.
  applied_files: []
  superseded_by: null
