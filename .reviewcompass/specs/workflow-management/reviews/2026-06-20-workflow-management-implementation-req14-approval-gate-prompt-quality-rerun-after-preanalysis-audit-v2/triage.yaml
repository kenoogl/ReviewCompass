  severity_original: INFO
  severity_normalized: INFO
  target_location: '## Finding Policy / severity labels'
  plain_language_summary: 'The Finding Policy uses ''Use CRITICAL if the model output
    or criteria would approve, delegate, or imply authorization…'' alongside ''Use
    CRITICAL for bypass of human-only approval.'' The second CRITICAL rule conflates
    two distinct subjects: (a) the review model''s own output authorizing operations,
    and (b) target code defects that bypass the boundary. Keeping these as separate
    labeled bullets would reduce the risk of a model treating a target-code bypass
    finding as requiring self-restraint rather than reporting.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Clarity in severity-label conditions prevents models from conflating
    self-constraint rules with target-defect reporting rules, which could cause under-reporting
    of target bypass defects.
  applied_files: []
  superseded_by: null
