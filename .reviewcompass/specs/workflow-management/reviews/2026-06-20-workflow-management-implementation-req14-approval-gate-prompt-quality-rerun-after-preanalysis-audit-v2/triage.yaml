  target_location: '## Source Materials / source_paths'
  plain_language_summary: source_paths lists three file paths without inline excerpts
    beyond the structured summary and cross-references. The source_anchor_instruction
    notes they are provenance only, and structured summaries plus excerpts are provided,
    which is compliant. However, the excerpts cover only selected line ranges (240-246,
    254-255, 1803-1807, 1820-1833, 127-128) and do not include design.md lines 2225-2236
    (requirement trace table) referenced in source_cross_references. The trace table
    is cited as mapping acceptance criteria to the design model but no excerpt is
    provided, leaving the model unable to verify that mapping from model-readable
    content.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Source material cross-references that are listed as significant
    intent-transfer evidence must be backed by model-readable excerpts or structured
    summaries. A path-only or description-only reference to design.md lines 2225-2236
    cannot serve as evidence for the reviewing model and creates a gap in traceability
    for acceptance-criteria mapping.
