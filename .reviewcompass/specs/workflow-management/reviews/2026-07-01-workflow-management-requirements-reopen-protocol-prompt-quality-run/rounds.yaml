  # API Review Prompt Quality Review Criteria


  Review the target prompt draft itself. Do not review the eventual feature artifact
  yet.


  The question is:


  Is the draft prompt suitable to use as the `--criteria-file` for the intended API-mediated
  review, given that the actual `--target` will be the target artifact named in the
  draft?


  If user-provided review requirements exist, also judge whether the draft prompt
  preserves and operationalizes those requirements without unauthorized narrowing,
  broadening, replacement, or added authority.


  ## Required Quality Checks


  Check both general LLM-as-Judge prompt quality and any workflow / phase-specific
  review requirements.


  ### General API Review Prompt Quality


  The prompt draft must:


  1. Show that main identified the materials and judgment points before sending the
  prompt.

  2. Include enough background and related context for the model to avoid guessing.

  3. Ask a non-leading analysis question.

  4. Define a scope that is neither too broad nor too narrow.

  5. Provide or rely on a fixed, parser-friendly output contract when combined with
  the API review runner template.

  6. Avoid credentials, personal data, or unrelated confidential material.

  7. Keep `--criteria-file` and `--target` roles distinct.

  8. Ensure the target manifest will contain the actual artifact under review.


  ### User Review Requirements Fit


  When the review was requested by a user or by a workflow-specific gate, the prompt
  draft must:


  1. Preserve the requested review purpose, review object, focus, scope boundaries,
  source materials, output requirements, and prohibited actions.

  2. Map those requirements into the review task, required checks, out of scope, and
  finding policy.

  3. Avoid narrowing the requested review so that important user-stated concerns disappear.

  4. Avoid broadening the requested review into unrelated judgments or downstream
  phase decisions.

  5. Avoid replacing the requested review question with a more convenient or generic
  question.

  6. Mark assumptions explicitly when the user requirement is ambiguous.

  7. Keep workflow-required checks distinguishable from user-requested checks when
  both apply.

  8. Prevent commit, push, phase completion, human approval delegation, or unapproved
  specification changes unless those actions are explicitly in scope and allowed by
  the governing workflow.


  ### Judgment Granularity


  The prompt draft must:


  1. Contain one primary judgment question.

  2. Avoid bundling multiple independent cluster, finding, acceptance, or design-policy
  judgments into one prompt.

  3. Split multiple independent judgments into separate prompt files unless they are
  inseparable parts of the same decision.

  4. Include only the source findings, upstream materials, target summaries, and output
  fields needed for the specific judgment item.

  5. Keep common background short enough that it does not obscure the item-specific
  evidence.

  6. Require separate prompt-quality review evidence for each item-specific prompt
  when the review is split.


  ### Source-Material Quality


  The prompt draft must:


  1. Clearly distinguish review target, source materials, and out-of-scope material.

  2. Avoid path-only source material listing.

  3. Include required source material as excerpt or structured summary in a model-readable
  form.

  4. Mark front matter paths as provenance when they are not model-readable content.

  5. Include unresolved or deferred items when they affect the target review.


  ### External API Material Policy


  The prompt draft may include ReviewCompass repository specifications, designs, tasks,
  review findings, structured summaries, and evidence paths when they are necessary
  for API review or proxy_model judgment and the user has approved that API/proxy
  execution.


  The prompt draft must:


  1. Exclude API keys, tokens, passwords, nonces, and other secrets.

  2. Exclude personal identifiers such as email addresses and phone numbers unless
  explicitly required and approved.

  3. Exclude third-party confidential material that is not allowed to be sent externally.

  4. Avoid unnecessary full logs or unrelated files.

  5. Use the minimum review-relevant excerpts or structured summaries needed for the
  judgment item.

  6. Not treat ordinary repository-internal specs, designs, review findings, or evidence
  paths as automatically prohibited solely because they are unpublished.


  ### Vertical Intent Transfer Requirements


  When the review is a phase review under `SESSION_WORKFLOW_GUIDE.md#vertical-intent-transfer-review`,
  the prompt draft must:


  1. Limit target judgment to the current phase artifact.

  2. Use upstream artifacts only for background and intent-transfer checking.

  3. Include upstream purpose, responsibility boundaries, acceptance criteria, forbidden
  actions, unresolved items, and intended target-phase transfer.

  4. Prevent the model from judging downstream tasks or implementation correctness
  unless downstream invention would be forced by a target omission.


  ### Output And Triage Fit


  The prompt draft must:


  1. Use severity labels compatible with the API parser: `CRITICAL`, `ERROR`, `WARN`,
  `INFO`.

  2. Give enough target-location guidance for findings to be triaged.

  3. Define when `findings: []` is acceptable.

  4. Avoid wording that suppresses findings about critical boundaries while merely
  trying to prohibit the model from authorizing operations.


  ## Finding Policy


  - Report `CRITICAL` if the draft prompt would authorize or imply authorization of
  irreversible operations, gate completion, or human-only approvals.

  - Report `CRITICAL` if the draft prompt would violate a user-stated prohibited action
  or authority limit.

  - Report `ERROR` if the draft prompt omits, weakens, broadens, or replaces a user-stated
  review requirement in a way that changes what will be reviewed.

  - Report `ERROR` if the draft prompt combines multiple independent judgments so
  that the model is likely to miss item-specific evidence, conflate labels, or produce
  unusable decisions.

  - Report `ERROR` if the draft prompt would likely cause models to review the wrong
  target, rely on summaries instead of the real target, miss required upstream-transfer
  obligations, leak secrets or prohibited third-party confidential material, or produce
  unusable output.

  - Report `WARN` if the draft prompt is usable but has avoidable ambiguity, framing
  bias, incomplete source-material presentation, weak target/source/out-of-scope separation,
  incomplete mapping from user requirements to checks, or mildly oversized common
  background.

  - Report `INFO` for minor wording or ergonomics improvements.

  - Return `findings: []` only if the draft prompt is safe to use for the intended
  API review.


  ## Output Contract


  Return YAML only with top-level key `findings`.


  Each finding must include:


  - `severity`: CRITICAL, ERROR, WARN, or INFO

  - `target_location`: specific section in the prompt draft

  - `description`: concise finding summary

  - `rationale`: why this matters for API review quality


  If there are no findings, return exactly:


  findings: []

  '
