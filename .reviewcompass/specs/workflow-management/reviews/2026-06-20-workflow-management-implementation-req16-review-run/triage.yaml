  decision_actor_type: human
  decision_at: null
  decision_reason: Req 16 requires proxy blocking when required evidence is missing
    or conflicting, when decision-scope is human_only, when approval gate is unresolved,
    when operation approval_required is true, and when review-wave impact evidence
    is unresolved, with priority on human-required predicates. The implementation
    only checks selected decision coverage, approval_required, a narrow subset of
    approval gate fields, and a boolean unresolved flag. It does not verify evidence
    completeness, conflicting evidence, finding/cluster coverage, final target mapping,
    or whether missing approval/review-wave records themselves force human-required
    handling, weakening the required proxy triage safety mechanics.
