- severity: WARN
  target_location: review-target.md § Tasks Drafting Changes To Review — T-006 completion
    conditions
  description: The review target lists 'expiry race' as a T-006 test requirement but
    does not explicitly state that the revalidation-immediately-before-write step
    (distinct from expiry race handling) is its own test case.
  rationale: 'design.md §2.2 specifies two distinct safety steps: (1) revalidation
    immediately before write, and (2) atomic write. Expiry race is a consequence of
    missing the first step, but a test that only verifies expiry-race rejection may
    not exercise the revalidation-before-write path directly. If the tasks text conflates
    these, an implementation could pass the race test without a true pre-write revalidation,
    leaving a gap between design intent and verified behaviour.'
- severity: WARN
  target_location: review-target.md § Tasks Drafting Changes To Review — T-011 traceability
  description: The traceability entry maps Requirement 4 acceptance 8 to T-004 / T-006
    / T-011, but the review target does not describe what portion of acceptance 8
    T-011 is responsible for. T-011's role relative to commit execution delegation
    is not stated.
  rationale: Without a description of T-011's specific responsibility for acceptance
    criterion 8, reviewers and implementers cannot confirm that the triad covers the
    full criterion or detect duplication. If T-011 owns, for example, the commit gate
    '--execution-actor llm' revalidation path, that should be stated explicitly; if
    it owns nothing new, the traceability entry is misleading and could cause confusion
    during implementation.
- severity: INFO
  target_location: review-target.md § Tasks Drafting Changes To Review — total task
    count remains 13
  description: The decision not to add a new task for commit-execution-delegation-formal-cli
    is noted but the rationale for folding all new work into T-004 and T-006 is not
    documented in the tasks text itself.
  rationale: While the design triad-review resolution (Option A) presumably justifies
    this, tasks.md readers who do not have access to the design review record cannot
    verify that the absorbed scope does not overload T-004 or T-006. A brief inline
    note in tasks.md referencing the Option A decision would make the rationale self-contained
    and reduce audit risk.
- severity: INFO
  target_location: review-target.md § Tasks Drafting Changes To Review — stdin normalization
    test requirements
  description: The review target lists 'stdin normalization' as a T-006 test requirement
    category but does not enumerate which of the eleven rejection conditions from
    design.md §2.2 must each have an independent test case.
  rationale: design.md §2.2 specifies eleven distinct rejection conditions (CR, CRLF,
    internal newline, multiple final LF, NUL, empty, whitespace-only, oversized, full-width
    Latin variants, and two affirmative normalizations). If tasks.md groups these
    under a single label without requiring per-condition coverage, test authors may
    implement a subset and consider the requirement satisfied. Enumerating required
    coverage in the completion conditions would prevent this gap.
- severity: INFO
  target_location: review-target.md § Review Questions — Question 7 (contradictions
    with T-013)
  description: The review target asks whether the update contradicts decision-source-lint
    T-013, but the tasks drafting section does not address T-013 at all, leaving this
