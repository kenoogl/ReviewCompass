  rationale: If T-013 (decision-source-lint) enforces rules about how delegation decisions
    are recorded or referenced in design artefacts, a tasks update that adds XDI-WM-001
    references to delegation could interact with those rules. The absence of any T-013
    analysis means a potential conflict is unverified. This is informational because
