  \ sha256:053858cf4abf94bd7b54bf8a45a8ca9504afef39ea8be48bd282193f95e84098\n- source_cross_references:\n\
  \  - requirements.md lines 238-255: Requirement 14 purpose and acceptance criteria\
  \ 1-3, 11, 12 define approval gates, record_human_decision separation, non-approved\
  \ decision blocking, digest/actor/source binding, proxy/human boundary, and read/write\
  \ operation separation.\n  - design.md lines 1788-1833: Req 14 design model defines\
  \ approval gate record fields, non-approved decision blocking, decision_scope derivation,\
  \ binding_kind/digest requirements, human-only override set, and proxy_model limits.\n\
  \  - design.md lines 2225-2236: Requirement trace table maps Req 14 acceptance criteria\
  \ to the Req 14 design model.\n  - tasks.md lines 127-128: Implementation tasks\
  \ require proxy_model gating and explicitly state proxy_model is limited to implementation\
  \ policy judgment, not commit, push, spec.json update, or phase transition.\n- source_anchor_instruction:\
  \ source_anchors are provenance. Do not attempt to verify hashes during this review.\
  \ If injected source excerpts or target code visibly contradict the structured summary\
  \ or cross-reference descriptions above, report the discrepancy as WARN or ERROR\
  \ according to impact.\n- source_label_instruction: If a source excerpt is visibly\
  \ inconsistent with its file label, line range, or anchor description, report WARN\
  \ against Source Materials; report ERROR if the mismatch changes required approval-gate\
  \ behavior.\n- source_conflict_instruction: If source excerpts and the structured\
  \ summary visibly conflict, treat the source excerpts as higher-priority evidence\
  \ for this review. If the conflict cannot be resolved from provided material, report\
  \ WARN against Source Materials; report ERROR if the conflict changes required approval-gate\
  \ behavior.\n\nSource excerpts (model-readable upstream source text):\n\n- requirements.md\
  \ lines 240-246:\n  - \"保守担当者が、不可逆操作の承認、予期しない側道作業、現在状態の可視化を、LLM の暗黙解釈ではなく機械可読な状態として扱えるようにする。\"\
  \n  - \"本機能は承認ゲートを、`wait_for_human_decision` と `record_human_decision` のペア、およびその後の\
  \ `next --json` による分岐として扱う。`record_human_decision` が完了した事実は、対象操作が承認された事実と同一視しない。\"\
  \n  - \"承認、拒否、保留、修正要求の各判断は、対象 operation ID、対象 `required_action`、対象 artifact または\
  \ staged file set digest、判断者、判断時刻、出典を持つ。\"\n- requirements.md lines 254-255:\n \
  \ - \"commit、push、spec.json 更新、phase approval、reopen finalize、approval_required\
  \ な不可逆操作の実行許可は human-only decision として扱い、proxy_model decision だけで通過させてはならない。\"\n\
  \  - \"状態を書き換える push / pop / consume / invalidate / save 系操作と、状態を読む current / snapshot\
  \ / inspect 系操作を同一 operation として曖昧化してはならない。\"\n- design.md lines 1803-1807:\n  -\
  \ \"`approved` 以外の判断は対象不可逆操作へ進めない。\"\n  - \"`decision_scope` は最低限 `human_only`、`proxy_allowed`、`advisory_only`\
  \ の 3 値とする。\"\n  - \"`binding_kind=none` は `wait_for_human_decision`、`collect_required_decisions`、`completed`\
  \ のような read-only / wait-only operation に限る。\"\n- design.md lines 1820-1833:\n  -\
  \ \"`decided_by=proxy_model` かつ `decision_scope=human_only` の record は承認として扱わず、`next\
  \ --json` は対象不可逆操作へ進めない。\"\n  - \"human-only decision の初期集合は commit、push、`spec.json`\
  \ 更新、phase approval、reopen finalize、`approval_required=true` の不可逆 operation 実行許可とする。\"\
  \n  - \"proxy_model は finding triage、同根 cluster の採否案、補助的な整合判断を代行できる。ただし proxy_model\
  \ decision は human-only decision の承認主体を置換しない。\"\n- design.md lines 2225-2236:\n\
  \  - \"Requirement 14：承認ゲート、側道スタック、状態スナップショット\" maps acceptance criteria 1-3 and\
  \ 11-12 to the Req 14 design model, including `decision_scope` / `binding_kind`\
  \ / digest binding and proxy / human decision boundaries.\n- tasks.md lines 127-128:\n\
  \  - \"`explicit_human_approval_recorded` 述語は `actor=proxy_model` の場合 `reviewcompass.yaml#human_proxy.proxy_allowed`\
  \ を参照して代行可否を機械判定する。\"\n  - \"proxy_model 代行は実装方針判断に限定し、コミット・プッシュ・spec.json 更新・フェーズ移行には使わない。\"\
  \n\nStructured Summary (model-readable upstream intent):\n\n- purpose: Treat irreversible-operation\
  \ approval as machine-readable state, not as implicit LLM conversation context.\n\
  - responsibility_boundaries:\n  - Approval gate records distinguish approved, rejected,\
  \ deferred, and changes_requested decisions and bind them to the target operation,\
  \ required_action, artifact or staged file set digest, actor, time, and source.\n\
  \  - record_human_decision records a decision but does not itself authorize the\
  \ target operation; next --json decides whether to proceed, stay blocked, redraft,\
  \ or repair.\n  - proxy_model may support triage or advisory judgments, but commit,\
  \ push, spec.json update, phase approval, reopen finalize, and approval_required\
  \ irreversible operations remain human-only.\n- acceptance_criteria:\n  - Approval\
  \ gate schema and implementation enforce decision_scope, binding_kind, digest binding,\
  \ source metadata, and non-approved decision blocking.\n  - proxy_model decisions\
  \ cannot satisfy human_only decisions and cannot replace human approval.\n  - Focused\
  \ tests cover approved, rejected, deferred, changes_requested, stale digest, wrong\
  \ actor/source, and proxy/human boundary behavior.\n- forbidden_actions:\n  - Do\
  \ not treat record_human_decision completion as target-operation approval.\n  -\
  \ Do not let proxy_model pass a human_only approval boundary.\n  - Do not use binding_kind\
  \ none for approval-required irreversible operations.\n- unresolved_or_design_deferred_items:\n\
  \  - No approval-gate-specific deferred items are currently recorded for this review.\
  \ Any later claimed deferred item must not weaken the human-only approval boundary\
  \ in the current implementation.\n- unresolved_items_review_rule: If the target\
  \ claims resolved behavior for an unresolved item without implementation evidence,\
  \ report WARN or ERROR according to impact.\n- intended_target_phase_transfer:\n\
  \  - Implementation should expose approval gate validation and tests covering human/proxy\
  \ boundaries, digest binding, and non-approved decision blocking.\n\n\n## Vertical\
  \ Intent Transfer Customization\n\nPhase chain:\n\n- requirements.md -> design.md\
  \ -> tasks.md -> implementation\n\nThe upstream artifacts in this phase chain are\
  \ represented by the model-readable structured summary, source excerpts, and cross-references\
  \ in Source Materials above. Use those upstream materials only for background and\
  \ transfer checking. Limit target judgment to the current phase artifact.\n\n##\
  \ Required Checks\n\n1. Check the target against the single judgment item: Req 14\
  \ approval gate implementation upstream transfer.\n2. Check that the target satisfies\
  \ preserved user review requirements.\n3. Check that source materials are used only\
  \ for background or required intent transfer.\n4. Check that no finding depends\
  \ on unstated assumptions or path-only source material.\n5. Respect review-run authority\
  \ limits: do not approve, authorize, delegate, or imply approval of commit, push,\
  \ spec.json update, phase completion, gate completion, or human-only approval. This\
  \ is a reviewer behavior constraint, not a target finding.\n6. Actively inspect\
  \ whether the target code omits, weakens, contradicts, or bypasses required approval-gate\
  \ behavior. Mentions of workflow-operation names are not sufficient evidence by\
  \ themselves; schema field presence alone is not sufficient evidence of enforcement.\
  \ Base findings on behavior, such as allowing or risking proxy_model decisions,\
  \ non-approved decisions, stale digests, missing bindings, or wrong actor/source\
  \ records to satisfy a human-only boundary. If a target file is present but contains\
  \ only stub, placeholder, or non-enforcing content for required approval-gate behavior,\
  \ treat that as missing or weakened behavior according to impact.\n7. Check each\
  \ preserved review focus item:\n  - approval/proxy human-only boundary\n  - approval\
  \ decision binding and digest checks\n\n## Out Of Scope\n\n- side track stack behavior\n\
  - workflow-state snapshot behavior\n- The reviewing model must not approve, authorize,\
  \ delegate, or imply approval of commit, push, spec.json update, phase completion,\
  \ gate completion, or human-only approval.\n- These limits constrain this review\
  \ run and the reviewing model; target code may still be reviewed when it omits,\
  \ weakens, contradicts, or bypasses required approval-gate behavior.\n- Do not judge\
  \ downstream correctness unless a target omission would force downstream invention.\n\
  \n## Finding Policy\n\n- Use CRITICAL for target behavior that bypasses human-only\
  \ approval or irreversible-operation boundaries.\n- Use CRITICAL if a listed target\
  \ path is absent from the injected prompt, because the review target is incomplete.\n\
  - Use ERROR for missing required behavior, weakened user requirements, or unsupported\
  \ target behavior.\n- Treat stub, placeholder, or non-enforcing target content as\
  \ missing or weakened behavior according to impact.\n- Use WARN for meaningful ambiguity,\
  \ weak traceability, or coverage gaps.\n- Use INFO only for minor non-blocking improvements.\n\
  - Traceable evidence means a target file plus the narrowest available anchor for\
  \ every checked claim, such as a line number, function name, schema field, JSON\
  \ Pointer path, CLI option, fixture, or test case.\n- For JSON schema targets, prefer\
  \ schema field names or JSON Pointer paths over line numbers when they are the narrowest\
  \ anchor.\n- If required behavior is absent and no implementing anchor exists, state\
  \ that no implementing code, schema field, fixture, or test case was found for the\
  \ required behavior.\n- For each finding, identify the target file and the narrowest\
  \ available location such as line number, function, schema field, or test case.\n\
  - Return findings: [] if and only if every required check passes with traceable\
  \ evidence and no deviation from the preserved review requirements or upstream intent.\n"
