criteria: "---\ncriteria_id: workflow-management-implementation-req14-approval-gate-transfer-review-criteria\n\
  phase: implementation\nstatus: draft_for_prompt_quality_review\n---\n\n# workflow-management\
  \ implementation req14-approval-gate-transfer API Review Criteria\n\n## Review Task\n\
  \nReview the target for: Req 14 approval gate implementation upstream transfer.\n\
  \nPrimary judgment question:\n\nDoes the target satisfy Req 14 approval gate implementation\
  \ upstream transfer, while carrying upstream purpose, responsibility boundaries,\
  \ acceptance criteria, forbidden actions, unresolved items, and intended transfer\
  \ without any of the following?\n\n- omission\n- weakening\n- contradiction\n- unsupported\
  \ addition\n- drift\n\nLimit findings to this judgment item.\n\n## User Review Requirements\n\
  \n- Review purpose: workflow-management implementation triad-review\n- Review object:\
  \ Req 14 approval gate implementation artifacts\n- Review focus:\n  - approval/proxy\
  \ human-only boundary\n  - approval decision binding and digest checks\n- Scope\
  \ boundaries:\n  - In scope:\n    - approval gate schema, implementation, CLI integration,\
  \ and focused tests\n  - Out of scope:\n    - side track stack behavior\n    - workflow-state\
  \ snapshot behavior\n- Output requirements:\n  - parser-compatible findings\n- Prohibited\
  \ actions:\n  - commit\n  - push\n  - spec.json update\n  - phase completion\n-\
  \ Requirement-to-prompt mapping:\n  - Review purpose -> Review Task, Required Checks,\
  \ and Vertical Intent Transfer Customization\n  - Review focus -> Required Checks\n\
  \  - Scope boundaries -> Review Target and Out Of Scope\n  - Output requirements\
  \ -> Finding Policy\n  - Prohibited actions -> Out Of Scope and Finding Policy CRITICAL\
  \ rules\n\n## Generic API Review Core\n\n- Keep criteria and target roles distinct.\n\
  - Treat the target files as the only review target.\n- Treat source materials as\
  \ background or intent-transfer evidence, not as targets.\n- Do not use path-only\
  \ source materials as model-readable evidence.\n- Preserve user review requirements\
  \ without narrowing, broadening, or replacement.\n- Exclude credentials, personal\
  \ identifiers, third-party non-sendable confidential material, and unrelated logs.\n\
  - Return parser-compatible findings only.\n\n## Review Target\n\n- `.reviewcompass/schema/approval_gate.schema.json`\n\
  - `tools/check-workflow-action.py`\n- `tools/check_workflow_action/approval_gate.py`\n\
  - `tests/workflow-management/test_approval_gate.py`\n\nAt the actual review-run,\
  \ pass every path listed here as --target. The API runner reads and injects those\
  \ file contents into the model prompt; this section is the target manifest, not\
  \ a substitute for target content.\nIf any one or more listed target path contents\
  \ are absent from the injected prompt, report CRITICAL against Review Target and\
  \ do not return findings: [].\nIf any listed target path is absent, stop the review\
  \ after reporting the CRITICAL target-incompleteness finding; do not continue with\
  \ partial target review.\nFor multi-target runs, treat a path as present only when\
  \ the Target document contains a heading or label with the exact target path followed\
  \ by non-empty file content. For the standard runner, the expected per-target heading\
  \ form is `## <target path>`.\nTreat a path as absent if the prompt does not contain\
  \ an exact target-path section or label for that path, if a read error or placeholder\
  \ is shown instead of file content, or if the injected section is empty.\n\nDo not\
  \ treat this criteria file, a wrapper, or an author-written summary as a substitute\
  \ for the target.\n\n## Source Materials\n\n### workflow-management-req14-approval-gate-upstream-intent\n\
  \nPurpose: Requirement 14 / design / tasks intent for approval gates and human-only\
  \ approval boundaries.\n\n- source_paths:\n  - .reviewcompass/specs/workflow-management/requirements.md\n\
  \  - .reviewcompass/specs/workflow-management/design.md\n  - .reviewcompass/specs/workflow-management/tasks.md\n\
  - source_paths_note: source_paths are provenance only; use the structured summary\
  \ fields below as the model-readable upstream intent material.\n- source_material_injection_note:\
  \ The structured summary, source excerpts, and cross-references in this section\
  \ are model-readable upstream intent material. They must be present inline in the\
  \ criteria prompt and must not be replaced by path-only references.\n- source_language_note:\
  \ Source excerpts may be in Japanese while structured summary fields may be in English.\
  \ Treat both as model-readable upstream intent material; when translation or wording\
  \ appears to conflict, prefer the source excerpts and report the discrepancy according\
  \ to the conflict instructions.\n- source_anchors:\n  - .reviewcompass/specs/workflow-management/requirements.md\
