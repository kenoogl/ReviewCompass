  target_location: 'tools/check_workflow_action/approval_gate.py: HUMAN_ONLY_REQUIRED_ACTIONS'
  plain_language_summary: The `HUMAN_ONLY_REQUIRED_ACTIONS` set does not include `commit`,
    `push`, or `spec_json_update` as required actions, although upstream design (requirements.md
    lines 254-255, design.md lines 1820-1833) lists `commit`, `push`, `spec.json update`,
    `phase approval`, and `reopen finalize` as the initial human-only decision set.
    `finalize_reopen` is present, but `commit_stop_point` is the only commit-adjacent
    entry and neither `push` nor `spec_json_update` appear.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: If the operation registry uses required_action identifiers such
    as `push` or `update_spec_json` that do not appear in HUMAN_ONLY_REQUIRED_ACTIONS,
    `derived_decision_scope` will fall through to lower-priority checks. Depending
    on the operation contract shape, a push or spec.json update could be classified
    as `proxy_allowed` rather than `human_only`. This is a coverage gap relative to
    the upstream human-only boundary definition.
  applied_files: []
  superseded_by: null
