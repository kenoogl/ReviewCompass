  severity_normalized: ERROR
  target_location: 'tools/check_workflow_action/approval_gate.py: validate_approval_gate_record,
    allows_target_operation'
  plain_language_summary: The `decided_by` field is never validated against its allowed
    value set. The schema defines `decided_by` as an enum of `user`, `human`, `proxy_model`,
    `llm`, but the implementation contains no check that rejects an out-of-enum or
    unexpected actor value. An invalid `decided_by` (e.g., `decided_by='llm'`) passes
    validation without error.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Upstream design (design.md lines 1820-1833) requires that `decided_by=proxy_model`
    and `decision_scope=human_only` records are not treated as approval. While the
    proxy/human_only check in `allows_target_operation` catches `proxy_model`, the
    absence of a decided_by enum validation means the field can carry arbitrary strings.
    This weakens the actor/source binding required by acceptance criteria (binding
    actor, source) and may allow unexpected actor values to slip through undetected.
  applied_files: []
  superseded_by: null
