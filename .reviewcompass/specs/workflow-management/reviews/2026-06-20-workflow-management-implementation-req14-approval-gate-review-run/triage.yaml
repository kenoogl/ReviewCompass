  target_location: 'tests/workflow-management/test_approval_gate.py: test_binding_kind_none_is_allowed_only_for_wait_only_operations'
  plain_language_summary: The wait-only `binding_kind=none` positive test uses `decision_scope='advisory_only'`,
    but the `_allows_binding_none` implementation requires `approval_required=False`,
    `effect_kind='read'`, and `phase_boundary='none'`. The test does not verify that
    a wait-only operation with `decision_scope='proxy_allowed'` or `decision_scope='human_only'`
    and `binding_kind=none` is also blocked. Coverage for the boundary between `advisory_only`
    and other scopes with `binding_kind=none` is absent.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Upstream acceptance criteria require focused tests covering the
    proxy/human boundary and binding/digest checks. The existing test exercises one
    valid path but does not exercise the reject path where a non-advisory scope is
    combined with `binding_kind=none` for a wait-only operation, leaving a gap in
    the required test coverage.
  applied_files: []
  superseded_by: null
