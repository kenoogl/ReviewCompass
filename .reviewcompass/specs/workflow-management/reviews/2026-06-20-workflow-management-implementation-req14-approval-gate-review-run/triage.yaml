  target_location: 'tools/check_workflow_action/approval_gate.py: allows_target_operation'
  plain_language_summary: The `consumed` guard only checks for `consumed is True`,
    but never marks or enforces that a record is consumed after use. The function
    checks `record.get('consumed') is True` and blocks, but there is no write-path
    or enforcement mechanism preventing the same unconsumed record from being passed
    to `allows_target_operation` multiple times. Replay of an approval gate record
    is not prevented at the validation layer.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 'Upstream acceptance criteria require that record_human_decision
    completion is not conflated with target-operation approval, and that non-approved
    decisions block operations. Single-use consumption enforcement is part of the
    gate binding model (schema `consumed: boolean`). Without any replay-prevention
    check or documentation of enforcement responsibility, the current implementation
    is ambiguous about whether the consumed field is ever set to true, leaving an
    unsupported gap that could allow the same approval record to be reused.'
  applied_files: []
  superseded_by: null
