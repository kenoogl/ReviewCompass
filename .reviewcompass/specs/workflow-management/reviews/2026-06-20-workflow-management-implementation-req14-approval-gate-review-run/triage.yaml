  plain_language_summary: Human-only approval can be satisfied by non-human actors
    other than proxy_model.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: allows_target_operation only rejects decided_by=proxy_model when
    decision_scope=human_only, while the schema explicitly permits decided_by=llm
    and the implementation does not validate decided_by against a human-only allowlist.
    An approved human_only record with decided_by=llm can therefore be allowed for
    commit/reopen/approval_required operation contracts, weakening the required human-only
    boundary.
