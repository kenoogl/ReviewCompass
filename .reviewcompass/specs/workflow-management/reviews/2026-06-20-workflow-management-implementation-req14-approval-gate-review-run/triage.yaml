  target_location: 'tools/check_workflow_action/approval_gate.py: validate_approval_gate_record'
  plain_language_summary: The `source_ref` and `source_digest` fields are only checked
    for presence (via REQUIRED_RECORD_FIELDS), but their content is never validated.
    There is no check that `source_digest` is a non-empty string in the expected hash
    format, and no check that `source_ref` is non-empty beyond its inclusion in the
    required-fields list.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 'Upstream design (requirements.md lines 240-246) binds each decision
    to its source (`source_ref`, `source_digest`). Accepting blank or structurally
    invalid source fields would weaken the source-binding guarantee. The schema enforces
    `minLength: 1` on both fields, but the Python validation does not apply this constraint.'
  applied_files: []
