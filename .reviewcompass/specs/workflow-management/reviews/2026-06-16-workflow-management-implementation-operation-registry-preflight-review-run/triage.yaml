    only when `next_action` is a dict, but the default path passes `next_action=None`
    for DEVIATION/missing-operation responses, and for non-workflow_cli families (review_artifact,
    commit_approval_chain, session_record_capture, deployment_export, nested_issue_control)
    the response is constructed without ever populating `next_action`. There is no
    shown code path that adapts `next --json` for any operation other than workflow
    next, so for the other five families `state_refs.next_action` is null and several
    declared dimensions are never produced. The Test Evidence only demonstrates the
    dimension set for `workflow_next_preflight`.'
