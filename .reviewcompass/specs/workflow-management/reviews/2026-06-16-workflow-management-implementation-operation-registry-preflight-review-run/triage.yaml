  target_location: tools/check_workflow_action/operation_preflight.py KNOWN_INVOCATIONS
  plain_language_summary: The known-invocation registry hard-codes per-script option
    sets (e.g. `next`, `review-run create`, `decide`, deployment export) in a second
    source of truth that is fully decoupled from the actual argparse parsers defined
    in check-workflow-action.py and the api_providers tools. There is no test or mechanism
    asserting that KNOWN_INVOCATIONS stays in sync with the real parsers, so any flag
    added/renamed/removed in the real CLI silently diverges, causing the preflight
    to report false DEVIATION (or false OK) on correct invocations.
  final_label: must-fix
  decision_status: decided
  decision_actor: human
  decision_actor_type: human
  decision_at: '2026-06-16T06:19:24.284015+00:00'
