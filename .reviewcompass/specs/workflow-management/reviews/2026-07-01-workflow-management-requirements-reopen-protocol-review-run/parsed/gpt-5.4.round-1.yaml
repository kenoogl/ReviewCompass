findings:
- severity: WARN
  target_location: Requirement 5 acceptance criterion 7
  description: The requirements require `next --json`, `reopen-finalize`, and commit
    preflight to fail closed when edited-phase gates or downstream impact decisions
    are missing, but they do not explicitly preserve the policy that commit preflight
    is only a final guard and must not become the first normal detection point.
  rationale: The upstream reopen-protocol intent distinguishes early detection (`next
    --json`, `reopen-finalize`) from final commit-time protection. AC7 names all three
    surfaces, but its wording can be satisfied even if implementations detect the
    defect only at commit preflight in normal flow. Because the guarded process failure
    specifically involved late detection, the requirements should state the ordering/role
    distinction explicitly to avoid downstream weakening or reinvention.
