- severity: WARN
  target_location: tasks.md T-016 完了条件5 / design.md §Requirement 12 設計モデル §1, §Requirement
    13 設計モデル §3
  description: T-016 は operation contract (`stages/operation-contracts.yaml`) と operation
    registry (`stages/operation-registry.yaml`) の二正本分離と digest 同期規則を新規導入しているが、その分離は
    requirements Requirement 13 にも design.md にも明示的な根拠がない。requirements Requirement
    13 受入 3 は『operation contract 上の effect_kind、実行主体、approval_required の対応を registry
    または同等の機械可読定義で表す』とし、registry と contract を同一物として扱う余地を残している。design.md §Requirement
    13 設計モデル §3 も『stages/operation-registry.yaml は各 required_action について operation_contract
    を参照し』とするが、T-014 が既に operation-registry.yaml に contract field（effect_kind 等）を持たせているため、T-016
    が contract を別ファイル正本へ移す決定は tasks 段で新たに導入された設計判断である。
  rationale: 上流（design.md）が二ファイル正本分離・digest 同期規則を確定していないのに tasks がそれを完了条件・禁止事項として固定すると、design
    に根拠のない実装制約を tasks が追加したことになる（unsupported addition）。実装時に registry/contract の正本境界の設計判断を強いる。design
    でこの分離を確定するか、T-016 が registry 内表現も許容する形にして整合させるべき。
- severity: WARN
  target_location: tasks.md T-017 完了条件2 / design.md §Requirement 14 設計モデル §1, requirements
    Requirement 14 受入 1-3
  description: T-017 完了条件2は『proxy_model decision は人間承認を置換しない対象と、代行可能な判断対象を schema
    / gate で区別する』を要求するが、requirements Requirement 14 と design.md §Requirement 14 設計モデルには
    approval gate における proxy_model の代行可否境界の規定がない。requirements Requirement 14 受入 1-3
    は decided_by を user | proxy_model とするのみで、どの判断を proxy が代行できないかの境界を定めていない。proxy
    非代行範囲（commit・push・spec.json 更新・フェーズ移行）は requirements Requirement 3 受入 5 由来だが、T-017
    はこれを承認ゲート schema/gate の区別要件として持ち込んでおり、design.md §Requirement 14 にこの境界設計がない。
  rationale: 上流に proxy 代行可否境界の設計が無いまま tasks が schema/gate での区別を完了条件にすると、実装段で『どの decision
    を proxy 非代行とするか』の境界設計を実装者が判断することになる（implementation-time design judgment の強制）。design.md
    §Requirement 14 で proxy 代行可否境界を明示するか、T-017 の該当条件を Requirement 3 受入 5 への参照に限定して整合させるべき。
- severity: INFO
  target_location: tasks.md T-019 完了条件5 / requirements Requirement 16 受入, design.md
    §Requirement 16 設計モデル
  description: T-019 完了条件5 の human-required predicate は『triage item、approval gate
    record、operation contract の approval_required、review-wave impact evidence の未解決状態から導出され、判定元が欠ける場合は
    DEVIATION』として、provider/model 名に依存しない機械可読述語として具体化されている。requirements Requirement
    16 受入には human-required 述語の具体的な導出元列挙はないが、design.md §Requirement 16 設計モデル §1 が『human-required
    decision は triad item / approval gate record / operation contract の approval_required
    / review-wave impact evidence のいずれかで明示的に machine-readable に出る場合だけ blocker として扱う』として導出元を確定しており、tasks
    はこれを忠実に継承している。proxy_model に human-only 判断を通過させない要件（Requirement 16 受入 5-9）も最初の失敗テスト
    test_human_required_decision_blocks_proxy_application で machine-checkable に固定されている。上流意図が欠落・弱体化なく実装可能粒度へ落ちている。
  rationale: T-019 の human-required predicate は design の導出元定義を正しく継承し、provider/model
    名に依存しない条件として明示され、ベースライン C3（T-019 human-required 述語）の懸念に対応している。指摘ではなく良好な意図伝達の記録。
