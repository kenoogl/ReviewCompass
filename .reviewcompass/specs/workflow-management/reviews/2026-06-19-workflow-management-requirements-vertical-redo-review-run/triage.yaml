  target_location: .reviewcompass/specs/workflow-management/requirements.md Requirement
    14 Acceptance Criteria 8-10
  plain_language_summary: The workflow-state snapshot requirements omit the upstream
    boundary that snapshot generation must be read-only and must not become a mutating
    state-management path.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The upstream decision materials distinguish state visualization
    from state mutation and require clear read-only versus mutating operation boundaries.
    Requirement 14 says the snapshot is a byproduct and not the source of truth, but
    it does not explicitly forbid snapshot generation/update from mutating workflow
    state or being used as a repair/write path. Without that prohibition, downstream
    design could drift into using snapshot save/update operations as hidden state
    mutation.
  applied_files: []
  superseded_by: null
