  decision_reason: 'JSON Schema Draft 2020-12 は `$comment` キーワードをサポートしており、機械可読な形でスキーマ自体に意図を残せる。明記しない場合、将来の実装者が「後方互換フィールドはもう不要になった」と誤判断して
