  target_location: 案イ：`$id` を省略する／テスト・検証コードの骨格
  plain_language_summary: '案イの登録コードでは `next_action_response.schema.json` を `response_uri`
    で登録しているが、バリデータに渡す際にどの URI を基底 URI として与えるかが示されていない。`Draft202012Validator(response,
    registry=registry)` のように dict を直接渡すと、`$id` がないスキーマの基底 URI は登録キーではなく空文字列（または未定義）になり、`$ref:
    "./required_action.schema.json"` の解決先が `required_action.schema.json` のみとなって `file://`
    キーと一致しない可能性がある。'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: '`referencing` ライブラリでは、スキーマを Registry に登録したキー（retrieval URI）は `$id`
    がない場合のみ基底 URI として機能するが、それはバリデータがそのキーを起点にスキーマを取得した場合に限られる。`Resource.from_contents()`
    に `$id` なしスキーマを渡しただけでは、バリデータが相対 `$ref` を解決する際の基底 URI として登録キーが自動採用されるとは限らない。設計文書はこの動作を「基底
    URI は登録キーになる」と断定しているが、実際には `retrieve` 経由での取得か、`Resource` 構築時に retrieval URI を明示しない限り保証されない。具体的には
    `referencing.Resource` の `__init__` に `default_specification` を与えるか、`Registry`
    の `retrieve` コールバックで file URI を解決する実装が必要になる。'
  applied_files: []
  superseded_by: null
