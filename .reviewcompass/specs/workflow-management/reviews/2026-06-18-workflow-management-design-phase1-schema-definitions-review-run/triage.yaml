  plain_language_summary: '`$id` に `urn:reviewcompass:schema:required_action` という
    URN 形式を使いながら、参照側で `$ref: "./required_action.schema.json"` という相対ファイルパスを使用している。URN
    ベースの `$id` を持つスキーマに対して相対パス参照を行う場合、JSON Schema Draft 2020-12 の仕様上、基底 URI が URN
    になるため相対パスの解決が未定義となる。バリデータ実装によって動作が異なり、参照解決に失敗するリスクがある。'
  final_label: must-fix
