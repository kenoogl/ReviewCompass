  decision_reason: 3者レビュー（クラスタ A）および cluster-a-eval 2ラウンドの評価を経て Case ウ（URN $id + 絶対 URN
    $ref）を採用することを利用者が「承認」。`$ref` を `"urn:reviewcompass:schema:required_action"` に変更することで
    URN 基底 URI に対する相対パス解決の問題を回避する。
