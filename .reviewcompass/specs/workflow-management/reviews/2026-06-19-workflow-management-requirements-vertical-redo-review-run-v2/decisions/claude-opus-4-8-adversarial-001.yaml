rationale: The approval boundary is materially important because upstream intent says
  record_human_decision records a decision but does not itself authorize an approval-required
  operation. However, the described surrounding requirements already state this boundary
  in Requirement 13 AC6 and Requirement 14 AC1 and AC3, so the requirements set is
  not missing the rule. Adding a local cross-reference in AC5 would reduce downstream
  misread risk and improve traceability, but the issue is not blocking for requirements
  triad-review.
