findings:
- severity: ERROR
  target_location: tools/check_workflow_action/commit_approval.py — delegate_execution
    duplicate-unexpired check
  description: The duplicate-unexpired delegation guard reads the existing record's
    expires_at and treats a missing/unparseable expires_at (expires_at is None) as
    expired, allowing overwrite. Since the record's expires_at is copied from approval["expires_at"],
    a tampered or malformed existing delegation file with a removed/garbled expires_at
    would be silently treated as eligible for overwrite rather than triggering a fail-closed
    invalidation. Treating an unparseable timestamp on an existing unconsumed record
    as 'not present, so overwrite is fine' is a fail-open posture for a security-relevant
    gate.
  rationale: For irreversible-operation gates the design mandates fail-closed behavior.
    A malformed unconsumed delegation record should not be silently overwritten as
    if it were expired; that path could be used to mask or replace a prior delegation
    without explicit invalidation.
- severity: WARN
  target_location: tools/check_workflow_action/commit_approval.py — delegate_execution
    TOCTOU re-validation
  description: delegate_execution re-validates the approval record and canonical target
    digest just before _atomic_write_json, but the staged_file_set_digest stored in
    record_data is computed from the earlier `current` snapshot, while the post-check
    only compares canonical_target(cwd)["digest"] to current["digest"]. The file-set
    digest is not independently re-verified against a fresh canonical snapshot at
    write time. If the overall canonical digest collision were possible across differing
    file-set compositions, the stored staged_file_set_digest could be stale. This
    is a narrow gap given the digest covers entries, but the re-check is asymmetric
    with what is persisted.
  rationale: The document claims tight binding to current index (Review Question 3).
    The pre-write re-validation should re-derive every persisted digest from the same
    fresh snapshot to fully close the TOCTOU window, rather than re-checking only
    the aggregate target digest.
- severity: WARN
  target_location: Target document §Implementation Evidence / validate_commit_execution_delegation
