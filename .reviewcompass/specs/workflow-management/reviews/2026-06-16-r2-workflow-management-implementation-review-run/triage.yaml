  severity_original: ERROR
  severity_normalized: ERROR
  target_location: tools/check_workflow_action/commit_approval.py — delegate_execution
    duplicate-unexpired check
  plain_language_summary: The duplicate-unexpired delegation guard reads the existing
    record's expires_at and treats a missing/unparseable expires_at (expires_at is
    None) as expired, allowing overwrite. Since the record's expires_at is copied
    from approval["expires_at"], a tampered or malformed existing delegation file
    with a removed/garbled expires_at would be silently treated as eligible for overwrite
    rather than triggering a fail-closed invalidation. Treating an unparseable timestamp
    on an existing unconsumed record as 'not present, so overwrite is fine' is a fail-open
    posture for a security-relevant gate.
  final_label: must-fix
  decision_status: decided
  decision_actor: user
  decision_actor_type: agent
  decision_at: '2026-06-15T23:46:54.556084+00:00'
  decision_reason: 利用者発言『次へ』により対処承認。既存実装は malformed expires_at を未消費 record として遮断していたためコード変更は不要だったが、回帰テストを追加して
    fail-closed を機械固定した。
  applied_files: []
  superseded_by: null
