  plain_language_summary: The trailing-LF handling rejects text ending in '\n\n' ('末尾
    LF は 1 個まで') then strips a single trailing '\n'. Combined with the later internal-newline
    rejection this is sound, but the order means an input of exactly '\n' (only a
    newline) is reduced to '' and caught by the empty check; an input like '  コミット  \n'
    is handled. Behavior appears correct; flagging only that the 256-byte limit is
    measured on the raw source_bytes before stripping/normalization, which is the
    safe choice.
