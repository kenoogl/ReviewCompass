  severity_original: WARN
  severity_normalized: WARN
  target_location: tools/check_workflow_action/commit_approval.py — delegate_execution
    TOCTOU re-validation
  plain_language_summary: delegate_execution re-validates the approval record and
    canonical target digest just before _atomic_write_json, but the staged_file_set_digest
    stored in record_data is computed from the earlier `current` snapshot, while the
    post-check only compares canonical_target(cwd)["digest"] to current["digest"].
    The file-set digest is not independently re-verified against a fresh canonical
    snapshot at write time. If the overall canonical digest collision were possible
    across differing file-set compositions, the stored staged_file_set_digest could
    be stale. This is a narrow gap given the digest covers entries, but the re-check
    is asymmetric with what is persisted.
  final_label: should-fix
  decision_status: decided
  decision_actor: user
  decision_actor_type: agent
  decision_at: '2026-06-15T23:46:54.619095+00:00'
  decision_reason: 利用者発言『次へ』により対処承認。保存直前の fresh canonical target から target_digest
    と staged_file_set_digest を再設定するように修正した。
  applied_files: []
  superseded_by: null
