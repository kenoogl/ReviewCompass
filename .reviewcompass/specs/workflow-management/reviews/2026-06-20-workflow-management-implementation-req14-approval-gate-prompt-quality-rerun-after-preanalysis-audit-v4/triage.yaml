  target_location: Source Materials / source_anchor_instruction
  plain_language_summary: The instruction says 'Do not attempt to verify hashes during
    this review.' This is correct, but the prompt does not tell the model what to
    do if a source excerpt is visibly inconsistent with its sha256 anchor label (e.g.,
    a wrong file is injected under that label). The source_conflict_instruction handles
    summary-vs-excerpt conflict, but not anchor-label-vs-content conflict.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: A mislabeled excerpt injected under the wrong anchor would silently
    corrupt intent-transfer checking. A brief instruction covering visible anchor-label
    mismatches would prevent silent errors.
  applied_files: []
  superseded_by: null
