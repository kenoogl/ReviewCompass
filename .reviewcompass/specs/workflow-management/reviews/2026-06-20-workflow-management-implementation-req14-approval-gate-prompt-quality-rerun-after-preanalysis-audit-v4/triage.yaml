  target_location: Review Target (target manifest section)
  plain_language_summary: The target manifest lists four paths but does not specify
    what the API runner will inject or confirm injection of source material excerpts.
    The prompt correctly states that source_paths are provenance-only and that structured
    summary fields are model-readable, but there is no analogous explicit confirmation
    that the structured summary and source excerpts are injected rather than being
    path-referenced. In practice the summary is inline, so this is low risk, but the
    asymmetry between target-injection verification (explicit CRITICAL rule) and source-material
    injection (implicit) creates a minor ambiguity.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: If the source excerpts were ever refactored to path-only references,
    no rule would catch the regression. Making the injection expectation symmetric
    would close this gap.
  applied_files: []
  superseded_by: null
