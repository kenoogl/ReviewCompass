  target_location: Required Checks / check 6
  plain_language_summary: Check 6 instructs the model to actively inspect whether
    target code omits, weakens, contradicts, or bypasses required approval-gate behavior,
    and provides useful behavioral examples. However, it does not instruct the model
    on what to do when a required target file is readable but empty or contains only
    stub/placeholder content (as opposed to a path being absent). The CRITICAL rule
    in Finding Policy covers path absence but not stub content.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: A stub file present with non-empty placeholder content would pass
    the path-presence check but would fail most behavioral checks. Covering this case
    explicitly in Required Checks or Finding Policy would prevent a gap between path-presence
    and behavioral adequacy.
  applied_files: []
  superseded_by: null
