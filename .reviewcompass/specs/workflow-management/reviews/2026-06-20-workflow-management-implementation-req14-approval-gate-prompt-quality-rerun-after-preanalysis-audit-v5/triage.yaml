  target_location: Required Checks / check 6
  plain_language_summary: 'Check 6 includes the instruction: ''If a target file is
    present but contains only stub, placeholder, or non-enforcing content for required
    approval-gate behavior, treat that as missing or weakened behavior according to
    impact.'' This is a correct and important instruction, but it appears inline within
    check 6 rather than in the Finding Policy section where severity mappings are
    defined. A reviewing model reading Finding Policy first may miss this stub-treatment
    rule when forming its severity labels.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 'Prompt-quality check for output consistency: placing enforcement
    rules in Required Checks and severity rules in Finding Policy creates a split
    that can cause the reviewing model to apply incorrect severity to stub findings.
    Moving or cross-referencing the stub rule in Finding Policy would improve consistency.'
  applied_files: []
  superseded_by: null
