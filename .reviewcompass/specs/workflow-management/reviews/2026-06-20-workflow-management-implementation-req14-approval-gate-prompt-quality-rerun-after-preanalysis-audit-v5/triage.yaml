  target_location: Source Materials / source_paths_note and source_material_injection_note
  plain_language_summary: The criteria states that source_paths are provenance only
    and that the structured summary fields are the model-readable upstream intent
    material. However, the structured summary and source excerpts are written in a
    mix of Japanese (requirements.md and design.md excerpt text) and English (Structured
    Summary fields). The criteria does not instruct the reviewing model how to handle
    potential translation discrepancy between the Japanese excerpt text and the English
    structured summary if they appear to conflict.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The source_conflict_instruction prioritizes source excerpts over
    the structured summary when they conflict, but if the reviewing model does not
    read Japanese with full fidelity, it may under-weight the Japanese excerpts or
    fail to detect a conflict between the Japanese excerpt and the English summary.
    An explicit note acknowledging the bilingual material and confirming that both
    are authoritative would reduce ambiguity.
  applied_files: []
  superseded_by: null
