  plain_language_summary: The design defines proxy_model triage decision human-required
    predicates using 5 evidence sources, but bases proxy triage application partly
    on 'triage item の decision_status, final_label, decision_actor_type' rather than
    restricting entirely to the evidence sources listed in Requirement 16. Specifically
    Requirement 16 forbids basing proxy triage on provider/model names but the design
    does not violate that. However, the design does not specify the predicate evaluation
    order as a machine-checkable algorithm—it lists 4 priority rules in prose but
    does not specify what constitutes '未解決 approval gate' or 'approval_required=true
    の対象 operation' in terms of the fields already defined in §Req 13 and §Req 14,
    leaving the connection ambiguous. Additionally, Requirement 16 requires that 'human-required
    evidence always outranks proxy approval' but the design gives this as a prose
    rule rather than as a formal pre-condition in the operation contract for proxy_triage_apply_batch,
    meaning tasks must invent the enforcement mechanism.
