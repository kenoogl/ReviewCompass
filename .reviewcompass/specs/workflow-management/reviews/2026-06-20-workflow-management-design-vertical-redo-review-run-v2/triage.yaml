  plain_language_summary: 'The design lists the human-only decision initial set as:
    commit, push, spec.json update, phase approval, reopen finalize, and approval_required=true
    irreversible operation execution. However the design does not specify the machine-checkable
    predicate by which next --json distinguishes proxy_allowed from human_only at
    the decision gate boundary—specifically it does not define how decision_scope
    is set on a given approval gate record, who sets it, and what the source of truth
    is. The design states ''decided_by=proxy_model かつ decision_scope=human_only の
    record は承認として扱わない'' but does not define how decision_scope gets populated for
    each of the 19 required_action values. This leaves the proxy/human boundary ambiguous
    enough that tasks must invent it.'
