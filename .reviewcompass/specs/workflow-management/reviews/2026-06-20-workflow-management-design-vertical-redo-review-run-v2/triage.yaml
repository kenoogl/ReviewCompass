  target_location: "§Req 13 設計モデル §5 — registry/preflight read-only boundary"
  plain_language_summary: The design correctly states that preflight reads operation
    contracts and does not execute, update, or consume approvals. However it does
    not explicitly state that the registry itself (stages/operation-registry.yaml)
    must not contain effect_kind, approval_required, or phase_boundary fields—only
    that such fields must not be duplicated from contract to registry. The prohibition
    on registry re-definition is stated as a fail-closed integrity check condition
    but the design does not state it as a structural constraint on registry schema.
    Tasks may interpret the integrity check as a runtime guard rather than a schema-level
    prohibition, potentially allowing registry authors to add such fields and rely
    on the check to catch it.
  final_label: must-fix
