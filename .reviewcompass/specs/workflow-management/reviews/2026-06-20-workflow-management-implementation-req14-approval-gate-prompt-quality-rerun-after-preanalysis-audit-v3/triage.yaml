  target_location: Finding Policy / traceable evidence definition
  plain_language_summary: The finding policy defines traceable evidence as 'a target
    file plus the narrowest available anchor.' The phrase 'narrowest available anchor'
    is slightly ambiguous when the target is a schema file where line numbers may
    be less stable than field names. Adding 'schema field name preferred over line
    number for JSON schema targets' would improve anchor consistency.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Minor ergonomics improvement; does not affect correctness of the
    review but would make findings easier to triage against the schema file specifically.
