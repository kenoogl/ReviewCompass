  severity_original: WARN
  severity_normalized: WARN
  target_location: Review Target / target manifest instruction
  plain_language_summary: The target manifest instructs the model to report CRITICAL
    if any listed path is absent from the injected prompt, which is correct. However,
    it does not define what constitutes a 'clearly labeled section.' Different API
    runner templates use different heading conventions, so the absence-detection rule
    may be applied inconsistently across runners, risking false CRITICAL reports or
    missed absences.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Ambiguous absence-detection language can cause the model to misjudge
    completeness of the injected target, producing either suppressed findings or spurious
    CRITICALs, both of which degrade triage usefulness.
  applied_files: []
