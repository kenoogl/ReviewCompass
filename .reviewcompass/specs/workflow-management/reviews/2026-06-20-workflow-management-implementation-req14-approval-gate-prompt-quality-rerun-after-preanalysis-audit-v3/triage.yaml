  severity_original: WARN
  severity_normalized: WARN
  target_location: Source Materials / source_paths_note
  plain_language_summary: The source_paths_note states source_paths are provenance
    only and instructs the model to use structured summary fields as model-readable
    evidence. However, the criteria does not include an explicit fallback instruction
    for cases where an injected source excerpt visibly conflicts with the structured
    summary in a way that cannot be resolved without the full source text. This leaves
    the model without a triage rule when excerpt and summary diverge beyond what the
    WARN/ERROR anchor-instruction covers.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Without a conflict-resolution rule, the model may suppress a finding
    or produce an unusable result when summary and excerpt text differ materially,
    reducing review reliability.
  applied_files: []
  superseded_by: null
