  severity_original: WARN
  severity_normalized: WARN
  target_location: Required Checks / check 6
  plain_language_summary: Check 6 instructs the model to actively inspect target code
    for omission, weakening, contradiction, or bypass, and lists specific behavioral
    risks (proxy_model decisions, stale digests, missing bindings, wrong actor/source).
    This is useful specificity. However, the check does not explicitly state that
    schema field presence alone is not sufficient evidence of enforcement; the model
    might accept a schema field definition as evidence of binding without verifying
    that the implementation actually enforces it at decision time. A brief clarifying
    clause would close this gap.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Schema fields can be defined without enforcement in implementation
    code. Without an explicit instruction to verify enforcement rather than mere definition,
    the model may produce false-negative findings on human-only boundary checks.
  applied_files: []
