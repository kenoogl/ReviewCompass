findings:
- severity: ERROR
  target_location: 論点 A（受入11 (6) action_parameters の6フィールド）
  description: 「含める」という表現では、6フィールドの必須性（全て required か）と追加フィールド（additionalProperties）の許容可否が判断できず、TDDにおいてテストの期待値が一意に定まらない。
  rationale: 要件フェーズで「6フィールドを必須とする」および「追加フィールドの扱いは許可/禁止する（またはdesignで確定する）」と明示しない限り、テスト実装者とスキーマ実装者間で、未知のフィールドを含むJSONをバリデーションエラーとするかどうかの解釈が割れ、重大な手戻りを引き起こすブロッカーとなるため。
- severity: WARN
  target_location: 論点 D（受入11 (5) pending_gates の整合条件）
  description: 後方互換フィールドと正本フィールド間の値の整合条件、およびそれをスキーマで検証するのかランタイムで検証するかの責任境界が要件として未定義である。
  rationale: JSON Schemaの標準仕様では、動的なフィールド間の値比較（`pending_gates` == `future_gates`）を検証することは極めて困難である。要件フェーズで「スキーマはオプションの型定義に留め、値の整合性検証はランタイム・アプリケーションの責務とする」と境界を明示しておかないと、設計フェーズで実現困難なスキーマ実装を試みるリスクや解釈差を生むため。
