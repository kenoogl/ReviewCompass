criteria: "---\ncriteria_id: workflow-management-implementation-req15-structured-effective-prompt-transfer-review-criteria\n\
  phase: implementation\nstatus: prompt_quality_reviewed_nonblocking_warnings_addressed\n\
  ---\n\n# workflow-management implementation req15-structured-effective-prompt-transfer\
  \ API Review Criteria\n\n## Review Task\n\nReview the target for: Req 15 implementation\
  \ upstream transfer for structured effective prompt and prompt audit.\n\nPrimary\
  \ judgment question:\n\nDoes the target satisfy Req 15 implementation upstream transfer\
  \ for structured effective prompt and prompt audit, while carrying upstream purpose,\
  \ responsibility boundaries, acceptance criteria, forbidden actions, unresolved\
  \ items, and intended transfer without omission, weakening, contradiction, unsupported\
  \ addition, or drift?\n\nDo not combine multiple independent judgments in this prompt.\
  \ If another cluster, finding, artifact, or design-policy judgment is needed, create\
  \ a separate criteria file and run separate prompt-quality review.\n\n## User Review\
  \ Requirements\n\n- Review purpose: workflow-management implementation triad-review\n\
  - Review object: Req 15 implementation artifacts\n- Review focus:\n  - language\
  \ task and machine task separation\n  - effective prompt manifest and metadata recording\n\
  \  - prompt audit fail-closed checks\n- Scope boundaries:\n  - In scope:\n    -\
  \ Req 15 schemas, implementation, compatibility paths, and focused tests\n  - Out\
  \ of scope:\n    - Req 14 approval gate state\n    - Req 16 proxy triage decision\
  \ mechanics\n- Output requirements:\n  - parser-compatible findings\n- Prohibited\
  \ actions:\n  - commit\n  - push\n  - spec.json update\n  - phase completion\n-\
  \ Requirement-to-prompt mapping:\n  - Review purpose -> Review Task and Required\
  \ Checks\n  - Review focus -> Required Checks\n  - Scope boundaries -> Review Target\
  \ and Out Of Scope\n  - Prohibited actions -> Out Of Scope and Finding Policy\n\n\
  ## Generic API Review Core\n\n- Keep criteria and target roles distinct.\n- Treat\
  \ the target files as the only review target.\n- Treat source materials as background\
  \ or intent-transfer evidence, not as targets.\n- Do not use path-only source materials\
  \ as model-readable evidence.\n- Ask one non-leading primary judgment question.\n\
  - Preserve user review requirements without narrowing, broadening, or replacement.\n\
  - Exclude credentials, personal identifiers, third-party non-sendable confidential\
  \ material, and unrelated logs.\n- Return parser-compatible findings only.\n\n##\
  \ Review Target\n\nThe authoritative target file set is\n`.reviewcompass/specs/workflow-management/reviews/2026-06-20-workflow-management-implementation-review-run/req15-review-target-manifest.md`\n\
  and the target files supplied by the review runner. The list below is an orientation\n\
  copy only; if it diverges from the manifest or runner target set, treat the manifest\n\
  and runner target set as authoritative and report the mismatch.\n\n- `.reviewcompass/schema/language_task_io.schema.json`\n\
  - `.reviewcompass/schema/effective_prompt_manifest.schema.json`\n- `tools/check-workflow-action.py`\n\
  - `tools/check_workflow_action/effective_prompt_builder.py`\n- `tools/check_workflow_action/prompt_audit.py`\n\
  - `tools/api_providers/run_role.py`\n- `tools/api_providers/run_review.py`\n- `tests/workflow-management/test_language_task_io_schema.py`\n\
  - `tests/workflow-management/test_effective_prompt_manifest.py`\n- `tests/workflow-management/test_prompt_audit.py`\n\
  - `tests/workflow-management/test_prompt_manifest_rounds_recording.py`\n- `tools/api_providers/tests/test_run_role.py`\n\
  - `tools/api_providers/tests/test_run_review.py`\n\nDo not treat this criteria file,\
  \ a wrapper, or an author-written summary as a substitute for the target.\n\n##\
  \ Source Materials\n\n### workflow-management-req15-upstream-intent\n\nPurpose:\
  \ Requirement 15 / design / tasks intent for structured effective prompts and prompt\
  \ audit.\nThis is a structured summary of the upstream phase chain, paraphrased\
  \ from\n`.reviewcompass/specs/workflow-management/requirements.md`,\n`.reviewcompass/specs/workflow-management/design.md`,\
  \ and\n`.reviewcompass/specs/workflow-management/tasks.md`. Use it as intent-transfer\n\
  evidence; do not treat it as a replacement for target files.\n\n- purpose: Treat\
  \ effective prompts as structured language-task specifications while keeping machine\
  \ tasks in operation contracts, preflight, runners, and guards.\n- responsibility_boundaries:\n\
  \  - Effective prompt structure owns decision_point, preconditions_checked, language_task,\
  \ postconditions, and on_completion.\n  - language_task owns document_kind, input,\
  \ output_format, and constraints for the LLM's language work.\n  - Machine operations\
  \ such as commit, push, spec.json mutation, review-run execution, approval consume,\
  \ and state mutation are not embedded as LLM instructions.\n  - Prompt audit checks\
  \ structure, references, anchors, length bounds, manifest/target consistency, language_task/output/postcondition\
  \ correspondence, and next action compatibility.\n  - LLM judge audit is semantic\
  \ assistance only and must not automate final approval.\n- acceptance_criteria:\n\
  \  - Effective prompt manifest schema validates required sections and source references.\n\
  \  - generated prompt metadata preserves compatibility with effective_prompt_path\
  \ and effective_prompt_sha256 in next_action and review-run rounds.\n  - prompt\
  \ audit rejects missing required structure, broken refs, unknown action kind, review\
  \ target manifest mismatch, machine task leakage, unverified preconditions, and\
  \ impossible postconditions.\n  - prompt audit findings are structured and do not\
  \ depend on provider or model identity.\n  - run_role.py and run_review.py record\
  \ effective prompt path and sha256 when provided.\n- forbidden_actions:\n  - Do\
  \ not summarize away required source material into path-only prompts when the review\
  \ requires upstream intent transfer.\n  - Do not place machine execution procedures\
  \ in the language_task as if the LLM should perform them manually.\n  - Do not delete\
  \ existing rounds.yaml compatibility fields while adding manifest metadata.\n  -\
  \ Do not let LLM judge audit act as final approval.\n- unresolved_or_design_deferred_items:\n\
  \  - Phase 6 LLM judge audit is later than the mechanical prompt audit and may remain\
  \ advisory.\n  - Full structured prompt generation for all decision points is Phase\
  \ 4 scope; compatibility Markdown output may remain during transition.\n- intended_target_phase_transfer:\n\
  \  - Implementation should provide language task schema, effective prompt manifest\
  \ validation, prompt audit logic, and review-run metadata recording.\n  - Implementation\
  \ review should verify schemas, prompt audit tests, and run_role/run_review compatibility\
  \ listed in req15-review-target-manifest.md against this intent.\n\n### req15-verification-context\n\
  \nVerification snapshots are smoke evidence only. Passing tests are not proof of\n\
  correctness and must not suppress findings. Use the target test files themselves\n\
  to evaluate whether the boundaries are meaningfully covered.\n\n- `test_language_task_io_schema.py`:\
  \ covers language task I/O schema shape and separation of language-facing input/output\
  \ fields.\n- `test_effective_prompt_manifest.py`: covers effective prompt manifest\
  \ required fields and source-reference metadata.\n- `test_prompt_audit.py`: covers\
  \ fail-closed prompt audit cases for missing structure, broken references, machine-task\
  \ leakage, and next-action compatibility.\n- `test_prompt_manifest_rounds_recording.py`:\
  \ covers review-run metadata compatibility for effective prompt path / sha256 recording.\n\
  - `test_run_role.py` and `test_run_review.py`: cover API provider runner compatibility\
  \ paths that preserve effective prompt metadata.\n\n### direct-boundary-reference-definition\n\
  \nReq 14 and Req 16 are out of scope except when the Req15 target code or schemas\n\
  explicitly name their boundary symbols. Examples of direct boundary references:\n\
  \n- prompt audit code or schema fields that explicitly mention approval gates,\n\
  \  human-only approval, proxy triage, operation contracts, phase transition, or\n\
  \  irreversible operation authorization\n- run_role.py / run_review.py metadata\
  \ behavior that explicitly passes evidence\n  required by Req16 proxy decision or\
  \ operation-contract checks\n\nDo not review the full Req14 approval gate implementation\
  \ or full Req16 proxy\ntriage mechanics.\n\n## Vertical Intent Transfer Customization\n\
  \nPhase chain:\n\n- requirements.md -> design.md -> tasks.md -> implementation\n\
  \nUse upstream materials only for background and transfer checking. Limit target\
  \ judgment to the current phase artifact.\n\n## Required Checks\n\n1. Check the\
  \ target against the single judgment item: Req 15 implementation upstream transfer\
  \ for structured effective prompt and prompt audit.\n2. Check that the target satisfies\
  \ preserved user review requirements.\n3. Check that source materials are used only\
  \ for background or required intent transfer.\n4. Check that no finding depends\
  \ on unstated assumptions or path-only source material.\n5. Check that source/digest/prompt\
  \ length structures are specific enough for later audit:\n   - source references\
  \ are non-empty and traceable to source material or target artifacts\n   - digests\
  \ use explicit sha256-style values where digest binding is claimed\n   - prompt\
  \ length or bound checks identify the measured field, bound source, and failure\
  \ behavior\n   - manifest metadata records path and sha256 without replacing the\
  \ target content\n6. Check that the target does not authorize commit, push, spec.json\
  \ mutation, phase transition, or gate completion.\n\n## Out Of Scope\n\n- Req 14\
  \ approval gate state\n- Req 16 proxy triage decision mechanics\n- Do not approve\
  \ or authorize commit, push, spec.json mutation, phase transition, or gate completion.\n\
  - Do not judge downstream correctness unless a target omission would force downstream\
  \ invention.\n\n## Finding Policy\n\n- Use CRITICAL for bypass of human-only approval\
  \ or irreversible-operation boundaries.\n- Use ERROR for missing required behavior,\
  \ weakened user requirements, or unsupported target behavior.\n- Use WARN for meaningful\
  \ ambiguity, weak traceability, or coverage gaps.\n- Use INFO only for minor non-blocking\
  \ improvements.\n- Use precise target locations such as `path`, `path:function`,\
  \ or `path:section`.\n- Return findings: [] only when the target is traceable, correctly\
  \ scoped, and sufficiently grounded.\n"
