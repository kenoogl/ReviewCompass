  plain_language_summary: effective_prompt_sha256 is recorded in rounds.yaml as the
    value passed by the caller. In test_run_role.py:test_main_records_effective_prompt_metadata_in_rounds,
    the expected sha256 is computed from the file bytes directly, but run_role._resolve_effective_prompt_sha256
    uses _sha256_file which also computes from bytes. The rounds.yaml field stores
    the raw hex, not the 'sha256:' prefixed form. The effective_prompt_manifest.schema.json
    requires the 'sha256:<hex>' pattern for source_artifacts.sha256, but rounds.yaml
    stores plain hex. This inconsistency in digest format between the manifest schema
    and the rounds recording may cause downstream audit confusion.
  final_label: should-fix
