- severity: WARN
  target_location: Feature impact 区分 / runtime
  description: LLMの非決定論的挙動に対する堅牢性（エラーハンドリング）要件の網羅性確認
  rationale: 「規則ファイル照合や固定プロンプトの単純写像」から「大規模言語モデルの判断に基づく発見と判断」に意図が変更（または明確化）された場合、予期せぬ出力スキーマの崩れ、ハルシネーション、パースエラー等の非決定論的挙動への対応が必要になります。既存の
    runtime Requirement 4（構造化証拠出力）の受入基準のみで、LLM出力のスキーマ検証・フェイルセーフ・リトライ等の要件が十分に網羅されているか（本当に新規要件や受入基準の追加が不要か）、Triadレビューにて慎重な検証が求められます。
- severity: INFO
