findings:
- severity: ERROR
  target_location: conformance-evaluation Requirement 10, Acceptance Criteria 2
  description: Requirement 10 AC2 states the feature extracts 'tasks または実装上の作業契約候補'
    from implementation code, but existing CE scope explicitly excludes tasks from
    CE's responsibility.
  rationale: 'Prior partial review finding #1 identified this conflict. Existing CE
    feature scope does not include tasks ownership. Including task contract extraction
    in CE Requirement 10 creates an undeclared scope expansion that conflicts with
    the established feature boundary. This must-fix conflict must be resolved before
    requirements triad-review can complete: either remove task contract extraction
    from CE Requirement 10 and assign it elsewhere, or explicitly amend the CE scope
    statement to include it.'
- severity: ERROR
  target_location: conformance-evaluation Requirement 10, Acceptance Criteria 3 and
    6
  description: The classification scheme (5 categories in AC3) and output structure
    (AC6) are insufficiently specified to serve as a verifiable requirements contract.
    Category definitions lack boundary conditions, and the output record structure
    does not specify required fields, cardinality, or schema reference.
  rationale: 'Prior partial review finding #2 identified under-specification in CE
    classification and output structure. Without precise category definitions and
    output schema anchors, design and test stages cannot derive acceptance tests from
    these requirements. This is a must-fix for requirements completeness before review-wave
    proceeds.'
- severity: ERROR
  target_location: workflow-management Requirement 9, Acceptance Criteria 3
  description: The conflict stop condition in WM Requirement 9 AC3 is under-specified.
    It states 'human approval or designated review as a stop point' but does not define
    what constitutes a stop, what the stop gate artifact is, who is the approver,
    or under what conditions the stop may be bypassed or overridden.
  rationale: 'Prior partial review finding #3 identified this gap. A stop condition
    that lacks operational definition cannot be enforced by design or implemented
    deterministically. This is a must-fix: the requirement must specify the gate artifact,
    approval actor, and bypass conditions at minimum.'
- severity: WARN
  target_location: workflow-management Requirement 9, Acceptance Criteria 4
  description: 'AC4 states WM receives conformance-evaluation output and progresses
    through the formal reopen procedure, but does not specify the interface contract:
    the format, schema, or handoff mechanism between CE output and WM intake.'
  rationale: 'The CE/WM boundary is described narratively but the handoff artifact
    is not defined in either Requirement 10 or Requirement 9. This creates a design-stage
    gap. Should-fix: the interface should be named and schema-anchored at requirements
    stage to prevent boundary ambiguity during design.'
- severity: WARN
  target_location: 'Feature impact table, indirect features: foundation'
  description: Foundation owns evidence vocabulary and metadata contracts that CE
    Requirement 10 and WM Requirement 9 both depend on (code references, evaluation
    records, reopen procedure schema). The indirect_check_only decision is not accompanied
    by a documented check result confirming no foundation requirements text changes
    are needed.
  rationale: 'The review target states foundation must be referenced and not redefined,
    and the 2026-06-08 note confirms evidence/metadata contracts are in scope for
    the added intent. Without a recorded check result for foundation, the indirect_check_only
    decision is unverifiable. Should-fix: a foundation indirect check result confirming
    existing requirements are sufficient must be recorded before review-wave.'
- severity: WARN
  target_location: 'Feature impact table, indirect features: runtime'
  description: Runtime owns structured evidence output and fixed-pattern exclusion,
    both of which are referenced as receiving the added intent per the 2026-06-08
    note. The indirect_check_only decision is not supported by a documented check
    result.
  rationale: CE Requirement 10 AC2 and AC5 depend on structured evidence output that
    runtime produces. If runtime's evidence output schema does not already accommodate
    code-reference fields, runtime requirements may need amendment. The absence of
    a check result leaves this risk unresolved. Should-fix before review-wave.
- severity: WARN
  target_location: 'Feature impact table, indirect features: evaluation'
  description: Evaluation explicitly excludes upstream document conformance as CE's
