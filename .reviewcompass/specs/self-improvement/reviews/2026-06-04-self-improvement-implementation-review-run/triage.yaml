  plain_language_summary: test_t011_seven_models_have_all_three_test_levels asserts
    that every model must have {'unit','integration','acceptance'}, but traceability.py::model_level_coverage
    parses design.md §18.1 table rows and only adds a level key when the cell is non-empty.
    The design §18.1 table uses Japanese free-text (not 'unit'/'integration'/'acceptance')
    in each cell, so the parsed level strings will never equal the hard-coded English
    set. The test will always fail unless the design table uses exactly those English
    tokens. Additionally, the section boundary 'start_heading=### 18.1' / 'end_heading=###
    18.2' depends on exact Markdown heading text in the live design.md file which
    is not verified to match.
  final_label: null
