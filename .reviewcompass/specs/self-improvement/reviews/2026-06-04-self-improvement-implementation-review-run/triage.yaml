  target_location: tools/self_improvement/proposal_model.py::validate_proposal motivating_evidence
    check
  plain_language_summary: The evidence validation `if set(item) < {'source','location','observation'}`
    uses strict subset (<), which means a dict with exactly those three keys evaluates
    to False (a set is not a proper subset of itself). The condition should be `not
    set(item) >= {'source','location','observation'}` or equivalently `not {'source','location','observation'}.issubset(set(item))`.
    The current code raises ProposalError for any evidence item that has exactly the
    three required keys, causing all valid proposals to be rejected.
  final_label: must-fix
