    of the traceability table in tasks.md use '| Boundary Context 隣接期待...' and '|
    権限分離の機械検査...' which do not start with 'Requirement', causing _requirements_traceability_issues
    to emit false 'has no task reference' warnings for those rows. The audit will
    produce non-empty issues list, causing test_t011_requirements_traceability_is_bidirectional
    to fail.
