  target_location: tools/self_improvement/signal_extraction.py::_classify — discipline_absence
    vs discipline_violation priority
  plain_language_summary: In _classify(), the conflict check (conflicting_disciplines
    >= 2) is evaluated first, then obsolete, then violation, then absence. A candidate
    with both matching_discipline set AND evidence_count >= threshold AND sessions_without_reference
    >= threshold will be classified as discipline_obsolete rather than discipline_violation.
    Design §7.2 does not specify priority rules among the four types, and no test
    exercises the ambiguous multi-condition case. This may produce unexpected proposal_type
    candidates (archive instead of update) for active-but-violated disciplines that
    happen to also have high sessions_without_reference.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Not a blocking defect for first-period operation since classification
    is semi-manual (§7.3), but the absence of a documented priority rule and no negative
    test covering the overlap case is a gap relative to T-003 completion condition
    1 ('4 種類の乖離判定がそれぞれ正しく分類される').
  applied_files: []
  superseded_by: null
