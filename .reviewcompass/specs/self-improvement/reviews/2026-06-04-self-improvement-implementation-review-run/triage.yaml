  target_location: learning/workflow/schemas/proposal.schema.json properties.proposal_id
    pattern
  plain_language_summary: proposal_id pattern is '^(WP|RB)-[0-9]{3,}$' which includes
    RB-NNN prefixes. However design §8.5 states that RB-NNN is used for rollback proposals
    (stored in learning/workflow/rollback/) while WP-NNN is for workflow proposals.
    The rollback schema (rollback.schema.json) already validates rollback_id separately.
    Allowing RB-NNN in the proposal schema means a rollback record accidentally placed
    in proposals/ or approved-updates/ would pass MV-2 validation even though it should
    only appear in rollback/. Tasks T-004 completion condition 2 says 'proposal_id
    の採番（接頭辞分離）が正しく機能し' implying the namespaces are meant to be distinct per directory.
  final_label: leave-as-is
  decision_status: decided
  decision_actor: main_session_llm
  decision_actor_type: agent
  decision_at: '2026-06-04T06:27:49.903817+00:00'
  decision_reason: proposal_id schema permissiveness around RB prefixes is minor because
    rollback_id remains separately validated by rollback.schema.json; namespace tightening
    is not a current blocker.
  applied_files: []
