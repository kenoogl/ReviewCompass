  plain_language_summary: 'For proposal_type=''new_discipline'', _validate_type_specific
    checks proposed_change.get(''relationship_notes'') but tasks.md T-004 test requirement
    note reads: ''new_discipline: ドラフト＋関係明示。ただし「関係明示」を機械検証可能な形＝grep 可能なキーワード等に定義してからテスト化する（topic-108／F-012）''.
    No such definition has been established; the implementation accepts any non-empty
    string as relationship_notes without a machine-checkable keyword constraint. The
    test test_t004_proposal_model.py passes ''relationship_notes: 既存規律との関係'' which
    is a trivially non-empty string. This means the machine-checkable criterion required
    by topic-108/F-012 is not implemented and the completion condition ''new_discipline:
    ドラフト＋関係明示の機械検証'' remains unresolved.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Tasks T-004 explicitly defers this to 'first define a machine-checkable
    form then write the test'; the implementation proceeded without the definition,
    leaving a DVT-equivalent gap with no corresponding DVT entry and no deferred reason
    in the completion gate.
