    the date embedded in the file name. The field ''approved_at'' was explicitly removed
    as part of DVT-S001 / A-019 resolution (tasks.md DVT table: ''workflow-management
    T-010 の独自項目名 approved_at を廃止''). As a result, average_days_to_adoption will always
    return 0.0 because no proposal will ever have an ''approved_at'' key.'
  final_label: null
