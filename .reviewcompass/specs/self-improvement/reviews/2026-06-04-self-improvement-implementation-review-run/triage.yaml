  decision_at: null
  decision_reason: T-011's acceptance gate for 7-model × 3-level coverage will always
    report failure or always trivially pass (empty dict) depending on parsing luck,
    making the test non-functional as a completion predicate. Design §18 explicitly
    requires this coverage to be verified (F-017 treatment), so a broken gate undermines
    the entire T-011 safeguard.
