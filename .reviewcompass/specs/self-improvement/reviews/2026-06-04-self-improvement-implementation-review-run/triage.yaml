  severity_original: WARN
  severity_normalized: WARN
  target_location: learning/workflow/schemas/proposal.schema.json properties.proposed_change
  plain_language_summary: The proposal schema defines proposed_change as type:object
    with no required sub-properties and no per-proposal_type conditional validation.
    Design §8.4 and design §8.8 specify that archive requires archive_readme_path,
    consolidation requires mapping_table, new_discipline requires draft_discipline
    and relationship_notes, update requires change_diff, status_change requires statistical_evidence
    at the proposal level. These constraints are enforced only in Python (proposal_model.py)
    but not in the JSON Schema. workflow-management reads approved-updates/ YAMLs
    using this schema (per design §13.5 and T-010 interfaces), so a schema-only consumer
    would not see the type-specific validation constraints.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Design §8.4 is declared the authoritative schema source ('self-improvement
    design §8.4 が正本スキーマ'). Missing per-type constraints in the JSON Schema weaken
    the machine-verifiable contract that workflow-management depends on, and undermine
    the 'dual gate' (MV-1 + pattern constraint) intent described in T-004 completion
    condition 7.
  applied_files: []
  superseded_by: null
