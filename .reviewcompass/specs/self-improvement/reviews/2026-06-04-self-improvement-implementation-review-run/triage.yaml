  plain_language_summary: requirements_traceability_issues uses start_heading='##
    要件追跡' and end_heading='## テスト戦略' to parse the traceability table from tasks.md.
    The actual tasks.md heading is '## 要件追跡（Requirements Traceability）' which does
    not start with exactly '## 要件追跡' because the method uses startswith—actually startswith
    DOES match a prefix so this particular heading would work. However end_heading='##
    テスト戦略の継承（Test Strategy Inheritance）' in tasks.md also starts with '## テスト戦略' so
