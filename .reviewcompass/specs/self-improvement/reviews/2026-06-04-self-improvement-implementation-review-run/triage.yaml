  target_location: tools/self_improvement/approval_model.py::reject — REJECTION_WORDS
    list
  plain_language_summary: reject() calls _require_rejection(approval_text) which checks
    REJECTION_WORDS = ('却下','不採用','reject'). The design §10.1 and discipline [approval-operation]
    define approval words but do not specify a symmetric rejection vocabulary. Using
    English 'reject' as a recognized rejection word may be inconsistent with the Japanese-only
    workflow and could be silently omitted by operators. More critically, the rejection
    test passes '却下します' but the approval test uses '承認します'—there is no symmetric test
    verifying that rejection fails when approval words are used.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: If an operator uses '採用しない' (a natural Japanese rejection phrase
    not in REJECTION_WORDS) the system raises ApprovalError and the proposal cannot
    be moved to rejected-updates, blocking the lifecycle. This is a fail-closed failure
    on a valid operation rather than on an invalid one.
  applied_files: []
  superseded_by: null
