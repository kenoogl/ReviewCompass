  \ |\n      design §10.4 の finding schema に合わせて ComparisonModel の出力構造を修正し、severity、target、summary、根拠、関連\
  \ ID 等の必要項目を契約どおり生成する。CheckPipeline は検出 findings を check record の Markdown 本文および必要な\
  \ front-matter/structured section に出力する。schema 準拠と本文出力の両方を失敗先行テストで確認する。\n    rejected_options:\n\
  \      B: |\n        差分検出結果そのものが記録に残らない、または契約外構造になる問題であり、完了後の持ち越しにはできない。\n     \
  \ C: |\n        中核出力の欠落・不一致であり、記録のみで済ませる性質ではない。\n\n  - cluster_id: CE-IMPL-MF-005\n\
  \    selected_option: A\n    final_label: must-fix\n    decision_reason: |\n   \
  \   foundation 参照のみ検査と commit hash 独立性検査は、自己改善方向の逆流防止や境界維持に関わるインターフェース契約である。現状は文字列部分一致や非空チェックに近く、検査として実効性が不足している。複数モデルが同根の弱さを指摘しており、must-fix\
  \ と判断する。\n    implementation_policy: |\n      foundation_reference_only() は許可された\
  \ foundation/metadata_contract 参照の形式、参照先、再定義禁止を検査するよう強化する。commit_hashes_are_independent()\
  \ は単に非空であることではなく、対象ハッシュの由来・フィールド分離・同一値の扱いなど設計上の独立性条件を検査する。悪性ケース、部分一致ケース、同一ハッシュケースを含む\
  \ TDD テストを追加する。\n    rejected_options:\n      B: |\n        インターフェース境界の検査が実質的に機能していないため、後回しにすると誤った合格を許す。\n\
  \      C: |\n        テスト不足だけでなく実装ロジック自体が契約を検証できていないため leave-as-is は不可。\n\n  - cluster_id:\
