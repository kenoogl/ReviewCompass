  \ |\n      運用文書の §5 が intent/tasks を推定生成対象のように説明している点は、最新 requirements/design との不一致であり、利用者の誤操作やレビュー観点のずれを招く。ただし中核の実装契約や機械ガードを直接破壊する箇所ではないため、triad-review\
