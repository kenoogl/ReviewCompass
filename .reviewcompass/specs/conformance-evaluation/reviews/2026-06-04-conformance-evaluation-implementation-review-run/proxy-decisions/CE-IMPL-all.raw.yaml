  \ は設計上必要な場合のみ条件付きで扱い、常設項目として固定しない。既存テストは契約不一致を失敗として検出するよう先に追加・更新する。\n    rejected_options:\n\
  \      B: |\n        carry-forward にすると、以後生成される評価記録が不正な契約のまま蓄積され、監査証跡と機械ガードの信頼性を損なうため不適切。\n\
  \      C: |\n        単なる記録上の差分ではなく、成果物スキーマと評価記録の互換性に関わるため leave-as-is は不可。\n\n \
  \ - cluster_id: CE-IMPL-MF-002\n    selected_option: A\n    final_label: must-fix\n\
  \    decision_reason: |\n      MV-6 は prompt isolation/auditability の機械ガードであり、単純な文字列包含検査だけでは、prompt\
  \ log の時刻、run_id、全文保存、ログ検査という要件を満たさない。遮断検査が実質的に形骸化しており、ERROR 所見もあるため、review 完了前に修正対象とする。\n\
  \    implementation_policy: |\n      MV-6 の期待契約を明文化したテストを先に追加し、prompt log に run_id、timestamp、完全な\
  \ prompt 本文、対象入力、検査結果が保存されることを検証する。禁止条項は単一固定文字列のみでなく、設計が要求する最小文言・構造・ログ存在確認を組み合わせて判定する。既存上流文書パス混入検知もログ実体に対して検査する。\n\
  \    rejected_options:\n      B: |\n        prompt isolation は誤実行や証跡欠落を防ぐ中核ガードであり、後回しにすると不十分な検査で合格記録を生成し得る。\n\
  \      C: |\n        仕様上要求された監査可能性を満たしていないため、現状維持は認められない。\n\n  - cluster_id: CE-IMPL-MF-003\n\
  \    selected_option: A\n    final_label: must-fix\n    decision_reason: |\n   \
  \   6 criteria YAML はレビュー基準を機械的に供給する契約ファイルであり、sub_structure 等の欠落は設計契約の不一致に直結する。また\
  \ DVT-C001 の状態と実ファイル配置の整合も崩れており、成果物の完了判定が曖昧になる。ERROR 所見を含むため must-fix とする。\n   \
  \ implementation_policy: |\n      design に定義された criteria YAML スキーマを正とし、6 criteria\
