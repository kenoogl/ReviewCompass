  \n  - cluster_id: CE-IMPL-SF-007\n    selected_option: B\n    final_label: should-fix\n\
  \    decision_reason: |\n      採番境界、--check-partitioning enabled、traceability 双方向整合はいずれもテスト網羅性の不足であり、将来的な退行を見逃すリスクがある。一方で、指摘の中心は既存実装が直ちに中核契約を破壊しているというより、検証の薄さであるため\
