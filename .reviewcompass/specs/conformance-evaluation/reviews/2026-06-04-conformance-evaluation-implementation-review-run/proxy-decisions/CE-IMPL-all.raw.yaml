  \ tasks 側の記述も実態に合わせて整理する。ただし spec.json のフェーズ遷移や状態更新の承認はこの判断には含めない。\n    rejected_options:\n\
  \      B: |\n        レビュー基準の機械可読契約が壊れている状態を carry-forward にすると、以後のレビュー入力が不安定になる。\n\
  \      C: |\n        ファイルが存在するだけでは契約充足にならず、schema/設計との不一致があるため leave-as-is は不可。\n\
  \n  - cluster_id: CE-IMPL-MF-004\n    selected_option: A\n    final_label: must-fix\n\
  \    decision_reason: |\n      ComparisonModel の finding 構造と CheckPipeline の記録出力は、conformance\
