  \  rejected_options:\n      A: |\n        テストギャップは重要だが、現時点の所見は主に網羅性不足であり、ERROR 級の中核契約不一致とは区別する。\n\
  \      C: |\n        tasks に明示された確認観点を含み、放置すると退行検知が弱いままになるため記録のみにはしない。\n\n  - cluster_id:\
