- severity: ERROR
  target_location: tools/conformance_evaluation/evaluation_record.py
  description: 評価記録に `materialization_commit_hash` を常設 front-matter として出力しており、設計で定義された
    conformance-evaluation 側の記録契約と乖離している。
  rationale: Requirement 6 と design §12.3 では conformance-evaluation の評価記録は `target_commit`
    を本機能の出典として保持し、self-improvement 側の `materialization_commit_hash` は必要時に `related_artifacts.self_improvement`
    経由で参照可能とされている。一方、現実装は全記録に `materialization_commit_hash` を直接埋め込み、`related_artifacts`
    ではなく `related_records` の配列で代替しているため、他機能が front-matter 契約に従って読むと契約不一致になる。
- severity: ERROR
  target_location: tools/conformance_evaluation/machine_verification.py
  description: MV-6 の遮断検査が要件の最小仕様を満たしておらず、既存上流文書パスの混入検知と自律探索禁止条項の確認しか実装していない。
  rationale: 運用文書・tasks T-012 では MV-6 の第1期最小仕様として、時刻・実行ID・プロンプト全文を残した `logs/estimation/<run_id>/prompt.log`
    相当の保存を前提にそのログを検査対象とすることが明記されている。しかし現実装は文字列を直接検査するだけで、ログ保存要件も run_id/時刻の存在検証もない。遮断必須の
    fail-closed 検査としては監査可能性が不足し、Requirement 3 の技術的遮断の裏付けにならない。
- severity: WARN
