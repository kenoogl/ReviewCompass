human_decisions:
  - decision_id: MLE-DEC-001
    date: 2026-06-12
    decided_by: user
    subject: MLE-GAP-003 の語彙調停（feature_order ／ phase_order）
    decision: 案 A を採用。仕様側を実装語彙 feature_order へ寄せる。実装・テスト・テンプレート・配布物は改名しない。
    notes:
      - Requirement 8 に旧称 phase_order（計画書 §5.5・stages/feature-partitioning/2026-05-24-proposal.md の表記）の由来注記を 1 文残す。
      - 過去記録（レビュー記録・分割提案書・計画書）は書き換えない。
      - 段集合 YAML の参照フィールド名 feature_order は参照先キーと同名で一致するため、feature_order_ref への改名案は不要となり破棄。
      - 文言追従の対象は workflow-management 仕様に加え、conformance-evaluation 仕様（約 9 箇所）と
        運用文書 2 件（REOPEN_PROCEDURE.md、CONFORMANCE_EVALUATION.md）に及ぶ（2026-06-12 議論で確定）。
  - decision_id: MLE-DEC-002
    date: 2026-06-12
    decided_by: user
    subject: T-002 のスキーマ契約（feature-dependency.schema.json、未実体化）の扱い
    decision: 実装検査で代替する。仕様を「パース仕様の正本はツールの解決・整合検査の実装（resolve_feature_order・validate_feature_order_consistency）とテスト」へ改める。スキーマの新規作成は行わない。
  - decision_id: MLE-DEC-003
    date: 2026-06-12
    decided_by: user
    subject: feature-dependency.yaml の features 列挙（現状 1 機能分のみ）の扱い
    decision: 承認済み分割提案書（stages/feature-partitioning/2026-05-24-proposal.md）の依存をそのまま転記し、7 機能分を実体化する。これにより新設の整合検査が全機能を覆う。
  - decision_id: MLE-DEC-004
    date: 2026-06-12
    decided_by: user
    subject: MLE-HANDOFF-004（操縦 LLM 別 variant 既定の evaluation 仕様への昇格要否）
    decision: 案 a を採用。evaluation 仕様へは昇格せず、docs/operations/SESSION_WORKFLOW_GUIDE.md §3.3 (a-3) を独立性原則と既定 variant 選択規則の正本とする（利用者発言「案 a」）。仕様への昇格は実アプリ pilot 後に再検討する。
    resolves:
      - package: MLE-HANDOFF-004
        note: reopen は実施しない（needs_human_decision の解消）。
  - decision_id: MLE-DEC-005
    date: 2026-06-12
    decided_by: user
    subject: FUP-2026-06-12-001（feature-dependency.yaml パース不能の遮断分離）の実施判断
    decision: 案 b を採用。パース不能（ファイルはあるが YAML として読めない）を立ち上げ案内（OK）から遮断（DEVIATION、fail-closed）へ分離する根本対策を実施する。利用者発言「私の判断がまちがっていた。コストはかかるが案ｂが根本対策と考える」（2026-06-12。triad-review r2 F4 の案 a 決定を利用者自身が改めたもの）。仕様 3 文書（requirements 受入 8・design §7・tasks T-004）の意味変更を伴うため、workflow-management の reopen 手続きで実施し、実装は仕様確定後に TDD で行う。

