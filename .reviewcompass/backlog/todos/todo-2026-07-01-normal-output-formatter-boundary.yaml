      title: Run focused tests and update checklist evidence
      status: done
acceptance_criteria:
- 新規 CLI が同じ helper を使える。
- 既存 CLI が返す判定データと human output 生成を分離できる。
- OK / WARN / DEVIATION / --json / --verbose の出し分けを helper API で固定できる。
- stdout / stderr の分担が helper API で確認できる。
red_tests:
- id: NOM-1-RT-1
  title: Shared formatter declares verdict and mode vocabulary
  expected: tools.normal_output exposes exact local verdict and output mode constants.
  status: done
- id: NOM-1-RT-2
  title: OK human output keeps one short line
  expected: OK human output only includes success fact, action, and summary fields.
  status: done
- id: NOM-1-RT-3
  title: WARN / DEVIATION output keeps concise reasons and next action
  expected: diagnostic output includes at most three reasons and a next action.
  status: done
- id: NOM-1-RT-4
  title: JSON and verbose output preserve details
  expected: details omitted from OK human output remain available in json and verbose modes.
  status: done
- id: NOM-1-RT-5
  title: Stream policy routes normal and diagnostic output
  expected: OK human output goes to stdout, WARN / DEVIATION to stderr, and json to stdout.
  status: done
non_goals:
- この TODO で全 CLI を共通 helper へ接続しない。
- 異常系の診断情報を削らない。
- medium priority inventory の棚卸し更新まで同時に行わない。
