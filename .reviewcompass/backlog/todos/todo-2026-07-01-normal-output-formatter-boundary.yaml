source_plan_slice:
  phase_id: NOM-1
  title: Define shared output formatter boundary
summary: >
  normal output minimization rollout plan の第 1 実行単位として、
  `tools/normal_output.py` の共通 formatter / output helper の最小 API を固定する。
  OK / WARN / DEVIATION、human / json / verbose、stdout / stderr の分担を明示し、
  既存 CLI が判定データと human output 生成を分離できる境界を作る。
problem_statement:
- 既存 CLI がそれぞれ別々に正常系 human output を組み立てており、OK / WARN / DEVIATION の短文化境界が統一されていない。
- `--json` と `--verbose` に詳細を残す契約が helper API として固定されていない。
- stdout / stderr の分担が CLI ごとに散らばり、正常系と診断系の見え方が揺れやすい。
