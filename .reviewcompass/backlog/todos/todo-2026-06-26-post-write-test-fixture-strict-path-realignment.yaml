summary: 'tests/tools/test_check_workflow_action.py の post-write 関連で失敗している 20件を、見本ファイルパスの付け替えにより解消する。失敗の原因は、テストが
  docs/notes 配下の見本を「厳格点検(post_write_verification)対象」として 扱っているが、現実装では docs/notes 配下は軽量審査(lightweight_self_check)
  に分類されることである。方針は「docs/notes は軽量審査のまま」とし、テスト側の 見本パスを厳格点検対象パスへ付け替える。実装(分類ルール)は変更しない。

  '
decision_basis:
  policy: docs/notes は軽量審査のまま維持する（実装を変えない）。
  fix_side: テスト側の見本パスのみを付け替える。
  replacement_target_path_default: docs/disciplines/
  replacement_target_note: 'docs/disciplines/ は POST_WRITE_VERIFICATION_DIR_PREFIXES
    に含まれ、 LIGHTWEIGHT_SELF_CHECK_DIR_PREFIXES には含まれないため厳格点検対象になる。 付け替え先が review_triage
    など他判定に干渉しないことは実装段階で確認する。

    '
do_not_touch:
- tests/tools/test_check_workflow_action.py 内の「docs/notes は軽量審査」を 主張するテスト（3569行・3612行付近）は現実装と一致しているため変更しない。
