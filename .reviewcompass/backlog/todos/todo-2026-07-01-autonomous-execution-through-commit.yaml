summary: 'commit stop-point and approval UX plan の CSUX-4 実行単位として、 利用者指示 `自律実行` を次の
  1 commit 分の作業、検証、TODO / checklist 更新、commit まで進める明示承認として扱えるようにする。

  '
problem_statement:
- 現在の `次へ` は commit 停止点までで止まり、commit 実行代行は含まない。
- 作業が安定してきたため、利用者が明示した場合だけ commit まで進む自律実行モードが必要である。
- push 代行承認と混同せず、commit までの承認範囲を機械可読に区別する必要がある。
