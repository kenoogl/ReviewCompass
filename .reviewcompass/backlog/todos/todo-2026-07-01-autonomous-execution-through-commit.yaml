acceptance_criteria:
- '`自律実行` は commit 代行承認を含むが、push 代行承認は含まない。'
- '`次へ` は従来どおり commit 停止点までで止まり、commit 実行代行を含まない。'
- commit preflight が DEVIATION / WARN を返した場合は commit せず停止する導線が残る。
- commit 後は push へ進まず、利用者向けの次操作が `プッシュ` になる。
red_tests:
- id: CSUX-4-RT-1
  title: Autonomous execution trigger includes commit delegation only
  expected: operation-trigger-resolve --trigger-text 自律実行 --json returns autonomous-through-commit
    metadata with commit delegation allowed and push delegation denied.
  status: done
- id: CSUX-4-RT-2
  title: Next trigger remains read-only and commit-stop-only
  expected: operation-trigger-resolve --trigger-text 次へ --json remains next/read-only
    and does not include commit delegation.
  status: done
- id: CSUX-4-RT-3
  title: Autonomous execution stops before push after commit
  expected: autonomous-through-commit metadata reports post_commit_stop_action プッシュ
    and excludes git push from mutation commands.
  status: done
non_goals:
- '`pushまで自律実行` をこの TODO で実装すること。'
- commit guard や commit preflight を緩めること。
- 利用者承認の必要性を runtime state で代替すること。
