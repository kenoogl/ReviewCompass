acceptance_criteria:
- API review-run の実行前後で、何を読んで何を書いたかが追跡できる。
- rounds.yaml、target-manifest.yaml、model-result-summary.yaml から同じ execution spec を参照できる。
- spec と実出力の不一致を invalid execution または要確認として検出できる。
red_tests:
- id: AES-1-RT-1
  title: API review-run writes ReviewExecutionSpec before execution
  expected: prepare/run review flow records target files, phase, criteria, variant,
    provider, model, prompt, and output paths in a ReviewExecutionSpec.
  status: done
- id: AES-1-RT-2
  title: Review-run artifacts reference the same execution spec
  expected: rounds.yaml, target-manifest.yaml, and model-result-summary.yaml contain
    a reference to the same execution spec path and digest.
  status: done
- id: AES-1-RT-3
  title: Execution spec audit detects output mismatch
  expected: a mismatch between the execution spec and actual review-run outputs is
    reported as invalid execution or requires confirmation.
  status: done
non_goals:
- API review-run の provider 実行ロジックを全面的に置き換えること。
- 外部モデル呼び出しを新規に増やすこと。
- workflow action 全般の ActionEffectSpec を同時に実装すること。
