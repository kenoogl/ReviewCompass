summary: 'action execution spec plan の第 1 実行単位として、API review-run の target files、phase、criteria、variant、provider、model、prompt、
  output paths を実行前 spec として保存し、rounds.yaml、 target-manifest.yaml、model-result-summary.yaml
  から参照できるようにする。

  '
problem_statement:
- API review-run は複数の入力、モデル、出力先を持つが、実行前に何を読んで何を書くかを単一 spec として追跡できない。
- 実行前 spec と実出力がずれても、invalid execution または要確認として機械的に検出する導線が不足している。
- rounds.yaml、target-manifest.yaml、model-result-summary.yaml から同じ実行 spec を参照できないため、後追い監査が会話記憶に寄りやすい。
