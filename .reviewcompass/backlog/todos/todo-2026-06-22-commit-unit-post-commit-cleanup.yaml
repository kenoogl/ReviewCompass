  tdd:
  - id: CUC-RT-1
    title: commit-unit clear が runtime marker を削除する red test を追加する
    status: done
  - id: CUC-RT-2
    title: guarded commit 成功後に commit-unit marker が残らない red test を追加する
    status: done
  implementation:
  - id: CUC-1
    title: commit-unit clear コマンドを追加する
    status: done
  - id: CUC-2
    title: guarded commit 成功後に commit-unit clear 相当を実行する
    status: done
  verification:
  - id: CUC-V1
    title: commit-unit / guarded commit 周辺テストを通す
    status: done
non_goals:
- 利用者承認なしで commit すること
- commit 前の commit-unit 検査を弱めること
