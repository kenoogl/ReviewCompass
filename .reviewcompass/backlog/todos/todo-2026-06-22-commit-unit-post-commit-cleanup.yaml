  reason: commit 成功後に .reviewcompass/runtime/work-units/commit-unit.json が残り、次の next --json が STALE_COMMIT_UNIT になるため
summary: >
  commit unit は commit 前の staged index を固定する一時 runtime marker である。
  commit 成功後は staged index が空になるため、marker を自動で片付け、
  手動削除なしに next --json が completed へ戻るようにする。
