acceptance_criteria:
- entrypoint registry schema を機械可読 JSON として取得できる。
- schema は entrypoint_id、kind、trigger、decision_point_ref、effective_prompt_ref、required_action、mechanized_command、evidence_contract
  を必須フィールドとして示す。
- WORKFLOW_DISCIPLINE_MAP.yaml は decision point / effective prompt source の正本、entrypoint
  registry は入口 / required_action / mechanized action link / evidence contract の正本、という責務境界を説明できる。
- ECA-3 の coverage audit が参照できる schema_version と registry_contract を持つ。
red_tests:
- id: ECA-2-RT-1
  title: Entrypoint registry schema is exposed as JSON
  expected: entrypoint-registry-schema --json returns verdict OK, schema_version,
    registry_contract, and operation_mode read_only.
  status: done
- id: ECA-2-RT-2
  title: Required registry fields are declared
  expected: registry_contract.required_fields includes entrypoint_id, kind, trigger,
    decision_point_ref, effective_prompt_ref, required_action, mechanized_command,
    evidence_contract.
  status: done
- id: ECA-2-RT-3
  title: Discipline map boundary is declared
  expected: registry_contract.responsibility_boundary distinguishes WORKFLOW_DISCIPLINE_MAP.yaml
    responsibilities from entrypoint registry responsibilities.
  status: done
non_goals:
