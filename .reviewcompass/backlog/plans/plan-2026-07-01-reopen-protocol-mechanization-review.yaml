schema_version: reviewcompass-backlog-item-v1
id: plan-2026-07-01-reopen-protocol-mechanization-review
kind: plan
title: reopen プロトコルの機械処理と下流波及規律の再検討
status: candidate
plan_level: design_required
materialization_required: true
source_unit_id: main-completed
created_at: '2026-07-01T00:00:00+09:00'
index_path: .reviewcompass/backlog/index.yaml
provenance:
  created_by: llm
  source_ref: conversation:user:reopen処理がおかしい。プロトコルを確認せよ
  reason: >
    backlog routing の reopen では requirements.md を実質修正したにもかかわらず、
    requirements の triad-review と review-wave を再実行しないまま finalize された。
    また、design/tasks/implementation への下流波及は通常の reopen 連鎖として処理されず、
    完了直前の補足メタデータとして扱われた。
summary: >
  上流成果物を実質修正した reopen が alignment/approval だけで完了しないように、
  reopen 手順、機械ガード、運用規律を再検討する。対象には requirements 変更、
  design/tasks/implementation への下流波及、完了済み reopen の修復方針、
  commit/finalize 前の fail-closed 検査を含める。
routing_decision:
  current_handling: maintenance_preparation
  maintenance_scope: >
    この plan 自体について、メンテナンスで扱う範囲、戻り先、再 reopen 方針を明記する。
    reopen プロトコル本体の意味、workflow guidance、機械ガード、正本仕様、実装コードは
    このメンテナンスでは変更しない。
  return_after_maintenance: >
    メンテナンス完了後、通常状態へ復帰し、この plan を根拠に改めて reopen を開始する。
  reopen_after_return_required: true
  direct_protocol_change_allowed_in_maintenance: false
current_problem:
  - >
    直近の backlog routing reopen では `requirements.md` を変更したが、
    requirements の triad-review と review-wave を通さずに alignment と approval へ進んだ。
  - >
    design/tasks/implementation への下流影響は認識されたが、通常の第3過程の連鎖としてではなく、
    finalize/commit 修復時の補足判断として追加された。
  - >
    既存の機械検査は、下流影響判断の不足を `reopen-finalize` が completed 記録を生成した後、
    commit 時にようやく検出した。
  - >
    文書化されたプロトコル上は前段の gate が必要な場合でも、`reopen-finalize` が
    completed reopen 記録を生成できてしまう。
  - >
    「正本本文を実質修正した phase」と「正本本文を修正していない downstream phase」の違いが、
    guidance と機械モデルの双方で十分に明示されていない。
scope:
  included:
    - >
      `REOPEN_PROCEDURE.md`、workflow-management の design/tasks、
      `tools/check-workflow-action.py` の reopen 系コマンドを照合し、不一致を調査する。
    - >
      phase の成果物本文を実質修正した場合、その phase の triad-review、review-wave、
      alignment、approval を finalize 前に必須とする規律を定義する。
    - >
      requirements 変更が design/tasks/implementation へ波及する場合、または既存の下流成果物で
      十分と判断する場合に、下流 gate をどのように記録するか定義する。
    - >
      必須 gate や下流判断が不足しているとき、`next --json`、`reopen-advance-gate`、
      `reopen-finalize`、commit preflight が fail-closed で停止する条件を定める。
    - >
      すでに push 済みの backlog routing reopen 記録を、修復するのか、再 reopen するのか、
      supersede するのか決める。
  excluded:
    - >
      プロトコルと修復経路が明示承認される前に、修復後の reopen フローを実装すること。
    - >
      修復または置換判断を記録せず、既存の completed reopen 記録を完全に有効なものとして扱うこと。
design_questions:
  - id: RPMR-Q1
    question: >
      reopen 中に phase 成果物を編集したとき、機械はどのように
      alignment/approval だけではなく triad-review と review-wave が必要だと検出するか。
  - id: RPMR-Q2
    question: >
      影響を受ける downstream phase に gate 判断が記録されていない場合、
      completed 記録を作ってから commit 時に失敗させるのではなく、`reopen-finalize` 自体を
      拒否すべきか。
  - id: RPMR-Q3
    question: >
      push 済みだが手続き上 incomplete な reopen は、workflow-state の修復、新しい reopen、
      superseding reopen record のどれとして表現するべきか。
  - id: RPMR-Q4
    question: >
      直接の reopen 範囲と、間接的な影響確認範囲を区別する正本フィールドは何にするべきか。
mechanization_gaps:
  - id: RPMR-G1
    summary: >
      規律としては、正本本文を実質修正した phase は triad-review、review-wave、
      alignment、approval を再実施する必要がある。しかし、reopen state が
      「どの phase を実質編集したか」を機械的な必須入力として保持していないため、
      pending_gates が alignment/approval だけでも早期に止めにくい。
  - id: RPMR-G2
    summary: >
      requirements 変更後の design/tasks/implementation 影響判断は必須だが、
      `reopen-start` や `next --json` が「下流 phase ごとの判断予定」を一貫して要求していない。
      そのため、不足が `reopen-finalize` や commit preflight まで遅れて見つかりうる。
  - id: RPMR-G3
    summary: >
      `reopen-finalize` は pending_gates が空であることを確認するが、必要な gate 集合そのものを
      edited phase と downstream phase から再計算して照合する契約が弱い。
  - id: RPMR-G4
    summary: >
      downstream が「変更不要」または「既存成果物で十分」と判断された場合も、
      gate、feature_scope、decision、rationale、evidence を持つ判断証跡が必須である。
      これが不足している状態を `next --json` 段階で次作業として返す機械処理が不足している。
fail_closed_invariants:
  - id: RPMR-I1
    statement: >
      reopen state は、実質編集した phase を `edited_phases` または同等の正本フィールドで
      機械可読に保持する。値は requirements/design/tasks/implementation などの既知 phase に限定する。
  - id: RPMR-I2
    statement: >
      `edited_phases` に含まれる各 phase は、required gates として
      `triad-review`、`review-wave`、`alignment`、`approval` をすべて要求する。
      drafting が必要な phase は `drafting_completed_gates` または `completed_gates` で drafting 完了も確認する。
  - id: RPMR-I3
    statement: >
      上流 phase が編集された場合、下流 phase ごとの影響判断予定を
      `impacted_downstream_phases` と `downstream_impact_decisions` で覆う。
      requirements 編集なら design/tasks/implementation、design 編集なら tasks/implementation、
      tasks 編集なら implementation を最低確認対象に含める。
  - id: RPMR-I4
    statement: >
      下流 phase を実際に修正しない場合でも、`existing_sufficient` または `no_impact` の
      downstream impact decision を gate 単位で記録する。判断証跡なしの省略は不可とする。
  - id: RPMR-I5
    statement: >
      `next --json` は、edited phase の required gates または downstream impact decision が不足している場合、
      completed や通常作業を返さず、reopen の不足作業を返す。
  - id: RPMR-I6
    statement: >
      `reopen-finalize` は、pending_gates が空であっても、edited phase と downstream phase から
      必須 gate / 必須 decision を再計算し、不足があれば completed 記録を生成しない。
  - id: RPMR-I7
    statement: >
      commit preflight は最後の保険として同じ不足を検出する。ただし初検出地点を commit に置かず、
      `next --json` と `reopen-finalize` で先に fail-closed させる。
red_tests:
  - id: RPMR-T1
    title: requirements 編集 phase が alignment/approval だけなら finalize を拒否する
    target: tests/tools/test_check_workflow_action.py
    expected: >
      reopen state に `edited_phases: [requirements]` があり、requirements の
      triad-review/review-wave が completed_gates にない場合、`reopen-finalize` は DEVIATION になる。
  - id: RPMR-T2
    title: requirements 編集後に design/tasks/implementation 判断がなければ next が不足作業を返す
    target: tests/tools/test_check_workflow_action.py
    expected: >
      requirements が edited phase で、downstream impact decision が design/tasks/implementation を
      覆っていない場合、`next --json` は completed ではなく reopen の downstream 判断不足を返す。
  - id: RPMR-T3
    title: downstream 変更不要でも判断証跡なしなら finalize を拒否する
    target: tests/tools/test_check_workflow_action.py
    expected: >
      `impacted_downstream_phases` に design/tasks/implementation が含まれていても、
      各 phase に対応する `downstream_impact_decisions` がなければ `reopen-finalize` は失敗する。
  - id: RPMR-T4
    title: existing_sufficient/no_impact の証跡があれば downstream 変更なしで進める
    target: tests/tools/test_check_workflow_action.py
    expected: >
      各 downstream phase に gate、feature_scope、decision、rationale、evidence を持つ
      decision がある場合、本文変更なしの downstream phase は finalize 条件を満たす。
  - id: RPMR-T5
    title: commit preflight は同じ不足を検出するが初検出にしない
    target: tests/tools/test_check_workflow_action.py
    expected: >
      `reopen-finalize` を迂回して不完全な completed reopen 記録が staged された場合、
      commit preflight も DEVIATION にする。
implementation_targets:
  - id: RPMR-IMPL-1
    command_or_area: reopen-start
    required_change: >
      分類と修正対象 phase から `edited_phases` と downstream impact confirmation scope を初期化できるようにする。
      requirements 起点の場合、design/tasks/implementation の確認予定を欠いた開始を拒否または明示的不足として記録する。
  - id: RPMR-IMPL-2
    command_or_area: next --json
    required_change: >
      edited phase の required gates と downstream impact decisions の不足を読み、
      `run_reopen_pending_gate` または downstream 判断不足を表す required_action を返す。
  - id: RPMR-IMPL-3
    command_or_area: reopen-advance-gate
    required_change: >
      completed gate 追加時に、該当 gate の decision が downstream 影響判断なのか、edited phase の
      review gate 完了なのかを区別して記録できるようにする。
  - id: RPMR-IMPL-4
    command_or_area: reopen-finalize
    required_change: >
      edited phase と downstream phase から必須 gate / decision を再計算し、
      pending_gates が空でも不足があれば completed 記録を生成しない。
  - id: RPMR-IMPL-5
    command_or_area: commit preflight
    required_change: >
      completed reopen 記録に対して同じ不変条件を検査し、手編集や古い completed 記録の混入を防ぐ。
repair_route_candidates:
  - id: RPMR-R1
    title: pushed completed reopen を superseding reopen で置き換える
    status: candidate
    rationale: >
      既に push 済みの completed 記録を履歴から消さず、手続き不備を明示したうえで新しい reopen 記録を作る。
  - id: RPMR-R2
    title: workflow-state repair record で completed reopen を補修する
    status: candidate
    rationale: >
      completed 記録自体を修復対象として扱い、修復理由と不足 gate を evidence として残す。
  - id: RPMR-R3
    title: completed reopen を再 reopen する
    status: candidate
    rationale: >
      手続き不備を「完了済み成果物の再検討」として扱い、通常 reopen の枠に乗せる。
selected_repair_route:
  status: selected
  selected: RPMR-R1
  required_before_implementation: true
  note: >
    修復経路は RPMR-R1（pushed completed reopen を superseding reopen で置き換える）を採用する。
    既に push 済みの `stages/completed/reopen-procedure-2026-07-01.yaml` は履歴として残し、
    その completed 記録が requirements 実質編集に対する triad-review/review-wave を欠いたことを
    superseding reopen の trigger として扱う。後付けで既存 completed 記録を有効化せず、
    新しい reopen で fail-closed 機械処理を実装・検証する。
  selected_reason: >
    R1 は履歴改変を避けつつ、既存 completed reopen の手続き不備を明示できる。R2 の
    workflow-state repair は既存 completed 記録を補修して有効化したように見えやすく、
    R3 の completed reopen 再 reopen は対象が「成果物の意味」なのか「reopen 機械処理」なのか
    曖昧になりやすい。今回の主問題は reopen 機械処理の fail-closed 不足なので、
    superseding reopen として別記録で置き換える。
  superseded_record:
    path: stages/completed/reopen-procedure-2026-07-01.yaml
    reason: >
      requirements.md の実質修正後、requirements triad-review/review-wave を再実施しないまま
      alignment/approval と finalize に進めてしまった。downstream design/tasks/implementation
      判断も、通常の連鎖 gate としてではなく後付け補修に近い形で completed 記録へ入った。
  next_execution_step: >
    RPMR-T1 から TDD を開始し、`edited_phases: [requirements]` を持つ reopen state が
    requirements triad-review/review-wave なしでは `reopen-finalize` できない赤テストを書く。
proposed_work:
  - id: RPMR-1
    title: プロトコルと実装の監査
    tasks:
      - >
        `REOPEN_PROCEDURE.md` と `tools/check-workflow-action.py` の reopen 関連実装を比較する。
      - >
        requirements を実質修正した後でも、機械が alignment/approval のみを許してしまった箇所を特定する。
      - >
        commit/finalize 検査のうち、遅すぎるもの、不十分なものを特定する。
  - id: RPMR-2
    title: 修復経路の決定
    tasks:
      - >
        push 済みの backlog routing reopen を修復するか、supersede するか、再度 reopen するか提案する。
      - >
        workflow state を変更する前に、選択した経路を記録する。
  - id: RPMR-3
    title: fail-closed 契約
    tasks:
      - >
        編集された phase と影響を受ける downstream phase に必要な gate を定義する。
      - >
        それらの gate が不足している場合の `next --json` と `reopen-finalize` の停止挙動を定義する。
      - >
        phase gate 証跡が不足した completed reopen 記録を commit できないようにする
        commit preflight 検査を定義する。
  - id: RPMR-4
    title: TDD 実装計画
    tasks:
      - >
        requirements の実質修正後、alignment/approval 前に triad-review/review-wave を必須にする
        失敗テストを追加する。
      - >
        downstream 波及判断が未完了の場合に `reopen-finalize` が拒否する失敗テストを追加する。
      - >
        プロトコル承認後に、必要最小限の実装を行う。
acceptance:
  - >
    backlog routing reopen が誤って完了できた具体的なプロトコル gap が特定されている。
  - >
    push 済み reopen の修復経路が明示され、証跡に基づいている。
  - >
    編集された phase が triad-review と review-wave を省略できないよう、機械挙動が定義されている。
  - >
    downstream design/tasks/implementation の波及判断が finalize 前に必須化され、
    commit 失敗後の後付け補修にならない。
  - >
    実装計画が TDD で開始できる粒度になっており、fail-closed の失敗テストを含む。
notes:
  - >
    対応方針は、まずこの plan をメンテナンスレーンで扱い、reopen プロトコルの点検・修復準備を
    安全に進められる状態へ整える。その後、通常状態へ復帰してから、改めて本件を reopen する。
    これは、問題のある reopen 処理の上に追加の reopen を直ちに重ねず、先に機械処理と運用規律の
    足場を整えるためである。
  - >
    この候補は maintenance ではない。reopen プロトコルの意味と機械ガードを変更するため、
    明示分類のうえで SDD workflow または reopen に送る。
