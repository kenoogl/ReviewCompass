schema_version: reviewcompass-backlog-item-v1
id: plan-2026-06-23-guidance-relocation-and-docs-classification
kind: plan
title: Classify and relocate remaining operations and discipline documents
status: candidate
source_unit_id: main-completed
created_at: '2026-06-23T12:18:28+09:00'
index_path: .reviewcompass/backlog/index.yaml
provenance:
  created_by: llm
  source_ref: conversation:2026-06-23-remaining-docs-relocation-discussion
  reason: >
    docs/operations と docs/disciplines に残る文書のうち、実行時・デプロイ時に
    LLM / hooks / tools / effective prompt が読むべきものは .reviewcompass 配下へ
    移していく必要がある。ただし前回の guidance 移動では、十分な計画と検査なしに
    進めた結果、参照漏れ、重複、旧 path 残存、誤った修復作業が発生したため、
    今回は移動前に詳細な分類・検査・段階移行計画を backlog へ起票する。
summary: >
  残存する docs/operations / docs/disciplines を一括移動せず、まず deploy-facing、
  runtime-facing、effective-prompt-source、human-reference、historical の分類軸で監査する。
  そのうえで .reviewcompass/guidance、.reviewcompass/specs、.reviewcompass/backlog、
  docs/notes、archive などの配置先を決め、参照更新、post-write verification、
  duplicate / stale path 監査、削除条件までを段階化する。
related:
  - .reviewcompass/backlog/plans/plan-2026-06-23-effective-prompt-freshness-audit.yaml
  - .reviewcompass/backlog/plans/plan-2026-06-23-entrypoint-coverage-audit.yaml
  - .reviewcompass/backlog/plans/plan-2026-06-23-operation-registry-preflight.yaml
  - .reviewcompass/guidance/WORKFLOW_NAVIGATION.md
  - .reviewcompass/guidance/WORKFLOW_DISCIPLINE_MAP.yaml
  - deploy-manifest.yaml
  - docs/operations
  - docs/disciplines
background:
  previous_guidance_relocation:
    - .reviewcompass/guidance を deploy-facing guidance の正本として追加した。
    - hooks、templates、tools、deploy manifest の参照を .reviewcompass/guidance 側へ切り替えた。
    - 旧 docs/operations / docs/disciplines に残っていた重複 guidance を削除した。
    - しかし初回は計画と検査が不足し、後からリンク漏れ、旧 path 参照、削除漏れ、誤った manifest 対象などを修正することになった。
  remaining_docs:
    - docs/operations には feature 別の運用解説、deployment 解説、adapter 手引きが残っている。
    - docs/disciplines には active feedback discipline に見える文書が残っている。
    - これらは性格が混在しており、一律に移すと別の混線を起こす。
problem_statement:
  - LLM が読むべき実行規律が docs 側に残ると、.reviewcompass/guidance と二重正本になる。
  - docs 側の active discipline が現在も効くなら、effective prompt / entrypoint coverage / deploy package がそれを追跡できない可能性がある。
  - feature operation 解説のような human-reference 文書まで guidance に移すと、逆に guidance が肥大化し、実行時に読むべきものが曖昧になる。
  - 旧 path を残したまま moving / deletion を行うと、link lint では拾えない adapter / hook / template / test fixture 参照が残る可能性がある。
classification_axes:
  - id: deploy_facing
    description: デプロイ先に持ち込み、対象アプリ内の LLM / hooks / tools が読む必要がある。
    preferred_location: .reviewcompass/guidance
  - id: runtime_facing
    description: 実行時の entrypoint、workflow navigation、commit / push / review-run / proxy 操作へ影響する。
    preferred_location: .reviewcompass/guidance
  - id: effective_prompt_source
    description: effective prompt の source ref として使われる、または使うべき規律。
    preferred_location: .reviewcompass/guidance
  - id: spec_or_contract_source
    description: 機能仕様・受入条件・機械検査の正本として扱う。
    preferred_location: .reviewcompass/specs
  - id: human_reference
    description: 人間向けの背景説明、機能解説、履歴整理であり、実行時に必読ではない。
    preferred_location: docs/operations または docs/notes
  - id: historical
    description: 過去の判断経緯・古い規律・退役済み文書。
    preferred_location: docs/notes または archive
