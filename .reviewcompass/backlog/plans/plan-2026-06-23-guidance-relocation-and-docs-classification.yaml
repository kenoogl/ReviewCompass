controls_before_any_move:
  - id: C-1
    title: Create complete inventory table
    requirement: >
      各ファイルに classification、current readers、expected readers、deploy inclusion、
      effective prompt source status、proposed destination、delete-old-path condition を付ける。
  - id: C-2
    title: Search all references before moving
    requirement: >
      rg で file name、relative path、anchor、template reference、test fixture reference、
      deploy manifest reference を全件列挙する。
  - id: C-3
    title: Prepare contract tests before implementation
    requirement: >
      TDD に従い、移動前に red test または現状固定テストを作る。
  - id: C-4
    title: Define old-path deletion policy
    requirement: >
      旧 path を残すなら明示的な compatibility shim と期限を置く。原則として二重正本は残さない。
  - id: C-5
    title: Define post-write review scope
    requirement: >
      正本 guidance / deploy-facing guidance を動かす場合、API post-write verification 対象とする。
      human-reference docs のみなら lightweight self-check とする。
  - id: C-6
    title: Avoid mixed commits
    requirement: >
      inventory / tests / migration / deletion / consumer update / cleanup を必要に応じて分割し、
      commit unit または blocking unit を使って混線を防ぐ。
implementation_plan:
  - id: GRC-1
    title: Inventory and classification only
    status: candidate
    tasks:
      - docs/operations と docs/disciplines の全残存ファイルを一覧化する。
      - classification_axes に従って一次分類する。
      - current readers と proposed destination を記録する。
    acceptance:
      - 移動対象、残置対象、判断保留対象が表で確認できる。
      - この段階ではファイル移動をしない。
  - id: GRC-2
    title: Reference and consumer audit
    status: candidate
    tasks:
      - path / basename / anchor で repo 全体を検索する。
      - hooks、templates、tools、tests、deploy-manifest、AGENTS / entry templates の参照を分類する。
      - deploy package に含めるべき consumer と開発リポジトリ内だけの consumer を分ける。
    acceptance:
      - 各移動候補について、更新すべき consumer が漏れなくリストされる。
  - id: GRC-3
    title: Red tests and audit tests
    status: candidate
    tasks:
      - duplicate guidance / legacy docs path を検出するテストを追加する。
      - deploy manifest が新配置だけを含むことを検査する。
      - effective prompt source refs が旧 docs path を指さないことを検査する。
      - adapter guidance が .reviewcompass/guidance 正本へリンクすることを検査する。
    acceptance:
      - 移動前に、期待する配置違反を検出できるテストが存在する。
  - id: GRC-4
    title: Move deploy-facing and runtime-facing docs
    status: candidate
    tasks:
      - 分類済み deploy-facing / runtime-facing 文書を .reviewcompass/guidance へ移す。
      - consumer references を同じ commit または明示した移行 commit で更新する。
      - effective prompt / discipline map / operation registry との接続を更新する。
    acceptance:
      - .reviewcompass/guidance が deploy-facing guidance の唯一の正本になる。
      - 旧 docs path を読む実行時 consumer が残らない。
  - id: GRC-5
    title: Delete or demote old paths
    status: candidate
    tasks:
      - 移動済み旧 path を削除する。
      - 削除しない場合は archive / historical / notes として明示し、実行時 consumer から切り離す。
      - README に残す場合は正本でないことを明記する。
    acceptance:
      - 二重正本が残らない。
      - 旧 path 参照が link / grep / deploy lint で検出されない。
  - id: GRC-6
    title: Post-write review and final audit
    status: candidate
    tasks:
      - guidance / discipline map / deploy manifest 変更に API post-write verification を実施する。
      - human-reference docs のみの変更は lightweight self-check にする。
      - next --json、document_link_lint、deployment tests、effective prompt freshness / coverage audit を実行する。
    acceptance:
      - 移動後に next --json が旧 path を返さない。
      - post-write manifest が実 target を正しく封印する。
      - 作業ツリー clean で push 可能になる。
