audit_commands_candidates:
  - rg -n "docs/operations|docs/disciplines|WORKFLOW_NAVIGATION_FOR_|discipline_" .
  - .venv/bin/python3 tools/document_link_lint.py --json <changed-files>
  - .venv/bin/python3 tools/check-workflow-action.py next --json
  - .venv/bin/python3 tools/check-workflow-action.py prompt-audit --json
  - .venv/bin/python3 -m unittest tests.deployment.test_deploy_manifest tests.tools.test_effective_prompt_contract
risks_and_mitigations:
  - risk: 一括移動で参照漏れが大量発生する。
    mitigation: inventory / reference audit / red tests を先に commit し、移動は段階化する。
  - risk: human-reference 文書まで guidance に移して guidance が肥大化する。
    mitigation: deploy-facing / runtime-facing / effective-prompt-source に該当しないものは docs 側または notes 側に残す。
  - risk: 旧 path を互換用に残して二重正本になる。
    mitigation: shim を置く場合は期限と警告を持たせ、原則は旧 path 削除。
  - risk: post-write manifest が review-target.md など派生物だけを封印する。
    mitigation: manifest target_files が実 target になっているか必ず確認する。
  - risk: 移動中に別作業を混ぜる。
    mitigation: blocking unit / commit unit を使い、allowed_files を限定する。
open_questions:
  - docs/disciplines の active feedback discipline を .reviewcompass/guidance に統合するか、別の .reviewcompass/discipline 風ディレクトリを作るか。
  - feature operation 解説を docs/operations に残すか、.reviewcompass/specs/*/operations.md のように feature 配下へ寄せるか。
  - adapter guidance for Claude / Codex を .reviewcompass/guidance に置くか、templates/entry 側へ吸収するか。
  - historical discipline の archive 先を docs/notes、docs/archive、.reviewcompass/archive のどれにするか。
  - deploy package から ReviewCompass 自身の作業ログ・evidence をどこまで除外するか。
recommended_next_step:
  id: GRC-1
  title: Create inventory and classification table without moving files
  rationale: >
    前回の失敗は移動を先に進め、後から参照漏れを直した点にある。
    今回はまず全残存ファイルの分類表を作り、移動対象と残置対象を合意してから
    TDD と段階移行へ進む。
non_goals:
  - この plan 作成時点でファイル移動を実施済み扱いにしない。
  - docs/operations / docs/disciplines を一括削除しない。
  - human-reference 文書を無理に .reviewcompass/guidance へ移さない。
  - 旧 path 互換を無期限に残さない。
decisions:
  - date: '2026-06-23'
    decision: >
      残存 docs/operations / docs/disciplines の整理は必要だが、前回の失敗を踏まえ、
      まず分類・参照監査・検査計画を backlog 化し、移動は別作業として実施する。
