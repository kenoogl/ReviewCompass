schema_version: reviewcompass-backlog-item-v1
id: issue-2026-06-24-sandbox-guarded-commit-blocked
kind: issue
title: サンドボックス/非TTY 環境では guarded commit が完了できない
status: completed
source_unit_id: main-side-conversation
created_at: '2026-06-24T10:15:47.659078+00:00'
index_path: .reviewcompass/backlog/index.yaml
provenance:
  created_by: llm
  source_ref: tools/check_workflow_action/commit_approval.py
  reason: Claude Code をサンドボックス(非対話・TTYなし・利用者端末と別ファイルシステム)で起動すると ReviewCompass の guarded
    commit が完了できない。commit-approval record/delegate-execution が TTY 対話入力必須で、Bash(非TTY)からも利用者端末(私の作業環境へ
    cd 不可)からも入力できない。--no-source-text + execution-actor human での代行は Claude Code auto
    mode classifier が承認ゲート迂回・human-in-the-loop 迂回として拒否(正当な制御)。利用者報告では Mac ローカルで直接
    Claude Code を起動した場合は TTY ありで問題なし、前回セッションでも発生。対策案:(a)サンドボックス起動時は commit/push を利用者のローカルセッションに委ねる運用を明文化、(b)非TTY環境向けの正規承認経路(human-in-the-loop
    を保つ事前承認トークン等)の検討。
decisions:
- decision: completed
  decision_ref: .reviewcompass/guidance/COMMIT_OPERATION_CARD.md
  reason: COMMIT_OPERATION_CARD.md、WORKFLOW_PRECHECK.md、WORKFLOW_PRECHECK_DETAILS.md、
    WORKFLOW_NAVIGATION_FOR_CLAUDE.md、WORKFLOW_NAVIGATION_FOR_CODEX.md に、非対話環境では
    PTY relay で直近の利用者発話を渡すこと、Codex workspace-write sandbox では commit
    wrapper 本体を最初から許可された実行環境で動かすこと、wrapper を迂回した承認レコード自作や固定文字列承認を禁止することが明文化済み。
    そのため、本 issue は追加実装ではなく既存正本で解消済みとして閉じる。
  decided_at: '2026-06-30T00:00:00+09:00'
