  \n```text\n# API Review Prompt Quality\n\n最終更新：2026-06-20\n\n本文書は、API 経由の review-run\
  \ を開始する前に、レビュー用プロンプト自体を品質確認するための運用手順である。\n\nこの手順は、特定 feature や特定 phase に閉じない。各 review-run\
  \ は、この共通手順に phase / gate / feature 固有の上流接続要件を差し込んで使う。\n\n利用者が任意の場面で API review を依頼する場合は、利用者が伝えたレビュー要件を\
  \ `User Review Requirements` として保持し、criteria 作成・prompt quality review・実 review-run\
  \ の全段で照合する。\n\n## 1. 目的\n\nAPI review-run の品質は、モデルや provider だけでなく、プロンプトの作り方に強く依存する。\n\
  \nレビュー用プロンプトの監査は、高リスク時だけの追加確認ではなく、API review-run の標準ゲートである。プロンプトが target / source\
  \ / scope / output contract を誤ると、その後の raw response、parsed YAML、triage、proxy decision、実装修正がすべて誤った入力に基づく。したがって、prompt\
  \ audit にかかるコストはレビュー外の余分なコストではなく、レビュー品質を成立させるための本体コストとして扱う。\n\n特に、次の失敗を防ぐ。\n\n-\
  \ `--target` が実際の審査対象本文ではなく、作成者の要約になっている\n- `--criteria-file` と `--target` が同一の\
  \ author-written summary になっている\n- source materials が path-only で、モデルが本文を読めない\n\
  - review target / source materials / out of scope が分離されていない\n- 上流意図伝達レビューで、上流の目的・責務境界・受入条件・禁止事項が\
  \ prompt に含まれていない\n- 利用者が指定したレビュー目的、重視点、範囲、禁止事項が main によって狭められる、広げられる、または別の問いに置き換えられる\n\
  - output contract が曖昧で parser / triage に載らない\n- プロンプトが結論を誘導している\n\n## 2. 役割\n\n\
  APIレビュー用プロンプト品質確認は、次の 2 者レビュー体制で行う。\n\n| 役割 | 担当 | 目的 |\n|---|---|---|\n| main |\
  \ 操縦中の LLM | API review criteria 素案を作る |\n| adversarial | 別モデル | 素案の欠落、誘導、対象違い、材料不足、範囲ミスを探す\
  \ |\n| judgment | 別モデル | adversarial 所見の反映後、その prompt を実 review-run に使ってよいか判定する\
  \ |\n\nここでいう 2 者レビュー体制は、作成者である main を除き、adversarial と judgment の 2 者で品質確認する運用を指す。\n\
  \n## 3. 入力分離\n\nAPI review-run では、criteria と target を分離する。\n\n- `User Review Requirements`:\
  \ 利用者が指定したレビュー目的、判断対象、重視点、範囲、禁止事項、必要出力\n- `--criteria-file`: レビュー目的、背景、上流材料、必須チェック、範囲外、finding\
  \ policy を含む\n- `--target`: 実際に審査する本文\n\n`User Review Requirements` は criteria の上位入力であり、criteria\
  \ 作成時に失われてはならない。main は、利用者要件を criteria に構造化して写し、どの要件がどの review task / required check\
  \ / out of scope / finding policy に対応するかを確認できる形にする。\n\n禁止:\n\n- criteria と target\
  \ に同じ review wrapper / author-written summary を渡す\n- target manifest が実審査対象を含まない状態で\
  \ gate 完了根拠にする\n- target 本文を入れず、target の要約だけで review-run を実行する\n- 利用者が求めたレビュー範囲を、合意なく狭める、広げる、または別目的の\
  \ review に置き換える\n\n## 4. User Review Requirements\n\n利用者が任意の場面で review を依頼する場合、main\
  \ は prompt 作成前に次を整理する。\n\n1. review purpose: 欠陥検出、採否判断、上流接続確認、回帰確認、比較評価など\n2. review\
  \ object: artifact、prompt、設計案、修正案、実装差分など\n3. review focus: API設計、互換性、セキュリティ、運用境界、上流要件、実装可能性など\n\
  4. scope boundaries: 含める範囲、含めない範囲、まだ判断しない下流工程\n5. source materials: 根拠にする要件、設計、過去判断、制約、禁止事項\n\
  6. output requirements: findings、severity、採否、懸念点、修正案、比較軸など\n7. prohibited actions:\
  \ commit、push、phase 完了、人間承認代行、未合意の仕様変更など\n\n利用者要件が曖昧な場合でも、main が勝手に確定しない。作業可能な仮定として扱う場合は、criteria\
  \ に仮定を明記し、prompt quality review で妥当性を確認させる。\n\n## 5. API 送信可能材料の基準\n\nAPI review-run\
  \ / proxy_model 判断では、判断に必要な ReviewCompass リポジトリ内の仕様、設計、タスク、レビュー所見、構造化要約、証跡パスを prompt\
  \ に含めてよい。\n\nこれは、次の条件を満たす場合に限る。\n\n1. 利用者が当該 API review-run / proxy_model 判断の実行を明示承認している。\n\
  2. API key、token、password、nonce などの秘密値を含めない。\n3. メールアドレス、電話番号など個人識別情報を含めない。\n4.\
  \ 第三者との契約上、外部送信できない非公開情報を含めない。\n5. 判断に不要な全文ログや周辺ファイルを含めず、判断項目に必要な抜粋または構造化要約に絞る。\n\
  \n単にリポジトリ内の未公開仕様・設計・レビュー要約であることだけを理由に、API 送信を禁止しない。ReviewCompass の API review /\
  \ proxy_model 運用では、それらは通常のレビュー材料である。\n\nただし、利用者が外部送信を避ける方針を示した場合、または上記 2〜4 に該当する情報が含まれる場合は、伏字化、抽象化、または外部\
  \ API を使わない判断へ切り替える。\n\n## 6. Main が作る criteria の必須要素\n\ncriteria file は、少なくとも次を持つ。\n\
  \n1. review task\n2. why this review exists\n3. user review requirements\n4. required\
  \ disciplines\n5. review target\n6. source materials\n7. required checks\n8. out\
  \ of scope\n9. finding policy\n\nsource materials は path-only にしない。必要な本文抜粋または構造化要約を、モデルが読める形で\
  \ criteria に含める。\n\nfront matter に path を置く場合は、provenance なのか model-readable material\
  \ なのかを明示する。\n\ncriteria は、利用者要件を単に引用するだけでなく、review task / required checks / out\
  \ of scope / finding policy へ反映する。\n\n## 6.1 Main Preanalysis\n\nmain は criteria\
  \ 素案を書く前に、対象 review requirement と source materials を直接検討し、判断に必要な材料、判断項目、分割要否、未読資料、機微情報リスクを整理する。\n\
  \nmain preanalysis は、prompt 作成のための材料揃えと判断点発見であり、reviewer に対する正解ではない。preanalysis\
  \ を後続の監査や prompt に含める場合は、仮説・source discovery aid として明示し、reviewer に source materials\
  \ から独立再構成させる。\n\nmain preanalysis には少なくとも次を含める。\n\n- 読んだ source materials と使用目的\n\
  - 判断項目と、それぞれの target / source / out of scope\n- 複数 prompt に分割すべき独立判断の有無\n- prompt\
  \ に含めるべき model-readable source material\n- 送信してはいけない、または最小化すべき機微情報\n- 未解決・未読・推測に留まる事項\n\
  \npreanalysis 内の所見は、`open`、`resolved`、`superseded`、`used_for_context` など現在性を区別できる形で扱う。解決済み所見を\
  \ open な欠陥として prompt bundle に残すと、reviewer を誤誘導するためである。\n\n## 7. Phase 別の上流接続\n\n\
  `.reviewcompass/guidance/SESSION_WORKFLOW_GUIDE.md#vertical-intent-transfer-review`\
  \ が適用される review では、phase ごとに次を確認する。\n\n| phase | target | source materials |\n|---|---|---|\n\
  | requirements | `requirements.md` | upstream decision materials, reopen classification,\
  \ planning notes, user decisions |\n| design | `design.md` | `requirements.md` |\n\
  | tasks | `tasks.md` | `requirements.md`, `design.md` |\n| implementation | implementation\
  \ artifacts | `requirements.md`, `design.md`, `tasks.md` |\n\nsource materials は背景・意図伝達確認のために使う。現在\
  \ phase の correctness だけを target として判定し、下流 phase の correctness を同時に判定しない。\n\n利用者が指定した\
  \ review focus が phase 標準の観点と異なる場合は、両者の関係を criteria に明記する。phase 標準の必須検査を外す必要がある場合は、利用者合意なしに外してはならない。\n\
  \n## 8. Prompt Quality Review\n\nmain が criteria 素案を作ったら、実 review-run の前に preanalysis\
  \ sufficiency audit と prompt quality review を行う。\n\n標準手順は次の順序とする。\n\n1. main preanalysis\n\
  2. preanalysis sufficiency audit\n3. API review criteria draft\n4. prompt quality\
  \ review\n5. 実 review-run\n6. raw / parsed / model summary / triage\n7. 必要に応じて proxy_model\
  \ decision\n\n通常の prompt quality review の前に、`templates/review/main_preanalysis_sufficiency_audit_criteria_template.md`\
  \ を使って preanalysis sufficiency audit を行う。この監査では、reviewer に source materials から judgment\
  \ item を独立再構成させたうえで、main preanalysis を仮説として比較させる。main preanalysis を正解として渡してはならない。\n\
  \npreanalysis sufficiency audit では、target bundle に次を含める。\n\n- 利用者または workflow の\
  \ review requirement\n- 判断に必要な source materials の本文または構造化抜粋\n- main session LLM\
  \ の preanalysis\n- proposed API review criteria または prompt\n\n監査結果の `required_prompt_changes`\
  \ を反映してから、通常の `templates/review/api_review_prompt_quality_criteria_template.md`\
  \ による prompt quality review へ進む。\n\npreanalysis sufficiency audit は、次の欠陥を検出するための標準ゲートである。\n\
  \n- source selection の漏れ\n- source summary と原文対応の不足\n- main preanalysis の stale\
  \ / resolved 所見による anchoring\n- 複数の独立判断を 1 prompt に押し込む粒度誤り\n- 誤検出防止文言が、重要な欠陥検出まで抑制する\
  \ framing bias\n- output contract と runner / parser の不一致\n\nreview question は 1\
  \ prompt につき原則 1 つにする。複数の独立した採否判断、クラスタ判断、設計論点判断を 1 つの prompt に押し込まない。\n\n複数判断がある場合は、判断項目ごとに\
  \ prompt を分ける。各 prompt は、その判断に必要な source findings、上流材料、対象本文要約、out of scope、output\
  \ contract だけを持つ。共通背景を入れる場合も、個別判断の焦点を曖昧にしない量に抑える。\n\nadversarial には、`templates/review/api_review_prompt_quality_criteria_template.md`\
  \ を criteria として渡し、criteria 素案を target としてレビューさせる。\n\n利用者要件がある場合、prompt quality\
  \ review では次も確認する。\n\n- 利用者要件が criteria に保持されている\n- 利用者要件が review task / required\
  \ checks / out of scope / finding policy に反映されている\n- main が利用者要件を合意なく狭めたり広げたりしていない\n\
  - 利用者が禁止した操作や判断代行が prompt に混入していない\n- 複数の独立判断を 1 prompt に押し込んでおらず、判断項目ごとに注意が分散しない粒度になっている\n\
  \nadversarial の所見を main が反映した後、judgment に同じ quality criteria と adversarial 所見を渡し、使用可否を判定させる。\n\
  \njudgment が `findings: []` を返した場合だけ、実 review-run へ進める。\n\njudgment が finding を返した場合は、prompt\
  \ を再修正し、必要に応じて再度 judgment へ回す。\n\n## 9. 実 Review-Run\n\nprompt quality review を通過した後、実\
  \ review-run を実行する。\n\n複数 prompt に分けた場合は、各 prompt の prompt quality review 通過証跡と実\
  \ review-run / proxy decision 結果を判断項目ごとに保存する。一括 summary は後段で作ってよいが、個別判断の raw / parsed\
  \ / decision 証跡を上書きしない。\n\n実行時には次を確認する。\n\n- `target-manifest.yaml` に実審査対象が入っている\n\
  - `rounds.yaml` の criteria は使用可判定済み criteria である\n- raw / parsed / model-result-summary\
  \ / triage が生成されている\n- 利用者提示ゲート前に、raw 結果概要、モデル別 summary、同根クラスタ、三段階トリアージ案をまとめる\n\
  - 実 review-run の結果を、利用者要件に含まれていない操作承認や phase 完了根拠へ拡張しない\n\n## 10. 成果物配置\n\n推奨配置:\n\
  \n```text\n.reviewcompass/specs/<feature>/reviews/<date>-<feature>-<phase>-<topic>-prompt-quality-run/\n\
  \  api-review-criteria.md\n  prompt-quality-review-criteria.md\n  variant-role-assignment.yaml\n\
  \  raw/\n  parsed/\n  prompts/\n  rounds.yaml\n  model-result-summary.yaml\n  prompt-quality-summary.md\n\
  ```\n\n実 review-run は別ディレクトリに分ける。\n\n```text\n.reviewcompass/specs/<feature>/reviews/<date>-<feature>-<phase>-<topic>-review-run/\n\
  ```\n\nprompt-quality-run は、実 review-run の gate 完了根拠ではない。実 review-run の criteria\
  \ を使ってよいことを示す補助証跡である。\n\n## 11. 今回の事例から得た規則\n\n2026-06-20 の `workflow-management`\
  \ design triad-review では、旧 run が `review-target.md` を criteria と target の両方に使い、`findings:\
  \ []` になった。\n\nその後、prompt quality review を挟み、`design.md` を実 target として再実行した v2 run\
  \ では 15 件の所見が出た。\n\n同日の `workflow-management` implementation Req14 approval gate\
  \ prompt audit では、preanalysis sufficiency audit により、source summary の原文対応不足と、誤検出防止文言が\
  \ approval gate bypass 検出を鈍らせる framing bias が検出された。これは、prompt audit が形式確認ではなく、実\
  \ review-run の欠陥検出力そのものを左右することを示す。\n\nこの差分から、次を標準規則とする。\n\n- 実審査対象本文を target にしない\
  \ review-run は、gate 完了根拠として弱い\n- author-written summary は criteria または source-material\
  \ summary として使えるが、target 本文の代替にしない\n- 上流接続 review では、source materials と target を明示的に分離する\n\
  - source summary には原文または構造化抜粋に加え、必要に応じて source cross-reference を持たせる\n- main preanalysis\
  \ は有用だが、仮説として扱い、reviewer に独立再構成させる\n- 1 prompt に複数の独立判断を押し込まない\n- prompt 自体の adversarial\
  \ / judgment レビューを実行前に挟む\n\n## 12. 停止点\n\nprompt quality review は、実 review-run の開始許可であり、次の操作を自動許可しない。\n\
  \n- `spec.json` 更新\n- phase / gate 完了\n- proxy_model 判断\n- design / requirements\
  \ / tasks / implementation 本文修正\n- commit\n- push\n\nこれらはそれぞれの workflow gate と利用者承認に従う。\n\
  ```\n\n### /Users/Daily/Development/ReviewCompass/.reviewcompass/guidance/discipline_post_write_verification.md\n\
  \ncontent_mode: full_text\ncontent_sha256: b5db5b8a11c57304976fd13a03e15fd39cbc44cb7b6f206b579065b0f62a10e2\n\
  \n```text\n---\nname: post-write-verification\ndescription: ワークフロー段の外側にある正本文書への書き込み後、起草者と異なる検証者による独立検証を必須化する。検出は逐語的指摘と本質的指摘に分類して処理する\n\
  metadata:\n  type: feedback\n---\n\nワークフロー段（drafting → triad-review → review-wave\
  \ → alignment → approval）の外側にある正本文書への書き込み後、書いた本人とは別の検証者による独立検証を必ず実施する。検出が出たときの処理は動作仕様ファイル\
  \ `.reviewcompass/specs/workflow-management/post-write-verification-spec.yaml` の収束基準に従う（逐語的指摘は弾き、本質的指摘は人へ上げる）。\n\
  \n**適用範囲：**\n\n- 対象：運用文書、規律文書、作業メモ、監査記録、再オープン記録など、通常ワークフロー段の成果物ではない正本文書\n- 対象外：`.reviewcompass/specs/`（ワークフロー段で検証）、spec.json\
  \ 状態変更（workflow precheck で検証）、`docs/archive/`、テスト用一時ファイル\n- 対象外（性質ベース）：**機械生成され引用元を明記した派生記録**（front-matter\
  \ に `generated_by: session-record-extractor` 等の来歴を持つもの）。独自の主張を持たず引用元からの決定論的な派生であり、独立検証が想定する「合意の取り違え・参照誤り・既存記述との矛盾」を持たないため対象外とする。これらは独立検証ではなく「**来歴の刻印＋引用元からの再生成突き合わせ（再現性）**」で担保する（取り込み時に引用元から再生成して\
  \ 1 バイト一致を確認し、来歴〔引用元のハッシュ・ツール版・機微除去ルール版〕を刻む）。判定はディレクトリでなく来歴マーカーで行う\n- 対象外（性質ベース）：**機械が吐く捕捉物**（API\
  \ 生出力・parsed・triage の review-run 一式、自律並列の走行台帳、書き込み後検証の API 結果ログ）。これらも独自の主張ではなく走行・実行の忠実な捕捉であり、独立検証ではなく**走行・再実行・再生成**で担保する。台帳の\
  \ `authorization` 等の埋め込み値は、承認レコードや autonomous-plan 検査など別の層で守られる。新規分は `.reviewcompass/evidence/`\
  \ 配下へ置かれ docs 配下に出ない。docs 配下の凍結旧配置はディレクトリ単位で対象外とする（`**/review-runs/**`、`docs/logs/autonomous-parallel/`、`docs/notes/post-write-verification-review/`）。なお**監査・計測記録**（例：`docs/discipline-compliance-reports/`）は主張を含むため対象に残す\n\
  - 新規ディレクトリ：判定に迷えば対象側に倒す\n\n**検証者の要件：**\n\n- 独立性：起草者と異なる検証者\n- 複数体並列：大規模時は複数の独立系統で検証する\n\
  - small 時は 1 体検証を許容するが、起草者と異なる独立系統を使う\n- 情報最小化：合意内容（決定事項の箇条書きのみ、判断理由文を含まない）と書き込み結果のみ渡す。起草者の解釈・判断理由・議論ログは渡さない\n\
  - フォールバック：独立系統が利用できない環境では書き込みを fail-closed で阻止し、人へエスカレーションする。同一系統内代替は既定では認めない。人が個別事案ごとに明示承認した場合に限り例外的に代替可（記録に残す）\n\
  \n**発火規模制御：**\n\n- 小規模（既存節への 1〜2 行追記・字句修正・既存リスト項目追加）：1 体検証\n- 大規模（新節起草・構造変更・複数節改訂）：3\
  \ 体検証\n- 判定に迷えば大規模側に倒す\n\n**検査観点 4 項目（yaml の `inspection_criteria` と対応）：**\n\n1.\
  \ `agreement_reflection`：合意内容が書き込みに反映されているか\n2. `reference_accuracy`：数値・出典・固有名詞が正本と一致するか\n\
  3. `existing_record_consistency`：既存記述との齟齬がないか\n4. `internal_logic`：内部の論理矛盾がないか\n\
  \n**失敗時の挙動：**\n\n- 検出の処理は動作仕様ファイル `post-write-verification-spec.yaml` の収束基準に従う。**逐語的指摘**（合意の意味に影響しない字句・表現レベル）は収束を妨げず、機械的に直せるものは直し、直せないものは記録に留める（再検証ループは回さず、修正時は起草者が機械的反映を\
  \ 1 回確認）。**本質的指摘**（合意の解釈・設計判断に触れうるもの）は起草者が独断で修正せず人へ上げる。逐語か本質か迷えば本質側に倒す。\n- 収束＝未解決の本質的指摘がゼロ。逐語的指摘だけが残る状況は実質収束。\n\
  - 深刻度（高／中／低）は検証者の**報告フォーマット用途**。\n\n**実装段階：**\n\n- **段階 1**：起草者が書き込み完了を認識し、独立検証者を呼び出して検証する。阻止は起草者の判断\n\
  - **段階 2**：書き込み後フックスクリプトによる機械的な検証起動と阻止\n- **段階 3（スコープ外、将来）**：Git/IDE フックによる機械的な検証起動と阻止（commit／push\
  \ 時のフックで未検証の書き込みを検出して差し戻す）\n\n**本規律の改訂：**\n\n- 本規律の改訂時は本規律を適用する。ただし改訂前の設定に従って検証者を起動する\n\
  - 改訂時は**変更の影響評価を実施**する（既存設定の意味変化、新規必須項目の追加、依存関係の変化、過去成果物への波及等を点検し、影響評価結果を改訂記録に残す）\n\
  - 改訂内容に破壊的変更（既存設定の意味変化、新しい必須項目の追加等）がある場合は人の明示承認必須\n\n**過去成果物：**\n\n- 遡及適用しない\n-\
  \ 過去分の誤りは再オープン手続きで発見の都度修正\n\n**Why:** 起草者の自己検証だけでは、合意内容の取り違え、参照誤り、既存記述との矛盾を見落とす可能性がある。書き込みを「合意内容の機械的清書」ではなく「書き込み＋独立検証」の不可分な単位として扱う。費用対効果と体験への配慮から、ワークフロー段で検証される文書は対象外（多層防御の役割分担）。\n\
  \n**How to apply:**\n\n- 対象文書の書き込み完了を起点に `reviewcompass.yaml#review.post_write_verification`\
  \ 設定で検証者を起動（段階別に手段が異なる、上記実装段階節）\n- 書き込み規模を判定（`scale_classification`、判定不能なら large）\n\
  - 検証者には合意内容（決定箇条書きのみ）と書き込み結果のみ渡す（`information_policy`）\n- 検査観点 4 項目で評価、深刻度を報告フォーマットとして使用\n\
  - 検出は動作仕様ファイルの収束基準で分類処理（逐語は弾く、本質は人へ）\n- 再検証ループは上限まで、超過は人間エスカレーション\n\n**関連規律：**\n\
  \n- [[facts-vs-interpretation]]（書き込み前の機械的照合と相補的）\n- [[workflow-precheck-invocation]]（spec.json\
  \ 状態変更の事前検査と相補的）\n```\n\n### /Users/Daily/Development/ReviewCompass/.reviewcompass/specs/workflow-management/post-write-verification-spec.yaml\n\
  \ncontent_mode: full_text\ncontent_sha256: 3e72e7431ccef008e0f87ac841053aed11b88f4350a027979661ffe1c6291d81\n\
  \n```text\n# post-write-verification 動作仕様（収束基準）\n# 書き込み後の独立検証で、検出時の処理を定義する正本。デプロイ対象。\n\
  # 規律 docs/disciplines/discipline_post_write_verification.md が本ファイルを参照する。\n\nmeta:\n\
  \  name: post-write-verification-spec\n  scope: 書き込み後検証の検出時の収束基準\n  owner: workflow-management\n\
  \  related:\n    discipline: docs/disciplines/discipline_post_write_verification.md\
  \  # 行動規範\n    config: \"reviewcompass.yaml#review.post_write_verification\"   \
  \       # 設定値（モデル・逐語リスト）\n\nconvergence_criterion:\n  classify:\n    - type: literal\
  \                    # 逐語的指摘\n      action: skip                     # 収束を妨げない\n\
  \      fix_if_mechanical: true          # 機械的に直せるものは直す\n      record_if_not_fixable:\
  \ true      # 直せないものは記録に留める\n      rerun_loop: false                # 再検証ループは回さない\n\
  \      post_fix_recheck:                # 逐語修正後の確認\n        enabled: true\n    \
  \    actor: drafter                 # 起草者\n        method: grep_or_read        \
  \   # 機械的反映を 1 回だけ確認\n        scope: mechanical_reflection_only  # 新たな実質的食い違いの捕捉は求めない\n\
  \    - type: substantive                # 本質的指摘\n      action: escalate_to_human\
  \        # 起草者が独断で修正せず人へ上げる\n  tie_break: substantive               # 逐語か本質か迷えば本質側に倒す\n\
  \  convergence_definition: 未解決の本質的指摘がゼロになれば収束。逐語的指摘だけが残る状況は実質収束。\n  no_autonomous_loop:\
  \ true             # 人なしの自律ループは設けない\n  description: |\n    検証者が出した指摘を逐語的指摘と本質的指摘の\
  \ 2 種類に分類して処理する。\n    逐語的指摘は合意の意味に影響しない字句・表現レベル（文体・言い回しの好み、\n    具体例の有無、付帯情報の省略、合意の意味を変えない用語の言い換え・付加）。\n\
  \    本質的指摘は合意の解釈・設計判断に触れうるもの。\n    判定に迷えば本質側（人へ）に倒す（安全側原則。本物の見落としのコストは\n    収束遅延より高い。少数の系統だけが本質を突く場合があるため、系統数の多寡で\n\
  \    切り捨てない）。本質的指摘は独自判断での仕様修正禁止と同原則で人へ上げる。\n\nliteral_patterns:\n  values_in: \"\
  reviewcompass.yaml#review.post_write_verification.literal_patterns\"  # 初期リストの値は設定側\n\
  \  management: |\n    逐語的指摘とみなすパターンは拡張可能なリストで管理する。初期値は description の類型。\n    新たなパターンの追加は規律変更扱いとし、人の明示承認を要する（恣意的な拡大の防止）。\n\
  \    起草者が「逐語」と分類した指摘は記録に残し、人が事後に検証できるようにする\n    （本質を逐語と誤分類して握りつぶすことの防止）。\n\nverifier_availability:\
  \                  # 検証者の応答可用性（必要な独立系統が揃わない場合）\n  on_incomplete_responses: escalate_to_human\n\
  \  same_family_substitute: requires_explicit_approval  # 同一系統内代替は既定で不可、明示承認時のみ\n\
  \  description: |\n    api_mediated（独立 API 経由）の検証で、必要な独立系統のうち一部が応答を返さない\n    （API\
  \ エラー・クォータ超過・タイムアウト等で揃わない）場合、起草者は揃った少数の\n    系統だけで収束・確定させない。人にエスカレートし、(a) 原因確認のうえ再試行、\n\
  \    (b) 揃った範囲で収束とみなす、(c) 別の独立系統で代替、のいずれかの判断を仰ぐ。\n    規律 discipline_post_write_verification.md\
  \ のフォールバック節を実行時ルールに反映する。\n  rationale: |\n    必要な独立系統が揃わないまま収束扱いにすると、検証者の独立性が崩れるため。\n\
  \nscope_of_application: |\n  本収束基準は書き込み後検証（docs 配下の正本文書）にのみ適用する。\n  ワークフロー段（.reviewcompass/specs/\
  \ 配下、5 段で検証）には適用しない（多層防御の役割分担）。\n  設定・動作仕様 yaml（config/**/*.yaml、runtime/config/**/*.yaml、stages/*.yaml、\n\
  \  .reviewcompass/specs/**/*.yaml）は本補助層 D ではなく補助層 E（yaml 監査）が担当する。\n  詳細は docs/disciplines/discipline_yaml_audit.md\
  \ および\n  .reviewcompass/specs/workflow-management/yaml-audit-spec.yaml を参照。\n```\n\
