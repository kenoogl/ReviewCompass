  \ 優先順位と競合解決） | §Req 16 設計モデル §3 |\n\n## 下流仕様への影響（Impact on Downstream Specs）\n\n\
  本設計は次の下流仕様に影響を与える：\n\n- **`self-improvement`**：規律変更の提案権と実体変更権の分離（判断 7、A-007 案 2）。`self-improvement`\
  \ の design.md／tasks.md で「規律ファイルを直接書き換える」記述があれば、本機能の所定手続き経由に変更する必要がある。**時系列契約・完了通知形式は\
  \ self-improvement design §13.5 と本機能 判断 7 で相互参照（A-012 対処、2026-05-26 セッション 28 確定）**\n\
  - **`conformance-evaluation`**：機能依存マップの依存種別（`hard`／`review`）を仕様内で明示する必要（A-005 の\
  \ conformance-evaluation 側対処、`feature-dependency.yaml` の連想配列構造を Req 7 で参照）\n- **`conformance-evaluation`**：後追い\
  \ intent 追加時のコード由来差分候補を生成し、本機能へ渡す必要（Req 9）。本機能は候補を作らず、候補の検証・記録・reopen 順序化を担う\n-\
  \ **全 7 機能の design 段以降**：レビュー記録の front-matter に `author.identity` ／ `reviewer.identity`\
  \ ／ `separation_from_author` を必須化（Req 3 受入 1）。既存のレビュー記録 7 件（requirements の各機能）はフェーズ\
  \ 2 の検査スクリプト導入時に遡及検査の対象に含めるか、grandfathering（移行期免除）として扱うかを別途決定する\n- **全 7 機能の運用・実装段**：operation\
  \ contract、structured effective prompt、workflow-state snapshot、side track stack\
  \ は `workflow-management` が正本を持つが、foundation／runtime／evaluation／analysis／self-improvement／conformance-evaluation\
  \ が consumer / derivative として参照し得る。正本変更要否は review-wave で確認し、reopen scope と impact\
  \ review scope を分けて記録する\n- **`evaluation`**：LLM judge audit の意味評価ロジックそのものは `evaluation`\
  \ の責務と接続し得る。ただし本機能は監査対象の prompt / contract / state refs と出力 schema を所有し、評価ロジックの妥当性判定は自機能内へ取り込まない\n\
  \n`evaluation` の既存評価ロジック本体への正本変更要否は review-wave で確認する。本 design drafting 時点では、operation\
  \ contract と prompt audit の contract consumer としての確認対象に置く。\n\n## 先送り論点（Open Issues\
  \ Deferred to Later Specs）\n\n本設計で確定せず、後続フェーズで決定する論点：\n\n1. **段集合の変更そのものを不可逆操作の対象とするか**：第\
  \ 5 層（処理表面積の抑制）導入時に検討（フェーズ 4 以降）\n2. **第 2 層 git フックの具体配線**：フェーズ 4 で `pre-commit`\
  \ ／ `pre-push` のフック実装、本機能の検査スクリプトを再利用する形を想定\n3. **第 3 層 利用者監査の具体手順**：フェーズ境目（要件→設計、設計→タスク等）での確認チェックリストを\
  \ `docs/operations/PHASE_BOUNDARY_AUDIT.md` として別途整備\n4. **既存レビュー記録の遡及検査**：Req 3\
  \ の front-matter 必須化を既存 7 件（requirements の各機能）に遡及適用するか、grandfathering で免除するか\n5.\
  \ **段階 3 の Claude Code フック実装**：補助層 C 段階 3 はフェーズ 2 以降の宿題、本機能の検査スクリプトとの結合方式を別途設計\n\
  6. **規律変更の所定手続きの段集合**：規律変更を `drafting → review → approval` の 3 段で扱うか、`triad-review`\
  \ を含めるかを A-007 案 2 対応の細部として後続セッションで確定\n7. **`stages/cross-spec-alignment.yaml` の段集合**：機能横断整合手続きの段集合は別途確定、本設計では枠のみ確保\n\
  8. **規律変更の所定手続きの実装と参照層 5 件の扱い**：A-007 対処で active 必読 12 件は `docs/disciplines/` に移管済み（2026-05-25\
  \ セッション 26）。本機能の所定手続きが `docs/disciplines/` 内の規律変更を扱う実装はフェーズ 2 以降。参照層 5 件（feedback_dominant_dominated_options\
  \ 等）の memory → repo 移管要否は別途判断\n9. **運営ガイド等の現行規律本体の改廃手続き**：`docs/operations/SESSION_WORKFLOW_GUIDE.md`\
  \ 等の運営文書を本機能の所定手続きの対象に含めるかは別論点。フェーズ 2 で `docs/disciplines/` 配置構造との整合とともに整理\n\n##\
  \ テスト戦略（Test Strategy）\n\n本機能の検証境界を設計段で次のとおり明示する。詳細ケース分解は tasks 段で行う。\n\n- **単体テスト**：\n\
  \  - 段集合 YAML のパース（壊れた YAML、必須フィールド欠落のケース）\n  - 完了述語の判定（`artifact_exists`、`artifact_exists_and_sections_present`\
  \ 等の各述語）\n  - `author.identity` ≠ `reviewer.identity` の文字列比較\n  - 手戻り種別の解析（`D-1`\
  \ → `trigger_map[D-1]` の再実施対象リスト）\n  - 進行中状態ファイルの読み書き（必須フィールド欠落の検出）\n  - 依存マップの解析（`depends_on`\
  \ の単純リスト構造と連想配列構造の両方）\n  - operation contract schema、`effect_kind`、`phase_boundary`、snapshot、language\
  \ task I/O の meta-schema 検証\n  - required_action 19語彙と operation contract 対応表の網羅性検査\n\
  \  - side track stack frame の depth、top frame pop、staged file set digest の検査\n \
  \ - structured effective prompt の必須構造、参照 anchor、output_format / postconditions 対応検査\n\
  \n- **統合テスト**：\n  - 不可逆操作（spec.json 書き込み、commit、push）の直前ゲートが実際に遮断すること\n  - reopen\
  \ 連鎖が `actor=human` 段で停止し、`stages/in-progress/` にファイルが残ること\n  - `stages/in-progress/`\
  \ ある状態での不可逆操作が遮断されること\n  - 機能依存マップの 1 箇所修正が各フェーズ YAML の解釈に正しく反映されること\n  - operation\
  \ preflight が `next --json` の active state dimensions と operation contract を照合すること\n\
  \  - Phase 3 advisory では WARN 以上を返し、Phase 5 では同じ条件を DEVIATION に昇格すること\n  - workflow-state\
  \ snapshot が `next --json` と照合できる場合だけ監査補助として使えること\n  - LLM judge audit が既知 gap fixture\
  \ を構造化 finding として返し、承認を自動化しないこと\n\n- **異常系 fixture**：\n  - YAML パースエラー（壊れた構文）\n\
  \  - 証跡ファイル不在\n  - 必須節欠落\n  - `author.identity` ＝ `reviewer.identity` の同一\n  - `feature-dependency.yaml`\
  \ 不在または依存循環\n  - 検査スクリプト実行失敗（Python 例外）\n  - operation contract 対応表の 19語彙欠落\n  -\
  \ 複合 operation の branch 欠落または最大副作用欠落\n  - side track stack の depth 超過、allowed_files\
  \ 外 staged 変更、digest 不一致\n  - structured prompt の機械タスク混入、preconditions の未確認条件参照、postconditions\
  \ 確認不能\n  - いずれも fail-closed となることを検証\n\n- **境界条件**：\n  - `depends_on: []`（依存先なし）の\
  \ foundation の扱い\n  - `depends_on` の連想配列構造で未知の依存種別（`hard`／`review` 以外）の扱い\n  - 進行中状態ファイルが複数存在する場合（複数の\
  \ `reopen-procedure-*.yaml` 並存）の扱い\n\n- **対象外**：\n  - 中身の妥当性判定（判断 2 で明示的に除外）\n \
  \ - 別モデル・別 session の機械判定（Req 3 受入 4 で除外）\n  - LLM judge audit による最終承認の自動化（Req 15\
  \ で除外）\n  - 第 2〜5 層のうち本設計で Phase 0〜6 に含めていない外部 hook / CI 強制\n\n## 完成判定基準（Completion\
  \ Criteria）\n\n本設計に基づく実装が完成したとみなす条件：\n\n1. `stages/` 配下に 9 ファイル（`intent.yaml`／`feature-partitioning.yaml`／`feature-dependency.yaml`／`requirements.yaml`／`design.yaml`／`tasks.yaml`／`implementation.yaml`／`reopen-procedure.yaml`／`cross-spec-alignment.yaml`）がすべて配置されている\n\
  2. `tools/check-workflow-action.py` が通常 workflow と reopen の選択層入口（少なくとも `next`、`spec-set`、`commit`、`push`、`reopen-start`、commit\
  \ / push 直前 gate）を提供し、各サブコマンドが exit code 0／1／2 を正しく返す\n3. 機能単位 spec.json 7 件（全 7\
  \ 機能）が `workflow_state` を計画書 §5.24 の正本スキーマで持つ\n4. レビュー記録の front-matter 検査が機能横断段（review-wave／alignment）の前提として組み込まれている\n\
  5. 進行中状態ファイル（`stages/in-progress/*.yaml`）の有無検査が `git commit`／`git push` の直前ゲートに統合されている\n\
  6. 手戻り種別判定の根拠ファイル（`docs/reviews/reopen-classification-*.md`）の雛形が `templates/review/reopen_classification_template.md`\
  \ として配置されている\n7. 運用文書（`docs/operations/WORKFLOW_PRECHECK.md`）にワークフロー事前検査の限界が明示されている\n\
  8. `.reviewcompass/schema/` に operation contract、`effect_kind`、`phase_boundary`、workflow-state\
  \ snapshot、language task I/O の schema が配置され、operation registry / structured effective\
  \ prompt / side track stack と相互参照できる\n9. Phase 0〜6 の各完了条件が tasks 段で TDD 可能な単位に分解され、Phase\
  \ をまたいだ途中状態を単一 commit に混在させない順序が明示されている\n10. decision-source-lint、review-wave summary、operation\
  \ registry / preflight、structured effective prompt、workflow-state snapshot、proxy_model\
  \ triage decision 機械処理化など、Requirement 11〜16 で追加された operation surface が、該当 Phase\
  \ の tasks / implementation で実装・検査されている\n\n本 design drafting 時点では、条件 1〜3 の一部と `required_action.schema.json`\
  \ / `next_action_response.schema.json` の先行実装が存在するが、Requirement 13〜16 の operation\
  \ contract、side track stack、structured effective prompt、workflow-state snapshot、proxy_model\
  \ triage decision 機械処理化は今後の tasks / implementation 段で TDD 対象として分解・実装する。したがって本節は完成判定の目標条件であり、現時点の実装完了主張ではない。\n\
  \n## 先行実装・運用由来契約の設計入力（Implementation-Derived Contract Inputs）\n\n本節は、dogfooding、先行実装、運用文書、conformance\
  \ check で観測された契約を、design drafting の入力として整理する。ここでいう「取り込む」「設計境界とする」は、本 design に契約候補を明文化する意味であり、review-wave、alignment、approval、または\
  \ Requirement 13〜16 の tasks / implementation 完了を主張しない。実装済みの証跡に触れる場合も、既存状態の説明に限り、本\
  \ reopen の後続 gate 完了とは区別する。\n\n### XDI-WM-001：post-write・承認・監査・自律台帳契約\n\n2026-06-08\
  \ の機能横断 conformance check で、workflow-management の post-write verification、commit\
  \ approval、audit trail、autonomous ledger に関する契約が、運用文書・規律・ゲート実装・テストにまたがって具体化されていることを確認した。本設計はその差分を先行実装・運用由来の設計入力として取り込む。\n\
  \n- post-write verification は、対象ファイルと検証結果の対応を commit 前に確認し、必要な検証記録がない変更を不可逆操作へ進ませないための境界である\n\
  - commit approval は、利用者の明示指示、対象ファイル、ハッシュ、rationale を `.reviewcompass/runtime/approvals/commit-approval.json`\
  \ に固定し、ガード付き commit の入力として扱う（旧 `.reviewcompass/approvals/` からの変更は 2026-06-12 配置規約\
  \ PLC-DEC-004・009〜011 反映。凍結・読み取り互換は §実行時生成物の凍結期（P3 まで）の扱いを正本とする）\n- audit trail\
  \ は `check-workflow-action.py` と `guarded-git-commit.py` の verdict、理由、staged files、承認レコード状態を観測可能な証跡として残す\n\
  - autonomous ledger は、進行中状態・未消化所見・承認済み不可逆操作を workflow の状態判断に反映し、自律進行と人間承認境界を混同しない\n\
  \n### XDI-WM-002：後追い intent 下流再展開契約\n\n2026-06-09 の dogfooding で、既存システムに intent\
  \ を後から追加した場合、既存 requirements が受け止められるかだけで処理を終えず、該当 feature の requirements／design／tasks／implementation\
  \ を上流から再展開する必要が確認された。本設計はその差分を先行運用由来の設計入力として取り込む。\n\n- 受け皿 feature がある場合は既存 feature\
  \ を reopen し、ない場合は feature-partitioning に戻る\n- `conformance-evaluation` はコード由来差分候補を生成し、本機能はその候補を\
  \ reopen 手続きへ取り込む\n- `pending_gates` が triad-review を指していても、drafting 証跡がなければ `next`\
  \ は `run_reopen_drafting` を返す\n- side track は `process_id: maintenance` で本線と分離し、開始と終了を明示する\n\
  \n### XDI-WM-003：配布側複数 LLM 入口の配布契約（2026-06-12 反映）\n\n2026-06-10〜12 の配布側複数 LLM 入口整備（設計記録\
  \ `docs/notes/2026-06-10-deployment-multi-llm-entry-design.md`、conformance 評価 `2026-06-12-completed-followup-conformance.md`\
  \ の MLE-C-005・C-006）で確立した配布契約を、本機能の設計入力として取り込み、後続 tasks / implementation で検査可能な境界へ分解する。\n\
  \n- **対象アプリ入口規律**：`templates/entry/AGENT_ENTRY.template.md` を配布し、対象アプリの `.reviewcompass/AGENT_ENTRY.md`\
  \ として実体化する。LLM 別差分（入口ファイル・記憶の扱い・設定の置き場）は §10 に 1 ファイル同居とし、別ファイル化しない。既存入口（CLAUDE.md／AGENTS.md）への合流条件（設計記録\
  \ 2026-06-10 §3.4、方式 A、利用者承認済み）：追記前に書き込み先・挿入行・挿入位置（末尾）を利用者へ提示して承認を得る。同じ行が既にあれば何もしない。ファイルが存在しなければ承認のうえその\
  \ 1 行のみで新規作成する。既存記述は変更しない。追記する 1 行の正本は `AGENT_ENTRY.template.md` §11 の定型文（Claude\
  \ 用は取り込み行 `@.reviewcompass/AGENT_ENTRY.md`、Codex 用は AGENT_ENTRY を最初に読む旨の指示文）とする。\n\
  - **hook 配布**：`templates/hooks/pre-bash-precheck.sh.template` を 1 本だけ配布する。プレースホルダは\
  \ `{{REVIEWCOMPASS_PYTHON}}`・`{{REVIEWCOMPASS_DIR}}` の 2 つで、いずれも絶対パス必須。初期設定時に LLM\
  \ が実パスへ置換し、`.claude/hooks/` と `.codex/hooks/` の両方へ同一内容で複製する。**自己診断の契約**：診断の主体は hook\
  \ スクリプト自身、実行タイミングは hook 起動時（検査ツール呼び出しの前）。未置換トークンの残存、検査ツール（`tools/check-workflow-action.py`）の不在、Python\
  \ 実行系の実行不能を検出した場合、「hook 設定不備」という明確な理由を出力して当該 commit／push を拒否する（fail-closed、非 0 終了）。復旧手順（プレースホルダの再置換）は初期設定ガイドに記載する。置換が正しく完了したことの検証は、hook\
  \ 起動時の自己診断（最初の commit／push 時）に加え、初期設定完了時の有効化確認手順（正本＝`docs/operations/INITIAL_SETUP_LLM_GUIDE.md`）で初期設定の時点でも行う。動作仕様の実体正本はテンプレート本体（`pre-bash-precheck.sh.template`\
  \ の deny 関数と診断部）とする。\n- **登録雛形**：`.claude/settings.json` の hook 登録断片（`templates/hooks/claude-settings.json.template`）と\
  \ `.codex/hooks.json` 雛形（`templates/hooks/codex-hooks.json.template`）を配布する。実体化先は対象アプリの\
  \ `.claude/settings.json`（既存設定があれば断片を統合）と `.codex/hooks.json`。導入は強推奨であり、有効化確認（hook\
  \ が commit／push 時に起動すること）の手順と検証責務は `docs/operations/INITIAL_SETUP_LLM_GUIDE.md`\
  \ を正本とする。導入を見送る場合は利用者の明示判断とし、見送った事実を初期設定の完了報告に記録する。hook が未登録または見送られた間は、機械ガード第 1\
  \ 層（hook による commit／push 直前の事前検査）が存在しない状態であり、この保護境界の不在は利用者明示判断による受容リスクとして扱う。その間の運用は\
  \ AGENT_ENTRY の規律（検査ツールの手動実行）に委ねる。\n- **配布 allowlist**：`deploy-manifest.yaml` に\
  \ entry／hooks／feature-dependency の各テンプレートを含める。\n- 運用手順の正本は `docs/operations/INITIAL_SETUP_LLM_GUIDE.md`・`INITIAL_DEPLOYMENT_USER_GUIDE.md`・`DEPLOYMENT.md`\
  \ §4 とし、本設計は配布物の契約境界（何を配布し、何を対象アプリ側で実体化するか）を定める。\n\n### XDI-WM-004：operation registry\
  \ / preflight 契約（2026-06-16 反映）\n\n2026-06-16 の workflow recovery smell inventory\
  \ と operation registry / preflight reopen R-0 で確認した、推測コマンド、誤 entrypoint、review artifact\
  \ drift、approval record gap、staged / unstaged 対象誤り、current-session formal record\
  \ 作成、nested issue scope drift を、本機能の設計入力として取り込み、Requirement 12〜13 の境界へ接続する。\n\n\
  - operation registry は `stages/operation-registry.yaml` を正本とし、operation id、kind、canonical\
  \ invocation、workflow binding、required inputs、target identity、planned outputs の参照・投影・binding\
  \ hint、sequence mode、worktree / pending / artifact policy、operation contract 参照を定義する。`effect_kind`、承認要否、phase\
  \ boundary、preconditions / postconditions、side effects、branch / internal step semantics、approval\
  \ aggregation、出力・副作用 contract field は registry で定義しない。\n- preflight は read-only\
  \ を Phase 1 とし、review-run directory、manifest、approval record、session record、commit、deployment\
  \ / export output を作成しない。\n- `next --json` の reopen 状態は Requirement 2 の契約を拡張し、reopen\
  \ scope、impact review scope、direct / indirect features、flag policy、pending / completed\
  \ / superseded gate、参照 state files を一意に返す。\n- approval chain、review artifacts、bundle、manifest、criteria、document-type、target\
  \ digest、session record、deployment / export は operation preflight の初期対象とする。\n- 判定は\
  \ LLM / provider / model 名に依存しない。\n\n### XDI-WM-005：選択層／実行層接続と構造化プロンプト契約（2026-06-19\
  \ 反映）\n\n2026-06-18〜19 の統合設計メモ反映で確認した、`next --json` の唯一 action selector と operation\
  \ contract / structured effective prompt / side track stack / workflow-state snapshot\
  \ の接続を、本機能の設計入力として取り込み、Requirement 13〜16 の段階的実装計画へ接続する。\n\n- `required_action` 19語彙は\
  \ operation contract に接続し、`effect_kind`、承認要否、phase boundary、sequence、preconditions\
  \ / postconditions を機械可読に持つ。\n- 複合 operation は単一代表値へ丸めず、branch / internal step /\
  \ max effect / approval aggregation を operation contract 上で表す。registry はそれらを再定義せず、contract\
  \ 参照・投影・binding に限定する。\n- 承認ゲートは判断記録 operation と対象 operation の承認を分離し、`record_human_decision`\
  \ の完了だけで不可逆操作を許可しない。\n- side track は stack frame として管理し、`return_to`、allowed files、staged\
  \ file set digest、max depth を機械検査対象にする。\n- workflow-state snapshot は `next --json`\
  \ の副産物であり、正本ではなく可視化・監査補助である。\n- structured effective prompt は LLM の言語タスク仕様であり、機械タスクは\
  \ operation contract / preflight / runner / guard の責務とする。\n- Phase 0〜6 は選択層、schema、read-only\
  \ registry、advisory preflight、structured prompt、mechanical blocking、LLM judge audit\
  \ の順に分け、TDD 実装時に混在させない。\n\n## 変更意図（Change Intent）\n\n本設計は先行プロジェクトの `dual-reviewer-implementation-governance/design.md`（466\
  \ 行、節ハッシュ・独立再導出パーサ・supersedes リンク・通過マーカーの後続確認等を含む大規模機構）を、ReviewCompass の方針（計画書 §5.4〜§5.8）に基づき\
  \ **思想は継承、実装は 1／10** で再設計した。\n\n### 継承した思想\n\n- 不可逆操作の直前にしか機械ゲートを置かない（fail-closed\
  \ の最小集合）\n- 証跡 artifact の存在＋構造適合で完了を判定する（主張ではなく証拠）\n- 起草者と判定者を分ける（自己承認の禁止）\n- 検査が結論不能なら遮断（fail-closed\
  \ の既定）\n- 完了判定述語と独立性 marker の分離（素材の小節 2 と小節 3 を §軽量版検査スクリプトモデル §3 と §起草者と判定者の分離モデル\
  \ §1 に縮約継承）\n\n### 削減・除去した機構（素材から継承しない、§5.4 確定）\n\n- 節ハッシュ（`section_content_hash`）と陳腐化／改竄検知（素材の小節\
  \ 1.3、§5.4 で削除確定）\n- supersedes リンクによる旧台帳保全（素材の小節 1.1、§5.4 で削除確定）\n- grandfathering\
  \ と format-migration の機構（素材の小節 10、§5.4 で削除確定。本設計でも先送り論点 4 として grandfathering の判断は別途）\n\
  - 権威マップ（authority-map）と独立再導出パーサ（素材の小節 1.2、§5.4 で削除確定）\n- 通過マーカーの後続確認（素材の小節 4 後段、§5.4\
  \ で削除確定、二次防御は補助層 C 段階 3 と第 2 層に分離）\n- 実行台帳（workflow-execution-ledger）の機構全体（素材の §Workflow\
  \ Execution Ledger and Enforcement Model、§5.4 で削除確定）\n- 上位文書同期（C-1／C-2／C-3 取り込み、素材の小節\
  \ 6）：人手の整合に置き換え\n\n### ReviewCompass 固有の追加\n\n- 補助層 C 段階 2 として `tools/check-workflow-action.py`\
  \ を本機能に組み込む（§5.8 補助層 C、計画書 §5.8 採用承認 2026-05-25 セッション 24）\n- サブエージェント方式（`mode: subagent_mediated`）への対応を\
  \ §起草者と判定者の分離モデル §2 に明示（計画書 §5.23.12 由来）\n- 規律変更の提案権と実体変更権の分離を §責務境界の明確化と §主要な設計判断\
  \ 判断 7 に明示（A-007 案 2、2026-05-23 利用者承認）\n- 機能依存マップの依存種別（`hard`／`review`）の連想配列構造を\
  \ §機能依存マップモデル §2 に明示（A-005 対処由来、計画書 §5.5 行 368〜373）\n- 検査スクリプトの 3 サブコマンド構成（`spec-set`／`commit`／`push`）と\
  \ verdict 3 値（OK／WARN／DEVIATION）を §軽量版検査スクリプトモデル §2 に明示（運用契約 `docs/operations/WORKFLOW_PRECHECK.md`\
  \ と詳細仕様 `docs/operations/WORKFLOW_PRECHECK_DETAILS.md` 由来）\n- proxy_model は approval\
  \ 段の代行主体ではなく、triad-review 段内の review-run 後の修正方針判断だけを代行できることを §段集合の静的列挙モデル §2 に明示（計画書\
  \ §5.12.4 由来の旧構想を human-only approval 境界へ修正）\n- 規律ファイル本体を `~/.claude/projects/.../memory/feedback_*.md`（Claude\
  \ Code auto memory 機構の領域）から `docs/disciplines/discipline_*.md`（リポジトリ内 git 追跡対象）へ軽量手続きで移管、12\
  \ 件（active 必読相当）を移管、memory 側は短い参照索引に置換（2026-05-25 セッション 26、計画書 §5.21 前倒し実施、利用者明示承認）\n\
  - 2026-06-08 の requirements 再確認への対応として、intent の「レビュー収集処理を事前設定の写像にしない」意図は §軽量版検査スクリプトモデルの\
  \ `next`、§不可逆操作の直前ゲートモデル、§session 跨ぎ状態管理モデル、§機能依存マップモデルで受けられるため、設計構造の追加は不要と確認\n\
  - 2026-06-08 の reopen 判定修正として、完了済み workflow で上流正本が後続成果物より新しい場合、`next` は `upstream_recheck`\
  \ ではなく `reopen_classification_required` を返す。意味変更の有無と reopen 種別は分類根拠を保存して `reopen-start`\
  \ に渡す。\n- 2026-06-09 の後追い intent 追加への対応として、既存システムで intent が後から追加された場合は、受け皿 feature\
  \ 判定、requirements 以降の下流再展開、CE 候補受け取り、drafting 漏れ防止、side track 分離を §reopen 機械強制モデル\
  \ §6 と §session 跨ぎ状態管理モデル §1 に反映した。\n- 2026-06-12 の reopen R-0（conformance 評価 `2026-06-12-completed-followup-conformance.md`\
  \ の gap 反映）として、feature 一覧の解決と立ち上げ案内を §機能依存マップモデル §7 に、機能順キー名の `feature_order` 統一（旧称\
  \ `phase_order`、案 A、MLE-DEC-001）を §機能依存マップモデル §1〜3 に、配布側複数 LLM 入口の配布契約を §XDI-WM-003\
  \ に反映した。コミット cde1f5c・c2903df は先行実装証跡として参照するが、本 design drafting はその契約を設計入力として再記述する段階であり、本\
  \ reopen の review-wave / alignment / approval / implementation 完了を意味しない。\n- 2026-06-12\
  \ の reopen R-0（parse-error-failclosed、MLE-DEC-005）として、パース不能ファイルの扱いを立ち上げ案内（OK）から遮断（DEVIATION）へ改めた（§機能依存マップモデル\
  \ §7「パース不能の遮断」）。本改訂は仕様確定後に TDD で実装する正順の手続きである。\n- 2026-06-15 の reopen R-0（decision-source-lint）として、Requirement\
  \ 11（重要決定の出典検査）の設計節（§Req 11 設計モデル）を追加し、記録スキーマ・ロケータ表現・正規化規則・保留管理・内容なし語リスト・サブコマンドと接続点（commit\
  \ ゲート組み込み）の 6 事項を確定した。本改訂は仕様確定後に TDD で実装する正順の手続きである。\n- 2026-06-15 の reopen R-0（commit-approval-nonce）として、Requirement\
  \ 4 受入 6〜7 の設計を §不可逆操作の直前ゲートモデル §2.1 に追加し、commit 承認を staged 内容に束縛する nonce challenge、承認レコードとの照合、consume、LLM／provider／model\
  \ 非依存、機微情報除去後の出典保存方針を確定した。本改訂は仕様確定後に TDD で実装する正順の手続きである。\n- 2026-06-16 の reopen\
  \ R-0（commit-execution-delegation-formal-cli）として、Requirement 4 受入 8 の設計を §不可逆操作の直前ゲートモデル\
  \ §2.2 に追加し、`commit-approval delegate-execution`、`execution_delegation` record、staged\
  \ 内容承認との順序制約、nonce / target digest / expiry 束縛、許可文言の正規化と完全一致、secret 検出時の fail-closed、LLM／provider／model\
  \ 非依存を確定した。後続の配布可能 UX 改善として、`guarded-git-commit.py --approval-nonce <nonce> --approval-source-text-line-stdin`\
  \ が承認 1 行から staged 内容承認 record、execution delegation、直前 gate、commit までを連続実行する wrapper\
  \ を §2.2 に追記した。本改訂は仕様確定後に TDD で実装する正順の手続きである。\n- 2026-06-16 の reopen R-0（operation-registry-preflight-unified-design）として、Requirement\
  \ 12 の設計を §Req 12 設計モデルに追加し、operation registry schema、read-only preflight response、command\
  \ validation、worktree / pending / integrity conflict、review artifact / bundle preflight、serial_only\
  \ approval chain、current-session guard、nested issue handling、deployment / export\
  \ preflight、reopen scope / impact review scope、`next` state uniqueness、LLM／provider／model\
