  \ は本機能が所定手続き（drafting → review → approval）経由で実施する。本機能は規律変更を Req 4 受入 1 の不可逆操作の対象として扱い、`self-improvement`\
  \ が直接ファイル書き換えを行うことはない。\n\n## 段集合の静的列挙モデル（Stage Set Static Enumeration Model）— Req\
  \ 1\n\n### 1. 9 ファイル体制（計画書 §5.5）\n\n段集合は次の 9 ファイルに静的列挙する。Markdown 節からの動的解析は行わない（Req\
  \ 1 受入 1）。\n\n| ファイル | 段集合 | actor 構成 |\n|---|---|---|\n| `stages/intent.yaml` |\
  \ drafting／review／approval の 3 段 | human／llm／human |\n| `stages/feature-partitioning.yaml`\
  \ | candidate-proposal／approval の 2 段 | llm／human |\n| `stages/feature-dependency.yaml`\
  \ | 段集合なし（機能依存マップ本体、Req 8） | — |\n| `stages/requirements.yaml` | drafting／triad-review／review-wave／alignment／approval\
  \ の 5 段 | llm／llm／llm／llm／human |\n| `stages/design.yaml` | 同上 | 同上 |\n| `stages/tasks.yaml`\
  \ | 同上 | 同上 |\n| `stages/implementation.yaml` | 同上 | 同上 |\n| `stages/reopen-procedure.yaml`\
  \ | 4 過程構成（§reopen 機械強制モデル §5）、第3過程で trigger_map 参照 | llm／human 混合 |\n| `stages/cross-spec-alignment.yaml`\
  \ | 段集合は別途確定（フェーズ 2 以降） | — |\n\n各 YAML 段は最低限、段名／`actor`／期待する証跡ファイルのパスパターン／必須節名のリスト／完了判定方式を含む（Req\
  \ 1 受入 3）。\n\n### 2. 段定義の構造例\n\n`stages/requirements.yaml` の段定義例：\n\n```yaml\nprocess_id:\
  \ requirements\ndescription: 要件フェーズの所定手続き（drafting → triad-review → review-wave\
  \ → alignment → approval の 5 段）\nfeature_order: feature-dependency.yaml#feature_order\
  \   # Req 8 受入 3、Req 1 受入 4\n\nstages:\n  - name: drafting\n    actor: llm     \
  \                                 # 起草、主に LLM\n    artifact_paths:\n      - .reviewcompass/specs/{feature}/requirements.md\n\
  \    required_sections:\n      - Introduction\n      - Boundary Context\n      -\
  \ Requirements\n      - Change Intent\n    completion_predicate: artifact_exists_and_sections_present\n\
  \    description: 起草者と判定者の分離規律により、起草段は判定段と別 actor で実施する\n\n  - name: triad-review\n\
  \    actor: llm\n    artifact_paths:\n      - .reviewcompass/specs/{feature}/reviews/*-requirements-triad-review.md\n\
  \    required_sections:\n      - 主役レビュー\n      - 敵対役レビュー\n      - 判定役レビュー\n    \
  \  - 統合\n    completion_predicate: artifact_exists_and_sections_present_and_author_reviewer_distinct\n\
  \    front_matter_required:\n      - author.identity\n      - reviewer.identity\n\
  \      - reviewer.separation_from_author\n    description: 3 役レビュー、起草者と判定者の異名を front-matter\
  \ で必須化\n\n  - name: review-wave\n    actor: llm\n    feature_order_required: true\
  \                    # 全機能の drafting＋triad-review 完了後に開始\n    artifact_paths:\n\
  \      - docs/reviews/{phase}-review-wave-{日付}.md\n    completion_predicate: all_features_drafting_and_triad_review_completed\n\
  \    description: 機能横断の波及所見の集約消化\n\n  - name: alignment\n    actor: llm        \
  \                              # LLM 自動判定\n    completion_predicate: cross_spec_alignment_passed\n\
  \    description: フェーズ終端の機能横断整合確認（LLM 自動判定）\n\n  - name: approval\n    actor: human\
  \                                    # phase / gate completion は human-only\n  \
  \  actor_allowed:\n      - human\n    completion_predicate: explicit_human_approval_recorded\n\
  \    description: 不可逆操作（フェーズ移行）の直前ゲート。proxy_model は承認主体を代行しない\n```\n\n### review-run\
  \ 後の proxy_model 判断代行モデル\n\nreview-run 後の重要件判断は、approval 段の承認ではなく、triad-review 段内の修正方針決定に限って\
  \ proxy_model が代行できる。対象は API 経由 review-run の `must-fix`、`should-fix`、`ERROR`、`CRITICAL`、または同根所見クラスタである。\n\
  \n責務分担：\n\n- メインセッション LLM：raw response を読み、モデル別要約、同根所見集約、三段階トリアージ下書き、候補案、推薦案、proxy_model\
  \ への判断材料を作る\n- proxy_model：重要件ごと、または同根所見クラスタごとに、採用案、判断理由、棄却案理由、最終ラベルを決定する\n- 機械ガード：proxy\
  \ decision の存在、raw response の存在、候補案の存在、採用案と最終ラベルの整合、未判断件数 0 を確認する\n- メインセッション LLM：機械ガード通過後、採用された修正だけを\
  \ TDD で実装する\n- 利用者：コミット、プッシュ、spec.json 更新、フェーズ移行、規律変更、大方針変更を承認する\n\n証跡構造：\n\n```text\n\
  .reviewcompass/specs/<feature>/reviews/<review-run-id>/\n  raw/\n  parsed/\n  triage.yaml\n\
  \  model-result-summary.yaml\n  review_summary.md\n  proxy-adjudication-prompt.md\
  \     # proxy への判断材料（既定名。実行時に指定可）\n  proxy-adjudication-response.txt  # proxy の生応答（既定名。実行時に指定可）\n\
  \  decisions/\n    <suffix>.yaml\n  proxy-approval.yaml\n```\n\n`decisions/<suffix>.yaml`（重要件ごとの裁定\
  \ file。`<suffix>` は finding に対応する `<model>-<role>-<連番>`）は最低限、`finding_id`、`approved_by:\
  \ proxy_model`、`proxy_model_id`、`selected_option`、`final_label`、`rationale`、`rejected_options`、`raw_response_path`\
  \ を持つ。`proxy-approval.yaml` は対象 review-run、`approved_finding_ids`、`approved_final_labels`、各\
  \ finding の裁定への参照（`proxy_decisions` で `decisions/<suffix>.yaml` を指す）、summary/triage\
  \ 提示済みフラグを束ねる。proxy approval は所見トリアージ・修正方針判断（`proxy_allowed` 相当の範囲）に限った承認である。`proxy-approval.yaml`\
  \ 自体は `decision_scope` フィールドを持たず、`proxy_allowed` と human-only の境界は別レコードの approval\
  \ gate（Requirement 14 の `record_human_decision` が持つ `decision_scope`）が機械判定で enforce\
  \ する。proxy approval は human-only approval、commit、push、`spec.json` 更新、phase / gate\
  \ completion、reopen finalize を許可しない。\n\nproxy decision の監査性を保つため、decision は `decision_prompt_path`、`source_raw_paths`、`candidate_options`\
  \ も持つ。`decision_prompt_path` は proxy_model に渡した prompt 証跡、`source_raw_paths` は元\
  \ review raw、`candidate_options` は proxy_model に提示された候補案セットである。機械ガードは、これらの参照先が存在し、`candidate_options`\
  \ が空でないことを確認する。現行の軽量ガードは、`proxy_model_id` の文字列一致、decision file の `finding_id` 一致、`final_label`\
  \ 一致、prompt/raw/候補案証跡の存在を検査する。API 署名や暗号学的な生成元証明は将来課題とする。\n\nparallelizable_units：\n\
  \n- proxy_model 判断依頼：同根所見クラスタ単位で並列化可能。同根とは、複数モデルの所見が同じ対象ファイル、同じ出力契約、同じ機械ガード、同じ証跡、または同じ原因に触れているものをいう\n\
  - 実装：互いに同じファイルを更新しない実装単位、または入出力契約が独立したタスク単位で並列化可能\n- 直列必須：共通スキーマ、共通ビルダー、同一ファイル、同一\
  \ manifest、同一 traceability 出力、生成物、共有 helper、推移的契約を触る修正\n- 統合時：メインセッション LLM が triage、proxy\
  \ decision、テスト結果、ファイル差分を再照合する\n\n実装サブ担当 LLM は、原則として別スレッドかつ分離 worktree で扱う。同じ repo\
  \ での並列実装は原則禁止し、読み取り調査または差分を残さない確認に限定する。メインセッション LLM は、対象 finding、proxy decision、許可ファイル、期待テスト、禁止事項、停止条件を渡し、統合時に差分とテスト結果を検査する。未承認の便乗リファクタ、隣接挙動変更、対象外\
  \ cleanup は実施せず、新規判断問題として停止する。\n\nsubimplementation_outputs：\n\n- implementation_diff：本線へ取り込み可能なソース、テスト、スキーマ、fixture、必要最小限の\
  \ docs 差分\n- verification_summary：サブ担当が実行したテスト、赤確認、緑確認、未実行理由\n- decision_basis：実装不能、停止、新規判断問題、採否判断に影響する失敗ログ\n\
  - work_noise：一時メモ、途中ログ、失敗パッチ案、ローカル調査メモ。原則として本線 repo に取り込まない\n\n本線へ戻す標準単位は、パッチ、テスト結果サマリ、未解決事項の\
  \ 3 点である。メインセッション LLM は `work_noise` を直接取り込まず、必要な場合のみ session record または docs/notes\
  \ に要約する。判断に影響した失敗試行、失敗パッチ、途中ログは `decision_basis` へ昇格し、メインセッション LLM が要約または該当箇所を保存する。\n\
  \n### テンプレート変数の展開規則（F-006 対処、2026-05-25 セッション 26 利用者明示承認）\n\n段集合 YAML の `artifact_paths`\
  \ フィールドに登場する 3 種のテンプレート変数（プレースホルダ）の展開元と解決規則を次のとおり確定する：\n\n- **`{feature}`**：機能横断段（`feature_order`\
  \ を持つ段）では `feature-dependency.yaml#feature_order` から機能名を順に展開する。機能単位段（`feature_order`\
  \ を持たない段）では当該機能名で固定する\n- **`{phase}`**：当該 YAML の `process_id` フィールドから取得する（例：`requirements.yaml`\
  \ の `process_id: requirements` なら `{phase}` は `requirements` に展開）。`process_id` と\
  \ YAML ファイル名は段集合 YAML 配置時に同期させる前提とし、両者がずれた場合は `process_id` を正本として優先する\n- **`{日付}`**：ファイル名のワイルドカード（`*`）として許容する。検査スクリプトは\
  \ `glob` で `artifact_paths` パターンに一致する全ファイルを取得し、ファイル名に含まれる日付部分（`YYYY-MM-DD` 形式と仮定）の\
  \ **辞書順最大** を最新と判定する\n\nワイルドカード解決時の優先順位を「辞書順最大」（mtime 基準ではなく）にする理由：ファイル名の日付は人手で命名されるため意図が明示される一方、ファイルの更新時刻（mtime）は\
  \ `git clone` ／ `git checkout` で書き換わるため再現性に劣る。`YYYY-MM-DD` 以外の日付形式が混入した場合、検査スクリプトは結論不能（fail-closed）として\
  \ DEVIATION を返す。\n\n複数ファイルが存在しても重複定義の禁止ではなく、reopen による複数回生成（同じ段の証跡が日付違いで複数並存）を自然に扱うための設計。\n\
  \n### 3. 機能横断段と機能単位段の区別\n\n- **機能横断段**：`feature_order` を持つ段（review-wave、alignment、approval\
  \ の 3 段）。`feature_order: feature-dependency.yaml#feature_order` で機能依存マップを参照し、対象機能集合を一元化する（Req\
  \ 1 受入 4、Req 8 受入 3）\n- **機能単位段**：`feature_order` を持たない段（drafting、triad-review の\
  \ 2 段）。各機能の `spec.json` の `workflow_state.<フェーズ>.<段>` で個別に管理する\n\n機能横断段の機能横断側状態は\
  \ `stages/<フェーズ>.yaml` の進行記録または別途配置する集約ファイルで保持し、機能単位の状態は各機能の `spec.json` で保持する（計画書\
  \ §5.24.8 由来）。\n\n**機能横断段 review-wave の作業内容（2026-05-27 セッション 34 追記、2026-05-28 セッション\
  \ 35 で 2 回方式に訂正、軽量手続き、Req 1 受入 6 と整合）**：\n\n7 モデル比較実験は **2 回方式** で実施する（2026-05-28\
  \ セッション 35 確定、初版の「機能横断段で一括実施、機能ごとに実施しない」記述を訂正）：\n\n- **1 回目（機能ごとの triad-review 段）**：当該機能の機能内\
  \ must-fix／should-fix を 7 モデル評価し、機能内対処を triad-review 段で完了させる。前機能の機能内対処未完了に次機能の triad-review\
  \ が依存しない構造を保つ\n- **2 回目（本機能横断段 review-wave）**：全機能の triad-review 完了後、機能横断波及所見と同根所見を\
  \ 7 モデル評価\n\n機能横断段 review-wave は、機能横断波及所見の集約・対処に加え、次の作業を含む（計画書 §5.5 ／ §5.9.6 と整合）：\n\
  \n- 全機能の triad-review が完了した時点で本段を開始する\n- 機能横断波及所見と同根所見を対象に 7 モデル評価（2 回目）を実施\n- 7\
  \ モデル評価データを全機能横並びで分析し、**同根所見**（異なる機能で同じ性格の所見が独立に発見された組）を grep ／ 集約で識別\n- 同根所見ごとに一貫した対処方針を立案、全該当機能の仕様文書（requirements.md\
  \ ／ design.md ／ tasks.md）に同じ対処を反映\n- 個別機能の triad-review で「機能横断段に持ち越し」と判定された所見も本段で一括対処\n\
  \n本作業内容は、セッション 33 利用者発言「あるフィーチャーだけをみてもダメで、全フィーチャーの triad-review を行い、それを 7 つのモデルで評価させたところで、同根の問題をまとめて考える」を受けた構造的対処、およびセッション\
  \ 35 利用者指摘「機能内対処は triad-review 段で実施しないと、他のフィーチャーの処理に影響する可能性がある」を受けた 2 回方式への訂正。利用者明示承認の出典：「(ニ)」「提案通り」「計画書や仕様・設計にも反映」（2026-05-27\
  \ セッション 34）／「2 回に分けて 7 モデルの must-fix+should-fix の対応が必要」「案 イ」「案 ア」（2 回方式への訂正、2026-05-28\
  \ セッション 35）。本記述は計画書 §5.23.13 軽量手続き許容の範囲内で追加。\n\n### 4. 段集合の変更運用\n\n段集合の変更は YAML\
  \ ファイル 1 箇所の修正で完結する（Req 1 受入 5）。Markdown 文書（運営ガイド、計画書）側との整合は人手で取る前提とし、自動同期は行わない（§5.4\
  \ 受け入れリスク）。段集合の変更そのものを不可逆操作の対象とするかは本フェーズで決めず、第 5 層（処理表面積の抑制）導入時に検討する（先送り論点参照）。\n\
  \n## 軽量版検査スクリプトモデル（Lightweight Check Script Model）— Req 2\n\n### 1. 検査の対象と原則\n\n\
  検査スクリプト `tools/check-workflow-action.py` は Python 実装で（Req 2 受入 1）、次の 4 入力のみを読む：\n\
  \n- 段集合 YAML（`stages/*.yaml`）\n- 進行中状態ファイル（`stages/in-progress/*.yaml`）\n- 機能単位\
  \ spec.json（`.reviewcompass/specs/<機能>/spec.json`）\n- 未消化所見（`learning/workflow/carry-forward-register/reviewcompass-import.yaml`）\n\
  \n判定原則：\n\n- **段ごとの完了判定**：YAML に列挙された証跡ファイルがすべて存在し、必須節名がすべて含まれること、それ以外は判定対象としない（Req\
  \ 2 受入 2）\n- **中身の妥当性判定は行わない**：所見の質、表現の適切性、論理的整合性は判定範囲外（Req 2 受入 3、第 1 層の限界として明示）\n\
  - **fail-closed の既定**：結論不能（YAML が壊れている、証跡ファイルが解析不能、必須フィールド欠落）の場合は合格判定を出さず、必ず fail\
  \ を返す（Req 2 受入 4）\n- **進行中手続きの警告**：`stages/in-progress/` に何かファイルがあれば「未完了の手続きあり」の警告を出す（Req\
  \ 2 受入 5）\n\n### 2. サブコマンド構成（`docs/operations/WORKFLOW_PRECHECK.md` と `docs/operations/WORKFLOW_PRECHECK_DETAILS.md`\
  \ 参照）\n\n| サブコマンド | 入力（必須引数） | 用途 |\n|---|---|---|\n| `spec-set <feature> <phase>\
  \ <stage> <new_value>` | 機能名・フェーズ・段・新しい真偽値、`--rationale \"<理由>\"`（任意、ログ記録用） | `spec.json`\
  \ の `workflow_state` 変更前の依存検査 |\n| `commit` | `--rationale \"<理由>\"`（**必須**） | `git\
  \ commit` 直前の検査（spec.json 整合、規律遵守、未消化所見の有無） |\n| `push` | `--rationale \"<理由>\"\
  `（**必須**） | `git push` 直前の検査（コミット履歴整合、リモート状態） |\n| `next` | なし、`--json`（任意） | 標準のワークフロー遷移入口。`workflow_state`、`stages/in-progress/`、reopen\
  \ pending、post-write-verification pending を読み、次作業を返す |\n\n引数仕様の正本は `docs/operations/WORKFLOW_PRECHECK_DETAILS.md`\
  \ と検査スクリプト本体 `tools/check-workflow-action.py` の argparse 定義。ただし、ここでいう引数仕様は軽量 precheck\
  \ CLI の呼び出し形式に限る。`required_action` 語彙、operation contract field、preconditions / postconditions、出力・副作用\
  \ contract は `.reviewcompass/schema/`、`stages/operation-contracts.yaml`、および Requirement\
  \ 12〜13 の registry / contract 境界を正本とする。`commit` と `push` の `--rationale` 必須化の理由：両者は不可逆操作で、人による承認の出典をログに残す必要があるため。next\
  \ サブコマンドは、LLM が次作業を独断で選ばず、同じワークフロー遷移入口から状態を再確認するための読み取り専用入口である。\n\nnext サブコマンドは、`workflow_state`\
  \ が全完了を示す場合でも、上流成果物が下流成果物より新しければ `kind: in_progress`（`upstream_phase` フィールド付き）を返す。旧称\
  \ `upstream_recheck`。代表的な伝播は、intent → feature-partitioning、feature-partitioning\
  \ → requirements、requirements → design、design → tasks、tasks → implementation である。これにより、intent\
  \ 更新後に requirements へ飛ぶ、requirements 更新後に tasks や implementation へ飛ぶ、tasks 更新後に\
  \ implementation 再確認を省く、といった手順逸脱を機械的に避ける。\n\nnext サブコマンドは、feature 一覧が解決できない場合（`feature-dependency.yaml`\
  \ 不在または `feature_order` 未定義、対象アプリの初期状態を想定）は `feature_definition_required`（verdict\
  \ OK）を返して intent／feature-partitioning の実施を案内し、`feature_order` と `depends_on` の整合違反（依存先行違反・循環）は\
  \ `kind: unknown`／DEVIATION で遮断する（§機能依存マップモデル 7、2026-06-12 反映）。\n\n`docs/operations/WORKFLOW_DISCIPLINE_MAP.yaml`\
  \ は、判定点ごとに読み込む規律文書と入力資料の機械可読マップである。`default`、`by_kind`、`by_stage` は `next_action.required_disciplines`\
  \ の元資料を定義し、`required_inputs` は対象 feature 文書、reopen 状態、review-run bundle、carry-forward\
  \ register などの入力資料を定義する。`next` はこのマップを読み、現在の判定点に対応する `required_disciplines` と `required_inputs`\
  \ を JSON に含める。判定点ごとの `effective prompt` は、このマップが示す元資料を 1 本へ束ねる生成物であり、マップ自体は複数元資料の正本である。`next`\
  \ は生成した prompt を `.reviewcompass/runtime/effective-prompts/` に保存し（旧 `.reviewcompass/effective-prompts/`\
  \ からの変更は 2026-06-12 配置規約 PLC-DEC-004・009〜011 反映。実行時生成物の runtime 区画集約。旧パス読み取り互換は\
  \ P3 まで維持し、凍結・互換の正本は §実行時生成物の凍結期（P3 まで）の扱い）、`next_action.effective_prompt` に `effective_prompt_path`、`effective_prompt_sha256`、`effective_prompt_loaded`\
  \ を含める。元資料が読めない場合は `effective_prompt_loaded: false` として `DEVIATION` を返し、通常作業へ進ませない。API\
  \ review-run では `run_role.py`／`run_review.py` が `rounds.yaml` に `effective_prompt_path`\
  \ と `effective_prompt_sha256` を記録し、後続の raw response・triage・proxy decision と同じ review-run\
  \ 証跡として追跡できるようにする。マップにない判定点は、規律読み込み規約が未定義の判定点として扱い、追加時は本マップへ登録する。\n\n### 2. next\
  \ --json unique action selector\n\n`next --json` は状態要約ではなく、現在実行してよい唯一 action を選ぶ\
  \ selector である。`required_action` は 1 つだけを返し、`pending_gates` や scope list は予定または補助情報として扱う。\n\
  \n共通フィールドは `kind`、`required_action`、`active_gate`、`feature`、`phase`、`stage`、`blocked_by`、`action_parameters`、`state_refs`\
  \ とする。active workflow unit があるのは、通常 workflow の `<feature, phase, stage>` または reopen\
  \ 第3過程の drafting / review gate だけである。この場合だけ `active_gate`、`feature`、`phase`、`stage`\
  \ を非 null にする。post-write verification、human decision、maintenance、reopen 第1・第2過程、commit\
  \ stop point、workflow state repair は active workflow unit を持たない action であり、`feature`、`phase`、`stage`、`active_gate`\
  \ は null にする。対象 feature、対象 phase、対象ファイル、実行コマンドは `action_parameters` または `state_refs`\
  \ から読む。\n\nselector の優先順位は、workflow state / reopen plan の破損、post-write verification\
  \ pending、human decision、maintenance / side track top frame、reopen commit stop point、reopen\
  \ 第1・第2過程、reopen 第3過程 drafting、reopen 第3過程 gate、reopen 第4過程、通常 workflow、completed\
  \ の順に固定する。maintenance は `required_action=run_maintenance` を返し、maintenance YAML 内の個別名は\
  \ `maintenance_action` と `action_parameters.maintenance_action` に分離する。reopen では\
  \ `current_blocker` がある場合に pending gate を active にせず `wait_for_human_decision` を返す。`commit_stop_point:\
  \ true` がある場合も pending gate を active にせず、`blocked_by.type=commit_stop_point`、`active_gate=null`、`phase=null`、`stage=null`\
  \ とする。第3過程の pending gate は、blocker と stop point がない場合だけ active gate にできる。\n\npost-write\
  \ target detection と manifest verification は、`next` と `commit` の双方が参照する実装契約である。post-write-verification\
  \ 対象の未コミット変更がある場合、`next` は通常 workflow ではなく post-write-verification pending を返す。completed\
  \ manifest は `target_files` と現在内容の `target_sha256` が一致し、`required_verifiers` の各\
  \ verifier が `verifications[]` の単一エントリで全対象ファイルと同じ sha を覆い、`unresolved_substantive_findings`\
  \ が 0 である場合だけ完了とみなす。\n\n各サブコマンドの戻り値（exit code）：\n\n- `0`：OK（不可逆操作を許可）\n- `1`：WARN（警告を出すが継続可、利用者判断で進める）\n\
  - `2`：DEVIATION（fail-closed で遮断、不可逆操作を許可しない）\n\n出力形式は人間可読の既定形式と、`--json` 指定時の JSON\
  \ 形式の 2 種類。出力構造とログ形式は `docs/operations/WORKFLOW_PRECHECK_DETAILS.md` を正本参照する。ただし、この正本性は\
  \ precheck CLI の表示・ログ出力形式に限り、operation contract の output / side-effect semantics\
  \ を定義しない。人間可読既定の書式は `[VERDICT] OK ／ WARN ／ DEVIATION（exit N）` のように **大括弧付きラベル形式**\
  \ で、`[VERDICT]`／`[ACTION]`／`[REASON]`／`[CURRENT STATE]` の 4 ブロックを順に出力する。判定結果はログ（`.reviewcompass/runtime/logs/workflow-precheck.log`、上書き可能＝ログファイル自体の再生成可否を指す。旧配置を対象とする凍結契約〔§実行時生成物の凍結期（P3\
  \ まで）の扱い〕とはスコープが異なる）に追記する。\n\n### 3. 完了判定の述語集合（completion_predicate 値域）\n\n段集合 YAML\
  \ の `completion_predicate` フィールドが取る値の集合：\n\n| 述語名 | 判定内容 |\n|---|---|\n| `artifact_exists`\
  \ | 期待する証跡ファイルが存在する |\n| `artifact_exists_and_sections_present` | ファイル存在＋必須節名がすべて含まれる\
  \ |\n| `artifact_exists_and_sections_present_and_author_reviewer_distinct` | 上記＋front-matter\
  \ の `author.identity` と `reviewer.identity` が異名 |\n| `all_features_drafting_and_triad_review_completed`\
  \ | `feature_order` の全機能で drafting＋triad-review が true |\n| `cross_spec_alignment_passed`\
  \ | 機能横断整合の判定が pass、未消化所見が 0 件 |\n| `explicit_human_approval_recorded` | 利用者の明示承認が\
  \ human-only approval record として記録されている。proxy_model decision はこの述語を満たさない |\n| `depends_on_resolves_correctly`\
  \ | `feature-dependency.yaml` の各機能の `depends_on` が単純リスト構造または連想配列構造として解析可能、連想配列構造の場合は値が\
  \ `hard` または `review` のいずれかであること（A-004 対処、2026-05-25 セッション 26 利用者明示承認） |\n\n述語集合の追加・削除は本機能の責務。新しい述語を導入する場合は、本節と検査スクリプト実装の両方を同時に更新する。\n\
  \n### 4. 第 1 層の限界の明示\n\n検査スクリプトが解決しない失敗モード（計画書 §5.8 由来、Req 7 受入 1）：\n\n- 中身の空疎（必須節は存在するが内容が「特に問題なし」のみ）\n\
  - 検査スクリプト自体が呼ばれない経路\n- `stages/in-progress/` ファイルの自己申告性（嘘・古い・欠落の余地）\n- 文脈圧力下での規律ファイル優先度低下\n\
  \nこれらは hook 連携や人の確認で補完する。本機能はワークフロー事前検査の限界を運用文書（`docs/operations/WORKFLOW_PRECHECK.md`）に明示し、人の期待値を整える（Req\
  \ 7 受入 4）。\n\n### 5. スキーマ定義（Phase 1 最小スキーマ、Req 2 受入 10・11）\n\n本節は `next --json`\
  \ の語彙と応答形式を機械検証可能な JSON Schema として定義する。2 ファイルを `.reviewcompass/schema/` 配下に置く。スキーマ形式はいずれも\
  \ JSON Schema Draft 2020-12 を使う。実装コードはこの 2 ファイルを語彙と応答構造の正本として参照し、コード内に語彙を直書きしない。\n\
  \n#### 5.1 required_action.schema.json（Req 2 受入 10）\n\n`required_action` の取り得る値を列挙する語彙ファイル。\n\
  \n- **`$schema`**：`https://json-schema.org/draft/2020-12/schema`\n- **`$id`**：`urn:reviewcompass:schema:required_action`\n\
  - **`type`**：`string`\n- **`enum`**：D-003 §6 の優先順位順に 19 値を列挙する（この順が正本）\n\n| 優先順位\
  \ | 値 |\n|---:|---|\n| 1 | `repair_workflow_state` |\n| 2 | `run_post_write_verification`\
  \ |\n| 3 | `wait_for_human_decision` |\n| 4 | `record_human_decision` |\n| 5 | `run_maintenance`\
  \ |\n| 6 | `advance_reopen_after_commit_stop_point` |\n| 7 | `commit_stop_point`\
  \ |\n| 8 | `draft_reopen_plan_candidates` |\n| 9 | `apply_approved_reopen_plan`\
  \ |\n| 10 | `advance_reopen_after_approval_stop_point` |\n| 11 | `repair_canonical_documents`\
  \ |\n| 12 | `run_reopen_drafting` |\n| 13 | `run_reopen_pending_gate` |\n| 14 |\
  \ `collect_required_decisions` |\n| 15 | `finalize_reopen` |\n| 16 | `draft_reopen_classification`\
  \ |\n| 17 | `run_reopen_start` |\n| 18 | `run_workflow_stage` |\n| 19 | `completed`\
  \ |\n\n語彙の追加・変更はこのファイルの `enum` 修正で完結する。\n\n#### 5.2 next_action_response.schema.json（Req\
  \ 2 受入 11）\n\n`next --json` の目標応答スキーマ。\n\n**最上位構造の設計確定事項**\n\n- **`$schema`**：`https://json-schema.org/draft/2020-12/schema`\n\
  - **`$id`**：`urn:reviewcompass:schema:next_action_response`\n- **`type`**：`object`\n\
  - **必須フィールド（5つ）**：`verdict`（文字列）・`exit_code`（整数）・`next_action`（オブジェクト）・`reasons`（配列）・`current_state`（オブジェクト）\n\
  - **`additionalProperties`**：最上位は指定しない（**前向き拡張用**：将来の実装で新フィールドを追加してもスキーマ改訂なしに対応できるよう、段階的拡張を妨げない。スキーマファイルの\
  \ `$comment` に意図を記録する）\n\n**`next_action` オブジェクトの設計確定事項**\n\n- **`type`**：`object`\n\
  - **必須フィールド（10つ）**：`kind`・`required_action`・`active_gate`・`feature`・`phase`・`stage`・`required_feature_scope`・`blocked_by`・`future_gates`・`state_refs`\n\
  - **`additionalProperties`**：指定しない（**後ろ向き互換用**：旧バージョンのツールが出力する `pending_gates`・`next_pending_gate`\
  \ 等を許容するため。最上位の「前向き拡張」とは目的が異なる。スキーマファイルの `$comment` に意図を記録する）\n- **`properties:\
  \ { \"verdict\": false }`**：`verdict` フィールドを `next_action` 内で明示禁止する（受入 11：`verdict`\
  \ は最上位にのみ存在し `next_action` 内には含めない。`additionalProperties` を開放したまま特定フィールドのみを禁止できる最も局所的な方法）\n\
  \n**`next_action` フィールド型定義**\n\n| フィールド | 型 |\n|---|---|\n| `kind` | string enum（7値インライン定義、下記\
  \ §5.2 値域表参照・MWP-0 反映） |\n| `required_action` | `$ref: \"urn:reviewcompass:schema:required_action\"\
  `（19語彙に限定。絶対 URN 参照により基底 URI 解決不要） |\n| `active_gate` | string または null（作業単位がない場合は\
  \ null） |\n| `feature` | string または null（単一機能名・`\"all_features\"`・null の 3 種） |\n\
  | `phase` | string または null |\n| `stage` | string または null |\n| `required_feature_scope`\
  \ | array of string |\n| `blocked_by` | object または null |\n| `future_gates` | array\
  \ |\n| `state_refs` | object |\n| `reason` | string（人間向けの現在状態説明。§5.2 の必須 10 フィールドには含めない任意フィールド）\
  \ |\n\n**next_action.reason と最上位 reasons の責務差**\n\n`next_action.reason` は、現在の状態と次に取る操作を人間向けに短く説明する\
  \ `next_action` 内の任意文字列である。これは §5.3 の全 kind 共通フィールドだが、§5.2 の `next_action` 必須 10\
  \ フィールドには含めない。\n\n最上位 `reasons` は、`verdict` と `exit_code` の検査・判定根拠を機械可読な文字列配列として列挙する必須フィールドである。`DEVIATION`\
  \ や `WARN` の理由、検査で見つかった不足・矛盾・遮断理由を入れる。したがって、最上位 `reasons` は判定根拠の配列、`next_action.reason`\
  \ は利用者が読む現在状態説明であり、互いに代替しない。\n\n**`kind` フィールドの値域**\n\n`kind` は `next_action_response.schema.json`\
  \ 内にインライン `enum` として定義する（`required_action` とは異なり別ファイル化しない。`kind` は `next_action_response`\
  \ 内でのみ参照されるため）。\n\n2026-06-26 MWP-0 反映：旧 14 値を 7 値へ整理した。旧値との対応は `docs/notes/2026-06-26-next-json-kind-redesign.md`\
  \ の新旧対照表を正本とする。この正本の範囲は `kind` 値域の新旧対照にのみ適用され、`stage` 等の詳細フィールド制約の正本は本設計書（§5.3）と受入\
  \ 11(6) である。\n\n| 優先順位 | 値 | 意味 |\n|---:|---|---|\n| 1 | `reopen_in_progress` |\
  \ 再開手続き中（サブステップは詳細フィールドで返す） |\n| 2 | `blocking_in_progress` | 本線とは別の作業中（maintenance\
  \ / side track / resume を統合） |\n| 3 | `verification_pending` | 書き込み後の検証（post-write\
  \ verification）待ち |\n| 4 | `in_progress` | 通常の作業中（stage / cross_feature_stage /\
  \ upstream_recheck / commit_stop_point を統合） |\n| 5 | `feature_definition_required`\
  \ | プロジェクト立ち上げ時の初期設定未完了（特殊ケース・verdict: OK） |\n| 6 | `completed` | 全作業完了 |\n| 7 |\
  \ `unknown` | 想定外のエラー状態（ファイル破損・整合違反など・verdict: DEVIATION） |\n\n値の追加・変更はこの表と `next_action_response.schema.json`\
  \ の `enum` 修正で完結する。（2026-06-26 MWP-0 反映：受入 12 参照）ただし `kind` の値種を増減する場合は受入 12 の改訂を要する。表と\
  \ enum の修正は実装作業の手順であり、要件変更を免除しない。\n\n**条件付き必須フィールド（`if/then` 構文で `next_action` 内に定義）**\n\
  \n- `repair_reasons`（非空配列、`type: array, minItems: 1`）：`required_action = \"repair_workflow_state\"\
  ` のとき必須\n- `action_parameters`（オブジェクト）：`required_action = \"run_maintenance\"` のとき必須。サブフィールド必須\
  \ 6 つ（`maintenance_action`・`allowed_scope`・`allowed_files`・`completion_conditions`・`active_stack_frame_id`・`parent_frame_id`）\n\
  \n**後方互換フィールドの整合規則**\n\n`pending_gates` が存在する場合は `future_gates` と一致させること（実装側の不変条件）。JSON\
  \ Schema の標準機能では 2 フィールドの内容が等しいことを機械検証できないため、この等価性はスキーマの責務対象外とし、実装コードで保証する。スキーマは\
  \ `pending_gates` の型（配列）のみ定義する。\n\n#### 5.3 kind 詳細フィールド設計（MWP-0 反映）\n\n各 `kind`\
  \ 値が返す詳細フィールドを定義する。\n\n**全 kind 共通フィールド**\n\n| フィールド | 役割 |\n|-----------|------|\n\
  | `kind` | 現在地のカテゴリ（7値） |\n| `required_action` | 次にすべき操作の名前（機械が読む） |\n| `reason`\
  \ | 状態の説明（人間が読む） |\n\n**`in_progress` の追加フィールド**\n\n旧 `stage` / `cross_feature_stage`\
  \ / `upstream_recheck` / `commit_stop_point` の 4 種類を統合する。ただし `commit_stop_point`\
  \ を統合する場合、受入 11(6) の制約（`required_action = \"commit_stop_point\"` 時は `phase=null`・`stage=null`・`active_gate=null`・`blocked_by.type=\"\
  commit_stop_point\"`）に従い、`stage` フィールドの値は null になる（`stage: \"commit_stop_point\"\
  ` という文字列値は取らない）。\n\n| フィールド | 説明 |\n|-----------|------|\n| `feature` | 対象機能名（cross_feature_stage\
  \ 相当は `\"all_features\"` 固定、commit_stop_point 時は null） |\n| `phase` | 現在のフェーズ（commit_stop_point\
  \ 時は null） |\n| `stage` | 現在のステージ（commit_stop_point 時は null・受入 11(6) 参照） |\n| `upstream_phase`\
  \ | 上流フェーズ名（upstream_recheck 相当の場合のみ） |\n\n**`blocking_in_progress` の追加フィールド**\n\
  \n`blocking_phase` サブフィールドで段階を区別する（3値）：\n\n| `blocking_phase` | 意味 | 統合された旧 kind\
  \ |\n|-----------------|------|----------------|\n| `required` | blocking 作業の開始が必要\
  \ | `blocking_unit_required` |\n| `in_progress` | blocking 作業中 | `blocking_unit_in_progress`\
  \ / `maintenance_in_progress` / `resume_in_progress` |\n| `return_pending` | blocking\
  \ 完了・親への復帰待ち | `parent_resume_pending` |\n\n| フィールド | `required` | `in_progress`\
  \ | `return_pending` | 説明 |\n|-----------|:---:|:---:|:---:|------|\n| `blocking_phase`\
  \ | ✓ | ✓ | ✓ | 段階の区別 |\n| `title` | ✓ | ✓ | — | 作業の名前 |\n| `unit_id` | ✓ | ✓ |\
  \ — | blocking unit の識別子（種別不明時は null） |\n| `parent_unit_id` | ✓ | ✓ | ✓ | 親への戻り先\
  \ |\n| `return_conditions` | ✓ | ✓ | — | 戻る条件 |\n| `allowed_scope` | — | ✓ | — |\
  \ 許可された操作の種類 |\n| `allowed_files` | — | ✓ | — | 許可されたファイル |\n| `file` | — | ✓ |\
  \ — | 進行中ファイルのパス |\n| `completed_unit_id` | — | — | ✓ | 完了した unit の識別子 |\n\n廃止するフィールドと廃止する\
  \ `blocking_phase` 値：`resuming`（`blocking_phase` 値・`in_progress` に統合。このとき `unit_id`/`parent_unit_id`\
  \ は null を許容する）/ `completion_conditions`（`return_conditions` に統一。ただしこの廃止は `blocking_in_progress`\
  \ 詳細フィールドの `completion_conditions` に限る。`next_action.action_parameters.completion_conditions`（受入\
  \ 11(2) の `run_maintenance` 時必須サブフィールド）は別物であり廃止しない）/ `process_id`（`blocking_phase`\
  \ で代替）/ `maintenance_action`（`required_action` で代替）/ `blocked_normal_workflow`（`blocking_phase:\
  \ in_progress` で暗示）/ `mainline_blocked_by`（`completed` 開始の maintenance に戻り先はなく不要）/\
  \ `action_parameters`（他フィールドの重複コピー）/ `active_gate`（maintenance では常に null）\n\n注：ここで廃止する\
  \ `action_parameters` は `blocking_in_progress` 種別の詳細フィールドとしての `action_parameters`\
  \ であり、`next_action` 直下の条件付き必須フィールド（`required_action = \"run_maintenance\"` のとき必須・受入\
  \ 11(2) で確定）とは配置レベルが異なる別物である。後者は廃止しない。\n\n**`verification_pending` の追加フィールド**\n\n\
  `verification_type` サブフィールドで種類を区別する：\n\n| `verification_type` | 意味 | 旧 kind |\n\
  |--------------------|------|--------|\n| `pending` | 検証待ち・未着手 | `post_write_verification`\
  \ |\n| `policy_violation` | 禁止変更が混入 | `post_write_policy_violation` |\n| `human_decision_required`\
  \ | 未解決の重大所見あり | `post_write_human_decision_required` |\n\n| フィールド | `pending` |\
  \ `policy_violation` | `human_decision_required` |\n|-----------|:---:|:---:|:---:|\n\
  | `verification_type` | ✓ | ✓ | ✓ |\n| `target_files` | ✓ | ✓ | ✓ |\n| `manifest`\
  \ | ✓ | — | ✓ |\n| `forbidden_files` | — | ✓ | — |\n| `codes` | ✓（任意） | — | — |\n\
  \n**`reopen_in_progress` の廃止フィールド**\n\n`next_drafting_gate`（`active_gate` で代替・手引き改修が必要）/\
  \ `feature`（旧 reopen 独自の意味での `feature` を廃止し `required_feature_scope` で代替。`next_action`\
  \ の必須フィールドとしての `feature` は別物であり存続する）/ `direct_features` / `indirect_features` /\
  \ `feature_impact_scope_basis`（手引きに参照なし）。残すフィールドは現行の `reopen_in_progress` 節の定義を引き継ぐ（`file`\
  \ / `next_step` / `step_number` / `pending_gates` など）。\n\n#### 5.4 commit-preflight\
  \ サブコマンドの kind 設計（MWP-0 反映）\n\n2026-06-26 MWP-0 の受入 12 により、次の 3 種類の判定を `next --json`\
  \ の `kind` から除外し `commit-preflight` サブコマンドの出力にのみ含める。\n\n| `kind` | 意味 |\n|--------|------|\n\
  | `commit_candidate` | コミット可能状態 |\n| `commit_mixing_risk` | 異なる作業単位が混在したコミット |\n\
  | `commit_unit_stale` | コミット単位の情報が古い |\n\nこれら 3 値は「コミット操作の前確認」であり「作業の現在地」ではない。`commit-preflight`\
  \ は既存のコミット手前の必須確認手順として確立されており（手順：commit-preflight → git add → guarded commit）、これらを\
  \ `commit-preflight` に集約することで `next --json` の `kind` 値域を「作業の現在地カテゴリ」に限定できる。\n\n\
  `commit-preflight` サブコマンドが返す `kind` の値域はこの 3 値とし、`next --json` は `commit_candidate`\
  \ / `commit_mixing_risk` / `commit_unit_stale` を返さない。\n\n## 起草者と判定者の分離モデル（Author-Reviewer\
  \ Separation Model）— Req 3\n\n### 1. front-matter の必須フィールド（計画書 §5.4 由来）\n\nレビュー記録（`.reviewcompass/specs/<機能>/reviews/<日付>-<種別>.md`）の冒頭メタデータに次を必須化する：\n\
  \n```yaml\n---\ntype: <レビュー種別>                     # 例：design_triad_review\ntarget:\
  \ <対象文書のパス>\ntarget_commit: <commit hash>\ntarget_content_hash: <sha256>\ndate:\
  \ 2026-05-25\nmode: subagent_mediated                  # レビューモード。値は foundation 正本を参照（再定義しない）\n\
  author:\n  identity: claude_code_main_session     # 起草者の識別子\n  model: claude-opus-4-7\n\
  \  role: drafter\nreviewer:\n  identity: claude_code_subagent         # 最終判定者の識別子（必ず異名）\n\
  \  model: claude-opus-4-7\n  role: final_judgment\n  separation_from_author: true\
  \           # 明示的に異名であることを宣言\n---\n```\n\n機械検査は次の 3 点を判定する（Req 3 受入 4）：\n\n1. `author.identity`\
  \ と `reviewer.identity` フィールドの存在\n2. `author.identity` ≠ `reviewer.identity`（文字列比較で同一を許容しない、Req\
  \ 3 受入 2）\n3. `reviewer.separation_from_author` が `true`\n\n別モデル・別 session の機械判定は第\
  \ 1 層検査対象外。これは利用者監査の第 3 層に委ねる（Req 3 受入 4 由来）。理由：CLI／API 経路の実行環境を機械判定で確実に区別する手段がフェーズ\
  \ 1 では整わないため。\n\n### 2. サブエージェント方式（subagent_mediated）の特例（Req 3 受入 3）\n\nメインセッション\
  \ LLM が主役（primary_reviewer）を兼ねる場合、判定役（judgment_reviewer）は **必ず別エンティティ**（別モデルかつ別\
  \ session）で実施する。これは計画書 §5.23.12 サブエージェント方式の限界（§5.23.12.7）を踏まえた特例である。\n\nサブエージェント方式採用時の\
  \ front-matter 例：\n\n```yaml\nauthor:\n  identity: claude_code_main_session    \
  \ # メインセッションが主役と起草を兼ねる\n  model: claude-opus-4-7\n  role: drafter_and_primary_reviewer\
  \     # 暫定許容の宣言\nreviewer:\n  identity: claude_code_subagent_judgment   # 判定役は別サブエージェント\n\
  \  model: claude-opus-4-7                    # 同モデル許容（§5.9.1 改訂後）\n  role: final_judgment\n\
  \  separation_from_author: true\n  subagent_invocation_method: agent_tool_with_general_purpose\n\
  ```\n\n`subagent_mediated` の場合、`role` フィールドに `drafter_and_primary_reviewer` 等の複合役を許容する（暫定許容の明示）。完全分離（メイン\
  \ LLM が 3 役のいずれにもならない）はフェーズ 4 の runtime_mediated 経路で実装する。\n\n### 3. 異名判定の機械検査範囲\n\
  \n機械検査の対象範囲（第 1 層で判定可能）：\n\n- フィールドの存在判定\n- 文字列の同一性判定\n- 値域チェック（`actor` フィールドが `human`／`llm`／`proxy_model`\
  \ のいずれか等）\n\n機械検査の対象外（第 3 層 利用者監査または定期事後監査に委ねる）：\n\n- 別モデルであることの実体確認（環境変数や API 呼び出し履歴の照合）\n\
  - 別 session であることの実体確認（session ID の独立性検証）\n- レビュー記録の中身が独立性を満たすかの質的判定\n\n## 不可逆操作の直前ゲートモデル（Pre-Operation\
  \ Gate Model）— Req 4\n\n### 1. 不可逆操作の最小集合（Req 4 受入 1）\n\n機械ゲートの対象は次の 4 種類に絞る：\n\n\
  | 不可逆操作 | 検査対象 | 検査結果が fail の場合 |\n|---|---|---|\n| `spec.json` の `approval` 段書き込み\
  \ | 当該機能の前段（alignment）が true、未消化所見が 0 件 | spec.json 書き込みを許可しない |\n| `git commit`\
  \ | 検査スクリプトが pass、`stages/in-progress/` が空 | commit を許可しない |\n| `git push` | 直前のコミットが上記検査を通過済み、リモート状態と整合\
  \ | push を許可しない |\n| フェーズ移行（次フェーズの drafting 段 true 化） | 当該フェーズの approval 段が `feature-dependency.yaml#feature_order`\
  \ の全機能で true（本設計時点 7 機能、§機能依存マップモデル §2 の A-001 注記参照） | フェーズ移行を許可しない |\n\nそれ以外（spec.json\
  \ の drafting／triad-review 段の書き込み、中間段の遷移など）には機械ゲートを置かない（最小集合方針、Req 4 受入 4）。これは検査スクリプトを呼ぶ頻度を下げ、検査自体の存在感を高めるため。\n\
  \n### 2. ゲート発火条件と独立走行（Req 4 受入 2）\n\nゲートは次の 2 条件で発火する：\n\n1. Requirement 2 の検査スクリプトが\
  \ pass を返す\n2. `stages/in-progress/` に未完了手続きが存在しない\n\n直前ゲートは **毎回独立して走行する**。session\
  \ 開始時の検査結果（Req 6 受入 3）をキャッシュせず、session 開始後の状態変化（途中での `stages/in-progress/` ファイル追加、所見の追加等）を直前で再検出する。これは「session\
  \ 開始時には pass だったが、その後の作業で状態が変わって本来 fail になるはずの遷移を見落とす」失敗モードを防ぐため。\n\n`git commit`\
  \ の直前ゲートでは commit 承認レコードを別入力として読み、`approved_action=commit`、`approved_by=user`、未消費状態、staged\
  \ ファイル被覆、staged 内容と一致する `target_sha256` を検査する。承認レコードの `target_sha256` は各 staged\
  \ ファイルの現在 staged blob から計算した sha と比較し、欠落・形式不正・不一致のいずれも DEVIATION とする。これにより、承認後に対象ファイルが差し替わった\
  \ commit を fail-closed で遮断する。\n\n### 2.1 commit 承認 nonce challenge（Req 4 受入 6〜7）\n\
  \ncommit 承認は、承認レコード単体ではなく nonce challenge と対で扱う。challenge の保存先は `.reviewcompass/runtime/approvals/commit-approval-challenge.json`、承認レコードの保存先は既存どおり\
  \ `.reviewcompass/runtime/approvals/commit-approval.json` とする。challenge は `approved_action=commit`\
  \ に限り、staged ファイル一覧、ファイル別 `target_sha256`、全体 target digest、nonce、有効期限、消費状態を保持する。\n\
  \n`tools/check-workflow-action.py commit-approval prepare --json` は、staged ファイルが存在する場合だけ\
  \ challenge を作成する。staged ファイルが 0 件、staged 内容の sha 計算不能、または保存不能の場合は fail-closed とし、commit\
  \ 承認手続きに進ませない。`prepare` は新しい challenge を作る前に、古い runtime の staged 内容承認 record と実行代行\
  \ delegation record を invalidated 状態へ寄せる。これは、消費済み・期限切れ・壊れた旧 record が第三者向け commit\
  \ UX の邪魔をしないようにするためである。手動の `commit-approval invalidate --json` は低レベル復旧手段として残すが、通常の準備操作で古い\
  \ runtime record の掃除を利用者に求めない。全体 target digest は、正規化した staged ファイルパスと各 staged blob\
  \ hash から安定順で計算し、ファイル順や環境差に依存させない。challenge は `created_at` と `expires_at` を UTC\
  \ ISO-8601 文字列で保持し、TTL は 10 分とする。テスト時は checker の `now_utc` を注入できる実装境界を持つ。\n\n全体\
  \ target digest の canonical format は `commit-approval-v1` とする。digest 入力は UTF-8 bytes\
  \ で、先頭行を `commit-approval-v1\\n` とし、以後 staged entry を repo-relative POSIX path の\
  \ UTF-8 byte 昇順で 1 行ずつ並べる。各 entry 行は、`{\"mode\":\"<git-index-mode>\",\"object_id\"\
  :\"<staged-object-id-or-DELETED>\",\"path\":\"<repo-relative-posix-path>\",\"target_sha256\"\
  :\"<sha256-or-DELETED>\"}` を JSON object として、キー順 `mode`、`object_id`、`path`、`target_sha256`、区切り文字は\
  \ `,` と `:` のみ、余分な空白なしで直列化し、末尾に `\\n` を付ける。`mode` は git index の file mode、`object_id`\
  \ は staged object id、削除 staged は `object_id=DELETED` かつ `target_sha256=DELETED`\
  \ とする。全体 target digest はこの bytes 列の SHA-256 hex とする。canonical format のバージョンを変える場合は\
  \ `commit-approval-v2` のように新しい header を使い、旧 challenge と混在させない。\n\nchallenge と承認レコードは、部分的に読める場合でも補完や推測をしない。JSON\
  \ として読めない、object ではない、必須フィールドが欠落している、フィールド型が違う、ファイルパスが重複している、repo-relative POSIX\
  \ path として不正、repo 外を指す、空文字を含む、`target_sha256` の形式が不正、未知の path が混入している、challenge\
  \ と承認レコードの file set が一致しない、のいずれも形式不正として fail-closed にする。この検査は承認レコード作成時と commit 直前ゲートの両方で行う。\n\
  \nchallenge と承認レコードの schema は、操縦 LLM、provider、model 名を持たない。`llm`、`provider`、`model`、`model_id`、`proxy_model_id`\
  \ のように操縦主体を表すフィールドが混入した場合は、情報用フィールドとしても受け入れず形式不正として fail-closed にする。承認レコードは `attestation_type=staged_content_nonce_binding`\
  \ と `guarantee_scope=staged_content_binding_not_ui_utterance_proof` を持ち、保証範囲を機械可読にする。\n\
  \n`tools/check-workflow-action.py commit-approval record --nonce <nonce> --source-text-stdin\
  \ --json` は、challenge が存在し、未期限切れ、未消費で、nonce が一致し、現在の staged ファイル集合・staged 内容が challenge\
  \ と一致する場合だけ承認レコードを作成する。承認文は CLI 引数で受け取らず、標準入力から読む。これは、redaction 前の承認文が shell history、process\
  \ listing、OS audit log 等へ露出することを避けるためである。承認文を保存しない運用では `--no-source-text` を指定し、本文の代わりに\
  \ `source_omission_reason=source_not_provided` を記録する。`--source-text <user text>`\
  \ のように本文を argv へ載せる入力経路は提供しない。\n\n承認文は UTF-8 text として扱い、UTF-8 として解析不能、または解析後の UTF-8\
  \ bytes が 4096 bytes を超える場合は fail-closed とする。承認レコードは `approved_action=commit`、`approved_by=user`、challenge\
  \ と同じ target digest、ファイル別 `target_sha256`、作成時刻、消費状態を持つ。`source_text_redacted` を保存する場合は\
  \ `tools.session_record_extractor.redact.redact_text` と `tools.session_record_extractor.redact.find_residual_secrets`\
  \ の builtin rules を通し、API キー、token、secret、password、credential に相当する値を生のまま残さない。通常文まで一律に秘密扱いするのではなく、秘密性のある文字列だけを\
  \ redaction 対象とする。ただし、秘匿情報除去に失敗した、または安全に保存できる形へ変換できない場合は、出典本文を保存せず、`source_omission_reason`\
  \ を記録する。`source_omission_reason` は `source_not_provided`、`unsafe_source_omitted`、`redaction_failed`、`residual_secret_detected`\
  \ のいずれかに限る。\n\ncommit 直前ゲートは、commit 実行パス内で、実際に commit される index に対して承認レコードと challenge\
  \ の両方を読み、nonce 一致、未期限切れ、未消費、target digest 一致、staged ファイル集合一致、staged 内容一致を検査する。欠落、形式不正、期限切れ、不一致、消費済みのいずれも\
  \ DEVIATION とし、commit を遮断する。この validation 失敗は security failure として扱い、challenge と承認レコードを\
  \ invalidated 状態にして、同じ承認の再利用を許可しない。\n\nvalidation 通過後に `git commit` 実行自体が失敗した場合は、通常の\
  \ git execution failure として扱う。署名失敗や hook infrastructure 失敗など、commit が作成されず index\
  \ が validation 時と同一で、challenge が期限内・未消費・未 invalidated のままなら再試行を許す。index が変わった、期限切れ、消費済み、invalidated、または\
  \ validation 条件を再度満たせない場合は新しい承認を要求する。commit 成功後は challenge と承認レコードを消費済みに更新する。commit\
  \ 成功後に consume 記録の永続化へ失敗した場合、その approval/challenge は次回以降の gate で拒否し、新しい承認なしに再利用させない。\n\
  \n時刻判定は UTC の現在時刻 `now_utc` と challenge の `created_at`／`expires_at` で行う。`now_utc\
  \ < created_at` はシステム時計の巻き戻りまたは challenge 破損の可能性として fail-closed にし、`now_utc > expires_at`\
  \ は期限切れとして fail-closed にする。`created_at`／`expires_at` の欠落、UTC ISO-8601 として解析不能、`expires_at\
  \ <= created_at`、TTL が 10 分以外に見える値も形式不正として fail-closed にする。\n\n本判定は、操縦する LLM、provider、model\
  \ 名に依存しない。判定入力は staged ファイル集合、staged blob hash、全体 target digest、nonce、expiry、consumed\
  \ 状態に限定する。LLM ごとの差異は、利用者へ nonce を提示する説明文やプロンプト表現だけに閉じる。本方式は、利用者が UI 上で nonce を発話したことを暗号的に証明するものではない。保証範囲は、古い承認、別対象の承認、承認後に\
  \ staged 内容が差し替えられた commit を防ぐことに限る。UI 署名や runtime event 署名による発話証明は将来拡張とし、本 reopen\
  \ では実装対象外とする。\n\n### 2.2 commit 実行代行承認（Req 4 受入 8）\n\nLLM が `git commit` の実行を代行する場合、staged\
  \ 内容承認とは別に、LLM への commit 実行代行承認を記録する。staged 内容承認は「この staged 内容を commit してよい」という承認であり、実行代行承認は「LLM\
  \ が commit 実行を代行してよい」という承認である。両者を混ぜないため、`commit-approval record` は `execution_delegation`\
  \ を既定で書かない。\n\n低レベル正式 CLI は `tools/check-workflow-action.py commit-approval delegate-execution\
  \ --nonce <nonce> --source-text-stdin --json` とする。承認文は標準入力からのみ読む。`--source-text\
  \ <user text>` のように argv へ載せる入力経路は提供しない。これは、redaction 前の承認文が shell history、process\
  \ listing、OS audit log 等へ露出することを避けるためである。\n\n第三者へ見せる通常 UX では、`record` と `delegate-execution`\
  \ を別操作として露出させない。`tools/guarded-git-commit.py --approval-nonce <nonce> --approval-source-text-line-stdin\
  \ ...` は stdin から承認文を 1 行だけ読み、EOF を待たずに staged 内容承認 record と実行代行 delegation record\
  \ を順序どおり作成し、そのまま commit 直前ゲートと `git commit` へ進む。これにより利用者に見える手順は「1 回目の『コミット』で staged\
  \ 対象・digest・nonce・期限を提示」「2 回目の『承認』で commit 完了」に閉じ、nonce / digest / delegation の多層防御を操作体験へ露出させない。\n\
  \n`delegate-execution` は、同じ nonce の challenge と staged 内容承認 record が存在し、どちらも未期限切れ・未消費・未\
  \ invalidated で、現在の staged ファイル集合・staged 内容・全体 target digest が challenge / staged\
  \ 内容承認 record と一致する場合だけ成功する。challenge 不在、staged 内容承認 record 不在、staged 内容承認より前の実行、期限切れ、消費済み、invalidated、target\
  \ digest 不一致、staged 内容差し替え、形式不正 JSON、JSON object 以外、unknown field、nonce 衝突、または未期限切れの\
  \ delegation record が既に存在する場合は fail-closed とする。ただし、既存 delegation record が同じ nonce、同じ\
  \ staged exact index、同じ staged 内容承認 record digest、同じ正規化済み承認文に対する有効 record である場合、これは重複作成ではなく\
  \ active transaction の再利用として扱う。壊れた旧 delegation が残っている場合は、次の `prepare` が旧 runtime\
  \ record を invalidated へ寄せ、新しい challenge からやり直せるようにする。\n\ndelegation record は `.reviewcompass/runtime/approvals/commit-approval.json`\
  \ へ追記せず、`.reviewcompass/runtime/approvals/commit-execution-delegation.json` に独立して保存する。`commit-approval.json`\
  \ は staged 内容承認のみを表す単一責務の record とし、commit gate は challenge、staged 内容承認 record、実行代行承認\
  \ record の 3 つを照合する。分離した record であっても別対象へ流用できないよう、delegation record は staged 内容へ明示的に束縛される。\n\
  \ndelegation record は strict schema とし、最低限、次を持つ。未定義 field は拒否する：\n\n```yaml\napproved_action:\
  \ commit_execution_delegation\ndelegated_action: commit\ndelegated_to: llm\napproved_by:\
  \ user\nnonce: <challenge nonce>\ntarget_digest: <commit-approval-v1 digest>\nstaged_file_set_digest:\
  \ <sha256 of canonical staged file paths and modes>\nstaged_content_approval_digest:\
  \ <sha256 of canonical commit-approval.json content>\nchallenge_path: .reviewcompass/runtime/approvals/commit-approval-challenge.json\n\
  approval_record_path: .reviewcompass/runtime/approvals/commit-approval.json\ncreated_at:\
  \ <UTC ISO-8601>\nexpires_at: <challenge expires_at>\nexplicit_instruction: <normalized\
  \ explicit commit instruction>\ninstruction_sha256: <sha256 of normalized instruction>\n\
  attestation_type: commit_execution_delegation_nonce_binding\nguarantee_scope: stdin_text_instruction_bound_to_commit_approval_not_ui_utterance_proof\n\
  consumed: false\ninvalidated: false\n```\n\n`created_at` は UTC ISO-8601 文字列とし、`expires_at`\
  \ は challenge と同じ値にする。delegation record の有効期限は challenge を超えない。`nonce`、`target_digest`、`staged_file_set_digest`、`staged_content_approval_digest`、`expires_at`\
  \ が challenge / staged 内容承認 record / 現在の index と一致しない場合は形式不正として fail-closed にする。schema\
  \ には `llm`、`provider`、`model`、`model_id`、`proxy_model_id` のように操縦主体を表すフィールドを受け入れない。判定は\
  \ LLM / provider / model 名に依存しない。`attestation_type` は `commit_execution_delegation_nonce_binding`、`guarantee_scope`\
  \ は `stdin_text_instruction_bound_to_commit_approval_not_ui_utterance_proof` の完全一致だけを許可する。この\
  \ `guarantee_scope` は、stdin で受けた明示文言が nonce と staged 内容承認へ束縛されていることだけを表し、UI 発話証明、provider\
  \ 証明、model 証明ではない。\n\n承認文の stdin payload は UTF-8 text として扱う。UTF-8 として解析不能、NUL を含む、空、空白のみ、または\
  \ UTF-8 bytes が 256 bytes を超える場合は fail-closed とする。標準的な pipe 入力に合わせ、末尾の POSIX LF\
  \ `\\n` は 1 個だけ除去してよい。ただし、`CR`、`CRLF`、内部改行、2 個以上の末尾 LF は拒否する。入力は、前後の ASCII 空白と全角空白を除去し、ASCII\
  \ 英字だけを小文字化し、末尾の日本語句点 `。` を 1 つだけ除去して正規化する。内部空白は畳み込まず、複数行は許可しない。全角 Latin 文字は ASCII\
  \ へ正規化せず、許可文言に完全一致しないため拒否する。\n\n正規化後の許可文言は次の完全一致に限定する：\n\n- `コミット`\n- `コミットして`\n\
  - `コミットを実行`\n- `承認`\n- `commit`\n- `commitして`\n\n正規化後の文言が上記以外の場合は fail-closed とする。特に、`次のコミットまで`、`コミット点まで`、`コミット準備`、`コミット可能なところまで`、`自律実行`、`進めて`、`続けて`、`OK`\
  \ は commit 実行代行承認として扱わない。`承認` は、直前に nonce / target digest / staged 対象 / 期限が提示済みである\
  \ commit approval challenge に対する 2 回目入力に限って、staged 内容承認と LLM commit 実行代行承認を兼ねる許可文言として扱う。\n\
  \n承認文を保存する場合は、`tools.session_record_extractor.redact.redact_text` と `find_residual_secrets`\
  \ の builtin rules を通す。API キー、token、secret、password、credential に相当する値を生のまま残さない。redaction\
  \ に失敗した、または redaction 後に残留 secret が検出された場合は、本文を省略した delegation record を作るのではなく、delegation\
  \ record 自体を作成せず fail-closed にする。通常文まで一律に秘密扱いするのではなく、秘密性のある文字列だけを redaction 対象とする。\n\
  \ndelegation record の書き込みは、保存直前に challenge / staged 内容承認 record / 現在 index / expiry\
  \ を再検証してから行う。再検証後に temp file へ書き、fsync 可能な環境では file と parent directory を fsync し、同一\
  \ filesystem 内の atomic rename で確定する。部分書き込み、外部変更、書き込み中の race、保存直前の期限切れを検出した場合は delegation\
  \ record を作らず fail-closed とする。\n\ncommit 直前ゲートで `--execution-actor llm` が指定された場合、staged\
  \ 内容承認 record / challenge の検査に加え、`.reviewcompass/runtime/approvals/commit-execution-delegation.json`\
  \ を必須とする。gate は commit 実行直前に challenge、staged 内容承認 record、delegation record、現在の\
  \ index を再読込し、strict schema、`approved_action=commit_execution_delegation`、`delegated_action=commit`、`delegated_to=llm`、`approved_by=user`、nonce\
  \ / target digest / staged file set digest / staged 内容承認 digest / expiry 一致、未期限切れ、未消費、未\
  \ invalidated、禁止 LLM/provider/model 系 field 不在、`explicit_instruction` の許可文言一致、`attestation_type`、`guarantee_scope`\
  \ を検査する。欠落・形式不正・unknown field・不一致・期限切れ・消費済み・invalidated・不許可文言はいずれも DEVIATION として\
  \ commit を遮断する。人間が自分で commit を実行する `--execution-actor human` では execution delegation\
  \ は不要である。\n\ncommit 成功後は、staged 内容承認 record / challenge と同じ commit approval 消費処理で\
  \ delegation も再利用不能にする。consume 永続化失敗後は、次回以降の gate で同じ approval / challenge / delegation\
  \ を拒否し、新しい承認なしに再利用させない。\n\n`guarded-git-commit.py --approval-nonce --approval-source-text-line-stdin`\
  \ は、同じ nonce に対する有効な staged 内容承認 record と delegation record が既にある場合、approval record\
  \ を再書き込みしない。これは、`git commit` 本体が sandbox、lock、hook、署名などの git execution failure で\
  \ commit を作成できず終了した後、同一 staged exact index で wrapper を再実行したときに、既存 delegation の `staged_content_approval_digest`\
  \ を壊さないためである。precheck が OK で `git commit` 本体だけが失敗した場合、wrapper は approval / challenge\
  \ / delegation を consumed にせず、validation failure として invalidated にもしない。再実行時に staged\
  \ exact index、nonce、expiry、approval、delegation がすべて同一なら同じ active transaction を使って\
  \ commit を再試行できる。\n\n`guarded-git-commit.py` は commit precheck 通過後、`git commit`\
  \ を呼ぶ直前に `git rev-parse --git-path index.lock` で解決した `index.lock` の排他作成を preflight\
  \ する。`index.lock` が既に存在する場合は既存 lock の調査を促して停止し、作成が permission / sandbox 系の理由で失敗した場合は\
  \ `sandbox_git_write_denied` として分類し、`required_action=rerun_commit_with_escalation`\
  \ を表示して停止する。この停止では `git commit` を呼ばず、approval / challenge / delegation を consumed\
  \ または invalidated にしない。`git commit` 実行後に `.git/index.lock` / permission 系エラーが返った場合も同じ分類と\
  \ required action を表示し、承認は保持されたこと、staged 内容が変わらなければ再承認不要であること、sandbox 外で guarded\
  \ commit を再実行する必要があることだけを利用者へ示す。sandbox 外再実行の直前 gate は既存の staged exact index / nonce\
  \ / expiry / approval / delegation 再照合を再度行うため、staged 内容が変化した場合は既存 approval を使わず新しい\
  \ challenge / approval からやり直す。\n\n### 3. fail-closed の既定（Req 4 受入 3）\n\n検査が結論不能な場合：\n\
  \n- 検査スクリプトの実行に失敗した（exit code が 0 でも 1 でも 2 でもない、または stderr に致命的エラー）\n- 段集合 YAML\
  \ が壊れている（YAML パースエラー）\n- 必須フィールドが欠落している\n- `feature_order` が参照する `feature-dependency.yaml`\
  \ が存在しない\n\nこれらの場合、ゲートを通さず必ず遮断する。判定不能を pass と解さない（fail-closed の既定）。これは「曖昧なときは止める」方針で、誤って不可逆操作を許可することによる被害を防ぐ。\n\
  \n### 4. ゲートと補助層 C 段階 3 の関係\n\n本ゲートは検査スクリプト（補助層 C 段階 2）を内部で呼び出す。利用者または LLM が不可逆操作を要求した時点で、補助層\
  \ C の 3 段階が次の順に走る：\n\n1. **段階 1**：LLM 規律として、これから何をするかを応答内で明示し、段階 2 を呼ぶ\n2. **段階\
  \ 2**：本ゲートの検査スクリプト（`check-workflow-action.py`）が走る\n3. **段階 3**：Claude Code フック機構（フェーズ\
  \ 2 以降の宿題）が段階 2 を自動で呼び、逸脱なら遮断\n\n段階 3 が実装されるまでは段階 1 の規律で代用する。段階 1 と段階 3 は段階 2 を呼ぶ経路が異なるだけで、判定本体は段階\
  \ 2 が単一の責務として持つ。\n\n## reopen 機械強制モデル（Reopen Mechanical Enforcement Model）— Req\
  \ 5\n\n### 1. 手戻り種別の二次元表記（Req 5 受入 1、計画書 §5.6）\n\n手戻り種別は **起点フェーズ記号 ＋ 深さ** の二次元で表す：\n\
  \n| 記号 | フェーズ | 深さの値域 |\n|---|---|---|\n| N | intent | 0 のみ（intent より上流なし） |\n|\
  \ R | requirements | 0〜1 |\n| D | design | 0〜2 |\n| A | tasks | 0〜3 |\n| I | implementation\
  \ | 0〜4 |\n\n深さは「起点フェーズの何段上に戻るか」を表す。例：\n\n- I-0 は実装段の整合ゲート再実施のみ\n- I-4 は実装段で発見された問題が\
  \ intent まで遡る場合の全フェーズ連鎖再実施\n- D-1 は設計段で発見された問題が要件段の修正を要する場合（要件・設計の 2 フェーズ連鎖）\n\n\
  旧表記 A／B／C／D は I-0／I-2／I-3／I-4 に対応し、旧表記で欠落していた I-1 を含めた完全二次元表記となる。\n\n### 2. trigger_map\
  \ による連鎖再実施対象の決定（Req 5 受入 2）\n\n`stages/reopen-procedure.yaml` に `trigger_map` を持たせ、第3過程（連鎖再実施）で参照する。種別から再実施対象を機械的に決定する：\n\
  \n```yaml\n- name: 該当ゲートの再実施\n  actor: llm                            # 第3過程の実行主体は\
  \ LLM（trigger_map を解決して順次進行する）\n  actor_resolution: per_target_stage    # 各 trigger_map\
  \ エントリの参照先段の `actor` を段定義から動的解決\n  trigger_map:\n    D-1:\n      - stages/requirements.yaml#alignment\
  \    # 参照先段の actor は当該段定義から取得（actor=llm 等）\n      - stages/requirements.yaml#approval\
  \     # 同上（actor=human）\n      - stages/design.yaml#alignment\n      - stages/design.yaml#approval\n\
  \    # 他種別（N-0／R-0〜1／D-0／D-2／A-0〜3／I-0〜4）の trigger_map は計画書 §5.6 行 457〜565 を正本参照\n\
  ```\n\n**第3過程の actor 解決規則（A-002 対処、2026-05-25 セッション 26 利用者明示承認）**：第3過程の進行ロジックは LLM\
  \ が担うが、各 trigger_map エントリの参照先段（`<YAML ファイル>#<段名>` 形式）の実 actor は **当該段定義（`stages/<YAML>.yaml`\
  \ の `stages` 配列のうち該当段の `actor` フィールド）から動的に解決** する。段定義の `actor` フィールドが単一正本で、trigger_map\
  \ 側には actor を二重記述しない（Req 1 受入 5 の「YAML 1 箇所修正で完結」の趣旨と整合）。動的解決の挙動：\n\n- 参照先段の actor\
  \ が `llm`：第3過程の進行ロジックが当該段の完了判定を実施\n- 参照先段の actor が `human`：作業を停止し、`stages/in-progress/`\
  \ ファイルに「人間承認待ち」を記録して待機（Req 5 受入 3〜4）\nこれにより Req 5 受入 3〜4 の機械強制が段定義 `actor` フィールドという単一正本に基づき動作する。\n\
  \n連鎖再実施対象は「根本原因フェーズの整合ゲート」から「起点フェーズの整合ゲート」まで、上流から下流へ順に並べる。起点フェーズまで再実施することで、上流変更が下流に正しく伝播したかを機械判定できる（計画書\
  \ §5.6 連鎖再実施の対象範囲）。\n\n### 3. actor=human 段での自動停止（Req 5 受入 3〜4）\n\nLLM が trigger_map\
  \ に沿って連鎖を進めるとき、`actor=human` の段（`intent.yaml#approval`、`feature-partitioning.yaml#approval`、`requirements.yaml#approval`\
  \ 等）に到達した時点で **作業を停止し、`stages/in-progress/` ファイルに「人間承認待ち」を記録して待機する**。\n\n人間承認なしに次の段への進行を許さない（fail-closed、Req\
  \ 5 受入 4）。これは「LLM が intent を勝手に書き換えて承認なしで進む」リスクを構造的に止めるため。\n\n待機中の `stages/in-progress/reopen-procedure-<日付>.yaml`\
  \ の例：\n\n```yaml\nprocess_id: reopen-procedure\nstarted_at: 2026-05-25T14:00:00+09:00\n\
  trigger: D-1（設計段で要件段の不整合発見）\nclassification_basis: docs/reviews/reopen-classification-2026-05-25.md\n\
  completed_steps: [第1過程：判定とフラグ差し戻し, 第2過程：正本修正]\nnext_step: 第3過程：連鎖再実施\npending_gates:\n\
  \  - stages/requirements.yaml#alignment   # actor=llm、機械判定で進行\n  - stages/requirements.yaml#approval\
  \    # actor=human、ここで停止\n  - stages/design.yaml#alignment\n  - stages/design.yaml#approval\n\
  current_blocker: stages/requirements.yaml#approval（人間承認待ち）\n```\n\n### 4. 種別判定の根拠保存（Req\
  \ 5 受入 5）\n\nreopen の第1過程で、種別判定の根拠を `docs/reviews/reopen-classification-<日付>.md`\
  \ として保存する。第3過程はこの判定ファイルを読み込んで `trigger_map` から連鎖再実施対象を決定する。\n\n種別判定根拠ファイルの最低限の構造：\n\
  \n```markdown\n---\ndate: 2026-05-25\nclassifier: claude_code_main_session\nclassification:\
  \ D-1\ntrigger_source: design/triad-review で発見した要件段の不整合\n---\n\n## 分類根拠\n- 発見段：design.triad-review\n\
  - 影響範囲：要件段の Requirement X の語彙が design.md と矛盾\n- 上流戻り：requirements 段への修正が必須\n- 連鎖：requirements\
  \ の修正後、design の再整合を要する → D-1\n```\n\n判定が後で誤りと分かった場合、reopen 自体をやり直す（`stages/in-progress/`\
  \ ファイルを新しいものに置き換え、旧ファイルは削除せず証跡として保全）。\n\n### 5. 再オープン手続きの 4 過程構成\n\n本機能が管理する再オープン手続きの全体構成を、現在の\
  \ 5 段ワークフロー（drafting → triad-review → review-wave → alignment → approval）に合わせて 4\
  \ つの過程で定義する。運用時の入口は `docs/operations/REOPEN_PROCEDURE.md` とし、本節は workflow-management\
  \ 側の状態管理・機械判定契約を定める。各過程は「停止せず連続実行できる作業の単位」とし、人の承認点または commit 停止点で締める。\n\n| 過程 |\
  \ 作業 | 停止点 |\n|---|---|---|\n| 1：判定とフラグ差し戻し | 種別判定 → trigger_map で再実施対象決定 → 根拠記録\
  \ → 進行中ファイル発行 → spec.json のフラグ差し戻し（reopened／recheck、上流・下流の対象段を false に） | フラグ差し戻しを人が承認（コミットなし）\
  \ |\n| 2：正本修正 | 上流フェーズの正本を修正 | コミット（第1過程＋第2過程をまとめて） |\n| 3：連鎖再実施 | 依存順に上流→下流で再実施対象\
  \ gate を処理する。正本本文を実質修正した phase は triad-review → review-wave → alignment → approval\
  \ の順に再実施し、正本本文を修正していない phase は trigger_map の pending gate に従って再確認する。各 gate の完了判定は\
  \ `downstream_impact_decisions` に記録する | actor=human の approval、または人間判断が必要な blocker。全完了後にコミット\
  \ |\n| 4：完了 | 整合性の最終確認 → recheck クリア → 進行中ファイルを completed へ | コミット |\n\nspec.json\
  \ の `reopened`／`recheck` の更新は、`docs/operations/REOPEN_PROCEDURE.md` と commit 前検査の\
  \ reopen 契約に従う。`reopened` は 6 フェーズ（intent／feature-partitioning／requirements／design／tasks／implementation）を対象とする。\n\
  \n第3過程の進行中状態では、`pending_gates` は「これから処理する残 gate」として扱う。完了した gate は `pending_gates`\
  \ から外し、`completed_gates` と `downstream_impact_decisions` に記録する。監査用に全体集合を固定したい場合は\
  \ `required_gates` を併記できる。reopen 完了時の機械検査は `pending_gates`、`completed_gates`、`required_gates`\
  \ の和集合を対象に、各 gate が `downstream_impact_decisions` で覆われていることを確認する。\n\n**`reopen-procedure.yaml`\
  \ への反映**：本 4 過程構成を `stages/reopen-procedure.yaml` の段集合として静的列挙する（tasks 段 T-003／T-007\
  \ の実装対象）。trigger_map（§2）は本構成の第3過程（連鎖再実施）で参照される。\n\n本節により、tasks.md T-003／T-007 が参照する再オープン手続きの段集合を\
  \ design.md に明示する。\n\n### 6. 後追い intent の下流再展開モデル（Req 9）\n\n既存システムに requirements／design／tasks／implementation\
  \ が存在する状態で intent が後から追加または修正された場合、本機能は通常の新規開発とは別に、既存成果物へ意図を取り込むための reopen 手続きを管理する。\n\
  \n最初に feature の受け皿を判定する。判定では intent 文面の所属表現よりも、実装上の所有、既存 requirements／design／tasks\
  \ の責務、該当コードの配置、`conformance-evaluation` が出す証拠付き候補を重視する。\n\n| 判定 | 意味 | 次の処理 |\n\
  |---|---|---|\n| `reopen_existing_feature` | 既存 feature が受け皿になる | 該当 feature を reopen\
  \ し、requirements 以降の下流段を再展開する |\n| `new_feature_required` | 既存 feature では受け止められない\
  \ | feature-partitioning の候補提案に戻り、新規 feature 作成を判断する |\n| `human_decision_required`\
  \ | 機械的に決められない | `current_blocker` に人間判断待ちを記録して停止する |\n\n既存 requirements に似た記述があることは、処理終了の根拠にしない。受け皿がある場合は、その\
  \ feature の requirements／design／tasks／implementation を上流から順に確認し、各段で「既存十分」「仕様追記が必要」「設計衝突候補」「下流影響候補」「実装変更候補」を記録する。受け皿がない場合は、既存文書を無理に解釈せず、新規\
  \ feature 分割に戻す。\n\n第3過程では、`pending_gates` は review／review-wave／alignment／approval\
  \ などの正式 gate を表す。`pending_gates` の先頭が `stages/<phase>.yaml#triad-review` であっても、当該\
  \ phase の正本本文をまだ起草していない場合、`next` は triad-review ではなく `run_reopen_drafting` を返す。起草完了は\
  \ `drafting_completed_gates` または `completed_gates` の `stages/<phase>.yaml#drafting`\
  \ で判定する。これにより、レビューを先に実施してから本文を直す逸脱を防ぐ。\n\n第2過程の正本修正後に `commit_stop_point: true`\
  \ が立っている場合、`pending_gates` は将来予定として残っていても active gate ではない。`next` は `required_action=commit_stop_point`\
  \ を返し、`next_pending_gate`、`phase`、`stage`、`active_gate` を null にする。commit stop point\
  \ を処理して構造化 ledger と step transition が完了した後だけ、第3過程の drafting / gate selector が動作する。\n\
  \n`conformance-evaluation` から受け取る候補は、少なくとも次の項目を持つ評価記録として扱う。\n\n| フィールド | 内容 |\n\
  |---|---|\n| `feature` | 候補が関係する feature |\n| `phase` | 候補が関係する phase（requirements／design／tasks／implementation）\
  \ |\n| `classification` | `existing_sufficient`／`spec_update_candidate`／`design_conflict_candidate`／`downstream_impact_candidate`／`implementation_change_candidate`\
  \ |\n| `code_refs` | 判断根拠となるコード参照 |\n| `existing_spec_refs` | 既存仕様側の参照 |\n| `reasoning_summary`\
  \ | 候補抽出理由の短い説明 |\n| `needs_human_decision` | 人間判断が必要か |\n\n本機能はこれらの候補を生成しない。候補の生成とコード由来の証拠抽出は\
  \ `conformance-evaluation` が担い、本機能は候補を reopen 手続きの入力として検証・記録・順序化する。\n\n下流判断は `downstream_impact_decisions`\
  \ に記録する。各判断は `gate`、`feature_scope`、`decision`、`rationale`、`evidence`、`decision_actor`、`decision_source`\
  \ を持つ。`decision` には既存語彙である `affected_update_required`、`existing_sufficient`、`no_impact`、`approved`、`proxy_approved`\
  \ を使い、未定義語彙をその場で増やさない。衝突候補や人間判断候補がある場合は `current_blocker` を設定し、利用者承認または判断材料提示で停止する。\n\
  \ndogfooding 中に workflow 手続き自体の欠陥が見つかった場合は、通常の reopen 候補として処理しない。`process_id: maintenance`\
  \ の side track 進行中ファイルを作り、`mainline_blocked_by`、`allowed_scope`、`allowed_files`、`completion_conditions`\
  \ を明示してから修復する。side track の開始と終了は利用者に明示し、終了後に本線の reopen 状態へ戻る。\n\n## session 跨ぎ状態管理モデル（Session-Spanning\
  \ State Model）— Req 6\n\n### 1. 進行中状態ファイルの構造（Req 6 受入 1〜2）\n\n現在進行中の手続きは `stages/in-progress/<process_id>-<日付>.yaml`\
  \ で表す。ファイル名は「手続き ID」と「開始日付」で一意化する。\n\n最低限のフィールド（Req 6 受入 2）：\n\n| フィールド | 内容 |\n\
  |---|---|\n| `process_id` | 手続きの識別子（`reopen-procedure`／`requirements-review-wave`\
  \ 等） |\n| `started_at` | 開始時刻（ISO 8601） |\n| `trigger` | 開始の契機（人間可読の短い説明） |\n| `completed_steps`\
  \ | 完了済みステップの番号リスト |\n| `next_step` | 次に実施すべきステップの番号 |\n| `pending_gates` | 残ゲートのリスト（`stages/<ファイル>#<段名>`\
  \ 形式） |\n| `completed_gates` | 完了済みの正式 gate |\n| `drafting_completed_gates` | 本文起草が完了した\
  \ drafting 段。review gate より前の起草漏れ防止に使う |\n| `active_reopen_scope` | 現在 reopen 中の正本変更対象。feature、phase\
  \ 範囲、開始 gate、終了条件を持つ |\n| `active_impact_review_scope` | 正本変更対象ではないが影響確認が必要な feature\
  \ / phase 範囲。flag を false に戻さない確認対象 |\n| `downstream_impact_decisions` | 下流影響判断の記録。gate、feature_scope、decision、rationale、evidence、decision_actor、decision_source\
  \ を持つ |\n| `current_blocker` | 人間判断や承認待ちで停止している位置 |\n\n任意の追加フィールド：`classification_basis`（reopen\
  \ の場合、種別判定根拠ファイルへのリンク）、`escalation_status`（通知済みか否か）など。\n\n`active_reopen_scope`\
  \ と `active_impact_review_scope` は active scope の正本である。`spec.json.reopened` は過去に\
  \ reopen した履歴フラグであり、active scope の正本ではない。`next --json` は reopen 中に `stages/in-progress/reopen-procedure-*.yaml`\
  \ を読み、これら 2 フィールドから `next_action.reopen_scope` と `next_action.impact_review_scope`\
  \ を生成する。両フィールドが欠落している、`pending_gates` / `completed_gates` / `downstream_impact_decisions`\
  \ と矛盾する、または `spec.json` の false 化対象と整合しない場合、`next --json` は通常進行を返さず `repair_workflow_state`\
  \ または `DEVIATION` を返す。\n\nreopen 開始時は、種別判定と trigger_map 解決後に `active_reopen_scope`\
  \ と `active_impact_review_scope` を初期化する。連鎖再実施中は gate 完了ごとに `pending_gates`、`completed_gates`、`downstream_impact_decisions`\
  \ を更新するが、scope 自体は利用者判断または repair workflow なしに拡張・縮小しない。reopen 完了時は、`pending_gates`\
  \ が空で、`required_gates` がある場合は全件が `completed_gates` または `downstream_impact_decisions`\
  \ で覆われ、active scope 全体の downstream impact が記録済みであることを確認してから、in-progress record を\
  \ completed へ移す。この移動により active scope は閉じる。\n\n通常の `next_action` と異なる side track、または\
  \ `next` 判定自体の欠陥修復に着手する場合は、`process_id: maintenance` の進行中ファイルを先に作成する。maintenance\
  \ 進行中ファイルは、少なくとも `trigger`、`mainline_blocked_by`、`allowed_scope`、`allowed_files`、`completion_conditions`\
  \ を持ち、本筋が何によって一時停止しているか、どの範囲だけを修復してよいか、どの条件で本筋へ戻れるかを明示する。\n\n### 2. session 開始時の標準フロー（Req\
  \ 6 受入 3）\n\nsession 開始時、次を順に行う：\n\n1. `TODO_NEXT_SESSION.md` を読み、全体の到達点を把握\n2.\
  \ 直近の `docs/sessions/session-*.md` を読み、TODO に圧縮された経緯の詳細を確認\n3. `git log --oneline\
  \ -10` ／ `git status` で直近の到達点と未コミット変更を確認\n4. 検査スクリプトを `stages/*.yaml` 全件に走らせる（フェーズ\
  \ 1 段階では人手で `check-workflow-action.py` を呼ぶ）\n5. `stages/in-progress/` の有無を確認\n6.\
  \ 進行中手続きがあれば、それを優先的に完了させる（無視して新規作業を始めない）\n7. 完了済み・未着手の状態に基づき、次の作業を決定\n\n本フローは運営ガイド\
  \ `docs/operations/SESSION_WORKFLOW_GUIDE.md` §1 必読フローと一体運用する。\n\n### 3. セッション記録の保存（Req\
  \ 6 受入 6）\n\n原則として毎 session、特に重要な判断・承認・レビュー結果・修正経緯が発生した session は、セッション終了時または重要判断後に\
  \ `docs/sessions/session-<N>-<YYYY-MM-DD>.md` へ要約記録を残す。記録は会話全文の逐語ログではなく、後で判断経緯を再構成できる運用記録とする。`<N>`\
  \ は `docs/sessions/` に存在する既存の最大セッション番号に 1 を加えた番号とし、同じ番号を再利用しない。1 session につき 1 ファイルとし、同一\
  \ session 内の重要判断は同じファイルへ追記する。並行 session や未コミット作業により採番が衝突した場合、メインセッション LLM は既存記録・git\
  \ 状態・未コミット差分を確認し、利用者が採番を確定するまで正式な新規セッション記録を作成しない。採番確定前に記録が必要な場合は、`docs/sessions/drafts/session-<YYYY-MM-DD>-<short-topic>.md`\
  \ に一時草案を置き、正式番号確定後に `docs/sessions/session-<N>-<YYYY-MM-DD>.md` へ移動する。移動後は draft\
  \ ファイルを残さず、正式ファイルに草案内容が統合済みであることを確認する。\n\nメインセッション LLM はセッション記録の草案作成責任を持つ。利用者判断の引用・承認範囲・未確定事項に曖昧さがある場合は、記録前に利用者へ確認する。コンテキスト切れや中断により当該\
  \ LLM が記録できない場合、次 session が草案を引き継ぐ。草案がない場合は、TODO、review-run、approval record、git\
  \ diff から経緯を再構成して記録する。\n\n`TODO_NEXT_SESSION.md` は次セッション開始時の入口メモであり、詳細経緯の正本ではない。詳細経緯は\
  \ `docs/sessions/`、API レビューの raw/parsed/triage は各 review-run ディレクトリ、承認記録は approval\
  \ record に分けて保持する。\n\n### 4. 完了時の移動（Req 6 受入 4）\n\n手続きが完了したら、`stages/in-progress/<process_id>-<日付>.yaml`\
  \ を `stages/completed/` に移動するか削除する。移動を採用する利点は「過去の手続きの記録が残り、事後監査に使える」こと、削除を採用する利点は「ディレクトリが肥大化しない」こと。本フェーズでは移動を既定とし、定期的に古いものを\
  \ `docs/archive/in-progress/` 配下に退避する運用とする。\n\n### 5. 進行中状態と不可逆操作の関係（Req 6 受入 5）\n\
  \n`stages/in-progress/` に何かファイルがある状態での不可逆操作実行を遮断する（fail-closed、Req 4 と整合）。これは「進行中の手続きを放置して別の不可逆操作を始める」失敗モードを防ぐため。\n\
  \n例外：進行中状態ファイル自体の更新（次ステップ進行、人間承認の記録）は遮断対象外。これらは進行中の手続きを進めるための更新であり、別の不可逆操作とは区別する。\n\
  \n## 多層防御の位置付けモデル（Multi-Layered Defense Positioning Model）— Req 7\n\n### 1. 第 1\
  \ 層の限界の明文化（Req 7 受入 1）\n\n本機能（軽量版 YAML 検査機構）は多層防御の **第 1 層** に位置付ける。第 1 層が解決しない失敗モードを次のように明文化する：\n\
  \n| 失敗モード | 発生原因 | 補完する層 |\n|---|---|---|\n| 中身の空疎 | 必須節は存在するが内容が「特に問題なし」のみ | 第\
  \ 3 層（フェーズ境目の利用者監査）、第 4 層（定期事後監査） |\n| 検査スクリプト呼び出し依存 | LLM が検査を呼ばない、結果を読まない | 第\
  \ 2 層（git フック）、補助層 C 段階 3（Claude Code フック） |\n| in-progress ファイルの自己申告性 | 「進行中」「次ステップ」を書くのは\
  \ LLM 自身、嘘・古い・欠落の余地 | 第 3 層、第 4 層 |\n| 文脈圧力下での規律低下 | 規律ファイルを増やすほど LLM が優先度を下げる |\
  \ 第 5 層（処理表面積の抑制方針）、補助層 C |\n\nこれらは多層防御の他層で補完し、第 1 層単独で 100% の遵守を達成しようとしない。\n\n\
  ### 2. 第 2〜5 層への参照（Req 7 受入 2、計画書 §5.8）\n\n第 2〜5 層はフェーズ 4 以降の宿題として参照する：\n\n- **第\
  \ 2 層：git フックによる外部強制**：検査スクリプトを `pre-commit`／`pre-push` フックに組み込み、LLM が「呼ばない」選択を構造的に不可能にする\n\
  - **第 3 層：フェーズ境目の利用者監査**：フェーズの境目で利用者が検査結果を必ず確認する手続きを必須化\n- **第 4 層：定期事後監査**：一定 session\
  \ 数または期間ごとに独立 LLM で過去証跡全件を監査\n- **第 5 層：処理表面積の抑制方針**：「新規規律を追加するときは既存規律 1 つ以上を統廃合する」等の縮減義務\n\
  \n本機能は第 2〜5 層の具体実装を持たないが、設計時に **将来導入する余地を残す** ことを明示する。例：段集合 YAML の `completion_predicate`\
  \ 述語集合は第 2 層の git フックから直接呼び出せる構造とする（CLI からもフックからも同じスクリプトを呼ぶ）。\n\n### 3. 補助層 A／B／C\
  \ の位置付け（計画書 §5.8、§5.12、§5.13）\n\n第 1 層と第 2 層の中間に補助層を 3 つ置く：\n\n- **補助層 A：人間代役機構（§5.12）**：軽い判断を外部モデルが代行、本人関与の頻度を下げる\n\
  - **補助層 B：人間への通知機構（§5.13）**：本人判断が必要な場面で外部チャネル（メール・LINE 等）に即時通知\n- **補助層 C：処理開始時のワークフロー事前検査（§5.8\
  \ 補助層 C、3 段階共存モデル）**：本機能の検査スクリプトがその実体\n\n補助層 C は本機能の検査スクリプトを段階 2 として持ち、段階 1（LLM\
  \ 規律）と段階 3（Claude Code フック）から呼ばれる。本機能は段階 2 の実装を所有し、段階 1 の規律化と段階 3 のフック実装は別経路で進める。\n\
  \n### 4. 第 5 層運用ルールの反映（Req 7 受入 3）\n\n第 5 層（処理表面積の抑制方針）の運用ルール「新規規律を追加するときは既存規律 1\
  \ つ以上を統廃合する」を本機能の運用ルールに反映する。フェーズ 4 までは利用者の意識に依拠（機械強制は第 5 層導入時に検討、Req 7 受入 3）。\n\n\
  本機能の段集合 YAML を変更する場合：\n\n- 段の追加：既存段の統廃合または明確な根拠を運用文書に記録\n- 段の改廃：影響を受ける機能（依存先・依存元）の確認と整合\n\
  - 述語の追加：既存述語との重複確認、検査スクリプトの拡張\n\nこれらは現時点では運用上の規律としてのみ存在し、機械検査の対象ではない。\n\n自律・並列実行を使う場合は、第\
  \ 1 層の補助的な安全契約として自律 plan と履歴 ledger を持つ。自律 plan は run ID、依存順、recheck 対象、許可パス、期待テスト、停止条件を宣言し、履歴\
  \ ledger は各作業単位の実行結果、統合判断、検証コマンド、未解決 blocker を追跡する。新しい依存、未記録依存、上流 recheck の下流反映が必要になった場合は、当該作業単位を進めず統合判断へ戻す。\n\
  \n### 5. 第 1 層の限界の運用文書への明示（Req 7 受入 4）\n\nワークフロー事前検査の限界を運用文書（`docs/operations/WORKFLOW_PRECHECK.md`）に明示し、人の期待値を整える。「本検査スクリプトは中身の妥当性を判定しない」「結論不能なら必ず遮断する」「必要に応じて\
  \ hook 連携や人の確認で補完する」の 3 点を最低限明示する。\n\n## 機能依存マップモデル（Feature Dependency Map Model）—\
  \ Req 8\n\n### 1. 一元保管先（Req 8 受入 1、計画書 §5.5 選択肢 X）\n\n機能間の処理順と依存関係を `feature-dependency.yaml`\
  \ に一元化する。各フェーズの YAML はこのファイルを参照し、重複させない。開発リポジトリでは `stages/feature-dependency.yaml`\
  \ に置き、対象アプリでは feature-partitioning の承認結果を `.reviewcompass/feature-dependency.yaml`\
  \ として実体化する（テンプレートは `templates/specs/feature-dependency.yaml.template` として配布。設計記録\
  \ 2026-06-10 §3.5 由来、2026-06-12 反映）。\n\n### 2. ファイル構造（Req 8 受入 2）\n\n最低限のフィールド：\n\
  \n```yaml\nfeatures:\n  foundation:\n    depends_on: []\n  runtime:\n    depends_on:\
  \ [foundation]\n  evaluation:\n    depends_on: [foundation, runtime]\n  analysis:\n\
  \    depends_on: [foundation, evaluation]\n  workflow-management:\n    depends_on:\
  \ [foundation, runtime, evaluation, analysis]\n  self-improvement:\n    depends_on:\
  \ [foundation, workflow-management]\n  conformance-evaluation:\n    depends_on:\n\
  \      foundation: hard                  # 連想配列構造、依存種別あり\n      runtime: review\n\
  \      evaluation: review\n      workflow-management: review\n\nfeature_order:\n\
  \  - foundation\n  - runtime\n  - evaluation\n  - analysis\n  - workflow-management\n\
  \  - self-improvement\n  - conformance-evaluation\n```\n\n機能順のキー名は `feature_order`\
  \ とする（旧称 `phase_order`。語彙調停 案 A、MLE-DEC-001、2026-06-12 利用者決定。過去記録・計画書・分割提案書の `phase_order`\
  \ 表記は書き換えず、requirements.md Requirement 8 受入 2 の由来注記で読み解く）。\n\n**機能順 7 機能採用の根拠（A-001\
  \ 対処、2026-05-25 セッション 26 利用者明示承認）**：計画書 §5.5 の `phase_order` 構造例（行 376〜383）には self-improvement\
  \ が記載漏れで 6 機能のみ列挙されている。本設計は次の確定事項に基づき機能順に self-improvement を含めて **7 機能** を採用する：\n\
  \n- 計画書 §3.1（self-improvement の workflow 層改善を第 1 期に含める確定）\n- 計画書 §5.16（self-improvement\
  \ の全面書き直し方針）\n- A-007 案 2（2026-05-23 利用者承認による本機能と self-improvement の権限分散調停、規律ファイルの提案権と実体変更権の分離）\n\
  - 全 7 機能の requirements 段 approval 完了（2026-05-24 セッション 23 末）\n\n計画書 §5.5 の構造例の補正は計画書全体管理の責務範囲で、本機能の責務範囲外。本セッション末尾の\
  \ TODO_NEXT_SESSION.md に「計画書 §5.5 phase_order の self-improvement 追記」を補正課題として記録する。\n\
  \n`depends_on` は次の 2 形式を許容する（Req 8 受入 2 後段）：\n\n- **単純リスト構造**：`[foundation, runtime]`\
  \ のように依存先を列挙するだけ\n- **連想配列構造**：`foundation: hard, runtime: review` のように依存種別（`hard`／`review`）を併記。`conformance-evaluation`\
  \ のように依存性の強度を区別する機能で使う\n\n依存種別の語彙：\n\n- `hard`：その機能の仕様が変わると本機能の仕様も影響を受ける（必須整合）\n\
  - `review`：その機能の出力を本機能がレビュー対象とする（参照関係）\n\n### 3. 各フェーズ YAML からの参照（Req 8 受入 3）\n\n\
  各フェーズの YAML（`requirements.yaml`／`design.yaml`／`tasks.yaml`／`implementation.yaml`）の草案段とレビュー波段は\
  \ `feature_order: feature-dependency.yaml#feature_order` の参照を持つ。検査スクリプトはこの参照を解決して機能名を順に展開する。\n\
  \n### 4. 変更の一元化（Req 8 受入 4）\n\n機能の追加・削除や依存関係の変更は本ファイル 1 箇所の修正で完結する。各フェーズの YAML を個別に修正する必要はない。これにより、新機能追加時の整合漏れを構造的に防ぐ。\n\
  \n### 5. 所有者の明示（Req 8 受入 5）\n\n機能間依存マップの所有者は本機能（`workflow-management`）であり、`runtime`／`evaluation`\
  \ 等の他機能は再定義せず参照のみとする。他機能の design.md／tasks.md で「依存関係を独自に定義する」記述があれば、本機能の `feature-dependency.yaml`\
  \ を正本として参照する形に統一する。\n\n### 6. パース仕様と依存種別の機械処理上の意味（A-004 対処、2026-05-25 セッション 26 利用者明示承認）\n\
  \n検査スクリプトが `feature-dependency.yaml` を解析する際の規則と、依存種別（`hard` ／ `review`）の機械処理上の意味を次のとおり確定する。\n\
  \n**パース仕様**：\n\n- `depends_on` の値が YAML パーサで配列（`list`）として解釈できる場合は **単純リスト構造**（例：`[foundation,\
  \ runtime]`）と判定する\n- `depends_on` の値が YAML パーサで辞書（`dict` ／ `mapping`）として解釈できる場合は\
  \ **連想配列構造**（例：`foundation: hard, runtime: review`）と判定する\n- 上記以外の型（文字列、整数、null、ネスト構造等）は結論不能とし、検査スクリプトは\
  \ DEVIATION（exit 2）を返す（fail-closed、Req 2 受入 4 と整合）\n\n**連想配列構造の値域**：\n\n- 値は `hard`\
  \ または `review` の 2 値のみ許容する\n- それ以外の値（例：`weak`、`strong`、空文字、null）は結論不能とし、DEVIATION\
  \ を返す\n- 将来の依存種別追加（例：`weak`）は、本設計の本節と検査スクリプト実装の両方を同時に更新する\n\n**依存種別の機械処理上の意味**：\n\
  \n- **`hard`（強依存）**：当該依存先の仕様が変更された場合、本機能の `spec.json` の `recheck.upstream_change_pending`\
  \ を `true` に設定し、`recheck.impacted_downstream_phases` に本機能の下流フェーズ（design／tasks／implementation）を追記する。これにより本機能の下流フェーズの再検査が要求される（reopen\
  \ 手続きの軽量版として動作）\n- **`review`（レビュー対象）**：当該依存先は本機能のレビュー対象として参照されるのみで、依存先の変更は本機能の\
  \ `recheck` を自動発火しない。レビュー記録の作成時に依存先の最新状態を読むが、依存先の変更が本機能の再検査を必須化しない\n\n**判定述語との関係**：`depends_on_resolves_correctly`\
  \ 述語は値域チェックのみを担い、依存先の変更検知と `recheck` の更新発火は別の機構（tasks 段で実装、本設計時点ではフェーズ 2 以降の宿題）が担う。本設計では「述語が値域を判定できる」「機械処理上の意味が確定している」までを設計範囲とし、変更検知ロジックの実装は先送り論点として\
  \ §先送り論点に追加する。\n\n### 7. feature 一覧の解決と立ち上げ案内（Req 8 受入 6〜8、2026-06-12 反映）\n\n検査スクリプトの\
  \ `next` サブコマンドは、feature 一覧と機能順をソース直書き定数ではなく\n`feature-dependency.yaml` の `feature_order`\
  \ キーから解決する（`resolve_feature_order`）。\nソース直書きの既定機能順は後方互換の既定値であり、`next` では解決結果で上書きされる。\n\
  \n- **探索順**：ツール実行時のカレントディレクトリを基準に、相対パス\n  `.reviewcompass/feature-dependency.yaml`\
  \ → `stages/feature-dependency.yaml` →\n  `feature-dependency.yaml` の順で確認し、最初に存在したファイル\
  \ 1 つだけを読む\n  （`FEATURE_DEPENDENCY_SEARCH_PATHS`、`tools/check-workflow-action.py`\
  \ 内の定数）。親ディレクトリへの遡上探索は行わない。\n  第一探索先の `.reviewcompass/` 配置は「ReviewCompass の物は `.reviewcompass/`\
  \ に閉じる」原則と\n  整合させるための対象アプリ向け規約で、開発リポジトリは既存の `stages/` 配置のまま互換とする。\n  直下の `feature-dependency.yaml`\
  \ は標準 2 配置に該当しない配置への後方互換の受け皿であり、\n  標準配置としては使わない（requirements Requirement 8 受入 6\
  \ と整合。2026-06-12 requirements\n  triad-review クラスタ A・F1 の精密化を design へ追従）。遡上探索を行わない根拠：親ディレクトリに\n\
  \  別の `feature-dependency.yaml` が存在すると、対象アプリ内の入れ子作業ディレクトリや一時ディレクトリ\n  からの実行で意図しないファイルを拾う恐れがあり、解決元の予測可能性（カレントディレクトリ基準の\n\
  \  3 パスだけを見れば解決元が確定する）を優先する。\n- **立ち上げ案内**：ファイル不在または `feature_order` 未定義の場合、エラーではなく\
  \ `next_action.kind: feature_definition_required`（verdict OK／exit 0）を返し、\n  intent／feature-partitioning\
  \ の実施と、承認された分割結果（依存の根拠と順序の導出を含む）の\n  記録先を案内する。`current_state.feature_dependency_source`\
  \ に解決元（不在時 null）を含める。\n  **判断 3（fail-closed 全面採用）との両立**：判断 3 は「不可逆操作を誤って許可することによる被害」を\n\
  \  防ぐ原則であり、本案内は spec.json 更新・commit・push 等のいかなる操作も許可せず、通常 workflow の\n  次タスク判定も返さない。つまり「作業を進ませない」という安全側の性質は保たれており、fail-closed\
  \ が\n  守る対象（不可逆操作の誤許可）に抵触しない。立ち上げ案内を DEVIATION にしないのは、対象アプリの\n  初期状態（feature 一覧が未定義であることが正常）で利用者を次の正規手順（intent／feature-partitioning）\n\
  \  へ誘導するためである。パース不能（ファイル破損）は未定義（初期状態）と区別して遮断するため\n  （次項「パース不能の遮断」）、破損が案内で覆い隠される弱点は解消済みである（MLE-DEC-005）。\n\
  - **パース不能の遮断**：探索で選ばれた（最初に存在した）1 ファイルが、YAML として読めない、\n  空（内容なし）、または最上位が連想配列でない場合、未定義と区別して\
  \ `next_action.kind: unknown`\n  （既存の判定種別。整合検査と同じ kind）を返し、破損ファイルのパスと内容確認を促す理由\n\
  \  （空の場合は `feature_order` の記録を促す理由）を `reasons` 配列に列挙して DEVIATION\n  （exit code 2、fail-closed）とする。これはファイルそのものの破損・構造異常の検査であり、\n\
  \  読み込み後の値の整合検査（次項）より先に判定する。破損を立ち上げ案内で覆い隠さない\n  （MLE-DEC-005、2026-06-12 利用者決定。当初\
  \ FUP-2026-06-12-001 として追跡したが同日の\n  利用者決定で遮断分離を実施。Req 8 受入 9 と整合）。\n- **整合検査**：`feature_order`\
  \ と `depends_on` の整合（依存される機能［依存先］を依存する機能\n  ［依存元］より先に置くこと、循環依存なし）を `validate_feature_order_consistency`\
  \ が検査し、\n  違反時は `next_action.kind: unknown` を返して違反内容を出力の `reasons` 配列に列挙し、\n  verdict\
  \ DEVIATION（exit code 2、fail-closed）とする。失敗の種類で挙動を分ける：\n  不在・未定義 → 案内（OK）、パース不能・整合違反\
  \ → 遮断（DEVIATION）。\n- **判定点の登録**：`feature_definition_required` は `WORKFLOW_DISCIPLINE_MAP.yaml`\
  \ の\n  `next_action_kind` 判定点として登録し、effective prompt の生成対象とする\n  （登録は 2026-06-12\
  \ の本変更セットで実施済み。書き込み後検証 3 系統を通過、\n  manifest post-write-2026-06-12-004）。\n\n実装：`tools/check-workflow-action.py`（コミット\
  \ cde1f5c、maintenance side track\n`stages/completed/maintenance-2026-06-11-feature-order-generalization.yaml`、TDD\
  \ テスト\n`tests/tools/test_check_workflow_action.py`）。本節は実装先行で確立した契約の設計追認である。\n\n\
  ## review-wave 要約コマンドモデル（Review-Wave Summary Command Model）— Req 10\n\nreopen R-0（2026-06-14、D-001）で新設。review-wave（機能横断段）の横断確認で使う指標を、手動集計ではなく機械生成する。Req\
  \ 1 の「段集合 YAML の静的列挙」と Req 2 の検査スクリプトを土台にした、機能内の静的検査である（実装は仕様確定後に TDD で行う正順）。\n\n\
  ### 1. 配置と原則（Req 10 受入 1・5）\n\n- サブコマンド `review-wave-summary` を `tools/check-workflow-action.py`\
  \ に追加する（`next`／`spec-set`／`commit` と同じ CLI 体系。Req 2 の検査スクリプトのサブコマンド）。\n- 読み取りに徹し、`spec.json`・フェーズ状態・トリアージを書き換えない（Req\
  \ 3 受入 5・Req 4 受入 1 と整合）。書き込みは自身の要約出力に限る。\n\n### 2. 読み取り元と指標の算出定義（Req 10 受入 1・2）\n\
  \n| 指標 | 読み取り元 | 算出定義 |\n| --- | --- | --- |\n| feature coverage | 各 feature の spec.json\
  \ `workflow_state` | feature ごとに、全 phase × 全 stage のうち true の比率、および「全 phase approval\
  \ 済みか」。`FEATURE_ORDER` の全 feature を対象。 |\n| phase／stage 状態 | 同上 | feature × phase\
  \ × stage の真偽をそのまま展開。 |\n| triage 未解決／draft／human_required 件数 | review-run の `triage.yaml`\
  \ 群（`.reviewcompass/evidence/review-runs/*/triage.yaml`、互換で旧 `.reviewcompass/specs/_cross_feature/reviews/*/triage.yaml`）\
  \ | unresolved／human_required は `items[]` の `decision_status` で集計、draft は run 単位（補足の判定規則を正とする）。\
  \ |\n| recheck 状態 | 各 feature の spec.json `recheck` | `upstream_change_pending`\
  \ と `impacted_downstream_phases` をそのまま。 |\n| 依存状況 | `feature-dependency.yaml` の\
  \ `feature_order` と各 feature の依存記述 | `feature_order` を提示し、上流が未 approval の依存（未充足依存）を列挙。解決は\
  \ Req 8 受入 6 の探索順を再利用。 |\n| carry-forward 未消化件数 | carry-forward register（`learning/workflow/carry-forward-register/*.yaml`）\
  \ | `items[]` のうち `status` が `resolved` 以外の件数。 |\n\n補足（集計規則）：\n\n- **triage の重複排除**：重複排除は\
  \ `triage.yaml` ファイル（＝`run_id`）単位で行う。同一 `run_id` の `triage.yaml` が新旧両パスに見つかった場合は、新パス（`evidence/review-runs/`）を優先して\
  \ 1 ファイルだけ採用する（旧パスは互換読みのみ）。各 finding item は単一の run に属するため、item レベルでの状態競合（同一 item\
  \ が複数 run で異なる状態）は生じない。\n- **triage 件数の判定規則**（定義はここを正とする）：\n  - `unresolved`（item\
  \ 単位）＝全 run の `items[]` のうち `decision_status` が `decided` 以外の item 数（`review_triage`\
  \ の既存定義に一致）。\n  - `human_required`（item 単位）＝全 run の `items[]` のうち `decision_status:\
  \ human_required` の item 数。\n  - `draft`（**run 単位**）＝`triage.yaml` の `triage_status:\
  \ draft` である run の数。item 個別の draft は数えない。\n  - unresolved は human_required を内包しうる（重なりを許す内訳。合計は取らない）。draft\
  \ は run 単位のため item 単位の 2 つとは集計軸が異なる点を Markdown でも明示する。\n- **carry-forward 未消化**：register\
  \ の各 item の `status` が `resolved` 以外（`in_progress`・`deferred`・未設定などを含む）を未消化として数える。\n\
  \n各指標の集計には既存関数（`load_all_feature_specs`、`feature_order` 解決、`collect_recheck_items`、`review_triage`\
  \ の集計）を再利用し、二重定義を避ける。\n\n### 3. 出力形式とスキーマ（Req 10 受入 3）\n\n- `--json` で JSON、既定は\
  \ Markdown。両者は同一情報源から生成し**情報同等**とする。\n- JSON の安定スキーマ（キー名・型を固定。追加は後方互換＝既存キーを変えない）：\n\
  \n```\n{\n  \"schema_version\": int,                  # 本設計の初版は 1\n  \"generated_at\"\
  : str|null,               # ISO8601。実行時刻は呼び出し側が渡す。省略時 null\n  \"status\": \"ok\"\
  \ | \"insufficient\",\n  \"features\": [                           # FEATURE_ORDER\
  \ 順\n    {\n      \"name\": str,\n      \"coverage\": {\"completed\": int, \"total\"\
  : int, \"all_approved\": bool},\n      \"phases\": {                         # phase\
  \ 名をキーとするオブジェクト\n        \"<phase>\": {\"<stage>\": bool, ...}  # 各 phase の stage→真偽\n\
  \      },\n      \"recheck\": {\"upstream_change_pending\": bool, \"impacted_downstream_phases\"\
  : [str]}\n    }\n  ],\n  \"triage\": {\"unresolved\": int, \"draft\": int, \"human_required\"\
  : int},\n  \"dependencies\": {\"feature_order\": [str], \"unmet\": [{\"feature\"\
  : str, \"depends_on\": str}]},\n  \"carry_forward\": {\"unresolved\": int},\n  \"\
  errors\": [str]                         # insufficient 時に対象と理由を列挙\n}\n```\n\n- `features[].phases`\
  \ は **phase 名をキーとするオブジェクト**（配列ではない）で、各値は stage 名→真偽（bool）のオブジェクト。stage キーの集合はその\
  \ phase が spec.json `workflow_state` に持つ stage 群をそのまま用いる（requirements／design／tasks／implementation\
  \ は drafting・triad-review・review-wave・alignment・approval、intent は drafting・review・approval、feature-partitioning\
  \ は candidate-proposal・approval）。bool は当該 stage の完了真偽。spec.json に存在しない stage はキーに含めない。\n\
  - **`status` の判定基準**（必須記録と任意記録を区別）：\n  - **必須記録**＝全 feature の spec.json と feature-dependency.yaml。これらの欠落・解析不能は\
  \ `insufficient`。\n  - **任意記録**＝triage.yaml 群と carry-forward register。これらの**非在**（glob\
  \ ゼロ件・ディレクトリ/ファイル欠落＝レビュー未実施の初期状態）は当該件数を 0 として正常に扱い `ok` を妨げない（非在を欠落と同一視しない）。ただし**存在するが解析不能**な任意記録があれば\
  \ `insufficient`。\n  - 必須記録がすべて読め、存在する任意記録もすべて解析できたとき `ok`。\n- Markdown は同じ項目を見出し＋表で表し、JSON\
  \ と情報同等とする。\n\n### 4. fail-closed（Req 10 受入 4）\n\n- **不能とする入力範囲（design で一意化）**：(a)\
  \ **必須記録**（spec.json・feature-dependency.yaml）の欠落、(b) 読み取った記録（必須・任意いずれも）が YAML として解析不能（パース不能）、(c)\
  \ 最上位が連想配列でない等の構造異常。**任意記録**（triage.yaml 群・carry-forward register）の非在は不能に含めず 0 件として扱う（§3\
  \ の status 判定と一致）。これは Req 8 受入 9（パース不能の遮断）と同型で、Req 2 受入 4（結論不能は fail）に従う。\n- これらの場合、`status:\
  \ insufficient` とし、`errors[]` に対象パスと理由を列挙、**非ゼロ終了コード**を返す。**終了コード規約**は既存サブコマンド（`next`／`spec-set`／`commit`）と整合させ、`0`＝ok、`2`＝insufficient（fail-closed、DEVIATION\
  \ 相当）とする。`1` は本コマンドの集計判定では使わず、想定外の実行時例外（呼び出し誤り等）にのみ割り当てる。\n- Markdown では見出しに不完全である旨を明示し、完了と誤読させない。\n\
  - 部分的に読めた集計値があっても `status: ok` にしない（部分集計を完了扱いしない）。第 1 層の限界（Req 7・中身の妥当性は判定しない）と整合。\n\
  \n### 5. 保存（Req 10 受入 5）\n\n- 既定は標準出力（保存しない）。オプションで自身の要約出力のみ書き出す：\n  - `--out <path>`：指定パスへ書き出す（パスは呼び出し側が決める）。\n\
  \  - `--save`：既定の保存先 `.reviewcompass/specs/_cross_feature/reviews/` に既定命名で書き出す。命名は\
  \ `<generated_at の日付>-review-wave-summary.<md|json>`（`generated_at` 省略時は連番や日付の付与方法を\
  \ implementation で確定）。\n- 保存先 `.reviewcompass/specs/_cross_feature/reviews/` は承認済み\
  \ requirements 受入 5 で定めた現行の横断レビュー記録置き場であり、旧配置ではない（review-run 生成物の `evidence/review-runs/`\
  \ とは別系統の、人が読む横断記録の置き場）。\n- いずれも spec.json・triage・phase 状態を書き換えない。自身の要約出力の書き出しは状態変更に当たらない（Req\
  \ 3 受入 5・Req 4 受入 1 と整合）。\n\n### 6. implementation へ委譲する未確定事項\n\n§3 の JSON スキーマ（キー名・型・構造）は**本\
  \ design で固定する契約**であり、implementation は変更しない（将来の追加は後方互換でのみ）。implementation 段で確定するのは契約に属さない次の細部に限る：\n\
  \n- `--save` 既定命名の連番・タイムスタンプ付与方法（`generated_at` 省略時の扱い）と、保存先ファイル名が衝突した場合の振る舞い（上書きするか・エラーにするか）。呼び出し側が保存先の一意性を保証する前提とする。\n\
  - 既存関数の具体的な呼び出し・統合方法（`load_all_feature_specs` 等の再利用）。\n- Markdown の具体的な表レイアウト（情報同等を満たす範囲で）。\n\
  \n## Requirement 11 設計モデル：重要決定の出典検査（Req 11）\n\nRequirement 11 は requirements フェーズで「design\
  \ で確定」と明示した 6 つの事項（記録スキーマ・ロケータ表現・正規化規則・保留管理・内容なし語リスト・接続点）を本節で確定する。\n\n### 1. 重要決定の記録スキーマ（Req\
  \ 11 受入 1）\n\n**配置先**：`.reviewcompass/decisions/{decision_id}.yaml`（1 決定 = 1 ファイル）。\n\
  \n**フィールド定義**：\n\n```yaml\ndecision_id: string          # プロジェクト内一意。命名則: DEC-{機能略称}-{連番3桁}\
  \  例: DEC-WM-001\ncategory: string             # 重要種別: irreversible_operation |\
  \ discipline_change | spec_plan_change\nstatement: string            # 決定文言（1 文〜数文）\n\
  source:\n  excerpt: string            # 出典の逐語引用（会話転写から抜粋した原文）\n  session_id: string\
  \         # 転写ファイルのベース名（拡張子なし）例: 2026-06-15-claude-4e02c8a6\n                  \
  \           # ※ファイル特定の正本は locator のパス部分。session_id はインデックス・メタデータ用補助\n  locator:\
  \ string            # 形式: {転写ファイルパス}:{ターン番号}\n                             # 例:\
  \ .reviewcompass/evidence/sessions/2026-06-15-claude-4e02c8a6.md:42\n          \
  \                   # ターン番号: 転写内の ## セクションを先頭から 1 から数えた順序番号（人向け位置情報）\n         \
  \                    # ※逐語照合はロケータを使わず転写全文を照合対象とする（§3 参照）\n  multiplicity: string\
  \       # single（当該決定専用）| bundled（他の決定と出典共有）\nverification_status: string  # verified\
  \ | pending | unverifiable\nverified_at: string          # ISO 8601 タイムスタンプ（verified\
  \ 時のみ。pending/unverifiable は省略）\nbundle_exception_id: string  # optional。multiplicity:\
  \ bundled かつ例外承認済みの場合のみ\n                             # 命名則: BEX-{機能略称}-{連番3桁} \
  \ 例: BEX-WM-001\n```\n\n**型制約**：\n- `category`：3 値 enum のみ。種別判定基準（§1 末尾参照）。\n- `multiplicity:\
  \ bundled`：束ね検出が fail-closed する（Req 11 受入 2）。例外承認がある場合は `bundle_exception_id` フィールドを追加し、束ね例外承認手順（§2）を経て各決定の\
  \ `multiplicity` を `single` に更新することを確定の必要条件とする。\n- `verification_status`：\n  - `verified`：逐語照合合格済み。`verified_at`\
  \ が必須。\n  - `pending`：確定済み重要決定として扱わない。後続の確定・承認の根拠に用いない。\n  - `unverifiable`：逐語照合対象の転写ファイルが取得不能・解析不能、または必須フィールドが欠落しており機械が照合を完了できない状態。lint\
  \ が内部エラー検出時に判定結果として扱う（commit を DEVIATION で遮断）。記録者が初期値として設定するのは出典が原則取得不能（口頭合意等でセッションログが存在しない）なケースに限る。\n\
  \n**`category` 種別判定基準**（Req 11 受入 1 からの design 委任事項）：\n\n| 種別 | 対象例 | 除外例 |\n| ---\
  \ | --- | --- |\n| `irreversible_operation` | コミット・プッシュ・フェーズ移行・reopen 開始 | ファイル読み取り・検査スクリプト実行\
  \ |\n| `discipline_change` | docs/disciplines/ の規律ファイル変更・内容なし語リスト拡張 | 規律の参照・説明 |\n\
  | `spec_plan_change` | requirements.md / design.md / tasks.md の内容追加・変更、spec.json\
  \ の確定的変更 | stages/in-progress/ への作業ログ追記、spec.json の段フラグ（true/false）更新のみ、進行中ファイルの\
  \ next_step 記録 |\n\n**going-forward 適用**：本スキーマは新規重要決定にのみ適用し、過去の散文決定台帳は遡及移行しない（Req\
  \ 11 受入 1 確定済み）。\n\n### 2. 束ね例外の扱いと記録（Req 11 受入 2）\n\n機械は `multiplicity: bundled`\
  \ を検出して fail-closed（非ゼロ終了）する。例外が承認された場合のみ進行を許可する。例外の承認手順：\n\n1. 人の明示承認記録 `.reviewcompass/decisions/bundle-exceptions/{bundle_exception_id}.yaml`\
  \ を別途保存する。\n   承認レコードの最低限スキーマ：\n   ```yaml\n   bundle_exception_id: string   # 例:\
  \ BEX-WM-001\n   approved_by: string           # 承認者の識別子（人間のみ。proxy_model は束ね例外を承認できない）\n\
  \   approved_at: string           # ISO 8601 タイムスタンプ\n   covered_decision_ids: \
  \        # この例外が適用される decision_id のリスト\n     - string\n   rationale: string    \
  \         # 束ねが避けられない理由の説明\n   ```\n2. 各決定に個別の `source.excerpt`・`source.locator`・`bundle_exception_id`\
  \ フィールドを付与し、`multiplicity` を `single` に更新する（Req 11 受入 2「個別出典なしには確定させない」の機械強制）。\n\
  3. lint は（a）承認レコードが存在し、（b）当該 `decision_id` が `covered_decision_ids` に含まれ、（c）`multiplicity:\
  \ single` であること、の 3 条件をすべて満たす場合のみ通過とする。\n\n「個別出典なしには確定させない」という必要条件は design で緩めない。\n\
  \n### 3. 逐語照合・正規化規則・保留状態管理（Req 11 受入 3）\n\n**正規化規則**（照合の前処理として両辺に適用）：\n1. Unicode\
  \ NFC 正規化。\n2. 連続する空白・改行・タブを単一の半角スペースに置換。\n3. 先頭・末尾の空白を除去。\n\n**照合の対象範囲**：`source.locator`\
  \ のパス部分に対応する層 1 転写ファイル（`.reviewcompass/evidence/sessions/`）の全文字列を検索する。`source.locator`\
  \ のターン番号での絞り込みは行わず、全文を照合対象とする（ターン番号は人向けの位置情報であり、lint は使用しない）。\n\n**保留状態の管理と後追い確定の順序制御**：\n\
  \n| ステップ | 主体 | 内容 |\n| --- | --- | --- |\n| 1 | 記録者 | `verification_status: pending`\
  \ として記録する |\n| 2 | 作業継続 | 作業（コミット等）はブロックしない。確定済みとして扱わない |\n| 3 | SessionStart フック\
  \ | セッション転写を `.reviewcompass/evidence/sessions/` に取り込む |\n| 4 | 保守担当 | `check-workflow-action.py\
  \ decision-source-lint --verify-pending` を実行 |\n| 5 | lint | 逐語照合合格 → `verification_status:\
  \ verified` へ更新・`verified_at` に現在日時を記録（Req 11 受入 5 の読み取り専用例外として design で明示。書き換えられるフィールドは\
  \ `verification_status`・`verified_at` の 2 フィールドのみ） |\n| 5b | lint | 逐語照合**不合格**\
  \ → `verification_status` を変更しない（`pending` のまま）。差分表示と非ゼロ終了のみを行う |\n| 6 | — | タイムアウト昇格なし。照合合格のみが確定の唯一の経路\
  \ |\n\n### 4. 内容なし語リスト（Req 11 受入 4）\n\n**設定ファイル配置**：`stages/decision-source-lint-config.yaml`\n\
  \n**初期リスト**：\n\n```yaml\nempty_content_words:\n  - \"OK\"\n  - \"ok\"\n  - \"承認\"\
  \n  - \"了解\"\n  - \"はい\"\n  - \"Yes\"\n  - \"yes\"\n  - \"LGTM\"\n  - \"✓\"\n  -\
  \ \"◯\"\n  - \"○\"\n```\n\n**判定ロジック**：正規化後の `source.excerpt` に対して、以下の手順で判定する。\n\
  1. 句読点・記号（。、！？）を除去する。\n2. スペース区切りでトークン化する。\n3. 全トークンが `empty_content_words` リストに含まれる場合、内容なし（fail-closed、非ゼロ終了）。\n\
  （例：「承認！」→ 記号除去 →「承認」→ リスト一致 → fail-closed。「承認します」→「承認します」→ リスト不一致 → 通過）\n\n**リスト拡張**：規律変更扱い（Req\
  \ 11 受入 4 の規定どおり人の明示承認を要する）。設定ファイル自体の変更も同じ扱いとする。\n\n### 5. サブコマンドと接続点（Req 11 受入\
  \ 5・7）\n\n**サブコマンド名**：`decision-source-lint`（Req 2 サブコマンドとして提供する必須基線）。\n\n**呼び出し形式**：\n\
  \n```\ncheck-workflow-action.py decision-source-lint [--all | <decision_file>]\n\
  check-workflow-action.py decision-source-lint --verify-pending\n```\n\n- 引数なし or\
  \ `--all`：`.reviewcompass/decisions/` 直下の YAML ファイルのみを検査（`bundle-exceptions/` サブディレクトリは除外する。承認レコードは\
  \ decision スキーマと異なるためパース失敗→ unverifiable → commit 遮断の誤動作を防ぐ）。\n- `<decision_file>`：指定ファイルのみ検査。\n\
  - `--verify-pending`：`verification_status: pending` の決定を再照合し、合格すれば `verified` へ更新する。ファイルを書き換える唯一の合法的な経路。Req\
  \ 11 受入 5 の読み取り専用例外として design で明示的に確定する（書き換えるフィールドは `verification_status`・`verified_at`\
  \ の 2 フィールドに限定）。\n\n**commit 直前ゲートへの組み込み**（Req 11 受入 7 の「設計拡張」として本 design で確定）：\n\
  \n- **組み込む**。`commit` サブコマンドは `decision-source-lint --all` を呼び出す。\n- `verification_status:\
  \ pending` の決定：WARN（commit の進行を遮断しない。AC3 のデッドロック回避）。\n- `verification_status: unverifiable`（記録が解析不能・必須フィールド欠落）：DEVIATION（fail-closed、commit\
  \ を遮断）。\n- `multiplicity: bundled` かつ承認レコードなし：DEVIATION（fail-closed）。\n\n### 6.\
  \ implementation へ委譲する未確定事項\n\n本節の §1〜5 のスキーマ・規則・サブコマンド構成は **本 design で固定する契約**\
  \ であり、implementation は変更しない。implementation 段で確定するのは次の細部に限る：\n\n- `--verify-pending`\
  \ でファイルを更新する際の安全性保証（並行書き込みの防止・失敗時の不完全書き込み防止）。\n- `bundle_exception_id` の採番規則の実装細部（予約済みの命名則\
  \ `BEX-{機能略称}-{連番3桁}` を実装で確認）。\n- 逐語不一致時の差分表示形式（どこが一致しなかったかの人向け出力。情報を含む範囲で形式を選ぶ）。\n\
  - `decision-source-lint` の既存関数との統合方法（`load_all_feature_specs` 等の再利用可否）。\n\n## Requirement\
  \ 12 設計モデル：operation registry / preflight（Req 12）\n\nRequirement 12 は、作業開始前に「正本コマンド・入力・成果物・順序・衝突・停止条件」を同じ形式で確認するための\
  \ operation registry / preflight 層である。本節は registry と read-only preflight を先に確定し、operation\
  \ contract の物理正本と runner による実行代行は後段へ分離する。\n\n### 1. operation registry / preflight\
  \ binding schema（Req 12 受入 1）\n\n**配置先**：`stages/operation-registry.yaml`。workflow-management\
  \ が所有し、他 feature は参照のみ行う。`stages/operation-registry.yaml` は registry 固有メタデータと preflight\
  \ binding の正本であり、operation contract field または contract semantics の正本ではない。operation\
  \ contract の物理正本は Requirement 13 の `stages/operation-contracts.yaml` とする。\n\n各 operation\
  \ は最低限、次のフィールドを持つ。\n\n```yaml\noperation_id: string\nkind: irreversible | review_artifact\
  \ | workflow_state | evidence_capture | deployment_export\noperation_family: review_artifact\
  \ | workflow_cli | commit_approval_chain | session_record_capture | deployment_export\
  \ | nested_issue_control\ncanonical_invocation:\n  entrypoint: string\n  subcommand:\
  \ string\n  options: [string]\n  positional_args: [string]\n  execution_context:\
  \ repo_root | target_app_root | external_output\nworkflow_binding:\n  phase: intent\
  \ | feature-partitioning | requirements | design | tasks | implementation | null\n\
  \  stage: drafting | triad-review | review-wave | alignment | approval | null\n\
  \  gate: string | null\n  next_action_kind: string | null\nrequired_inputs: [string]\n\
  target_identity: [string]\nplanned_outputs: [string]  # contract 由来の参照・投影・binding\
  \ hint。出力 contract 正本ではない。\nsequence_mode: parallel_ok | serial_only\nworktree_policy:\
  \ string\npending_conflict_policy: string\nartifact_policy: string\nfamily_required_checks:\
  \ [string]\nvocabulary_refs: [string]\n```\n\n`workflow_binding` は workflow 段に属する\
  \ operation のみ必須とする。該当しない operation では `null` を許すが、`kind` と `artifact_policy` で適用範囲を説明する。\n\
  \nregistry schema は operation contract field を構造的に受け付けない。`stages/operation-registry.yaml`\
  \ の各 operation entry では、`effect_kind`、`approval_required`、`phase_boundary`、`preconditions`、`postconditions`、`side_effects`、`approval_aggregation`、`branching`、`max_effect_kind`、出力・副作用\
  \ contract field を禁止キーとする。これらの値は `operation_contract_ref`、`contract_digest`、`contract_schema_version`\
  \ から `stages/operation-contracts.yaml` の contract 正本を解決して読む。禁止キーが registry entry\
  \ に存在する場合は schema validation error とし、preflight の runtime integrity check 以前に `DEVIATION`\
  \ として扱う。\n\nregistry schema が許す contract 接続フィールドは、最低限 `operation_contract_ref`、`contract_digest`、`contract_schema_version`\
  \ に限定する。`planned_outputs`、`sequence_mode`、`required_inputs`、`target_identity` は\
  \ preflight binding hint として保持してよいが、contract 正本と矛盾した場合は registry 側を優先せず、contract\
  \ digest / schema_version drift または binding projection drift として fail-closed にする。\n\
  \n`operation_family` は operation ごとの policy 文字列だけに依存しないための型である。たとえば `review_artifact`\
  \ は target / manifest / bundle / criteria / document-type / approval record の対応検査、`commit_approval_chain`\
  \ は nonce / digest / expiry / consume / invalidated / target 検査、`deployment_export`\
  \ は planned outputs / overwrite policy / external root 検査を `family_required_checks`\
  \ として必ず持つ。`planned_outputs` は registry が operation contract から導出・参照・投影する binding\
  \ hint であり、出力 contract の二重正本にしてはならない。未知の `kind`、未知の `operation_family`、未登録の `sequence_mode`、存在しない\
  \ entrypoint、parser / parser adapter と一致しない option、family に必須の check 欠落は registry\
  \ 定義エラーである。\n\n### 2. preflight response schema（Req 12 受入 2〜3）\n\npreflight は read-only\
  \ であり、正本 artifact を作成・更新しない。出力は JSON を正本とし、Markdown は人向け表示に限る。\n\n```yaml\nschema_version:\
  \ string\noperation_id: string\nverdict: OK | WARN | DEVIATION\nallowed_verdicts:\
  \ [OK, WARN, DEVIATION]\nsequence_mode: parallel_ok | serial_only\nallowed_sequence_modes:\
  \ [parallel_ok, serial_only]\nstate_refs:\n  next_action:\n    kind: string\n  \
  \  current_mainline: string\n    required_action: string\n    phase: string\n  \
  \  stage: string\n    reopen_scope: [string]\n    impact_review_scope: [string]\n\
  \    direct_features: [string]  # 2026-06-26 MWP-0 廃止（required_feature_scope で代替、T-020\
  \ 実装完了）\n    indirect_features: [string]  # 2026-06-26 MWP-0 廃止（required_feature_scope\
  \ で代替、T-020 実装完了）\n    flag_policy: object\n    next_pending_gate: string | null\n\
  \    next_drafting_gate: string | null  # 2026-06-26 MWP-0 廃止（active_gate で代替、T-020\
  \ 実装完了・WORKFLOW_NAVIGATION.md 更新済み）\n    pending_gates: [string]\n    completed_gates:\
  \ [string]\n    superseded_gates: [string]\n    state_files: [string]\n    inconsistencies:\
  \ [object]\n  current_session_id: string | null\n  target_session_id: string | null\n\
  \  session_record_mode: formal | diagnostic | none | null\n  nested_issue_state:\n\
  \    parent_task_id: string | null\n    discovered_issue_id: string | null\n   \
  \ relation: blocker | follow-up | side-track | dependent_issue | null\n    allowed_files:\
  \ [string]\n    return_condition: string | null\n    nesting_depth: integer\n  workflow_state_files:\
  \ [string]\n  git_index: object | null\nrequired_inputs: [string]\nmissing_inputs:\
  \ [string]\ntemplate_available: boolean\ntarget_identity: [string]\nworktree_state:\
  \ object\npending_conflicts: [object]\nintegrity_conflicts: [object]\nchecks: [object]\n\
  planned_outputs: [string]\ncanonical_commands: [string]\nnext_step: string\n```\n\
  \nworkflow state に依存する operation は、`state_refs.next_action` に `next --json` から読んだ\
  \ active state dimensions を含める。少なくとも current mainline、`required_action`、phase、stage、`reopen_scope`、`impact_review_scope`、direct\
  \ / indirect features、flag policy、`next_pending_gate`、`next_drafting_gate`、`pending_gates`、`completed_gates`、superseded\
  \ gate の有無、参照 state files を含める。\n\n`planned_outputs` は preflight が registry と operation\
  \ contract を照合した結果として返す参照・投影・binding hint であり、preflight response が出力 contract を定義してはならない。\n\
  \n`allowed_verdicts` は、その operation contract が許す verdict 集合である。省略時や通常 operation\
  \ では `[OK, WARN, DEVIATION]` を使う。subset を許す場合は operation contract に理由を明示し、`verdict`\
  \ は必ず `allowed_verdicts` の要素でなければならない。`DEVIATION` は hard-stop であり、operation policy\
  \ や人向け表示の都合で `WARN` に下げてはならない。\n\npreflight は `review-run directory`、manifest、approval\
  \ record、session record、commit、deployment / export output を作らない。作成が必要な場合は、Phase\
  \ 2 runner operation として別 operation にする。\n\n### 3. verdict と fail-closed（Req 12\
  \ 受入 3、7〜9）\n\n`DEVIATION` は対象 operation の開始を拒否する。次の場合は少なくとも `DEVIATION` とする。\n\n\
  - 必須入力欠落\n- 正本 command / option / entrypoint が parser または parser adapter と不一致\n\
  - 上書き禁止 policy 違反\n- serial_only operation の順序外・並列実行\n- approval chain の nonce /\
  \ target digest / staged file set digest 不一致、期限切れ、消費済み、invalidated、対象外 record\n\
  - current-session formal record の作成要求\n- side-track / follow-up / blocker 記録なしの\
  \ scope drift\n- `next` active state dimensions と operation contract の workflow\
  \ binding が矛盾\n- `feature_impact_decisions`、`spec.json`、`pending_gates`、`drafting_completed_gates`、`downstream_impact_decisions`、`reopen_scope`、`impact_review_scope`\
  \ の間に矛盾がある\n- `allowed_verdicts` が不正、または `DEVIATION` 対象条件を `WARN` として返そうとしている\n\
  - registry の contract 参照欠落、contract digest / schema_version drift、contract authority\
  \ field の複製、未接続 `required_action` mapping\n\n`WARN` は advisory / read-only 条件で、かつ\
  \ operation contract が「開始は妨げないが注意表示が必要」と明示した場合に限る。上記の hard-stop 条件は `WARN` にできない。安全性または適用可否を確認できない場合、read-only\
  \ diagnostic 表示では `WARN` 以上を返してよいが、operation が安全に束縛済みまたは実行可能であるとは報告しない。runner-enabled\
  \ operation では同じ状態を `DEVIATION` とする。\n\n### 4. command validation（Req 12 受入 4）\n\
  \ncommand validation の正本は help 文字列ではなく、実 parser または parser adapter とする。adapter は、argparse\
  \ 等からサブコマンド、option、required option、位置引数を取り出し、operation registry の `canonical_invocation`\
  \ と照合する。\n\n`reopen-status`、`next --file`、誤った script path、短縮名、未登録 alias のような推測実行は、成果物作成前に\
  \ `DEVIATION` または確認不能 `WARN` として返す。\n\n### 5. worktree / pending / integrity conflict（Req\
  \ 12 受入 5）\n\npreflight は worktree conflict と integrity conflict を分けて返す。\n\n- worktree\
  \ conflict：post-write pending、reopen in-progress、maintenance in-progress、staged\
  \ / unstaged 混在、対象外差分同居、commit approval 後の staged 変更。\n- integrity conflict：worktree\
  \ が clean でも発生する承認 record、delegation record、manifest、bundle、target digest の欠落、stale、不一致、消費済み、対象外。\n\
  \n`pending_conflict_policy` と `artifact_policy` が明示されていない衝突は `OK` にしてはならない。\n\n\
  ### 6. review artifact preflight（Req 12 受入 6）\n\n初期・拡張可能な対象 operation id は次とする。\n\
  \n- `post_write_review`\n- `review_run_create`\n- `triage_decide`\n- `document_type_preflight`\n\
  - `review_criteria_preflight`\n- `post_write_manifest_coverage_preflight`\n- `approval_record_preflight`\n\
  - `bundle_preflight`\n\n検査対象は review target、manifest、bundle、criteria、document-type、approval\
  \ record、既存 review-run artifact の対象集合一致である。phase / artifact 種別に必要な一次情報が review target\
  \ に含まれること、差分 bundle が空でないこと、staged / unstaged のどちらを対象にすべきか、既存 artifact の上書き・stale・drift\
  \ がないことを作成前に確認する。\n\n### 7. commit approval chain と serial_only（Req 12 受入 7）\n\n\
  `prepare -> record -> delegate-execution -> guarded commit` は内部 chain として `serial_only`\
  \ として扱う。配布可能 UX では `guarded-git-commit.py --approval-nonce <nonce> --approval-source-text-line-stdin`\
  \ が `record -> delegate-execution -> guarded commit` を単一操作として順序実行する。preflight は各段階の成果物存在、nonce、target\
  \ digest、staged file set digest、staged content approval digest、expiry、consume 状態を返す。\n\
  \nこの設計は Requirement 4 の commit approval / execution delegation 契約を置き換えない。Requirement\
  \ 12 は操作開始前にそれらを参照して、順序外実行や古い承認を早期に止める。\n\n### 8. current-session formal record\
  \ guard（Req 12 受入 8）\n\nevidence capture 系 operation では、formal 2 層 session record\
  \ 出力が現セッションを対象にしていないことを作成前に確認する。preflight response は `session_record_mode`、`current_session_id`、`target_session_id`\
  \ を返す。`session_record_mode=formal` の場合、`current_session_id` と `target_session_id`\
  \ がどちらも既知であり、かつ一致しないことを必須条件にする。current session id を確認できない、target session id を確認できない、または両者が一致する場合は正式出力を\
  \ fail-closed にする。\n\ncommit guard による混入防止は最後の保険として維持し、preflight は生成前防止を担う。\n\n\
  ### 9. nested issue handling（Req 12 受入 9）\n\npreflight は、parent task、発見 issue、親作業との関係、分類（blocker\
  \ / follow-up / side-track / dependent issue）、allowed files、return condition、nesting\
  \ depth を確認する。\n\nこの情報は `state_refs.nested_issue_state` に返す。`relation`、`allowed_files`、`return_condition`\
  \ が欠けている状態で、元作業の対象、検証範囲、allowed files、review target、manifest target、return condition\
  \ が広がる場合は `DEVIATION` とする。意味的にどの分類が妥当かは人または review / proxy が判断する。\n\n### 10. deployment\
  \ / export preflight（Req 12 受入 10）\n\ndeployment smoke、deploy package build、runtime\
  \ bundle export など repo 外または出力ディレクトリへ成果物を書く operation は、作成予定ファイル一覧、出力先の既存成果物、上書き禁止\
  \ policy、外部 app root への書き込み、既存 bundle / smoke-run / app file との衝突を作成前に返す。\n\ndeployment\
  \ / export は read-only preflight の対象であり、実際の出力作成は Phase 2 runner operation として分離する。\n\
  \n### 11. reopen scope / impact review scope と next state uniqueness（Req 12 受入 11・13）\n\
  \n`next --json` は Requirement 2 が所有する。Requirement 12 は、その出力を operation preflight\
  \ が一意に参照できるよう拡張する。\n\n`reopen_in_progress` の `next_action` は次を含める。\n\n- current\
  \ mainline\n- `required_action`\n- `active_gate`\n- `blocked_by`\n- phase / stage\n\
  - `reopen_scope`\n- `impact_review_scope`\n- direct / indirect features\n- flag\
  \ policy\n- `next_pending_gate`\n- `next_drafting_gate`（2026-06-26 MWP-0 廃止。`active_gate`\
  \ で代替。手引き改修は T-020 実装時に完了（WORKFLOW_NAVIGATION.md 更新済み））\n- `pending_gates`\n- `completed_gates`\n\
  - superseded gate の有無\n- 参照した state files\n\n`reopen_scope` は正本を再オープンして flag を false\
  \ に戻す feature、`impact_review_scope` は正本変更要否だけを確認し flag を維持する feature である。active\
  \ scope の正本は `stages/in-progress/reopen-procedure-*.yaml` の `active_reopen_scope`\
  \ と `active_impact_review_scope` であり、`next --json` はこれらを `next_action.reopen_scope`\
  \ と `next_action.impact_review_scope` へ写す。これらは `feature_impact_decisions`、`spec.json`、`pending_gates`、`drafting_completed_gates`、`downstream_impact_decisions`\
  \ と整合しなければならない。整合しない場合、`next` は通常進行を許す `OK` として扱わず、`WARN` または `DEVIATION` と理由を返す。\n\
  \nRequirement 12 は `next --json` の別正本を持たない。operation preflight は `state_refs.next_action`\
  \ に Requirement 2 の selector 結果を写し、operation 開始前の照合に使う。preflight 側が pending gate\
  \ や maintenance action を独自に選んではならない。\n\n### 12. LLM / provider / model 非依存（Req 12\
  \ 受入 12）\n\npreflight の合否判定は repository 状態、git index、workflow state、registry 定義、parser\
  \ / parser adapter、既存成果物、明示入力に限定する。LLM、provider、model 名は合否条件に含めない。LLM ごとの差異は説明文や\
  \ prompt 表現に限定する。\n\n### 13. Phase 1 / Phase 2 の境界\n\n- Phase 1：read-only registry\
  \ / preflight。成果物を作らず、operation 可否と衝突を返す。\n- Phase 2：runner-enabled operation。Phase\
  \ 1 の preflight が `OK` または明示許可された `WARN` の場合のみ、実際の artifact 作成・更新を行う。\n\n実装フェーズでは\
  \ Phase 1 を先に TDD 対象にする。Phase 2 は runner 契約と安全確認を別タスクに分ける。\n\n## Requirement 13\
  \ 設計モデル：operation contract 語彙と required_action 対応（Req 13）\n\nRequirement 13 は、`next\
  \ --json` の選択層が返す唯一 action を、実行層の operation contract へ接続する。Requirement 12 の operation\
  \ registry / preflight は「操作開始前の read-only 確認」を担い、本節の operation contract は「操作の副作用・承認要否・順序・前提・事後条件」を定義する。\n\
  \n### 1. 共通語彙 schema（Req 13 受入 1〜2）\n\nPhase 1 で追加する schema は次の 5 ファイルである。いずれも JSON\
  \ Schema Draft 2020-12 を使い、既存実行挙動を変更しない。\n\n| ファイル | 責務 |\n|---|---|\n| `.reviewcompass/schema/effect_kind.schema.json`\
  \ | `read`、`write`、`state_mutation`、`external_call` の 4 値を定義する |\n| `.reviewcompass/schema/phase_boundary.schema.json`\
  \ | `none`、`within_phase`、`phase_transition`、`reopen_boundary`、`commit_boundary`、`push_boundary`、`external_boundary`\
  \ を定義する |\n| `.reviewcompass/schema/operation_contract.schema.json` | operation\
  \ contract の共通構造を定義する |\n| `.reviewcompass/schema/workflow_state_snapshot.schema.json`\
  \ | Requirement 14 の snapshot 構造を定義する |\n| `.reviewcompass/schema/language_task_io.schema.json`\
  \ | Requirement 15 の `language_task` 入出力構造を定義する |\n\n`effect_kind` は副作用の種類だけを表す。承認要否は\
  \ `approval_required` として独立させ、`read` でも承認が必要な操作、`state_mutation` でも承認不要な判断記録操作を表現できるようにする。\n\
  \n### 2. operation contract schema（Req 13 受入 3〜4、10）\n\n`operation_contract.schema.json`\
  \ の論理構造は次を最低限とする。\n\n```yaml\nschema_version: string\noperation_id: string\nrequired_action:\
  \ string\neffect_kind: read | write | state_mutation | external_call\napproval_required:\
  \ boolean\napproval_contract_refs: [string]\nphase_boundary: none | within_phase\
  \ | phase_transition | reopen_boundary | commit_boundary | push_boundary | external_boundary\n\
  sequence:\n  mode: parallel_ok | serial_only\n  internal_steps: [object]\nactor:\n\
  \  kind: human | llm | proxy_model | tool | mixed\n  source: string\nbranching:\n\
  \  has_branches: boolean\n  branches: [object]\nmax_effect_kind: read | write |\
  \ state_mutation | external_call\npreconditions: [object]\npostconditions: [object]\n\
  state_refs: [string]\nregistry_refs: [string]\n```\n\n`approval_required` は boolean\
  \ のみを許容する。外部送信承認、human-only gate、または対象 operation 固有の承認 contract への接続は `approval_contract_refs`\
  \ または branch / internal step の `approval_contract_ref` に分離し、`approval_required`\
  \ 欄に方針文を入れてはならない。`preconditions` と `postconditions` は `id`、`description`、`check_kind`、`machine_checkable`、`source_ref`、`failure_verdict`\
  \ を持つ。`machine_checkable=false` の条件を `OK` の根拠にしてはならない。read-only advisory 段階では確認不能を\
  \ `WARN` 以上、runner-enabled operation では `DEVIATION` として扱う。\n\n### 3. required_action\
  \ 19語彙の対応表（Req 13 受入 3〜5、7〜8）\n\n19語彙の正本は `.reviewcompass/schema/required_action.schema.json`\
  \ である。operation contract の物理正本は `stages/operation-contracts.yaml` とし、`stages/operation-registry.yaml`\
  \ は operation registry / preflight binding の正本として各 `required_action` から `operation_contract`\
  \ ID と contract digest / schema_version を参照する。\n\n`stages/operation-contracts.yaml`\
  \ は、最低限 `required_action`、`effect_kind`、`approval_required`、`approval_contract_refs`、`phase_boundary`、`sequence`、実行主体、分岐条件、preconditions\
  \ / postconditions、side effects、承認要否の集約規則、branch / internal step semantics、max effect、出力・副作用\
  \ contract field を持つ。`stages/operation-registry.yaml` は operation id、canonical invocation、workflow\
  \ binding、required inputs、target identity、sequence mode、worktree / pending / artifact\
  \ policy、planned outputs の参照・投影・binding hint、contract ID、contract digest、schema_version\
  \ を持ち、contract field を再定義しない。registry / preflight は contract と state evidence を読み取って確認するだけで、contract\
  \ 更新、operation 実行、approval consume、workflow state 作成、review-run artifact 作成、artifact\
  \ mutation、action 独自選択を行わない。\n\nregistry / contract の整合検査は次を fail-closed にする。\n\n\
  - registry が参照する contract ID が存在しない\n- registry が保持する contract digest または schema_version\
  \ が contract 正本と一致しない\n- registry が `effect_kind`、`approval_required`、`approval_contract_refs`、`phase_boundary`、preconditions\
