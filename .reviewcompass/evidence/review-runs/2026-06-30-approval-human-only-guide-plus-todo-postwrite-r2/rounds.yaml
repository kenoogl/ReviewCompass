  \n```text\n# SESSION_WORKFLOW_GUIDE：セッション運営ガイドライン\n\n最終更新：2026-06-10（現行のセッション運営契約として整理）\n\
  \n本文書は ReviewCompass の開発セッションを確実に回すための運用ガイドラインである。作業開始、レビュー、利用者判断、コミット、完了報告の共通手順を定める。\n\
  \n本文書は運用文書（`docs/operations/` 配下）であり、ReviewCompass の実行時手順を定める。仕様・設計・タスクの正本と矛盾する場合は、該当正本を確認し、必要に応じて\
  \ reopen 手続きに乗せる。\n\n## 1. セッション開始時の必読フロー（5 分以内）\n\nセッション開始時は **作業着手前に必ず**次を順番に確認する。記憶や前回会話だけを根拠に作業へ入らない。\n\
  \n### 1.1 必読 5 件\n\n順序は重要：\n\n1. **`TODO_NEXT_SESSION.md`**（最新進捗）\n   - 前セッション末尾の到達点、次の作業候補、未消化所見\n\
  \   - 「§0 重要事項」「§1 起動手順」「§3 次の作業候補」を最低限読む\n   - 直近の `docs/sessions/session-*.md`\
  \ も併読し、TODO に圧縮された経緯の詳細を確認する\n\n2. **`.reviewcompass/guidance/WORKFLOW_NAVIGATION.md`**（次\
  \ action 判定）\n   - `tools/check-workflow-action.py next --json` の読み方\n   - 判定点ごとの\
  \ required disciplines / required inputs / effective prompt の扱い\n\n3. **`.reviewcompass/guidance/WORKFLOW_PRECHECK.md`**（機械判定の入口）\n\
  \   - `spec-set`、`commit`、`push`、`next`、`reopen-start` の実行前条件\n   - 機械判定で停止した場合の扱い\n\
  \n4. **`learning/workflow/carry-forward-register/reviewcompass-import.yaml`**（持ち越し所見の正本）\n\
  \   - 機能横断波及所見の未消化件数と内容を把握\n   - 正本と履歴 source を混同しない\n\n5. **`docs/extraction-mapping.md`**（抽出進捗）\n\
  \   - 各機能の状態（未着手／抽出中／抽出済／確認済）\n   - 機能ごとの実施履歴\n\n### 1.2 確認後の git 状態把握\n\n- `git\
  \ log --oneline -10`：直近のコミット履歴\n- `git status`：未コミット変更の有無\n\n### 1.3 ワークフロー上の現在位置の確認\n\
  \n- 現在どのフェーズか（intent ／ requirements ／ design ／ tasks ／ implementation）\n- 現在どの段か（drafting\
  \ ／ triad-review ／ review-wave ／ alignment ／ approval の 5 段）\n- 残機能と消化予定所見\n\n##\
  \ 2. ワークフロー段の役割と順序\n\n### 2.1 全体構造\n\n```\nintent 層（人間担当）\n  ↓\n機能分離\n  ↓\nrequirements\
  \ 段：drafting → triad-review → review-wave → alignment → approval\n  ↓\ndesign 段：drafting\
  \ → triad-review → review-wave → alignment → approval\n  ↓\ntasks 段：drafting → triad-review\
  \ → review-wave → alignment → approval\n  ↓\nimplementation 段：drafting → triad-review\
  \ → review-wave → alignment → approval\n```\n\n各フェーズは drafting／triad-review／review-wave／alignment／approval\
  \ の 5 段で進める。\n\n### 2.2 各段の役割（責務分離後）\n\n- **drafting**：各機能の草案作成のみ。1 機能ずつ独立に進める。actor=llm（または\
  \ human）。requirements／design／tasks の drafting は文書起草を意味する。implementation の drafting\
  \ は文書起草ではなく、tasks.md に従ったテストと実装コードの生成を意味する。\n- **tasks drafting の粒度**：tasks 段の drafting\
  \ では、対象機能の設計書 §14 要件追跡表（Req 受入単位 × 担当タスク単位）を骨格として tasks.md を作成する。tasks.md は implementation\
  \ drafting へ直接入れる粒度で書く。各タスクには、実装対象ファイル、最初に書く失敗テスト、実装順序、完了条件、検証コマンド、禁止事項、停止条件を含める。implementation-plan.md\
  \ や implementation-drafting.md のような別の実装前計画文書を正本成果物として要求しない。\n- **triad-review**：機能内の\
  \ 3 役レビュー（主役・敵対役・判定役）と機能内対処の実施。手動 dogfooding または subagent_mediated（サブエージェント仲介方式）で実施。actor=llm\n\
  - **review-wave**：複数機能を横断する複数ラウンドレビュー。機能横断波及所見と同根所見（異なる機能で同じ性格の所見が独立に発見された組）を集約し、一貫した対処方針で全該当機能の仕様文書に反映する\n\
  - **alignment**：LLM 自動判定による整合確認段（actor=llm）\n- **approval**：人間承認段（actor=human）。proxy_model\
  \ は approval 段の代行主体ではなく、review-run 後の重要件判断だけを代行できる\n\ndrafting と triad-review を別段にする理由は、誰が何をしたかを段単位で明確に記録し、草案作成者と判定者の分離を機械検査可能にするためである。\n\
  \n<a id=\"vertical-intent-transfer-review\"></a>\n\n### 2.2.1 上流意図伝達の必須検査\n\n各 phase\
  \ の triad-review／review-wave／alignment では、対象 phase の成果物だけでなく、上流成果物または上流判断材料からの意図伝達を必須検査項目とする。review\
  \ prompt は、少なくとも「上流の目的・責務境界・受入条件・禁止事項が、対象成果物へ欠落・弱体化・逸脱・未根拠追加なく引き継がれているか」を問わなければならない。\n\
  \n- **requirements review**：`上流判断材料 → requirements.md` を確認し、reopen 分類根拠、利用者判断、計画メモ、設計メモなどの目的・責務境界・受入条件・禁止事項が要件へ欠落なく落ちているかを検査する。design.md\
  \ / tasks.md は参照資料であり、審査対象ではない\n- **design review**：`requirements.md → design.md`\
  \ を確認し、要件の目的・境界・受入条件が設計へ欠落なく落ちているかを検査する\n- **tasks review**：`requirements.md → design.md\
  \ → tasks.md` を確認し、要件と設計の意図が implementation-ready なタスク粒度へ落ちているかを検査する\n- **implementation\
  \ review**：`requirements.md → design.md → tasks.md → implementation` を確認し、実装がタスクだけでなく上流意図から逸脱していないかを検査する\n\
  \nreview prompt は、review target / source materials / out of scope を明示する。審査対象は現在\
  \ phase の成果物に限定し、source materials は背景・意図伝達確認のための参照資料として扱う。下流 phase の成果物が source\
  \ materials に含まれる場合でも、その correctness を現在 phase の review で判定してはならない。\n\nsource materials\
  \ をパス名だけで列挙してはならない。縦方向監査の review prompt には、判断に必要な上流本文または要点抽出を、モデルが推測せず読める形で含める。要点抽出を使う場合は、少なくとも上流の目的、責務境界、受入条件、禁止事項、未確定事項、対象\
  \ phase へ引き継ぐべき判断を分けて記録する。上流資料を読んでいない場合は review-run を開始してはならない。prompt 内で上流資料の中身が確認できない場合も\
  \ review-run を開始してはならない。\n\ntasks review では、単に tasks.md の粒度や項目数を見るだけでは不十分である。たとえば\
  \ T-016〜T-019 を審査する場合は、Requirement 13〜16 の意図が design.md の設計判断を経由して、欠落・弱体化・勝手な追加なしに\
  \ implementation-ready な作業単位へ落ちているかを必須で確認する。\n\n### 2.3 段の進め方の規律\n\n- **drafting\
  \ 段の草案完成** → 当該機能の triad-review 段に進む（機能単位で逐次進行）\n- **triad-review 段で 3 役レビューと機能内対処**\
  \ を完了 → 当該機能の drafting／triad-review がそろう\n- **全機能で drafting ＋ triad-review を完了**\
  \ してから review-wave に進む（部分的に review-wave を始めない）\n- **review-wave の所見を消化** してから alignment\
  \ に進む\n- **alignment で LLM 自動判定** を通過してから approval に進む\n- **approval で利用者の明示承認**\
  \ を得てから次フェーズに進む\n\n### 2.4 「次の機能の drafting に進むべき」状況の判断\n\ntriad-review 段で 3 役レビューを行った所見が\
  \ **機能横断の波及所見**だった場合、当該機能の triad-review で対処せず、carry-forward register に持ち越して **次の機能の\
  \ drafting に進む**。\n\n## 3. 修正案件の波及種別と処理段\n\n### 3.1 用語の使い分け\n\n両用語は **対象方向が異なる正当な技術用語**\
  \ であり、優劣はない：\n\n- **遡及（そきゅう）**：**上流フェーズへの影響**。下流段の作業で発見された問題が、上流段（過去フェーズ）の修正を要するもの。例：実装段で発見した不整合が要件段の書き直しを要する\n\
  - **波及（はきゅう）**：**同フェーズ内の他機能（フィーチャー）への影響**。ある機能のレビューが別機能との不整合を露出させるもの。例：foundation\
  \ 要件の修正が runtime／evaluation 要件にも影響する\n\n所見を分類するときは、上流フェーズへ戻る必要があるか、同フェーズ内の他機能へ広がるかを分けて判断する。\n\
  \n### 3.2 修正案件の 4 種別（＋ 2 補助種別）\n\nレビューで露出する所見は次の種別に分類する：\n\n| 種別 | 内容 | 例 |\n|---|---|---|\n\
  | **機能内対処** | 当該機能の仕様修正のみで完結 | 表現修正、機能内の語彙不統一訂正 |\n| **波及（同フェーズ・横方向）** | 同フェーズ内の他機能の仕様修正も必要\
  \ | A-001：foundation 要件と runtime 要件の `not_run` 欠落 |\n| **遡及（上流フェーズ・縦方向）** | 上流フェーズの仕様修正が必要\
  \ | 設計段で「要件段の Req 6 受入 8 に矛盾あり」と発見 |\n| **遡及 ＋ 波及（縦 ＋ 横）** | 上流フェーズの複数機能に影響 | 設計段で発見した要件段の不整合が複数機能の要件文書に波及\
  \ |\n\n補助種別：\n\n- **leave-as-is（修正不要）**：判定役が「修正不要」と判断したもの、対処せず記録のみ\n- **延期**：「将来フェーズで対処」と判定役が明示したもの（例：F-004\
  \ の配置時対処）\n\n### 3.3 種別ごとの処理段と方法\n\n#### (a) 機能内対処\n\n- **発見されるタイミング**：drafting\
  \ 段（起草者の自己発見）／ triad-review 段（3 役レビュー）\n- **処理する段**：当該機能の **triad-review 段** で対処（drafting\
  \ に戻して草案修正、または triad-review 段内で直接修正）\n- **方法**：当該機能の仕様文書を直接修正\n- **次段への進行**：当該機能の\
  \ triad-review 段が `completed` 状態になってから次機能へ\n- **記録先**：レビュー記録（`.reviewcompass/specs/<機能>/reviews/<日付>-<種別>.md`）の\
  \ §4 統合節に「対処済み」と記録\n\n##### (a-1) must-fix 所見の対処手順\n\ntriad-review 段で判定役が must-fix\
  \ と判定した所見の対処は、起草者（LLM または人間）が独自判断で仕様文書を修正することを禁ずる。利用者と必ず議論し、各所見の対処方針を 1 件ずつ平易な日本語で説明して合意を得てから反映する。\n\
  \n**手順**：\n\n1. must-fix 所見を 1 件ずつ取り上げる。複数所見が論理的に連動する場合は連動単位でまとめる（例：F-001 と F-007\
  \ が同一事象を別観点で扱う場合）\n2. 各所見について、対処方針の提案を次の構造で平易に説明する：\n   - その判断が必要になった経緯（要件文書や上流文書からの導出）\n\
  \   - 候補案の列挙（必ず複数）\n   - 各候補案の利点と弱点\n   - **後段で発生し得る問題の深掘り**：下流仕様（他機能の design／tasks／implementation）、対象アプリへの配置可能性、機械検証時の挙動、実装フェーズの運用、将来の拡張性\n\
  \   - 推奨案とその根拠\n3. 「現状維持」を推奨する場合も、現状維持の弱点を検証してから示す\n4. 一括処理（複数論点を一気に決着）を避け、各論点を個別に深掘りする\n\
  5. 利用者の判断を得てから、仕様文書を 1 件ずつ Edit で修正する\n6. 各修正後に grep または Read で機械的に照合し、反映を確認する\n\
  7. レビュー記録（reviews/...）の §4 統合節に「対処方針・利用者承認の根拠・反映箇所」を記録する\n\n**深掘りの具体内容**（推奨案を提示する際に必ず想定する事項）：\n\
  \n- foundation 機能の場合：対象アプリへの配置可能性、配布対象外資産との分離、リポジトリ内資産の規則との整合\n- 値域・語彙の固定：将来拡張時の改訂コスト、機械検証時の不正値検出\n\
  - 責務境界：foundation と runtime（または他機能）の責務分離、上流が下流の実装方針に踏み込まない原則\n- 不変性：成果物の追記性、生証拠は不変の原則\n\
  - 依存関係：他機能が当該仕様を取り込む際の参照可否\n\n**禁則**：\n\n- 利用者と議論せずに must-fix 所見の対処内容を独自に確定する\n\
  - 「現状維持を推奨」と表層的に提案する（弱点検証を欠く）\n- 候補案を 1 つしか提示しない（代替案との比較を欠く）\n- 後段影響を想定しない推奨\n\n\
  <a id=\"3.3-a-2\"></a>\n\n##### (a-2) review-run 後の proxy_model 判断代行手順\n\nAPI 経由の\
  \ review-run 後に、人間の個別判断を proxy_model が代行する場合も、メインセッション LLM が重要件を独自に確定して実装へ進むことを禁ずる。proxy_model\
  \ 代行は「人間判断を省略する」ものではなく、判断主体を別モデルへ移す運用である。\n\n**proxy_model 判断依頼前の利用者提示ゲート**：\n\n\
  API review-run が完了したら、proxy_model 判断依頼、実装修正、spec.json 更新、フェーズ移行のいずれにも進む前に、メインセッション\
  \ LLM は次を利用者へ提示して停止する。この提示ゲートを完了する前に proxy_model を呼び出してはいけない。\n\n1. 使用 variant 名\n\
  2. role ごとの path／provider／model（例：primary／adversarial／judgment の割当）\n3. モデル別 raw\
  \ 結果概要（parse 状態、所見数、severity 内訳、raw path）\n4. 同根所見クラスタの一覧\n5. `must-fix`／`should-fix`／`leave-as-is`\
  \ の三段階トリアージ案\n6. `must-fix` 候補ごとの平易な説明、候補案、各案の利点と弱点、後段影響、推薦案\n7. proxy_model に判断させる場合の対象\
  \ finding／cluster、判断範囲、不可逆操作（commit／push／spec.json 更新／フェーズ移行）を含まないこと\n\nvariant\
  \ が未確定、または role 割当が曖昧な場合は review-run を開始しない。既定 variant が CLI 経路を含む等、実行環境と合わない場合は、設定ファイルを読んで候補\
  \ variant と role 割当を利用者へ説明し、選択理由を review-run 記録に残す。\n\n**役割分担**：\n\n1. メインセッション\
  \ LLM は raw レビューを集約し、三段階トリアージの下書きを作る。parsed YAML だけでなく raw response も読み、同根所見をまとめ、`must-fix`\
  \ ／ `should-fix` ／ `leave-as-is` の候補を作る\n2. メインセッション LLM は重要件ごとに、平易な問題説明、候補案、各案の利点と弱点、後段影響、推薦案を作る\n\
  3. proxy_model は重要件の採用案・判断理由・最終ラベルを決定する。実装は担当しない\n4. メインセッション LLM は proxy_model\
  \ の raw response を保存し、`decisions/<suffix>.yaml`（重要件ごとの裁定 file。`<suffix>` は `<model>-<role>-<連番>`）と\
  \ `proxy-approval.yaml` に構造化する\n5. 機械ガードは proxy decision の充足を検査する。未判断、raw 欠落、候補案欠落、採用案欠落、判断理由欠落、triage\
  \ 最終ラベルとの不一致があれば実装へ進まない\n6. メインセッション LLM は機械ガード通過後、採用された修正だけを TDD で実装する\n7. コミット・プッシュ・spec.json\
  \ 更新・フェーズ移行は人間の明示承認を要求する。proxy_model はこれらの不可逆操作を代行しない\n\n**重要件の判定閾値**：\n\n- `must-fix`、`ERROR`、`CRITICAL`\
  \ は必ず重要件として扱う\n- `should-fix` でも、上流仕様、データ契約、機械ガード、証跡保持、ワークフロー権限境界、複数モデルの同根指摘に関わるものは重要件として扱う\n\
  - 同根指摘とは、複数モデルの所見が同じ対象ファイル・同じ出力契約・同じ機械ガード・同じ証跡・同じ原因に触れているものをいう。表現が異なっても、対象または原因が一致する場合は同根として扱う\n\
  - 正本削除、機械ガード削除、重要件閾値の引き下げ、承認証跡の削除、検証対象範囲の縮小は、コミット等と同じく人間の明示承認を要する不可逆操作として扱う\n- 判断に迷うものは重要件側に倒し、proxy_model\
  \ 判断または人間判断へ回す\n\n**proxy_model への入力証跡**：\n\n- proxy_model へ渡す判断材料には、メインセッション LLM\
  \ の要約だけでなく、元 review raw への参照または抜粋を必ず含める\n- proxy_model への判断プロンプト（review-run 直下に保存）を作成する前に、[[llm-as-judge-prompting]]\
  \ の手順（材料揃え → 問い設計 → 選択肢なし分析）でプロンプトを設計する\n- 判断プロンプト（review-run 直下。既定名 `proxy-adjudication-prompt.md`、実行時に指定可）に、元\
  \ review raw 参照、問題説明、候補案セット、推薦案、判断してほしい最終ラベルを保存する\n- `decisions/<suffix>.yaml`（重要件ごとの裁定\
  \ file。`<suffix>` は `<model>-<role>-<連番>`）には、`candidate_options`、`source_raw_paths`、`decision_prompt_path`、採用案、棄却案理由、判断理由、最終ラベルを保存する\n\
  - proxy_model が元 review raw を読めない形の判断材料しか受け取っていない場合、その decision は実装着手の承認証跡として扱わない\n\
  - 現行の軽量ガードは、proxy_model_id の文字列一致、decision file の finding_id 一致、final_label 一致、prompt/raw/候補案証跡の存在を検査する。API\
  \ 署名や暗号学的な生成元証明は将来課題とする\n\n**証跡配置**：\n\n- `raw/`：各モデルの生応答\n- `triage.yaml`：メインセッション\
  \ LLM による三段階トリアージ\n- `proxy-adjudication-prompt.md`（既定名。review-run 直下、実行時に指定可）：proxy_model\
  \ に渡した判断材料\n- `proxy-adjudication-response.txt`（既定名。review-run 直下、実行時に指定可）：proxy_model\
  \ の生応答\n- `decisions/<suffix>.yaml`：重要件ごとの採用案、判断理由、最終ラベル、棄却案理由\n- `proxy-approval.yaml`：実装着手を許可する\
  \ proxy approval record\n\n**並列化可能な単位**：\n\n- proxy_model への判断依頼は、同根所見クラスタ単位で並列化できる\n\
  - TDD 実装は、互いに同じファイルを更新しない実装単位、または入出力契約が独立しているタスク単位で並列化できる\n- 共通スキーマ・共通ビルダー・同一ファイルを触る修正は直列で扱う\n\
  - 生成物、共有 helper、推移的契約、同じ出力 manifest、同じ traceability 出力を共有する修正は直列で扱う\n- 並列実装の統合前に、メインセッション\
  \ LLM が triage、proxy decision、テスト結果、ファイル差分を再照合する\n- 並列処理で新しい判断問題が出た場合、その単位は停止し、proxy_model\
  \ 判断または人間判断へ戻す\n- 承認済み finding の実装中に見つけた未承認の便乗リファクタ、隣接挙動変更、対象外 cleanup は実施しない。必要なら新しい判断問題として停止する\n\
  \n**実装サブ担当 LLM の扱い**：\n\n- 実装サブ担当 LLM は、原則として別スレッドかつ分離 worktree で扱う\n- 同じ repo での並列実装は原則禁止し、読み取り調査または差分を残さない確認に限定する\n\
  - メインセッション LLM は、対象 finding、proxy decision、触ってよいファイル、期待テスト、禁止事項、停止条件を実装サブ担当へ渡す\n\
  - 実装サブ担当は、指定範囲外のファイル変更、判断変更、コミット、プッシュ、spec.json 更新、フェーズ移行を行わない\n- 実装サブ担当が新しい判断問題、上流仕様への疑義、許可ファイル外の修正必要性を見つけた場合、その作業単位を停止してメインセッション\
  \ LLM に戻す\n\n**別スレッド生成物の扱い**：\n\n- 別スレッド・分離 worktree で発生した生成物は、実装差分、検証結果、判断根拠、作業ノイズに分類する\n\
  - 実装差分は、メインセッション LLM が確認したうえで本線 worktree への取り込み候補にする\n- 検証結果と判断根拠は、必要な要約だけを review-run、session\
  \ record、または docs/notes に保存する\n- 判断に影響した失敗試行、失敗パッチ、途中ログは work_noise から decision_basis\
  \ へ昇格し、メインセッション LLM が要約または該当箇所を保存する\n- 作業ノイズは本線 repo に取り込まない。作業ログ、一時メモ、途中のテスト出力、失敗パッチ案は原則としてサブ\
  \ worktree 側に閉じる\n- 本線へ戻す標準単位は、パッチ、テスト結果サマリ、未解決事項の 3 点とする\n\n<a id=\"3.3-a-3\"></a>\n\
  \n##### (a-3) 操縦 LLM 別の API 既定 variant と独立性原則（本節を正本とする）\n\nセッションを操縦（起草・修正）する LLM\
  \ と、その成果物を検証する LLM の系列を分離する。\n自己レビューによる独立性低下を防ぐための原則であり、利用者承認済み\n（設計記録 `docs/notes/2026-06-10-deployment-multi-llm-entry-design.md`\
  \ §3.6、2026-06-11 個別承認）。\n本節がこの原則と既定 variant 選択規則の正本である（仕様への昇格は実アプリ pilot 後に再検討、\n\
  MLE-DEC-004、2026-06-12 利用者決定）。\n\n**独立性の原則**：\n\n1. 単独検証役（1 体での post-write 検証など）は、操縦\
  \ LLM と別系列を必須とする\n2. 3 役構成の adversarial（反証役）と judgment（判定役）は、操縦 LLM と別系列を必須とする\n\
  3. 3 役構成の primary（検出役）は、操縦 LLM と同系列を許容する（最終判定を持たず、\n   残り 2 役の独立で全体の独立性が保たれるため）\n\
  4. proxy_model（人の判断の代行）は、操縦 LLM と別系列を必須とする\n\n**操縦 LLM 別の既定 variant**（実体は `config/api-settings.yaml`）：\n\
  \n- **Claude Code 操縦時**：接尾辞なしの `*_independent_3way` 系\n  （post_write_verification／yaml_audit／implementation_review\
  \ の 3 用途。\n  primary=anthropic/claude-sonnet-4-6、adversarial=openai/gpt-5.5、\n \
  \ judgment=gemini/gemini-3.1-pro-preview）\n- **Codex CLI 操縦時**：`*_independent_3way_codex_operator`\
  \ 系\n  （primary=openai/gpt-5.4、adversarial=anthropic/claude-opus-4-8、\n  judgment=gemini/gemini-3.1-pro-preview）\n\
  - judgment（gemini-3.1-pro-preview）と小規模 1 体検証（`post_write_verification_google`）は\n\
  \  両操縦で共用し、操縦を切り替えても判定基準の連続性を保つ\n- 既存 variant の改名は行わない（規律文書・過去 run 記録・spec からの参照保全）。\n\
  \  別の LLM が操縦する場合（将来）は同じ原則で役を回転して対応する\n\n対象アプリ向けの同内容の案内は `templates/entry/AGENT_ENTRY.template.md`\
  \ §10 と\n`.reviewcompass/guidance/INITIAL_SETUP_LLM_GUIDE.md` にあり、本節と整合させて保守する。\n\
  \n#### (b) 波及（同フェーズ・他機能への影響）\n\n- **発見されるタイミング**：triad-review 段（3 役が他機能との不整合に気づく）／\
  \ review-wave 段（機能横断レビュー）\n- **処理する段**：**review-wave 段**（フェーズ終端の機能横断段、全機能の drafting\
  \ ＋ triad-review 完了後に開始）\n- **方法**：\n  1. triad-review 段で波及と判定されたら **当該機能では対処せず**、carry-forward\
  \ register に追記\n  2. 「次の機能の drafting」に進む（個別機能の段では対処しない）\n  3. 全機能の drafting ＋ triad-review\
  \ が完了したら、review-wave 段で集約消化\n  4. 影響を受ける全機能の仕様文書を一括修正（依存順を守る、例：foundation を先に修正してから\
  \ runtime）\n- **記録先**：`learning/workflow/carry-forward-register/reviewcompass-import.yaml`\
  \ の各所見項目、消化後は `status: resolved` と `resolution` を更新\n\n#### (c) 遡及（上流フェーズへの影響）\n\
  \n- **発見されるタイミング**：任意の下流段（triad-review／review-wave／alignment／approval のいずれか）\n-\
  \ **処理方法**：[REOPEN_PROCEDURE.md](REOPEN_PROCEDURE.md) の 4 過程手順を起動。当該段の作業を停止し、上流フェーズに戻る\n\
  - **手戻り種別判定**：N（intent）／R（requirements）／D（design）／A（tasks）／I（implementation）× 深さ\
  \ 0〜4 の二次元表記で判定\n- **再実施対象決定**：第1過程で trigger_map（再実施対象段の決定表）を参照して決める。actor=human\
  \ の段（approval 等）に来たら作業を止めて承認待ち\n- **記録先**：種別判定の根拠を `docs/reviews/reopen-classification-<日付>.md`\
  \ に残す、機能単位 spec.json の `reopened` 履歴と `recheck` フラグを更新\n\n#### (d) 遡及 ＋ 波及の組合せ\n\
  \n- **発見されるタイミング**：任意の下流段\n- **処理方法**：reopen で上流フェーズに戻り、上流フェーズの review-wave 段で波及所見として集約消化、その後下流に伝播\n\
  \  1. **第 1 段階**：reopen 手続きで上流フェーズに戻り、影響範囲を特定（trigger_map）\n  2. **第 2 段階**：上流フェーズで\
  \ carry-forward register に波及所見として追記し、当該フェーズの review-wave 段で消化\n  3. **第 3 段階**：上流フェーズの\
  \ alignment ＋ approval を再実施\n  4. **第 4 段階**：下流フェーズの alignment ＋ approval を再実施（trigger_map\
  \ で連鎖再実施対象として決定）\n- **記録先**：reopen 記録 ＋ carry-forward register の両方\n\n#### (e) leave-as-is\
  \ と延期\n\n- **leave-as-is**：判定役が「修正不要」と判断したもの。対処せず、レビュー記録に判定根拠を残すのみ\n- **延期**：将来のフェーズで対処する判定。レビュー記録に延期理由と対処予定フェーズを残し、当該フェーズ着手時のチェックリストに追記\n\
  \n### 3.4 振り分け判断のフロー（triad-review 段で実施）\n\ntriad-review 段の判定役は、各所見について次の振り分けを行う：\n\
  \n```\n所見発見\n  ↓\n当該機能の仕様修正のみで完結するか？\n  ├── YES → 機能内対処（triad-review 段内で対処）\n  └──\
  \ NO\n      ↓\n  他機能の仕様修正も必要か？\n  ├── YES（同フェーズ内のみ） → carry-forward register に追記、review-wave\
  \ 段で処理\n  ├── YES（上流フェーズに戻る必要あり、単機能） → reopen 手続きを起動\n  └── YES（上流フェーズに戻る必要あり、複数機能）\
  \ → reopen ＋ 上流の review-wave で集約処理\n  \n別判定：\n  ├── 修正不要 → leave-as-is（記録のみ）\n \
  \ └── 将来フェーズで対処 → 延期（チェックリスト追記）\n```\n\n### 3.5 段ごとの露出と処理段の対応表\n\n| 段 | 主に露出する所見\
  \ | 当該段内で処理する所見 | 次段に持ち越す所見 |\n|---|---|---|---|\n| drafting | 起草中の自己発見 | 機能内（草案に直接反映）\
  \ | なし |\n| triad-review | 機能内 ／ 波及 ／ 遡及 | **機能内** のみ | 波及 → review-wave、遡及 → reopen\
  \ |\n| review-wave | 波及（横断ラウンド中の追加発見も） | **波及** | 遡及あり → reopen |\n| alignment |\
  \ 自動判定の不整合検出 | （自動判定が通過するまで前段に戻す） | 遡及あり → reopen |\n| approval | 重大見落とし、利用者または別モデルによる指摘\
  \ | （承認しない） | reopen で上流戻し |\n\n### 3.6 機能横断波及所見の管理ルール\n\n- 各機能の triad-review 段で発見されたら、即時\
  \ carry-forward register に追記\n- 追記項目：所見 ID（A-XXX 形式）、検出セッション、波及範囲（影響を受ける機能と仕様箇所）、対処方針、依存関係\n\
  - review-wave／alignment／approval の機能横断段着手時、全件を消化対象とする\n- 消化後、各所見に「✅ 対処済み（YYYY-MM-DD、要件\
  \ review-wave）」ラベルを追加\n\n## 4. サブエージェント方式の運用条件\n\n### 4.1 位置づけ\n\n- メインセッションは草案作成とレビュー結果の取りまとめを担う\n\
  - 3 役レビューは、メインセッションから分離された reviewer session または外部 API 検証者で実行する\n- review-run の実行形は\
  \ adapter と provider 設定に従う\n\n### 4.2 モデル割り当て（規律）\n\n3 役（主役・敵対役・判定役）は、メイン LLM から分離した実行主体が担う。メイン\
  \ LLM は草案作成と三役レビュー結果の取りまとめのみを担い、3 役のいずれにもならない。\n\n各役のモデルは `runtime/config/reviewcompass.yaml`\
  \ または review-run の provider 設定で指定する。利用者が設定で変更できる。\n\n**モデル能力配分の規律**：\n\n- **主役と敵対役は必ず異なるモデルを使う**（敵対役の独立性確保のため）\n\
  - 判定役は主役または敵対役と同じモデルを使うことを許容する\n- 敵対役と判定役には、反証生成と責務境界判断を担う十分な能力のモデルを割り当てる\n\n###\
  \ 4.3 サブエージェント呼び出し時の規律\n\n- **プロンプトに自己完結性を持たせる**：サブエージェントは別 session で、メインの作業文脈を共有しない\n\
  - **参照文書の引用は事後検証**：サブエージェントの引用には節番号や参照先の誤りが発生しうる。メインセッションが grep やリンク検査で確認する\n- **ファイル書き込みは原則禁止**：読み取りと分析のみ。例外的にレビュー記録の\
  \ §2 や carry-forward register への追記提案を許容\n- **モデル指定**：利用中の adapter が提供する model /\
  \ provider 指定方法に従う。外部 API 経由では provider 設定を参照する\n\n### 4.4 レビュー記録の必須フィールド\n\nレビュー記録の\
  \ front-matter に次を必須化：\n\n```yaml\nauthor:\n  identity: <adapter_main_session>\n\
  \  model: <model-id>\n  role: drafter\nreviewer:\n  identity: <adapter_reviewer_session>\n\
  \  model: <model-id>\n  role: final_judgment\n  separation_from_author: true\n```\n\
  \n`author.identity` と `reviewer.identity` が異名であることを機械検査の対象とする。重要なのは provider 名ではなく、起草者と判定者が分離していることを記録できることである。\n\
  \n### 4.5 mode 値\n\nレビュー記録の `mode` は `subagent_mediated`（正式値）。foundation のレビューモード語彙正本（Requirement\
  \ 6 受入 6）の 3 値のうちのひとつ。\n\n## 5. 利用者判断が必要な論点の見極め\n\n### 5.1 利用者判断必須の項目\n\n次のいずれかに該当する場合、LLM\
  \ は単独で確定せず、利用者の明示承認を仰ぐ：\n\n- **正本方針変更**：仕様・設計・タスク・運用規律の意味を変える修正\n- **大規模再設計**：既存の責務境界、機械判定、成果物配置を大きく変更する場合\n\
  - **機能横断の権限分担**：複数機能にまたがる責務分担の決定（例：A-007 の self-improvement と workflow-management\
  \ の権限調停）\n- **判定境界の判断**：must-fix／should-fix／leave-as-is の境界が曖昧な場合\n- **承認・コミット・push・フェーズ移行**：すべて利用者明示承認必須\n\
  - **作業の打ち切り・先送りの誘導**：利用者の明示承認なく「続きは次セッションで」等と作業を終了・先送りに誘導しない\n\n### 5.2 LLM が自律的に決められる項目\n\
  \n- **抽出時のクリーニング作業の細部**（機能名置換、自己適用前提除去等）\n- **観点 5（検証可能性）の機械判定可能な所見の指摘**\n- **レビュー記録の構造化**（front-matter、節構成）\n\
  \n### 5.3 判断の記録規律\n\n利用者判断の結果は次の場所に記録：\n\n- **正本方針変更**：該当する仕様・設計・タスク・運用規律に決定日付付きで記載\n\
  - **機能横断対処方針**：carry-forward register の該当所見に対処方針として追記\n- **重大論点**：レビュー記録の §1 主役レビュー、§4\
  \ 統合の「利用者判断履歴」節に記録\n\n### 5.4 セッション記録の作成規律\n\n原則として毎セッション、セッション終了時または重要判断後に `docs/sessions/session-<N>-<YYYY-MM-DD>.md`\
  \ を作成または更新する。特に、重要な判断・承認・レビュー結果・修正経緯が発生した場合は必須とする。これは会話全文の逐語ログではなく、後で経緯を確認できる要約記録とする。\n\
  \n`<N>` は `docs/sessions/` に存在する既存の最大セッション番号に 1 を加えた番号とする。同日の複数セッションでも番号を進め、同じ番号を再利用しない。\n\
  1 session につき 1 ファイルとし、同一 session 内で重要判断が複数回発生した場合は同じファイルへ追記する。重要判断ごとに別番号を消費しない。\n\
  並行セッションや未コミット作業により採番が衝突した場合、メインセッション LLM は既存記録・git 状態・未コミット差分を確認し、利用者が採番を確定するまで正式な新規セッション記録を作成しない。採番確定前に記録が必要な場合は、`docs/sessions/drafts/session-<YYYY-MM-DD>-<short-topic>.md`\
  \ に一時草案を置き、正式番号確定後に `docs/sessions/session-<N>-<YYYY-MM-DD>.md` へ移動する。移動後は draft\
  \ ファイルを残さず、正式ファイルに草案内容が統合済みであることを確認する。\n\nメインセッション LLM はセッション記録の草案作成責任を持つ。利用者判断の引用・承認範囲・未確定事項に曖昧さがある場合は、記録前に利用者へ確認する。\n\
  コンテキスト切れや中断により当該 LLM が記録できない場合、次セッションが草案を引き継ぐ。草案がない場合は、TODO、review-run、approval\
  \ record、git diff から経緯を再構成して記録する。\n\n最低限、次を記録する：\n\n- このセッションで実施した作業\n- 利用者が承認した判断と、その対象\n\
  - API レビューや独立検証の結果と三段階トリアージ\n- 修正した主要ファイルと検証結果\n- 失敗・見落とし・再発防止に必要な気づき\n- 次セッションへの引き継ぎ\n\
  \n推奨見出しは既存 session 記録と同型とし、最低限次を含める：\n\n1. サマリ（このセッションでやったこと）\n2. 気づき・特筆点\n3. コミット一覧（該当する場合）\n\
  4. 次セッションへの引き継ぎ\n\n`TODO_NEXT_SESSION.md` は次セッション向けの入口メモであり、詳細な経緯記録の正本ではない。詳細経緯は\
  \ `docs/sessions/` に残し、TODO には必要な参照だけを置く。\n\n## 6. コミット規律\n\n### 6.1 コミット単位\n\n\
  - **正本文書更新 ＋ 基盤整備**：1〜2 コミット（方針確定、運用ファイル整備）\n- **機能ごとに 1 コミット**：仕様文書 ＋ 運用文書 ＋ レビュー記録の\
  \ 3 ファイル（または schema/template 等の関連ファイル）\n- **機能横断段（review-wave／alignment／approval）**：1\
  \ コミット（複数機能の小修正をまとめる）\n\n### 6.2 コミット順序\n\n依存マップ順に従う：\n\n1. foundation\n2. runtime\n\
  3. evaluation\n4. analysis\n5. workflow-management\n6. self-improvement\n7. conformance-evaluation\n\
  \n### 6.3 コミットメッセージ規律\n\n- **平易な日本語**：英語技術用語の連発を避け、完全な日本語の文で書く\n- **題名**：機能名 ＋ 作業種別（例：「foundation\
  \ 機能の requirements 抽出と 3 役レビュー」）\n- **本文**：作成・更新ファイルの列挙、主な反映内容、機能横断所見の持ち越し有無\n-\
  \ **Co-Authored-By**：利用中の adapter と利用者方針に従う。自動付与を前提にしない\n\n### 6.4 コミット前確認\n\n-\
  \ `git status` で対象ファイルを確認\n- `git diff --cached` で内容確認（必要に応じて）\n- `--no-verify`\
  \ や `--no-gpg-sign` は使わない（規律）\n\n### 6.5 不可逆操作の進行報告最小化\n\ncommit、push、spec.json\
  \ workflow_state 変更、フェーズ移行などの不可逆操作では、利用者が操作を明示指示した後の正常系進行報告を原則として省く。LLM は必要な確認、stage、承認\
  \ record、guard、実操作、事後確認を実行してよいが、各内部手順を逐一会話へ説明しない。\n\n途中報告を行うのは、利用者判断または追加承認が必要な場合に限る。例：承認\
  \ record の期限切れや対象不一致、precheck failure、post-write / reopen / in-progress による遮断、sandbox\
  \ escalation が必要な場合、staged 内容が変わり再承認が必要な場合。\n\ncommit 中に、staged 内容の確定、承認内容を作り直す、既存\
  \ delegation を使い直す、nonce を更新する、といった内部再準備が必要になっても、それ自体を利用者に報告しない。これらは、承認済みの対象範囲内であり利用者判断を要しない通常手順として黙って実行する。コミット対象が増えた、staged\
  \ 内容が変わった、または再承認が必要になった場合は内部再準備として隠さず、追加判断が必要な停止理由だけを短く報告する。利用者へ報告するのは、作業を続けられない異常、追加判断が必要な\
  \ WARN / DEVIATION、または成功結果だけとする。\n\n正常完了時の報告は、実行結果だけに絞る。commit なら commit hash、`git\
  \ status` の clean 性、`next --json` の要点を示す。push なら push 先と結果、`git status` の clean\
  \ 性を示す。詳細な手順ログ、precheck の全文、stage したファイル一覧、nonce / challenge の値は、利用者が求めた場合または失敗調査に必要な場合だけ示す。\n\
  \n### 6.6 push\n\npush は **利用者明示承認**を仰いでから実行。LLM が自律的に push しない。\n\n## 7. 作業完了時レポート\n\
  \n作業を終えて利用者へ返答するときは、adapter や利用モデルに依存しない会話末尾の運用契約として、最低限次を示す：\n\n- **作業サマリ**：このターンで実施した変更、判断、未変更の範囲\n\
  - **検証結果**：実行したテスト、確認コマンド、`post_write_verification` の要否と結果\n- **現在状態**：`git status`\
  \ と `next --json` の要点\n- **次タスク**：次に着手すべき具体的な作業、または workflow が要求する次 action\n\n未実施・失敗・承認待ち・保留判断がある場合は、完了扱いにせず明記する。commit、push、workflow_state\
  \ 更新、spec.json 更新などの不可逆または状態変更を伴う操作は、実際に成功した場合だけ作業サマリに記録する。\n\n`next --json` が `post_write_verification`、`reopen_in_progress`、`resume_in_progress`、`unknown`\
  \ など `completed` 以外を返している場合、次タスクには任意の改善候補ではなく、その workflow 状態に従う次 action を示す。\n\n\
  ### 7.1 進捗説明の平易化\n\n進捗説明では、内部処理名をそのまま主文にせず、利用者が理解しやすい作業状態で述べる。まず次の順で短く示す：\n\n1.\
  \ 今どの段階か\n2. 何をしたか\n3. 次に何をするか\n\n必要な場合だけ、内部用語を括弧で補足する。\n\n完了報告や途中報告では、翻訳調の名詞句、英語混じりの見出し、内部状態名や英語の道具名を見出しや主語にしない。`next\
  \ --json`、`commit wrapper`、`required_action`、`workflow_state` などの語は、利用者が判断するために必要な場合だけ、自然な日本語の説明の後ろへ括弧書きで添える。主文では「何を変えたか」「今どこで止まっているか」を自然な日本語で述べ、利用者が次に何をすればよいかを自然な日本語の文で示す。\n\
  \n避ける表現：\n\n- 停止点を消費\n- gate を通過\n- required_action\n- pending_gate\n- workflow_state\
  \ を更新\n- commit wrapper を開始条件にする\n- next --json は reopen_in_progress\n\n言い換え例：\n\
  \n- 「tasks approval の停止点を消費」ではなく「tasks 段の承認を完了済みとして記録」\n- 「implementation drafting\
  \ を完了」ではなく「implementation 段のコードとテストを作成」\n- 「次の required_action は run_reopen_pending_gate」ではなく「次は現在の段のレビュー作業」\n\
  - 「commit wrapper を最初から sandbox 外で実行」ではなく「コミット用の検査手順は、最初から許可された実行環境で動かす」\n- 「next\
  \ --json は reopen_in_progress」ではなく「やり直し手続きの途中で、次は requirements 段の確認を進める状態」\n\n###\
  \ 7.2 利用者操作が必要な停止点の表示\n\n承認、コミット、push、判断など、利用者の短い返信で次へ進む停止点では、完了報告の末尾に次の 1 行を示す：\n\
  \n```text\n次に必要な操作: <操作語>\n```\n\n`<操作語>` は、利用者がそのまま返信できる短い語にする。\n\n例：\n\n- `次に必要な操作:\
  \ 承認`\n- `次に必要な操作: コミット`\n- `次に必要な操作: push`\n- `次に必要な操作: 判断`\n\n複数の選択肢が必要な場合だけ、候補を短く並べる。通常は候補を\
  \ 1 つに絞る。内部用語、長い説明、手順ログをこの行に混ぜない。\n\nこのレポートは会話末尾の完了報告であり、workflow_state や `spec.json`\
  \ の正本を代替しない。\n\n## 8. 用語ガイド\n\n### 8.1 「遡及」と「波及」\n\n両用語は対象方向で使い分ける：\n\n- **遡及（そきゅう）**：上流フェーズへの影響（時間軸＝過去方向）\n\
  - **波及（はきゅう）**：同フェーズ内の他機能への影響（横方向＝機能間）\n\n両方とも正当な技術用語で、避けるべき／推奨という関係ではない。所見の性格を正確に表すために使い分ける。\n\
  \n### 8.2 判定値の使い分け\n\n- **must-fix**：仕様の致命的または重要な欠落、修正必須\n- **should-fix**：仕様の改善余地、修正推奨\n\
  - **leave-as-is**：仕様として問題なし、修正不要\n\n### 8.3 機能内と機能横断\n\n- **機能内対処**：当該機能の drafting\
  \ 段で本セッション内に修正\n- **機能横断持ち越し**：carry-forward register に集約、review-wave／alignment／approval\
  \ の機能横断段で対処\n\n### 8.4 サブエージェント関連\n\n- **メインセッション**：作業の入口となる LLM session。草案作成とレビュー結果の取りまとめを担い、3\
  \ 役レビューの判定者とは分離する\n- **サブエージェント**：敵対役・判定役を実行する別 session または外部 API 検証者。利用中の adapter\
  \ が利用可能な実行形に従う\n- **mode = `subagent_mediated`**：サブエージェント方式のレビュー記録の mode 値\n\n##\
  \ 9. 関連文書\n\n- ワークフローナビゲーション：[WORKFLOW_NAVIGATION.md](WORKFLOW_NAVIGATION.md)\n\
  - 事前検査：[WORKFLOW_PRECHECK.md](WORKFLOW_PRECHECK.md)\n- reopen 手順：[REOPEN_PROCEDURE.md](REOPEN_PROCEDURE.md)\n\
  - 抽出進捗：[../../docs/extraction-mapping.md](../../docs/extraction-mapping.md)\n- 機能横断波及所見：正本\
  \ [../../learning/workflow/carry-forward-register/reviewcompass-import.yaml](../../learning/workflow/carry-forward-register/reviewcompass-import.yaml)、履歴\
  \ source [../../learning/workflow/carry-forward-register/sources/reviewcompass-pending-cross-feature-findings.md](../../learning/workflow/carry-forward-register/sources/reviewcompass-pending-cross-feature-findings.md)\n\
  - レビュー記録雛形：[../../templates/review/manual_dogfooding_review_template.md](../../templates/review/manual_dogfooding_review_template.md)\n\
  - TODO：[../../TODO_NEXT_SESSION.md](../../TODO_NEXT_SESSION.md)\n\n## 10. 本ガイドラインの改訂規律\n\
  \n- 本ガイドラインは運用文書として更新可能\n- セッションの経緯記録は `docs/sessions/` に残し、本文書には現行の運用契約だけを置く\n\
  - 規律変更（§2〜§8）は利用者明示承認後に反映\n- 改訂時は最終更新日付を更新\n```\n\n### .reviewcompass/guidance/REOPEN_PROCEDURE.md\n\
  \ncontent_mode: full_text\ncontent_sha256: a5494b22fda1eeaf26d450f730119a4fb9ea4834970d4b5af05eb0f976f000fc\n\
  \n```text\n# REOPEN_PROCEDURE：再オープン手続きの運用手順\n\n最終更新：2026-06-10（現行の運用手順として更新）\n\n\
  ## 0. 位置づけ\n\n本文書は ReviewCompass の再オープン手続き（やり直し）を実行可能な手順にした運用文書である。運用時は本文書を手順の入口とし、形式的な契約は\
  \ [workflow-management design](../../.reviewcompass/specs/workflow-management/design.md)、[workflow-management\
  \ tasks](../../.reviewcompass/specs/workflow-management/tasks.md)、および [WORKFLOW_PRECHECK_DETAILS.md](WORKFLOW_PRECHECK_DETAILS.md)\
  \ の reopen 関連記述と整合させる。\n\n本手順は、現在の 5 段ワークフロー（drafting → triad-review → review-wave\
  \ → alignment → approval）を前提とする。\n\n## 1. いつ使うか\n\n下流の段（triad-review／review-wave／alignment／approval）で、上流フェーズ（過去フェーズ）の修正が必要な「遡及（そきゅう）所見」を発見したとき。同じフェーズの他機能への影響（波及）は機能横断段（review-wave）で扱い、本手続きの対象外。所見の波及種別の判断は\
  \ [SESSION_WORKFLOW_GUIDE.md](SESSION_WORKFLOW_GUIDE.md) を参照する。\n\n## 2. 4 過程の実行手順\n\
  \n再オープン手続きは 4 過程で扱う。各過程は「停止せず連続実行できる作業の単位」で、人の承認点または commit 停止点で締める。\n\n### 第1過程：判定とフラグ差し戻し（actor=llm、自律で連続実行）\n\
  \n1. 遡及所見を発見し、下流の作業を停止する\n2. 手戻り種別を判定する（N／R／D／A／I × 深さ）\n3. 上流変更を既存 feature の責務境界へ写像し、feature\
  \ impact を判定する。これは intent に限らず、feature-partitioning／requirements／design／tasks／implementation\
  \ のいずれを変更した場合も共通で行う\n   - 既存 feature に受け皿がある場合：該当 feature ごとに `reopen_existing_feature`、`no_reopen_existing_feature`、`indirect_check_only`\
  \ のいずれかを判定する\n   - 既存 feature に受け皿がない場合：`new_feature_required` として新 feature 候補を作る\n\
  \   - 判定の主軸は、文書内の挿入箇所ではなく、実装上の所有責務である。変更が実装責務または契約正本を変え得る feature は direct impact\
  \ として扱い、出力を読むだけ、派生物を作るだけ、手続きを確認するだけの feature は indirect check として扱う\n   - 各 feature\
  \ impact 判定には `impact_basis` を記録する。値は `implementation_ownership`、`contract_ownership`、`consumer_or_derivative_only`、`no_implementation_impact`、`new_feature_boundary`\
  \ のいずれかとする\n   - 判定が重要、曖昧、広範囲の場合は 3 役レビューに送る\n4. trigger_map で再実施対象の段を決定する（依存順＝`feature-dependency.yaml#feature_order`。旧称\
  \ phase_order）\n5. 種別判定と feature impact 判定の根拠を `docs/reviews/reopen-classification-<日付>.md`\
  \ に記録する。形式は既存の `docs/reviews/reopen-classification-*.md` の記録例に合わせる\n6. 進行中状態ファイル\
  \ `stages/in-progress/reopen-procedure-<日付>.yaml` を発行する\n7. spec.json のフラグを差し戻す：\n\
  \   - 上流：`reopened.<上流>=true`、上流の修正対象段（alignment／approval）を `false` に\n   - 下流：`recheck.upstream_change_pending=true`、`impacted_downstream_phases`\
  \ に下流確認対象を列挙する。下流段を `false` に戻すか、完了扱いのまま影響なし／間接確認のみとするかは feature impact 判定と下流影響判定で決める\n\
  \   - 上流段を `false` に戻しても、同フェーズ後段または下流フェーズ段を機械的にすべて `false` にする必要はない。ただし完了 commit\
  \ までに、残した段を含む feature impact 判定と下流影響判定を手続き記録へ明示する\n   - 複数段を実際に差し戻す場合は、下流側から上流側へ\
  \ `false` にすると作業状態を読みやすい。影響なしと判定した段は `true` のまま残してよい\n   - `recheck.upstream_change_pending=true`\
  \ または空でない `impacted_downstream_phases` を含む `spec.json` 変更は、対応する `stages/in-progress/reopen-procedure-*.yaml`\
  \ と同じ停止点 commit に含める\n\n→ **停止点：フラグ差し戻しの内容（手戻り種別・再実施範囲・差し戻し）を人が承認する**（この時点ではコミットしない）\n\
  \n### 第2過程：正本修正（actor=human または llm）\n\n8. 上流フェーズの正本（仕様文書の該当箇所）を修正する\n\n→ **停止点：コミット**（第1過程のフラグ差し戻しと本過程の正本修正をまとめて\
  \ 1 コミット）\n\n### 第3過程：連鎖再実施（依存順、各 approval で停止）\n\n9. 依存順に上流 → 下流の各フェーズで：\n   -\
  \ `pending_gates` は review 系 gate（triad-review／review-wave／alignment／approval）の処理順を表す。phase\
  \ の正本本文を更新する必要があり、先頭 gate が triad-review の場合、triad-review の前に drafting を実施する。drafting\
  \ 完了後は `drafting_completed_gates` に `stages/<phase>.yaml#drafting` を記録し、その後に triad-review\
  \ へ進む\n   - 正本本文（`.reviewcompass/specs/<feature>/<phase>.md`）を実質修正した phase は、triad-review\
  \ → review-wave → alignment → approval の順に再実施する。これは requirements／design／tasks／implementation\
  \ のいずれでも同じ\n   - 正本本文を修正していない phase は、trigger_map の pending gate に従って alignment（整合チェック）から再確認してよい\n\
  \   - 上流変更に対する下流影響判定を `downstream_impact_decisions` に記録する。これは intent に限らず、feature-partitioning／requirements／design／tasks／implementation\
  \ のいずれを変更した場合も共通で必須とする\n   - 「既存で受けられる」「修正不要」と判断する場合も、判定対象 gate、feature 範囲、判断、理由、証跡を記録する。修正不要は\
  \ reopen を省略する理由ではなく、reopen 後の影響判定結果としてのみ扱う\n   - 波及あり → triad-review に戻して対処（機能内対処または機能横断段へ）\n\
  \   - 波及なし → approval へ\n   - approval は人間の承認（actor=human）。proxy_model は review-run\
  \ 後の重要件判断だけを代行でき、approval 段の代行主体にはしない\n\n→ **停止点：各フェーズの approval（人の承認）。全フェーズ完了後にコミット**\n\
  \n### 第4過程：完了（連続実行）\n\n10. 整合性の最終確認（上流の変更が下流に正しく伝わったか）\n11. `reopen-finalize` で\
  \ recheck をクリアする（`upstream_change_pending=false`、`impacted_downstream_phases=[]`）、第4過程完了履歴を追加する、進行中状態ファイルを\
  \ `stages/completed/` へ移動する、の 3 点を一括で行う。`reopened.<上流>` は `true` のまま残す（履歴）。\n\n\
  → **停止点：コミット**\n\n第4過程の完了 commit では、`stages/completed/reopen-procedure-*.yaml` に\
  \ `feature_impact_decisions`、`new_feature_decision`、`impacted_downstream_phases`\
  \ と、`pending_gates` の各 gate を覆う `downstream_impact_decisions` が必要である。`feature_impact_decisions`\
  \ は、既存 feature ごとに `feature`、`decision`、`impact_basis`、`rationale`、`evidence` を持つ。`decision`\
  \ は `reopen_existing_feature`、`no_reopen_existing_feature`、`indirect_check_only`、`new_feature_required`\
  \ のいずれかとする。`impact_basis` は `implementation_ownership`、`contract_ownership`、`consumer_or_derivative_only`、`no_implementation_impact`、`new_feature_boundary`\
  \ のいずれかとする。`new_feature_decision.decision` は `no_new_feature` または `new_feature_required`\
  \ とする。`downstream_impact_decisions` の各判定は最低限、`gate`、`feature_scope`、`decision`、`rationale`、`evidence`\
  \ を持つ。`decision` は `affected_update_required`、`existing_sufficient`、`no_impact`、`approved`、`proxy_approved`\
  \ のいずれかとする。`impacted_downstream_phases` に列挙した各フェーズには、対応する `downstream_impact_decisions[].gate`\
  \ を少なくとも 1 件記録する。完了 commit に正本本文の変更が含まれる phase は、`pending_gates` に triad-review／review-wave／alignment／approval\
  \ をすべて含め、drafting を実施した phase は `drafting_completed_gates` または `completed_gates`\
  \ に `stages/<phase>.yaml#drafting` を含める。\n\n## 3. 手戻り種別と trigger_map\n\n種別記号は N（intent）／R（requirements）／D（design）／A（tasks）／I（implementation）×\
  \ 深さ（どこまで上流に戻るか）で表す。trigger_map（全 15 種）は種別から再実施対象段を返す。trigger_map の alignment／approval-only\
  \ は、該当 phase の正本本文を修正しない再確認に限る。正本本文を修正した phase は、その phase の triad-review／review-wave／alignment／approval\
  \ を再実施対象に加える。\n\n## 4. 状態遷移の早見表\n\n| 発見した問題 | 修正フェーズ | 主なアクション |\n|---|---|---|\n\
  | 要件の問題 | requirements | requirements を修正 → 下流（design／tasks／implementation）を reopen\
  \ 対象に → 依存順に連鎖再実施 |\n| 設計の問題 | design | design を修正 → 下流（tasks／implementation）を reopen\
  \ 対象に → 連鎖再実施 |\n| タスクの問題 | tasks | tasks を修正 → 下流（implementation）を reopen 対象に →\
  \ 連鎖再実施 |\n| 意図の問題 | intent | intent を修正 → 全機能の下流（requirements 以降）を reopen 対象に →\
  \ 連鎖再実施 |\n\n本表は代表例である。実際の再実施対象は、手戻り種別、trigger_map、正本本文を修正した phase、feature impact\
  \ 判定、下流影響判定を合わせて決める。\n\n## 5. spec.json の更新\n\n`reopened` は 6 フェーズ（intent／feature-partitioning／requirements／design／tasks／implementation）を対象とする。intent\
  \ と feature-partitioning は機能横断段のため、これらの `reopened` は全機能で同じ値になる。commit 時には [WORKFLOW_PRECHECK_DETAILS.md](WORKFLOW_PRECHECK_DETAILS.md#commit)\
  \ の reopen 検査により、recheck 印付き spec.json と reopen 手続き記録の対応、完了時の feature impact 判定、下流影響判定、影響フェーズ網羅が確認される。\n\
  \n## 6. 記録の確実性について\n\n本手続きの各ステップを LLM が忘れず実行する保証はない（ワークフロー記録全般が持つ脆さ）。本手続きでは、第1過程の承認、各\
  \ commit、各 approval を停止点として人の確認を挟む。また、`tools/check-workflow-action.py` の `reopen-start`、`spec-set`、`commit`、`next`\
  \ の各判定で、記録漏れや手順逸脱を検出可能にする。\n\n## 7. 関連参照\n\n- [WORKFLOW_PRECHECK.md](WORKFLOW_PRECHECK.md)（reopen-start\
  \ と commit 前検査の運用契約）\n- [WORKFLOW_PRECHECK_DETAILS.md](WORKFLOW_PRECHECK_DETAILS.md)（reopen\
  \ 関連の commit 検査詳細）\n- [WORKFLOW_NAVIGATION.md](WORKFLOW_NAVIGATION.md)（`reopen_in_progress`、`reopen_classification_required`、`stage`\
  \ の読み方）\n- [SESSION_WORKFLOW_GUIDE.md](SESSION_WORKFLOW_GUIDE.md)（所見提示、判断停止、作業完了時報告の運用）\n\
  - [workflow-management design](../../.reviewcompass/specs/workflow-management/design.md)（reopen\
  \ 機械強制モデル、後追い intent の下流再展開モデル）\n- [workflow-management tasks](../../.reviewcompass/specs/workflow-management/tasks.md)（T-007、T-008、XDI-WM-002）\n\
  - `tools/check-workflow-action.py`（`reopen-start`、`spec-set`、`commit`、`next` の実装）\n\
  ```\n\n\n## Scope\n\n- Check whether the changed target files clearly state the\
  \ intended contract.\n- Check whether related instructions are mutually consistent\
  \ across targets.\n- Check whether the documented procedure is actionable before\
  \ API review, triage, manifest, or commit steps continue.\n\n## Out Of Scope\n\n\
  - Do not request unrelated refactors or style-only rewrites.\n- Do not judge files\
  \ that are not listed in Target Files.\n- Do not treat missing implementation work\
  \ as a document defect unless the target text claims it already exists.\n\n## Finding\
  \ Policy\n\n- Report must-fix findings for contradictions, missing required gates,\
  \ or instructions that would allow an unsafe workflow action.\n- Report should-fix\
  \ findings for ambiguity that could cause repeated manual judgment or unnecessary\
  \ API review loops.\n- Return findings: [] when the target files are internally\
  \ consistent for this review question.\n\n## Sensitive Information Check\n\n- status:\
  \ passed\n- External API review must not proceed if this section reports potential\
  \ secrets.\n"
