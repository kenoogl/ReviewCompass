  \ contract で扱う |\n| `review-wave` | `external_call` | false | 横断 impact check の証跡生成を含む\
  \ |\n| `alignment` | `write` | false | LLM が整合確認 artifact を生成する |\n| `approval`\
  \ | `state_mutation` | true | 承認要求を構造化し、人間判断待ちへ渡す。proxy_model は human-only approval\
  \ を代行しない |\n\n`run_reopen_drafting` は drafting 正本の更新であり、`run_reopen_pending_gate`\
  \ とは分離する。`run_maintenance` と `run_workflow_stage` は複合操作として扱い、内部 operation または stage\
  \ 種別により `effect_kind` と `approval_required` が変わる。代表値だけで確定せず、`branching.branches[]`\
  \ に分岐条件、内部 step、各 step の `effect_kind`、最大副作用、承認要否の集約規則を持たせる。\n\n### 4. 複合操作の schema\
  \ 表現（Req 13 受入 8〜9）\n\n複合 operation は `effect_kind` を単一 enum のまま保持し、`max_effect_kind`\
  \ に最大副作用を置く。複数副作用の詳細は `sequence.internal_steps[]` と `branching.branches[]` に展開する。これにより、既存の単一値\
  \ schema を保ちながら、`run_maintenance` や `run_workflow_stage` の内部差異を LLM の推測に戻さない。\n\n\
  `record_human_decision` は承認対象 operation ではなく、判断記録 operation とする。`effect_kind=state_mutation`、`approval_required=false`、`phase_boundary=within_phase`\
  \ とし、記録対象は `target_operation_id`、`target_required_action`、`target_artifact_digest`\
  \ または `staged_file_set_digest` で束縛する。`record_human_decision` の完了だけでは、対象 operation\
  \ の `approval_required=true` を満たさない。承認として対象 operation を進められるかどうかは、Requirement 14\
  \ §1 の approval gate record にある `decision_scope`、`binding_kind`、digest 束縛、および対象\
  \ operation contract から導出した human-only / proxy-allowed 判定で決まる。\n\n### 5. registry\
  \ / preflight の read-only 境界（Req 13 受入 11〜12）\n\noperation preflight は `stages/operation-registry.yaml`\
  \ を入口にし、参照先 `stages/operation-contracts.yaml` の preconditions / postconditions /\
  \ side effects / approval_required を読み取る。preflight の責務は「開始前に確認すること」であり、contract\
  \ 正本、workflow state、approval record、side track stack、snapshot、review-run artifact\
  \ を作成・更新しない。\n\nread-only diagnostic 表示では、contract 参照欠落、digest drift、schema_version\
  \ mismatch、確認不能 precondition、正本 field 重複、未接続 `required_action` mapping を `WARN`\
  \ 以上にしてよい。ただし、その状態を operation が安全に束縛済みまたは実行可能である根拠にしてはならない。runner-enabled operation\
  \ では同じ状態を `DEVIATION` とし、operation 実行を開始しない。\n\n## Requirement 14 設計モデル：承認ゲート、側道スタック、状態スナップショット（Req\
  \ 14）\n\nRequirement 14 は、判断記録、側道作業、現在状態の可視化を、会話文脈ではなく機械可読状態として扱う。\n\n### 1. 承認ゲート\
  \ record（Req 14 受入 1〜3）\n\n承認ゲートは `wait_for_human_decision` と `record_human_decision`\
  \ のペアとして扱う。判断 record の最低構造は次とする。\n\n```yaml\nschema_version: string\ndecision_id:\
  \ string\ndecision: approved | rejected | deferred | changes_requested\ndecision_scope:\
  \ human_only | proxy_allowed | advisory_only\ntarget_operation_id: string\ntarget_required_action:\
  \ string\ntarget_artifact: string | null\ntarget_artifact_digest: string | null\
  \  # binding_kind=artifact_digest / both では必須\nstaged_file_set_digest: string |\
  \ null  # binding_kind=staged_file_set_digest / both では必須\nbinding_kind: artifact_digest\
  \ | staged_file_set_digest | both | none\ndecided_by: user | proxy_model\ndecided_at:\
  \ string\nsource_ref: string\nsource_digest: string\nrationale: string\nnext_action_expectation:\
  \ proceed | stay_blocked | redraft | repair\nconsumed: boolean\n```\n\n`approved`\
  \ 以外の判断は対象不可逆操作へ進めない。`rejected` は停止維持、`deferred` は待機、`changes_requested` は再起草または\
  \ repair へ分岐する。分岐を選ぶ責務は `next --json` に置き、LLM が会話上の雰囲気で選ばない。\n\nhuman-only decision\
  \ と proxy-allowed decision は approval gate record の `decision_scope` で区別する。`decision_scope`\
  \ は最低限 `human_only`、`proxy_allowed`、`advisory_only` の 3 値とする。`decision_scope` は\
  \ record 作成者が任意に選ぶ値ではなく、`target_required_action` から解決した operation contract の `approval_required`、`phase_boundary`、`effect_kind`、`actor.kind`、および\
  \ human-only override set から機械的に導出する。record 内の `decision_scope` が contract から導出した値と一致しない場合は形式不正として\
  \ fail-closed にする。\n\n`binding_kind` も operation contract から導出する。正本文書・review artifact・approval\
  \ artifact・proxy decision artifact を対象にする operation は `target_artifact_digest` を必須にする。commit\
  \ / staged content / apply-fixes / state mutation のうち git index に束縛される operation\
  \ は `staged_file_set_digest` を必須にする。両方を参照する operation は `binding_kind=both` とし、両\
  \ digest を必須にする。`binding_kind=none` は `wait_for_human_decision`、`collect_required_decisions`、`completed`\
  \ のような read-only / wait-only operation に限る。`approval_required=true`、human-only override\
  \ set、phase / gate completion、commit、push、`spec.json` 更新、reopen finalize の対象 record\
  \ では `binding_kind=none` を禁止する。必要な digest が欠落、null、または現在の対象 digest と不一致の場合、`record_human_decision`\
  \ は成功せず、`next --json` は対象 operation へ進めない。\n\nbinding 条件は次のとおりとする。record schema\
  \ はこの表を条件付き必須として実装し、両 digest を独立 optional として扱ってはならない。\n\n| binding_kind | 必須 digest\
  \ | null を許す digest | 対象 operation |\n|---|---|---|---|\n| `artifact_digest` | `target_artifact_digest`\
  \ | `staged_file_set_digest` | 正本文書、review artifact、approval artifact、proxy decision\
  \ artifact を対象にする判断 |\n| `staged_file_set_digest` | `staged_file_set_digest` | `target_artifact_digest`\
  \ | commit / push / staged content / git index に束縛される判断 |\n| `both` | `target_artifact_digest`\
  \ と `staged_file_set_digest` | なし | artifact と staged 内容の両方を対象にする判断 |\n| `none`\
  \ | なし | `target_artifact_digest`、`staged_file_set_digest` | read-only / wait-only\
  \ operation のみ。承認済み不可逆操作には使えない |\n\n`decided_by`、`decided_at`、`source_ref`、`source_digest`\
  \ は常に必須である。`source_digest` は判断根拠として提示・保存した source text または source artifact の SHA-256\
  \ hex とし、source が保存不能な場合でも omission reason を持つ source evidence artifact の digest\
  \ を記録する。actor、timestamp、source、target operation、required_action、binding digest のいずれかが欠落する\
  \ record は、承認 record ではなく形式不正として扱う。\n\n`decided_by=proxy_model` かつ `decision_scope=human_only`\
  \ の record は承認として扱わず、`next --json` は対象不可逆操作へ進めない。`decided_by=proxy_model` かつ `decision_scope=proxy_allowed`\
  \ の record は、finding triage や修正方針判断の証跡としてのみ使える。`decision_scope=advisory_only` は補助的判断であり、対象\
  \ operation の `approval_required=true` を満たさない。\n\nhuman-only decision の初期集合は次とする。\n\
  \n- commit\n- push\n- `spec.json` 更新\n- phase approval\n- reopen finalize\n- `approval_required=true`\
  \ の不可逆 operation 実行許可\n\nhuman-only override set は operation contract より強い。ある operation\
  \ が `approval_required=false` と書かれていても、commit、push、`spec.json` 更新、phase / gate completion、reopen\
  \ finalize、または approval-required irreversible operation execution に該当する branch では\
  \ `decision_scope=human_only` とする。\n\nproxy_model は finding triage、同根 cluster の採否案、補助的な整合判断を代行できる。ただし\
  \ proxy_model decision は human-only decision の承認主体を置換しない。\n\n### 2. side track stack（Req\
  \ 14 受入 4〜7）\n\nside track は stack frame として `stages/in-progress/side-track-stack.yaml`\
  \ または後継 runtime state に保持する。初期実装では既存の `process_id: maintenance` 進行中ファイルを互換入力として扱い、Phase\
  \ 3 以降で stack schema へ寄せる。\n\nframe の最低構造は次とする。\n\n```yaml\nframe_id: string\nkind:\
  \ maintenance | follow_up | blocker_repair | dependent_issue\nparent_frame_id: string\
  \ | null\npushed_by: user | llm | tool\ntitle: string\nspawned_from:\n  required_action:\
  \ string\n  active_gate: string | null\n  state_file: string | null\nallowed_scope:\
  \ string\nallowed_files: [string]\ncompletion_conditions: [string]\nreturn_to:\n\
  \  required_action: string\n  active_gate: string | null\n  state_refs: [string]\n\
  staged_file_set: [string]\nstaged_file_digest: string\npushed_at: string\nmax_depth:\
  \ integer\n```\n\npush 時、pop 直前、commit / push 直前に `staged_file_set` と `staged_file_digest`\
  \ を採取して照合する。top frame 以外の pop、`allowed_files` 外の staged 変更、親子 frame の未許可 overlap、push\
  \ 時点からの予期しない digest 変化、pop 時の digest / set 不一致は、Phase 3 では `WARN` 以上、Phase 5 では\
  \ `DEVIATION` または `repair_workflow_state` とする。`max_depth` は既定 2 で、Phase 3 は警告、Phase\
  \ 5 はブロックする。\n\nside track stack の read-only 操作は `current` / `inspect` とし、stack\
  \ state を書き換えない。mutating 操作は `push` / `pop` / `repair` とし、operation contract の preconditions\
  \ / postconditions を通す。`push` は新 frame を top に追加し、`pop` は top frame だけを閉じる。pop 後に\
  \ `return_to` が解決できない、または staged file set が本線復帰条件を満たさない場合、`next --json` は通常作業に戻さず\
  \ `repair_workflow_state` または同等の停止状態を返す。\n\n### 3. workflow-state snapshot（Req 14\
  \ 受入 8〜10）\n\n`.reviewcompass/runtime/workflow-state-snapshot.yaml` は `next --json`\
  \ の副産物であり、正本ではない。正本は常に `next --json` と state refs である。snapshot が古い、手動更新された、または直近\
  \ `next --json` と照合できない場合は信頼しない。\n\nsnapshot の最低構造は次とする。\n\n```yaml\nschema_version:\
  \ string\ngenerated_by: tools/check-workflow-action.py\ngenerated_at: string\nsource_next_action_sha256:\
  \ string\ncurrent_work:\n  required_action: string\n  title: string\n  outer_node:\
  \ string | null\n  inner_node: string | null\n  active_gate: string | null\nactive_side_tracks:\
  \ [object]\ngit_tree_summary:\n  clean: boolean\n  staged_files: [string]\n  unstaged_files:\
  \ [string]\npost_write_manifest_summary: object\nworkflow_state_summary: object\n\
  ```\n\n`current_work.outer_node` は reopen / maintenance / workflow / post-write\
  \ などの外側の状態、`inner_node` は phase / stage / gate などの内側の単位を表す。UI や人向け報告は snapshot を読んでよいが、操作可否は\
  \ `next --json` と operation preflight で再確認する。\n\n### 4. read-only / mutating 操作の保存先（Req\
  \ 14 受入 11〜12）\n\napproval gate record、side track stack、workflow-state snapshot\
  \ は次の保存先を基線とする。\n\n| 対象 | 保存先 | 正本性 | read-only 操作 | mutating 操作 |\n|---|---|---|---|---|\n\
  | approval gate record | `.reviewcompass/runtime/approvals/` 配下または後継 approval state\
  \ | 承認判断の正本 | inspect | record / consume / invalidate |\n| side track stack | `stages/in-progress/side-track-stack.yaml`\
  \ または後継 runtime state | side track 状態の正本 | current / inspect | push / pop / repair\
  \ |\n| workflow-state snapshot | `.reviewcompass/runtime/workflow-state-snapshot.yaml`\
  \ | 可視化・監査補助、正本ではない | snapshot / inspect | save snapshot のみ。操作許可は変更しない |\n\nread-only\
  \ 操作と mutating 操作を同じ operation として扱ってはならない。mutating 操作は Requirement 13 の operation\
  \ contract に接続し、approval_required、preconditions、postconditions、side effects を明示する。\n\
  \n## Requirement 15 設計モデル：構造化有効プロンプトと監査（Req 15）\n\nRequirement 15 は、有効プロンプトを「LLM\
  \ が行う言語タスクの仕様」として構造化する。機械タスクは operation contract、preflight、runner、guard が担う。\n\n\
  ### 1. structured effective prompt schema（Req 15 受入 1〜4）\n\n既存の `.reviewcompass/runtime/effective-prompts/*.prompt.md`\
  \ は互換出力として維持する。Phase 4 では、同じ判定点から構造化 YAML または JSON を生成し、Markdown prompt はその人向けレンダリングとして扱う。\n\
  \n```yaml\nschema_version: string\ndecision_point:\n  kind: string\n  required_action:\
  \ string\n  phase: string | null\n  stage: string | null\n  active_gate: string\
  \ | null\nprompt_length:\n  min_chars: integer\n  max_chars: integer\n  source_ref:\
  \ string\n  failure_verdict: WARN | DEVIATION\npreconditions_checked:\n  - id: string\n\
  \    source: next_json | operation_preflight | schema_validation | manifest_validation\n\
  \    machine_checked: true\n    evidence_ref: string\nlanguage_task:\n  document_kind:\
  \ design | requirements | tasks | review | alignment | approval | report\n  input:\n\
  \    required_files: [string]\n    state_refs: [string]\n    source_refs: [string]\n\
  \  output_format:\n    kind: markdown | yaml | json\n    required_sections: [string]\n\
  \    schema_ref: string | null\n  constraints: [string]\npostconditions:\n  - id:\
  \ string\n    check_kind: section_exists | schema_valid | target_set_matches | next_action_compatible\
  \ | manual_review_required\n    source_ref: string\non_completion:\n  next_required_action:\
  \ string | null\n  allowed_followups: [string]\n  forbidden_actions: [string]\n\
  ```\n\n`preconditions_checked` は機械が確認済みの条件だけを参照する。LLM がこれから確認する事項をここに置いてはならない。`language_task`\
  \ は生成または判断する文章の範囲を表し、commit、push、spec.json 更新、review-run 実行などの機械操作手順を埋め込まない。\n\n\
  `prompt_length` は、判定点ごとの長さ上下限を構造化 prompt に写した監査用フィールドである。正本は `docs/operations/WORKFLOW_DISCIPLINE_MAP.yaml#decision_points`\
  \ の各判定点に置く `prompt_length_bounds` とし、個別判定点に未設定の場合は同ファイルの `default_prompt_length_bounds`\
  \ を使う。上下限は `min_chars`、`max_chars`、`failure_verdict` を持ち、`min_chars` と `max_chars`\
  \ は正の整数かつ `min_chars < max_chars` でなければならない。`failure_verdict` は範囲外 prompt の第1層機械検査\
  \ verdict であり、未設定値を runner が推測してはならない。\n\n長さ基準の設定主体は workflow-management の設計・規律マップ更新手続きであり、task\
  \ 個別の review-run や prompt generator が場当たり的に決めてはならない。上下限の変更は Requirement 13〜15 の責務境界を変えるため、通常の\
  \ design / tasks / implementation 連鎖で扱う。\n\n### 2. 第1層機械検査（Req 15 受入 5）\n\n有効プロンプト検査は次を確認する。\n\
  \n- 参照先ファイルとアンカーが存在する\n- `decision_point`、`preconditions_checked`、`language_task`、`postconditions`、`on_completion`\
  \ が存在する\n- `prompt_length` が `WORKFLOW_DISCIPLINE_MAP.yaml` の `prompt_length_bounds`\
  \ または `default_prompt_length_bounds` と一致し、長さがその上下限内にある。範囲外の場合は当該 bounds の `failure_verdict`\
  \ を返す\n- DISCIPLINE_MAP または後継 registry に未登録の action kind を使っていない\n- review target\
  \ manifest と review-run target が一致する\n- `language_task.output_format` と `postconditions`\
  \ が対応している\n- `preconditions_checked` が機械確認済み条件だけを参照している\n- `on_completion` が operation\
  \ contract の postconditions と次 action に矛盾しない\n\nstaged file set とのコミット混線、side track\
  \ depth、operation preflight の pending conflict は Requirement 12・14 の責務であり、有効プロンプト検査はその結果を参照するだけにする。\n\
  \n### 3. LLM judge audit（Req 15 受入 6〜7）\n\nPhase 6 では、構造化有効プロンプト、該当する `WORKFLOW_NAVIGATION.md`\
  \ 節、operation contract を入力として LLM judge audit を実行できるようにする。出力は schema 適合 JSON または同等の構造化形式とし、最低限\
  \ `gap_id`、`severity`、`prompt_ref`、`contract_ref`、`finding`、`recommended_action`、`blocks_approval`\
  \ を持つ。\n\nLLM judge audit は意味的な不足を見つける補助であり、最終承認を自動化しない。既知 gap fixture には、必須構造節欠落、機械タスクの\
  \ prompt 内残留、preconditions の網羅不足、postconditions の確認不能性を含める。\n\n## Requirement 16\
  \ 設計モデル：段階的実装計画 Phase 0〜6（Req 16）\n\nRequirement 16 は、選択層と実行層の機械化を一度に混ぜず、既存挙動を壊さない順序で実装するための計画である。\n\
  \n### 1. Phase anchor と順序（Req 16 受入 1〜10）\n\n| Phase | 主対象 | 完了条件 |\n|---|---|---|\n\
  | Phase 0 | D-003 選択層 | 19段階優先順位、`required_action` 唯一化、invariant 検査、mechanical workflow-state\
  \ repair detection、reopen plan compiler / `reopen-recompile` 相当が TDD で通る |\n| Phase\
  \ 1 | 語彙・schema | `.reviewcompass/schema/` の required_action / next_action / operation\
  \ contract / effect_kind / phase_boundary / snapshot / language task schema が meta-schema\
  \ 検証を通る |\n| Phase 2 | read-only registry | `check-workflow-action.py operation-list\
  \ --json` または同等が operation contract を読み取り専用で返す |\n| Phase 3 | advisory preflight\
  \ | `operation-preflight <id> --json` または同等が pending conflict、side track depth、commit\
  \ mixing、prompt 機械検査を `WARN` 以上で返す |\n| Phase 4 | structured effective prompt |\
  \ 全判定点で構造化 prompt と既存 Markdown prompt を生成し、互換 path を維持する |\n| Phase 5 | mechanical\
  \ blocking | Phase 3 の警告対象のうち serial_only 違反、承認欠落、side track depth 超過、commit mixing\
  \ を `DEVIATION` で止める |\n| Phase 6 | LLM judge audit | 構造化 prompt と運用文書を入力に gap を構造化出力する。承認自動化はしない\
  \ |\n\nPhase 0 の安定 anchor は `docs/notes/working/2026-06-16-next-json-unique-state-redesign.md`\
  \ の D-003 とする。ただし Phase 0 完了条件は working note の節番号に依存させず、本設計の次の 6 失敗テストを tasks /\
  \ implementation の受入単位へ写す。\n\n1. `commit_stop_point=true` の reopen state では、`pending_gates`\
  \ が残っていても `required_action=commit_stop_point`、`active_gate=null`、`phase=null`、`stage=null`\
  \ を返す。\n2. `current_blocker` がある reopen state では、`pending_gates` が残っていても `required_action=wait_for_human_decision`、`active_gate=null`\
  \ を返す。\n3. 正本変更済み phase が `canonical_update_phases` にあるのに `future_gates` / `pending_gates`\
  \ が full gate を含まない場合、`verdict=DEVIATION`、`required_action=repair_workflow_state`\
  \ を返す。\n4. 第3過程で active gate がある場合だけ、`phase` / `stage` が非 null になる。\n5. commit stop\
  \ point commit 後、worktree clean で HEAD が当該 stop point を含む場合、`required_action=advance_reopen_after_commit_stop_point`\
  \ を返し、同じ commit stop point を再提示しない。\n6. `required_action` ごとの JSON 相互排他 schema を\
  \ fixture で検証する。\n\nmechanical workflow-state repair detection は Phase 0 の完了条件である。`next\
  \ --json` は、reopen state の `active_reopen_scope` / `active_impact_review_scope`、`pending_gates`、`completed_gates`、`drafting_completed_gates`、`downstream_impact_decisions`、commit\
  \ stop point、`current_blocker`、`spec.json` workflow_state の間に矛盾を検出した場合、通常 action\
  \ へ進まず `required_action=repair_workflow_state` と `verdict=DEVIATION` を返す。Phase 0\
  \ は、この repair detection が少なくとも上記 6 失敗テストの 3 番と active scope 欠落・矛盾ケースで TDD 検証されるまで完了扱いにしない。\n\
  \nPhase 1 のうち `required_action.schema.json` と `next_action_response.schema.json`\
  \ は Phase 0 開始をブロックする最小前提として先行済みである。他の operation contract 系 schema は Phase 0 と並行可能だが、Phase\
  \ 2 へ進む前にはそろえる。\n\n各 Phase の終了時は、`next --json` が通常作業へ戻れる状態、または明示された停止状態を返すことを確認する。Phase\
  \ をまたいだ途中状態を単一 commit に混在させない。\n\n### 2. reopen scope と impact review scope（Req\
  \ 16 受入 11〜12）\n\n本改訂の active reopen scope は `workflow-management` の requirements\
  \ から design / tasks / implementation への連鎖再実施である。active scope の正本は `stages/in-progress/reopen-procedure-*.yaml`\
  \ の `active_reopen_scope` と `active_impact_review_scope` である。`spec.json.reopened`\
  \ は過去に上流を reopen した履歴フラグとして保持され得るため、現在の active reopen scope と同一視しない。\n\n`active_reopen_scope`\
  \ は正本を再オープンして workflow_state flag を false に戻した feature / phase / gate 範囲を持つ。`active_impact_review_scope`\
  \ は、正本変更の有無を確認する consumer / derivative feature / phase / gate 範囲を持つが、当該 feature\
  \ の workflow_state flag を自動で false に戻す根拠ではない。`next --json` は reopen 中にこの in-progress\
  \ record を必ず読み、scope が欠落・不整合・stale の場合は `repair_workflow_state` を返す。\n\n初期化は reopen\
  \ 第1過程で行う。trigger_map と分類根拠から両 scope を生成し、利用者承認後に in-progress record へ固定する。更新は gate\
  \ 完了記録と downstream impact decision の追加に限定し、scope の拡張・縮小は新しい利用者判断または `repair_workflow_state`\
  \ を必要とする。終了は reopen 第4過程で行い、全 pending gate が解消し、active scope 全件が completed gate\
  \ または downstream impact decision で覆われた場合だけ in-progress record を `stages/completed/`\
  \ へ移す。\n\noperation contract、構造化有効プロンプト、状態スナップショット、proxy_model triage decision の機械処理化は、他\
  \ feature が consumer / derivative として参照し得る。正本 reopen 対象を `workflow-management` に限定する場合でも、review-wave\
  \ では foundation、runtime、evaluation、analysis、self-improvement、conformance-evaluation\
  \ への正本変更要否と consumer 契約影響を確認し、reopen scope と impact review scope を混同せず記録する。\n\n\
  ### 3. proxy_model triage decision の機械処理化\n\nproxy_model triage decision は、review-run\
  \ 後の重要件判断を一括化しても、finding ごとの traceability と承認 scope を失わないための operation family として扱う。対象\
  \ operation は次を初期集合とする。\n\n- `proxy_triage_prepare_input`：raw response、parsed finding、同根\
  \ cluster、候補案を読み、proxy_model 入力 bundle を作る。\n- `proxy_triage_record_cluster_decision`：cluster\
  \ 単位の proxy raw response と decision を保存する。\n- `proxy_triage_expand_findings`：cluster-level\
  \ decision を finding-level decision へ展開する。\n- `proxy_triage_validate_coverage`：triage\
  \ 対象 finding ID が decision file で過不足なく覆われているか検査する。\n- `proxy_triage_apply_batch`：coverage\
  \ validation が通った finding-level decision だけを `triage.yaml` へ batch 適用する。\n\nproxy_model\
  \ triage decision の適用前には、human-required predicate を必ず評価する。predicate は provider /\
  \ model 名を見ず、次の証跡だけを読む。\n\n1. proxy 適用対象 finding / cluster coverage と raw / parsed\
  \ / prompt 証跡\n2. approval gate record の `decision_scope`、`decision`、`decided_by`、`target_operation_id`、`target_required_action`、`binding_kind`、digest\
  \ 束縛\n3. operation contract の `approval_required`、`phase_boundary`、`effect_kind`、`actor.kind`、human-only\
  \ override set\n4. review-wave impact evidence の未解決状態\n5. downstream impact decisions\
  \ と active reopen scope / impact review scope の整合\n\ntriage item の `decision_status`、`final_label`、`decision_actor_type`\
  \ は適用対象の状態確認と二重適用防止には使ってよいが、human-required predicate の正本にはしない。human-required predicate\
  \ の正本は approval gate record と operation contract、および review-wave / downstream impact\
  \ evidence である。\n\nhuman-required predicate は `proxy_triage_evaluate_human_required`\
  \ という read-only internal check として扱う。入力は、対象 finding / cluster IDs、finding-to-operation\
  \ mapping、関連 approval gate record、対象 operation contract、review-wave impact evidence、active\
  \ reopen scope / impact review scope とする。出力は最低限、`verdict`、`blocks_proxy_apply`、`blocking_reasons[]`、`checked_records[]`、`checked_contracts[]`、`source_refs[]`\
  \ を持つ。`blocks_proxy_apply=true` の場合、後続の `proxy_triage_apply_batch` は `DEVIATION`\
  \ とし、`triage.yaml` を更新しない。\n\n`未解決 approval gate` は、対象 finding / cluster または対象 operation\
  \ に紐づく approval gate record のうち、`decision` が `approved` ではない、`consumed=false` のまま対象\
  \ operation に未反映、`decision_scope=human_only`、binding digest 不一致、または `next_action_expectation`\
  \ が `proceed` 以外のものを指す。record が欠落していて、対象 operation contract が `approval_required=true`、human-only\
  \ override set、phase / gate completion、commit、push、`spec.json` 更新、reopen finalize、または\
  \ approval-required irreversible operation execution に該当する場合も、未解決 approval gate\
  \ と同等に扱う。\n\n`approval_required=true の対象 operation` は、finding-to-operation mapping\
  \ から得た `target_operation_id` / `target_required_action` を `stages/operation-contracts.yaml`\
  \ の operation contract に解決し、その contract の `approval_required=true`、または branch 内部\
  \ step の approval aggregation が true になるものを指す。mapping が欠落、複数候補で一意に解決不能、contract\
  \ 参照欠落、contract digest / schema_version drift の場合は、proxy が安全に適用可能とは扱わず `blocks_proxy_apply=true`\
  \ とする。\n\npredicate の評価順序は次の固定順とする。\n\n1. coverage と証跡存在を検査し、対象 finding / cluster、raw、parsed、prompt、proxy\
  \ raw、decision file、mapping が過不足なくそろわない場合は `DEVIATION`。\n2. finding-to-operation\
  \ mapping から対象 operation contract を解決し、一意に解決できない場合は `DEVIATION`。\n3. 対象 operation\
  \ contract と human-only override set から `approval_required`、`phase_boundary`、`effect_kind`、`actor.kind`、approval\
  \ aggregation を評価する。\n4. 関連 approval gate record の `decision_scope`、`decision`、`decided_by`、`binding_kind`、digest、`consumed`、`next_action_expectation`\
  \ を検査する。\n5. review-wave impact evidence、downstream impact decisions、active reopen\
  \ scope / impact review scope の未解決・矛盾を検査する。\n6. 3〜5 のいずれかが human-required を示す場合は、triage\
  \ item の `decision_status`、`final_label`、`decision_actor_type`、proxy decision の\
  \ selected option に関係なく `blocks_proxy_apply=true` とする。\n\n優先順位は次のとおりとする。\n\n1. `decision_scope=human_only`、未解決\
  \ approval gate、`approval_required=true` の対象 operation、未解決 review-wave impact evidence\
  \ は、proxy_model の判断より常に優先し、proxy apply を止める。\n2. 必須証跡が欠落、競合、または対象 finding / cluster\
  \ coverage を満たさない場合は `DEVIATION` とする。\n3. triage 上の `leave-as-is`、`proxy_approved`、または\
  \ proxy_model の selected decision は、1 の human-required 証跡を打ち消さない。\n4. 1〜3 を通過し、かつ\
  \ finding / cluster coverage が完全な場合だけ、proxy decision を finding-level decision へ展開できる。\n\
  \n`proxy_triage_apply_batch` の operation contract は、preconditions に次を持つ。\n\n- `proxy_triage_validate_coverage`\
  \ が成功している\n- `proxy_triage_evaluate_human_required` が成功し、`blocks_proxy_apply=false`\
  \ を返している\n- すべての対象 finding に raw response、parsed finding、decision prompt、proxy raw\
  \ response、cluster/finding mapping が存在する\n- 対象 finding / cluster に紐づく approval gate\
  \ record が存在する場合、その `decision_scope` は `proxy_allowed` または `advisory_only` であり、`human_only`\
  \ ではない\n- 対象 operation contract の `approval_required` が true、または human-only override\
  \ set に該当する場合、proxy apply を停止する\n- review-wave impact evidence、downstream impact\
  \ decisions、active reopen scope / impact review scope に未解決または矛盾がない\n\nこれらの preconditions\
  \ のいずれかが満たされない場合、`proxy_triage_apply_batch` は `DEVIATION` とし、triage.yaml を更新しない。\n\
  \ncluster-level decision は保存してよいが、実装修正や manifest 作成の承認単位は finding-level decision\
  \ とする。`proxy_triage_expand_findings` は、cluster ID、含まれる finding IDs、採用案、棄却案理由、final\
  \ label、source raw paths、decision prompt path、proxy raw path を finding ごとに複製し、各\
  \ finding decision に `cluster_decision_id` を保持する。\n\ncoverage validation は次を fail-closed\
  \ にする。\n\n- triage 対象 finding ID が decision file に存在しない\n- decision file に triage\
  \ 対象外 finding ID が混入している\n- cluster decision の finding set と展開後 finding decisions\
  \ が一致しない\n- `final_label`、採用案、判断理由、source raw paths、decision prompt path、proxy raw\
  \ path のいずれかが欠落している\n- `review_triage_decide` approval と apply-fixes approval の\
  \ scope が一致しない\n\napproval scope は `approval_record.scope` で区別する。`review_triage_decide`\
  \ は triage label の採否だけを許可し、仕様文書・実装・spec.json・workflow_state の変更は許可しない。apply-fixes\
  \ は対象 finding IDs、対象ファイル、期待する変更種別を別 record として持つ。batch 適用は triage decision の一括反映に限り、修正実装を同時に行わない。\n\
  \n## 主要な設計判断（Interface Decisions）\n\n### 判断 1：段集合は静的列挙、Markdown からの動的解析はしない\n\n\
  理由：素材設計（節ハッシュ・独立再導出パーサ・通過マーカー）は実装コストが高く、フェーズ 1 では維持できない。YAML 静的列挙に置き換えることで実装コストを\
  \ 1／10 に抑え、Markdown 側との整合は人手で取る前提とする（§5.4 受け入れリスク）。\n\n### 判断 2：検査スクリプトは中身を判定しない\n\
  \n理由：中身の妥当性判定を始めると検査スクリプトの規模が爆発し、第 1 層の本来の責務（証跡＋必須節の機械判定）が薄まる。中身判定は第 3 層（利用者監査）と第\
  \ 4 層（定期事後監査）に委ね、第 1 層は「形式が揃っているか」のみに絞る。\n\n### 判断 3：fail-closed を全面採用\n\n理由：誤って不可逆操作を許可することによる被害は、検査が\
  \ pass しないことで作業が止まる不便さを大きく上回る。曖昧なときは止める方針を全段に適用する。\n\n### 判断 4：直前ゲートは最小集合に絞る\n\n\
  理由：機械ゲートをすべての段遷移に置くと、検査スクリプトを呼ぶ頻度が上がり、LLM が「検査を回避する」「結果を読み飛ばす」失敗モードを誘発する。不可逆操作の直前のみに絞ることで、検査の存在感を維持し、回避のコストを上げる。\n\
  \n### 判断 5：reopen 連鎖は actor=human で必ず停止\n\n理由：「LLM が intent を勝手に書き換えて承認なしで進む」リスクは構造的に止めなければならない。trigger_map\
  \ の連鎖を `actor=human` の段で必ず停止させ、人間承認なしには次に進めない設計とする。\n\n### 判断 6：機能依存マップは 1 ファイル所有\n\
  \n理由：各フェーズの YAML に依存関係を分散させると、新機能追加時の整合漏れが避けられない。1 ファイル所有・他機能は参照のみ、の構造で整合漏れを構造的に防ぐ。\n\
  \n### 判断 7：規律変更は本機能が所定手続き経由で実体変更（A-007 案 2、A-012 対処で時系列契約・完了通知形式を詳細化）\n\n理由：規律ファイル本体の変更権を\
  \ `self-improvement`（提案権）と本機能（実体変更権）に分散させ、自己承認の空洞化を防ぐ。`self-improvement` が直接ファイル書き換えを行うことを禁じ、必ず本機能の所定手続き（drafting\
  \ → review → approval）を通す。\n\n**self-improvement との時系列契約・完了通知形式（A-012 対処、2026-05-26\
  \ セッション 28 確定、self-improvement design §13.5 の合意点を受け入れ）**：\n\nself-improvement design\
  \ §13.5 で本機能との接合面の詳細が定義されており、本機能はこの合意点を受け入れる。\n\n- **時系列契約**：\n  - `approved` ＝\
  \ self-improvement の提案レビュー承認時点\n  - `materialized_at` ＝ 本機能の所定手続き完了時点（self-improvement\
  \ の status は `approved` のまま、本フィールドのみ追記）\n- **入力経路**：self-improvement が承認済み提案 YAML\
  \ を `git mv` で `learning/workflow/approved-updates/` に配置、本機能はこのディレクトリを所定手続きの input\
  \ として読む\n- **完了通知形式**：本機能が所定手続き完了時に `approved-updates/<日付>-<id>.yaml` に次のフィールドを追記：\n\
  \  - `materialized_at`：ISO 8601 形式の完了時点\n  - `materialization_commit_hash`：規律ファイルの実体変更コミットのハッシュ\n\
  - **ロールバック責務**：`approved` だが未 `materialized` の状態でロールバックが必要になった場合、self-improvement\
  \ が `superseded` に遷移させ、本機能に通知する（本機能側で能動的なロールバック実行は不要、状態は self-improvement が管理）\n\
  - **整合性検査タイミング**：本機能の `materialized_at` 記録後、self-improvement の遵守検査再実行のトリガーとなる（self-improvement\
  \ §11.6 と整合）\n\n### 判断 8：補助層 C の段階 2 を本機能が所有\n\n理由：補助層 C 段階 2 の検査スクリプト（`check-workflow-action.py`）は本機能の\
  \ Req 2 検査スクリプトと実体が同一であり、別経路で同じ機能を実装すると保守コストが二重化する。段階 2 は本機能が単独所有し、段階 1（LLM 規律）と段階\
  \ 3（Claude Code フック）は段階 2 を呼ぶだけの薄い層とする。\n\n## 要件と設計の対応（Requirements Traceability）\n\
