  \ Requirement 13 の contract 境界に従う。\n\n### 実行時生成物の凍結期（P3 まで）の扱い（2026-06-12 配置規約 P1）\n\
  \n本機能の実行時生成物 3 パス（検査ログ `.reviewcompass/runtime/logs/workflow-precheck.log`〔旧 `docs/logs/workflow-precheck.log`〕、effective\
