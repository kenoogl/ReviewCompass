  plain_language_summary: rollout 探索のディレクトリ前方一致が repo == cwd と startswith(repo + '/')
    で行われるが、cwd が末尾スラッシュ付きで渡された場合 repo は rstrip('/') 済みなので問題ないものの、別 repo がサブパス接頭辞を共有する場合（例
