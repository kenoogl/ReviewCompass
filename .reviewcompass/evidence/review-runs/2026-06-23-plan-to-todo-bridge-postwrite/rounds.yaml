  \ の phase/task、acceptance_criteria、残作業をどの単位で TODO に切るかを定義する。\n  cli:\n  - id: PTC-3\n\
  \    title: plan 由来 TODO の作成または確認を促す導線を追加する\n    status: pending\n    detail: plan\
