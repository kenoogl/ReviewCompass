  plain_language_summary: rollout 検証用の find_rollout は CODEX_ROOT 配下を rglob で走査し session_meta
    の id/cwd 一致で元 rollout を選ぶが、複数 rollout が同一 session_id を持つ場合に best=(mtime, path)
    を最大 mtime で選ぶため、下書き作成時に sha256 を取った rollout と別ファイルを掴む可能性がある。一致 hash を持つ rollout
    が複数候補にあっても mtime 最大の 1 件しか検査しないため、進行中判定（mismatch）と検証不能判定の境界が rollout 選択に依存する。
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 安全策2/3 の核は『下書き source_sha256 と現在の元 rollout sha256 の一致だけで昇格』だが、対象
    rollout の同定が mtime 最大という弱い基準で行われるため、別 rollout を掴むと本来 match すべき下書きを mismatch/unverifiable
    と誤判定（昇格漏れ）し得る。誤って昇格する方向ではないため安全側だが、合意した『最新候補 1 件を確実に昇格する』動作の確実性に影響する。テストは 1 session_id
    = 1 rollout 前提のみで、この分岐を固定していない。
