  severity_original: WARN
  severity_normalized: WARN
  target_location: .codex/hooks/session-record-promote-previous-draft.sh (find_rollout)
    and tests/hooks/test_codex_session_record_promote_previous.py::test_duplicate_session_rollouts_prefer_hash_matching_source
  plain_language_summary: The find_rollout fallback returns the most recent rollout
    (best by mtime) when no hash-matching rollout exists, but its actual_sha is then
    compared against expected in the caller. When a duplicate session_id has a later
    non-matching rollout AND the original matching rollout exists, the loop returns
    the matching one immediately via early-return; however if iteration order encounters
    the non-matching newer rollout first the early-return on the matching file still
    wins. The test only fixes the case where a hash match exists. There is no test
    for the case where two same-session rollouts both differ from the draft hash (e.g.
    the matching original was rotated/deleted), where the fallback returns the newest
    mismatched rollout and emits previous_draft_in_progress — which is the intended
    safe behavior but is unverified.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The duplicate-rollout selection logic has a fallback branch (return
    newest by mtime) whose mismatch outcome is not exercised by any test. A regression
    that changed the fallback to silently treat a mismatched newest rollout as match
    would not be caught, weakening the in-progress safety guarantee that the document
    claims is fixed for r7.
  applied_files: []
  superseded_by: null
