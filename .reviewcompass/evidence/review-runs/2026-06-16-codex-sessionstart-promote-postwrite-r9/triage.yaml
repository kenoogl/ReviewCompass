  plain_language_summary: The repo hook hardcodes DRAFT_DIR/EVIDENCE_DIR/DOCS_DIR
    defaults to $REPO_ROOT-based paths and reads them before parsing payload, while
    the template derives DRAFT_DIR/EVIDENCE_DIR/DOCS_DIR from $CWD (payload-derived)
    after jq parsing. This divergence is intentional (repo uses local root, template
    uses target-app cwd) but is not asserted by any equivalence test. No finding-level
    defect, but the two files share a large copied Python heredoc body that can drift.
  final_label: null
