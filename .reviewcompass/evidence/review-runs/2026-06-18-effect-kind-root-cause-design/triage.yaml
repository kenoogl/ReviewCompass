  severity_original: ERROR
  severity_normalized: ERROR
  target_location: §3 required_action/effect_kind table and §3.1
  plain_language_summary: 'The same operations are assigned conflicting effect_kind
    values: several actions are listed as state_mutation in the table but later declared
    to require effect_kind: irreversible_action.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 'The design says approval gates are triggered by effect_kind: irreversible_action,
    but actions such as apply_approved_reopen_plan, run_reopen_start, advance_reopen_after_commit_stop_point,
    advance_reopen_after_approval_stop_point, finalize_reopen, and repair_workflow_state
    are mapped to state_mutation in §3. A machine-readable operation registry derived
    from the table could therefore fail to require approval for irreversible state
    changes.'
  applied_files: []
  superseded_by: null
- finding_id: 2026-06-18-effect-kind-root-cause-design-gpt-5.5-adversarial-002
  run_id: 2026-06-18-effect-kind-root-cause-design
  source_model: gpt-5.5
  source_round: round-1
  source_raw_path: raw/gpt-5.5.round-1.txt
  source_parsed_path: parsed/gpt-5.5.round-1.yaml
  severity_original: ERROR
  severity_normalized: ERROR
  target_location: §3 and §3.1 effect_kind model
  plain_language_summary: 'effect_kind conflates two separate design dimensions: the
    kind of side effect and whether the operation is irreversible or approval-gated.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 'Operations such as apply_approved_reopen_plan are both state mutations
    and irreversible. Modeling irreversible_action as an alternative effect_kind forces
    the design to choose between describing the technical effect and describing the
    approval requirement. This obscures root cause, weakens contract validation, and
    makes it hard for execution tooling to select the correct executor, preconditions,
    postconditions, and approval policy. The design should separate these concerns,
    for example effect_kind: state_mutation plus irreversible: true or approval_required:
    true.'
  applied_files: []
  superseded_by: null
