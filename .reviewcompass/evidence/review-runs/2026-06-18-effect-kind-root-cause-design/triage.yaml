  severity_original: WARN
  severity_normalized: WARN
  target_location: '§3 table: run_maintenance and run_workflow_stage'
  plain_language_summary: Some required_action rows use dynamic or ambiguous effect_kind
    values such as 'write / state_mutation', '操作による', and 'ステージ種別による'.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: If operation contracts are intended to be mechanically enforced,
    each executable operation must resolve to a concrete effect_kind and approval
    policy before execution. Leaving these as informal unions makes preflight checks,
    approval gating, and executor selection dependent on ad hoc interpretation rather
    than schema-valid data.
  applied_files: []
  superseded_by: null
