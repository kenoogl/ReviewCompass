- finding_id: 2026-06-18-effect-kind-root-cause-design-gemini-3.1-pro-preview-judgment-001
  run_id: 2026-06-18-effect-kind-root-cause-design
  source_model: gemini-3.1-pro-preview
  source_round: round-1
