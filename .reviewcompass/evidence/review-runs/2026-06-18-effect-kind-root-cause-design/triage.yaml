    と複数値を併記し「操作による」と濁すのは、effect_kind が操作の根本原因（何を不可逆に変えるか）を一意に分類できていないことを示す。
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: effect_kind は承認ゲートの要否を機械判定する根拠（root cause）であるべきなのに、1操作に複数の effect_kind
    が同居すると機械判定が成立しない。実行主体軸と副作用軸を混在させると、設計の根本軸が曖昧になり実装時に判定ロジックが分岐爆発する。
