  target_location: §3.2 run_reopen_pending_gate
  plain_language_summary: run_reopen_pending_gate is assigned different effect_kind
    values depending on active_gate, but the design does not define a normalized contract
    key for that dispatch.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The table lists run_reopen_pending_gate as external_call / write,
    while §3.2 adds irreversible_action for approval gates. Without a concrete discriminator
    such as active_gate_type in the operation contract schema, implementations may
    validate only required_action and miss gate-specific approval requirements.
