  source_parsed_path: parsed/gemini-3.1-pro-preview.round-1.yaml
  severity_original: ERROR
  severity_normalized: ERROR
  target_location: Section 3 vs Section 3.1
  plain_language_summary: Inconsistent effect_kind mapping for run_maintenance regarding
    irreversible actions.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The mapping table in Section 3 restricts the `run_maintenance`
    effect_kind to `write` or `state_mutation`. However, Section 3.1 explicitly notes
    that maintenance YAMLs can have an `effect_kind` of `irreversible_action` and
    must pass through an approval gate. Omitting this from the primary mapping table
    compromises the execution layer's ability to reliably enforce safety guards on
    destructive maintenance operations.
  applied_files: []
  superseded_by: null
