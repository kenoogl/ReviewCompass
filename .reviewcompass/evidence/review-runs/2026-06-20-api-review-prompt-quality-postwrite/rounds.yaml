  ## Scope


  - Check whether the changed target files clearly state the intended prompt-quality
  review contract.

  - Check whether the prompt-quality review can handle arbitrary user-provided review
  requirements without assuming a single fixed problem.

  - Check whether general API review criteria and upstream-to-current-phase connection
  checks are both represented.

  - Check whether the discipline map points to the necessary prompt-quality material
  at the appropriate decision points.


  ## Out Of Scope


  - Do not review code, templates, or files outside Target Files.

  - Do not request unrelated refactors or style-only rewrites.

  - Do not judge implementation readiness of tools unless a target file claims the
  implementation already exists.


  ## Finding Policy


  - Report must-fix findings for contradictions, missing required review inputs, missing
  upstream-connection checks, or instructions that would allow unsafe or under-specified
  API review prompts.

  - Report should-fix findings for ambiguity likely to cause repeated manual judgment,
  prompt overloading, weak role separation, or unclear handoff between main / adversarial
  / judgment roles.

  - Return findings: [] when the target files are internally consistent for this review
  question.


