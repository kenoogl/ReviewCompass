  \n```text\nschema_version: reviewcompass-backlog-item-v1\nid: todo-2026-06-23-plan-to-todo-checklist-evidence\n\
  kind: todo\ntitle: Preserve plan to TODO checklist execution evidence\nstatus: candidate\n\
