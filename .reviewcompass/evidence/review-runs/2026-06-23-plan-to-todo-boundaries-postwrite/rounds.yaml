  \ checklist coverage を確認できる\n  expected: plan 由来 TODO に対して runtime checklist が生成され、coverage\
  \ audit が OK/DEVIATION を返す\n- id: PTC-RT-3\n  title: 完了後に TODO execution_history\
  \ へ証跡が戻る\n  expected: checklist close 後、TODO に evidence_path と completion_summary\
  \ が記録される\nnon_goals:\n- 完了済み作業に対して、実行時から存在したかのような checklist を後付けすること\n- すべての plan\
  \ を即時に TODO 化すること\n- plan の内容を LLM 要約だけで実行 checklist に変換すること\nnotes:\n- 既存の `work-backlog\
  \ start-checklist` は TODO から checklist への導線であり、plan から TODO への導線は別課題として扱う。\n- 既に\
  \ plan から直接進めた作業は、必要に応じて retrospective execution trace または deviation/follow-up note\
  \ として記録する。\n```\n\n\n## Target File Contents\n\n### .reviewcompass/guidance/effective-prompts/user-initiated-plan-to-todo-bridge.prompt.md\n\
  \ncontent_mode: full_text\ncontent_sha256: fcba123ccdb6d099a2d4e413504becdd4574760bb8b26ae766f18db9765d400e\n\
  \n```text\n# Effective Prompt: User-Initiated Plan To TODO Bridge\n\n## Decision\
  \ Point\n- group: operation_prompt\n- id: user_initiated_plan_to_todo_bridge\n\n\
  ## Purpose\nユーザが backlog plan または plan 内の一部作業を実行しようとしたときに読む。plan を実行単位へ変換する直前で、plan\
  \ から直接実作業に入らず、backlog TODO、runtime checklist、coverage / quality audit、必要時の review\
  \ materials へ接続する。\n\n## Trigger Boundary\n- ユーザが「次へ」「進める」「この plan を進める」など、plan\
  \ 由来の実作業開始を指示した。\n- `next --json` が completed で、次作業を backlog plan から選ぶ状態になった。\n\
  - plan の `implementation_plan`、`acceptance_criteria`、remaining work を読んで実装、整理、移行、監査へ入ろうとしている。\n\
  - plan の一部 phase / task だけを実行しようとしている。\n\nplan を読むだけ、説明するだけ、優先順位を相談するだけの場合は、この bridge\
  \ を開始しない。\n\n## Required Inputs\n- 対象 plan id または plan path。\n- `.reviewcompass/backlog/index.yaml`\n\
  - 対象 plan 本文。\n- 対応する既存 backlog TODO の有無。\n- 現在の work unit stack。\n\n## Artifact\
  \ Boundaries\n- plan は方針、分解案、受け入れ条件、残作業を保持する。実行対象そのものではなく、どこを TODO 化するかを判断する上流材料である。\n\
  - TODO は実行対象化した最小の追跡単位である。1 つの TODO は、同じ目的、同じ完了条件、同じ検証単位で閉じる範囲だけを扱う。\n- runtime\
  \ checklist は実行中の進捗証跡である。TODO の task / implementation_plan / todos / red_tests から生成し、作業中の\
  \ active / pending / done を保持する。\n- evidence checklist は完了後の固定証跡である。runtime checklist\
  \ を後から作業中だったかのように補う場所ではなく、完了時点の checklist と検証結果を残す。\n- TODO の execution_history\
  \ は、完了した checklist_id、evidence_path、completion_summary を TODO 正本へ戻す索引である。\n\n##\
  \ TODO Conversion Rules\n- 同時に完了判定できる範囲だけを 1 TODO にする。複数の独立した成果物、検証、判断待ちを含む場合は TODO\
  \ を分ける。\n- plan の一部だけを実行する場合、TODO には source_plan_id または source_plan_path と、対象 phase\
  \ / task / acceptance_criteria / red_tests の対応を記録する。\n- acceptance_criteria は TODO\
  \ の完了条件へ落とす。受け入れ条件に対応しない checklist item だけで実作業へ進まない。\n- red_tests は実装前の確認項目として TODO\
  \ または checklist に残す。赤テストが不要な文書作業では lightweight self-check の理由を明示する。\n- 既存 TODO がある場合は、対象範囲、完了条件、検証単位が\
  \ plan の実行範囲を覆るかを確認してから再利用する。\n- 対応が曖昧な場合は TODO を新規作成または分割し、曖昧なまま既存 TODO に押し込まない。\n\
  \n## Mechanical Steps\n1. 対象 plan を読み、実行しようとしている範囲を特定する。\n2. `.reviewcompass/backlog/index.yaml`\
  \ と backlog TODO を確認し、同じ範囲を扱う既存 TODO があるかを見る。\n3. 対応 TODO がなければ `work-backlog add-todo`\
  \ で plan 由来 TODO を作成する。\n4. 作成または選択した TODO を `work-backlog show --id <todo-id> --json`\
  \ で読む。\n5. `work-backlog start-checklist --id <todo-id>` で runtime checklist を生成する。\n\
  6. `work-backlog audit-checklist-coverage --id <todo-id> --checklist-id <checklist-id>`\
  \ を実行する。\n7. `task-quality-check audit --backlog-id <todo-id> --checklist-id <checklist-id>`\
  \ を実行する。\n8. audit が DEVIATION の場合は実作業へ進まず、TODO または checklist の修正に戻る。\n9. audit\
  \ が WARN または高リスクの場合、`task-quality-check prepare-review-materials --backlog-id <todo-id>\
  \ --checklist-id <checklist-id> --output-dir <dir>` で review materials を作る。\n10.\
  \ review materials を作った場合、外部 API review に進むか、ローカル判断に留めるかを利用者に確認する。\n11. coverage\
  \ / quality が OK で、WARN または高リスクが解消または明示判断済みの場合だけ、checklist item を active にして実作業へ進む。\n\
  \n## High-Risk Signals\n- plan から複数の独立作業を切り出す必要がある。\n- TODO の粒度や順序に迷いがある。\n- `task-quality-check\
  \ audit` が WARN を返した。\n- red test の位置づけ、レビュー要否、または実行順序に判断が必要である。\n- plan と既存 TODO/checklist\
  \ の対応が曖昧である。\n\n## LLM Scope\n- ユーザの自然言語指示がどの plan 範囲に対応するかを読む。\n- 既存 TODO が plan\
  \ の対象範囲を十分に覆うかを説明する。\n- WARN または高リスクの理由を利用者に平易に説明する。\n- review materials を作る場合、送信前に認証情報、個人情報、不要な全文ログ、外部送信不可情報が含まれないか確認する。\n\
  \n## Prohibitions\n- TODO/checklist がないまま plan から実作業へ進まない。\n- plan 本文を読まずに path-only\
  \ で TODO 化しない。\n- plan の広い範囲を 1 つの曖昧な TODO に押し込まない。\n- 3者レビューを常に必須化しない。\n- WARN\
  \ または高リスクを無視して実作業へ進まない。\n\n## Stop Conditions\n- 対象 plan または実行範囲が一意に定まらない。\n- 対応\
  \ TODO が複数あり、どれを使うべきか判断できない。\n- `work-backlog audit-checklist-coverage` が DEVIATION。\n\
  - `task-quality-check audit` が DEVIATION。\n- WARN または高リスクについて、review materials 作成または明示判断が未了。\n\
  ```\n\n\n## Scope\n\n- Check whether the changed target files clearly state the\
