  \ から直接作業を進めると、実行単位化した TODO と checklist の証跡が残らず、後から進め方と完了根拠を追跡しにくくなるため\ndecisions:\
  \ []\nsummary: >\n  plan の implementation_plan を読んで直接作業へ入る運用を避け、\n  実行前に backlog\
  \ TODO と runtime checklist へ落としてから進める。\n  作業完了後は completed checklist / evidence\
  \ と TODO の execution_history に\n  実行証跡を残し、plan、TODO、checklist、完了証跡のつながりを追跡可能にする。\n\
  problem_statement:\n- plan は方針、分解案、受け入れ条件を持つが、実行単位そのものではない。\n- plan から直接作業すると、どの部分を\
  \ TODO として実行対象化したかが残りにくい。\n- checklist なしで進めると、作業中の進捗と完了根拠が会話履歴に寄り、後続セッションから追跡しにくい。\n\
  - 完了後に checklist を後付けすると、実行中証跡ではなく回顧メモになり、証跡の意味が曖昧になる。\nrequired_flow:\n- plan の\
  \ implementation_plan / acceptance_criteria / remaining work を読む。\n- 実行対象にする範囲を\
  \ backlog TODO として切り出す。\n- \"`work-backlog start-checklist --id <todo-id>` で runtime\
  \ checklist を生成する。\"\n- \"`work-backlog audit-checklist-coverage --id <todo-id>\
  \ --checklist-id <checklist-id>` で coverage を確認する。\"\n- checklist item を進めながら作業し、完了時に\
  \ checklist を close して evidence へ移す。\n- TODO 側の execution_history に checklist_id、evidence_path、completion_summary\
  \ を残す。\ntodos:\n  design_contract:\n  - id: PTC-1\n    title: plan、TODO、runtime\
  \ checklist、evidence の責務境界を明文化する\n    status: pending\n    detail: plan は方針、TODO\
  \ は実行単位、runtime checklist は実行中進捗、evidence は完了証跡として扱う。\n  - id: PTC-2\n    title:\
  \ plan から作業開始する前の TODO 化ルールを定義する\n    status: pending\n    detail: implementation_plan\
  \ の phase/task、acceptance_criteria、残作業をどの単位で TODO に切るかを定義する。\n  cli:\n  - id: PTC-3\n\
  \    title: plan 由来 TODO の作成または確認を促す導線を追加する\n    status: pending\n    detail: plan\
  \ から次作業を開始する場面で、既存 TODO の有無を確認し、なければ TODO 作成へ進ませる。\n  - id: PTC-4\n    title: TODO\
  \ から checklist 生成と coverage audit までを標準手順に組み込む\n    status: pending\n    detail:\
  \ start-checklist と audit-checklist-coverage を実行前証跡として残す。\n  audit:\n  - id: PTC-5\n\
