    比較で mtime→path→Path→sha の順だが、tuple 内に `Path` オブジェクトが含まれており、mtime と path 文字列が等しい場合に
    `Path` 同士の比較が走る。Python では Path は `<` 比較可能だが、3要素目が str(path) で既に決定的なため 4要素目以降は到達しない。決定性は担保されているが、tuple
    に比較不能になり得る要素を含めるのは脆い設計。
