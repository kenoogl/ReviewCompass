  source_parsed_path: parsed/claude-sonnet-4-6.round-1.yaml
  severity_original: WARN
  severity_normalized: WARN
  target_location: 'Section 3, Table row: `wait_for_human_decision`'
  plain_language_summary: The `effect_kind` for `wait_for_human_decision` is listed
    as `read`, but this action also triggers the approval gate sequence and may produce
    observable output (e.g., structured prompt or blocker record).
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: If `wait_for_human_decision` only reads state and presents information,
    `read` is appropriate. However, section 5.1 describes `reopen-set-blocker` as
    a step before `wait_for_human_decision`, implying the gate entry itself may mutate
    state. A misclassified `effect_kind` could cause Phase 3/5 guards to skip a precondition
    check where one is needed.
  applied_files: []
  superseded_by: null
- finding_id: 2026-06-18-effect-kind-design-review-claude-sonnet-4-6-primary-002
  run_id: 2026-06-18-effect-kind-design-review
  source_model: claude-sonnet-4-6
  source_round: round-1
  source_raw_path: raw/claude-sonnet-4-6.round-1.txt
  source_parsed_path: parsed/claude-sonnet-4-6.round-1.yaml
  severity_original: WARN
  severity_normalized: WARN
  target_location: 'Section 3, Table row: `run_maintenance`'
  plain_language_summary: The `effect_kind` for `run_maintenance` is listed as `write`
    / `state_mutation` with the qualifier 'depends on operation', but no mechanism
    is specified for how the concrete `effect_kind` is resolved at dispatch time.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The operation contract model requires a deterministic `effect_kind`
    to route to the correct execution guard. If `run_maintenance` can be either `write`,
    `state_mutation`, or `irreversible_action`, the dispatch logic must read the maintenance
    YAML's `effect_kind` field before applying guards. This resolution path is mentioned
    in section 3.1 but not formalized as a contract rule, leaving an implementation
    gap that could allow an irreversible maintenance action to bypass the approval
    gate.
  applied_files: []
  superseded_by: null
- finding_id: 2026-06-18-effect-kind-design-review-claude-sonnet-4-6-primary-003
  run_id: 2026-06-18-effect-kind-design-review
  source_model: claude-sonnet-4-6
  source_round: round-1
  source_raw_path: raw/claude-sonnet-4-6.round-1.txt
  source_parsed_path: parsed/claude-sonnet-4-6.round-1.yaml
  severity_original: ERROR
  severity_normalized: ERROR
  target_location: 'Section 3.1, list of `effect_kind: irreversible_action` actions'
  plain_language_summary: '`record_human_decision` is classified as `irreversible_action`
    and listed as requiring an approval gate, but by definition it *is* the approval
    gate terminal step. Requiring an approval gate before executing the approval gate
    record creates a logical circularity.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The approval gate sequence defined in section 5.1 is `wait_for_human_decision
    → (human decides) → record_human_decision → target operation`. If `record_human_decision`
    itself requires a prior approval gate, the sequence cannot terminate. This is
    a design contradiction that must be resolved before implementation of Phase 0
    or Phase 5 guards.
  applied_files: []
  superseded_by: null
- finding_id: 2026-06-18-effect-kind-design-review-claude-sonnet-4-6-primary-004
  run_id: 2026-06-18-effect-kind-design-review
  source_model: claude-sonnet-4-6
  source_round: round-1
  source_raw_path: raw/claude-sonnet-4-6.round-1.txt
  source_parsed_path: parsed/claude-sonnet-4-6.round-1.yaml
  severity_original: WARN
  severity_normalized: WARN
  target_location: Section 3.2, `approval` gate row
  plain_language_summary: The `effect_kind` for the `approval` gate variant of `run_reopen_pending_gate`
    is listed as `irreversible_action`, but the described execution is `reopen-set-blocker`,
    which sets a blocker rather than completing an irreversible state transition.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Setting a blocker is a reversible state mutation (the blocker can
    be cleared). Classifying it as `irreversible_action` would trigger the full approval
    gate guard for an operation that is itself preparatory. The intended irreversible
    action is the downstream operation gated by the blocker, not the blocker-setting
    step. This misclassification could cause unnecessary double-gating.
  applied_files: []
  superseded_by: null
- finding_id: 2026-06-18-effect-kind-design-review-claude-sonnet-4-6-primary-005
