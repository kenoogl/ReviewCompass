  severity_original: INFO
  severity_normalized: INFO
  target_location: 'Section 3, Table row: `completed`'
  plain_language_summary: The `effect_kind` for `completed` is `read` and the executor
    is listed as `LLM (candidate presentation)`, but no operation contract boundary
    is specified for what the LLM may or may not do during this step.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: In a mechanized execution layer, even `read`-classified steps that
    involve LLM output should have a bounded operation contract to prevent unintended
    side effects. Without a contract specifying allowed output scope, the `completed`
    step could be interpreted as a license for open-ended LLM action.
  applied_files: []
  superseded_by: null
