  ## 動機\n\n`next --json` の本来の役割は「ワークフロー作業の中のどの地点にいるかを返す」こと。\n地点が分かれば次のアクションが機械的に決まり、LLM\
  \ の手作業が減り動作がセキュアになる。\n\n現状の `kind` 値は41種類あり、次の問題がある：\n\n- 「作業状態」「手続きの内部ステップ追跡」「コミット操作の確認」が同じ\
