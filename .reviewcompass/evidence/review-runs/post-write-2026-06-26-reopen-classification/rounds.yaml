  \ DEVIATION） |\n\n`feature_definition_required` と `unknown` の区別：同じ設定ファイル問題でも、前者は「正常な未完了」（修復方法が明確）、後者は「壊れた異常状態」（調査が必要）。\n\
  \n## 新旧対照表\n\n| 旧 `kind` | 新 `kind` |\n|-----------|-----------|\n| `stage` | `in_progress`\
