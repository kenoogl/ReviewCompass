  \ があること。\n5. ReviewCompass の Python ツールを実行できる環境か確認すること。\n\n対象アプリが決まったら、対象アプリ root\
  \ で新しい LLM セッションを立ち上げ、パターン 2 として初期設定を続ける。\n\n## 4. 対象アプリ側に作成または確認するもの\n\n対象アプリ側では、次を確認する。\n\
  \n| パス | 扱い |\n| --- | --- |\n| `.reviewcompass/` | 対象アプリ側の ReviewCompass 作業領域。なければ作成候補。\
  \ |\n| `.reviewcompass/config.yaml` | 対象アプリ固有の設定。テンプレートから作成候補。 |\n| `.reviewcompass/specs/`\
  \ | 仕様、設計、タスク、review-run 記録の置き場。 |\n| `.reviewcompass/AGENT_ENTRY.md` | LLM セッションの入口規律。テンプレートから実体化する（§8）。\
  \ |\n| `.reviewcompass/feature-dependency.yaml` | feature 一覧・開発順・依存の定義。feature-partitioning\
  \ 承認後に作成する（§9）。 |\n| `CLAUDE.md`／`AGENTS.md` | 既存入口ファイルへの参照 1 行の追記（§8）。 |\n| `.claude/`／`.codex/`\
  \ | commit／push 事前検査 hook と設定（§10、強く推奨）。 |\n\n既存の `.reviewcompass/` がある場合は、上書きせず、内容を確認してから進める。\n\
  \n## 5. 秘密値の扱い\n\n`config/api-settings.yaml` や対象アプリ側の `.reviewcompass/config.yaml`\
  \ に API key、token、password などを書き込まない。\n\n秘密値が必要な場合は、利用者に次のように説明する。\n\n```text\n\
  API key は設定ファイルに書かず、環境変数など配布物外の方法で渡してください。\nこの初期設定では、秘密値そのものは表示・保存しません。\n```\n\n\
  ## 6. 初期確認の最小セット\n\n対象アプリ側まで設定する場合は、最低限次を確認する。\n\n1. ReviewCompass 配布物ディレクトリを参照できる。\n\
  2. 対象アプリ root に書き込みできる。\n3. 対象アプリ側の `.reviewcompass/` の作成または既存確認が済んでいる。\n4. 対象アプリ側の\
  \ `.reviewcompass/config.yaml` の作成または既存確認が済んでいる。\n5. 入口の合流（§8）が済んでいる。\n6. workflow\
  \ next を確認できる（feature 未確定の段階では `feature_definition_required` の案内が返ることを確認する）。\n7.\
  \ review-run 記録の出力先を対象アプリ側に指定できる。\n\n## 7. 完了報告\n\n初期設定が終わったら、利用者へ次を報告する。\n\n1.\
  \ 選択した起動パターンと操縦 LLM。\n2. ReviewCompass 配布物ディレクトリ。\n3. 対象アプリ root。\n4. 作成または変更した対象アプリ側ファイル。\n\
  5. hook 導入の有無（見送った場合は、利用者の明示判断であることと理由）。\n6. 実行した確認。\n7. 未実施の確認。\n8. 次に行うべき作業。\n\
  \n対象アプリへ何も書き込んでいない場合は、そのことを明示する。\n\n## 8. 入口の合流（AGENT_ENTRY の実体化と参照 1 行）\n\n対象アプリで複数の\
  \ LLM（Claude Code、Codex CLI）を同じ規律で使うための入口を作る。\n\n1. 配布物の `templates/entry/AGENT_ENTRY.template.md`\
  \ を、対象アプリの `.reviewcompass/AGENT_ENTRY.md` として実体化する。冒頭の記入欄（実体化日、実体化元の配布物）と §2 の「配布物の場所」（**絶対パス**）を記入する。\n\
  2. 既存の入口ファイルへ、利用者承認のうえ参照 1 行を末尾に追記する。追記の前に、書き込み先・挿入する行・挿入位置を利用者へ提示する。書き込むのは次の枠内の文字列**だけ**である（枠外の説明文を書き込まない）。\n\
  \n   `CLAUDE.md` へ追記する 1 行：\n\n   ```text\n   @.reviewcompass/AGENT_ENTRY.md\n \
  \  ```\n\n   `AGENTS.md` へ追記する 1 行：\n\n   ```text\n   ReviewCompass を使う作業では、最初に\
  \ `.reviewcompass/AGENT_ENTRY.md` を読み、その規律に従う。\n   ```\n3. 入口ファイルが存在しない場合は、その 1\
  \ 行だけの新規ファイルを作る（これも承認のうえ）。同じ行が既にある場合は何もしない。既存の記述は変更しない。\n4. 既存入口の規律と AGENT_ENTRY\
  \ の規律が衝突している場合（例：既存入口が「commit は自動で実行してよい」と指示しているが、AGENT_ENTRY §5 は利用者の明示承認を求める、というように両立しない指示）は、作業を進めず利用者へ提示する。優先順位は自動で決めず、利用者判断で\
  \ AGENT_ENTRY 側を調整する。\n5. 対象アプリの `.gitignore` へ、ReviewCompass ツールの実行時生成物の除外 1 行を利用者承認のうえ追記する（除外がないと、2\
  \ 回目以降の `next` がツール自身の実行記録を未検証の文書変更として誤検出し、`post_write_verification` を返し続ける）。実行時生成物（検査ログ・effective\
  \ prompt・commit 承認レコード）は `.reviewcompass/runtime/` 区画に集約されている（2026-06-12 配置規約 PLC-DEC-004\
  \ 反映。旧 3 パスの個別除外は不要になった）。\n\n   ```text\n   .reviewcompass/runtime/\n   ```\n\n\
  ## 9. feature 一覧の立ち上げ\n\n対象アプリの workflow 管理は、`.reviewcompass/feature-dependency.yaml`\
  \ の `feature_order` キーに基づいて動く。\n\n1. feature 一覧が未確定の段階では、`next` は `feature_definition_required`\
  \ を返し、intent と feature-partitioning の実施を案内する。これはエラーではなく正常な立ち上げ状態である。\n2. feature-partitioning\
  \ の提案には、機能ごとの依存の主張と理由、順序の導出を必須で含める（人が根拠を検討できるようにする）。\n3. 承認された分割結果を、配布物の `templates/specs/feature-dependency.yaml.template`\
  \ から実体化した `.reviewcompass/feature-dependency.yaml` に記録する。依存される機能を先に並べる。\n4. `feature_order`\
  \ が `depends_on` と矛盾する場合（依存先が後ろ、依存先が一覧にない、循環依存）、`next` は理由つきの逸脱を返す。\n\n## 10. hook\
  \ 導入（強く推奨）\n\ncommit／push の事前検査 hook を対象アプリへ導入する。LLM が規律を読み忘れても、不可逆操作だけは機械が止める防衛線になる。初期設定の標準手順として導入し、見送る場合は利用者の明示判断として完了報告に記録する。\n\
  \n1. 配布物の `templates/hooks/pre-bash-precheck.sh.template`、`templates/hooks/session-record-capture-current-on-todo.sh.template`、`templates/hooks/session-record-promote-previous-draft.sh.template`\
  \ のプレースホルダを**絶対パス**へ置換する。\n   - `{{REVIEWCOMPASS_PYTHON}}`：依存（PyYAML 等）導入済みの Python\
  \ 実行系\n   - `{{REVIEWCOMPASS_DIR}}`：配布物 root\n2. 置換後のファイルを、対象アプリの `.claude/hooks/pre-bash-precheck.sh`\
  \ と `.codex/hooks/pre-bash-precheck.sh` の両方へ同一内容で複製する。同名の既存ファイルがある場合は上書きせず、既存内容と置換後の内容を利用者へ提示して扱いを確認する。\n\
  3. 置換後の `session-record-capture-current-on-todo.sh.template` と `session-record-promote-previous-draft.sh.template`\
  \ は、対象アプリの `.codex/hooks/` に配置する。同名の既存ファイルがある場合は上書きせず、既存内容と置換後の内容を利用者へ提示して扱いを確認する。\n\
  4. `templates/hooks/claude-settings.json.template` と `templates/hooks/codex-hooks.json.template`\
  \ から、`.claude/settings.json` と `.codex/hooks.json` を作る。いずれも既存ファイルがある場合は上書きせず、hooks\
  \ キーだけを既存へ合流させる（合流して書き込む内容を、書き込み前に利用者へ提示する）。\n5. 静的チェック：複製した hook ファイルに未置換トークン（`{{`）が残っていないこと、置換先のパスが実在すること、`jq`\
  \ が利用できることを確認する。\n6. Codex 側の環境設定：Codex の非 managed command hook は、配置しただけでは実行されない。Codex\
  \ の GUI 設定画面または CLI の `/hooks` で、対象アプリのプロジェクト hook が認識されていることを確認し、利用者が内容を確認したうえで信頼する。未信頼のままでは\
  \ hook 一覧に出ても Active 0 / review 待ちになり、`PreToolUse` も `PostToolUse` も実行されない。hook\
  \ ファイルや `.codex/hooks.json` を変更した場合は、定義 hash が変わるため再度 review / trust が必要になる。\n7.\
  \ Codex の現セッション下書き hook は `PostToolUse` に登録し、`TODO_NEXT_SESSION.md` の内容 hash が前回保存時から変わった場合だけ、現セッション\
  \ rollout を `.reviewcompass/runtime/session-record-drafts/codex-<session_id>.md`\
  \ へ下書き保存する。下書き先はテスト時に `RC_SESSION_DRAFT_DIR` で差し替えられる。現セッション途中版を `.reviewcompass/evidence/sessions/`\
  \ と `docs/sessions/` へ直接作らない。`UserPromptSubmit` は発話ごとに呼ばれ得るため使用しない。動作確認では、対象アプリの\
  \ `.reviewcompass/runtime/session-record-capture-current-on-todo.jsonl` を確認する。`todo_changed`、`selected`、`drafted`、`draft_failed`、`todo_unchanged`、`baseline_recorded`\
  \ などが出る。`ignored_event` が出た場合は、`PostToolUse` 以外へ誤登録されているため hook 設定を修正する。\n8. Codex\
  \ の前セッション正式化 hook は `SessionStart` に matcher = `startup|resume` で登録し、現 `session_id`\
  \ と異なる runtime 下書きを新しい順に確認して、検証できた最初の 1 件を正式 2 層記録へ昇格する。正式化前に下書き frontmatter `source_sha256`\
  \ と現在の元 rollout の sha256 を比較し、一致した場合だけ昇格する。不一致なら `previous_draft_in_progress`、検証不能なら\
  \ `previous_draft_unverifiable` を記録し、次候補へ進む。複数の終了済み下書きが溜まっている場合も、この hook が 1 回の\
  \ `SessionStart` で昇格するのは 1 件だけであり、残りは次回 `SessionStart` または明示 backfill の対象とする。動作確認では、対象アプリの\
  \ `.reviewcompass/runtime/session-record-promote-previous-draft.jsonl` を確認する。`selected`\
  \ と `promoted` があれば正式化成功、`missing_jq` は jq 不在、`no_current_session_id` は current\
  \ session_id 不在、`no_cwd` は cwd 不在、`no_draft_dir` は下書きディレクトリ不在、`no_previous_draft`\
  \ は昇格対象なし、`previous_draft_in_progress` は下書き作成後に rollout が伸びた可能性があるため安全側でスキップ、`previous_draft_unverifiable`\
  \ は hash 確認情報不足、`no_promote_tool` は昇格 helper 不在、`promote_failed` はその他の昇格失敗である。`Stop`\
  \ は turn scope のためセッション終了 hook として使わない。\n9. TODO を更新しないセッション、クラッシュ、hook 失敗、または Codex\
  \ の `session_id` が取れない場合は、自動 fallback を追加せず、終了済みの対象 rollout を指定して `tools/session-record-backfill.py\
  \ --session <jsonl> --source codex` を明示実行する。\n10. 復旧手順：hook が「hook 設定不備」を理由に拒否する場合は、プレースホルダの置換値を確認して再置換する（テンプレートから作り直してよい）。Codex\
  \ で hook が発火しない場合は、まず GUI 設定または `/hooks` で対象 hook が信頼済みか確認する。\n\n## 11. 操縦 LLM 別の既定\
  \ variant\n\nreview-run の variant（モデルの組）は、起草者（操縦 LLM）と検証者の独立を保つため、操縦 LLM に応じた既定を使う。\n\
  \n| 操縦 LLM | 3 役 review-run の既定 | 小規模 1 体検証の既定 |\n| --- | --- | --- |\n| Claude\
  \ Code | 接尾辞なしの `*_independent_3way` 系 | `post_write_verification_google`（共通） |\n\
  | Codex CLI | `*_independent_3way_codex_operator` 系 | 同上（共通） |\n\nproxy_model（人の判断を代行させる場合のモデル）も、操縦\
  \ LLM と別系列のモデルを選ぶ。\n\n上記以外の LLM で操縦する場合は、独断で進めず利用者に確認し、「起草者（操縦 LLM）と同系列のモデルを反証役・判定役・単独検証役に置かない」という独立性の原則に従って\
  \ variant を選ぶ。その操縦 LLM 向けの既定 variant の追加は、第3者配布時の再検討事項とする。\n```\n\n\n## Scope\n\n\
  - Check whether the changed target files clearly state the intended contract.\n\
  - Check whether related instructions are mutually consistent across targets.\n-\
  \ Check whether the documented procedure is actionable before API review, triage,\
  \ manifest, or commit steps continue.\n\n## Out Of Scope\n\n- Do not request unrelated\
  \ refactors or style-only rewrites.\n- Do not judge files that are not listed in\
  \ Target Files.\n- Do not treat missing implementation work as a document defect\
  \ unless the target text claims it already exists.\n\n## Finding Policy\n\n- Report\
  \ must-fix findings for contradictions, missing required gates, or instructions\
  \ that would allow an unsafe workflow action.\n- Report should-fix findings for\
  \ ambiguity that could cause repeated manual judgment or unnecessary API review\
  \ loops.\n- Return findings: [] when the target files are internally consistent\
  \ for this review question.\n\n## Sensitive Information Check\n\n- status: passed\n\
  - External API review must not proceed if this section reports potential secrets.\n"
