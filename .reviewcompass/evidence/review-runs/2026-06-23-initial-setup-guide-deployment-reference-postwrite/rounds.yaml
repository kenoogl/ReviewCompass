  \ など、利用者が選んだ初期確認へ進む。\n\n### 3.2 パターン 2：対象アプリ側で起動して ReviewCompass 配布物を指定する\n\nこのパターンでは、現在の作業ディレクトリが対象アプリ\
  \ root であることを確認する。ReviewCompass 配布物ディレクトリは利用者から指定される。\n\n進め方：\n\n1. 現在のディレクトリが対象アプリ\
  \ root か確認する。\n2. ReviewCompass 配布物ディレクトリに `tools/`、`runtime/`、`templates/`、`config/api-settings.yaml`\
  \ があることを確認する。\n3. 対象アプリ root に `.reviewcompass/` があるか確認する。\n4. `.reviewcompass/`\
  \ がなければ、作成前に利用者へ説明する。\n5. 対象アプリ側の `.reviewcompass/config.yaml` を作成または確認する。\n6. 入口の合流（§8）と\
  \ hook 導入（§10、強く推奨）を行う。\n7. 配布済み ReviewCompass のツールを使い、対象アプリ側の workflow next を確認する（feature\
  \ 未確定なら `feature_definition_required` の案内が返る。§9）。\n\n通常利用を始める場合は、このパターンを基本とする。\n\
  \n### 3.3 パターン 3：配布物側だけ先に確認し、対象アプリ側設定は後で行う\n\nこのパターンでは、まず ReviewCompass 配布物ディレクトリだけを確認する。対象アプリ\
  \ root が未定、または利用者がまだ対象アプリへ書き込みたくない場合は、この範囲で止める。\n\n配布物側で確認すること：\n\n1. `tools/`、`runtime/`、`templates/`（入口・hook・feature-dependency\
  \ の雛形を含む）、`config/api-settings.yaml` があること。\n2. `config/api-settings.yaml` に秘密値が含まれていないこと。\n\
