    final_label: should-fix
    rationale: The generic exit-code/stop contract likely prevents convergence on audit-commit deviations, but explicitly tying post-commit deviations to no-push/no-convergence or corrective follow-up would improve clarity for an already-committed recovery path.
    rejected_options:
      must-fix: The existing generic stop-on-failure behavior appears sufficient to avoid weakening the stop condition, so this does not block convergence.
      leave-as-is: The ambiguity is relevant to post-write verification behavior and is a valid completeness improvement.
