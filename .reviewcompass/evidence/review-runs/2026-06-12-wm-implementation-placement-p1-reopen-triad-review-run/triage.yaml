  plain_language_summary: The deletion violation test unlinks LEGACY_LOG but does
    not stage/commit the deletion before calling check_runtime_placement_freeze. The
    detection of deleted files relies on `git diff --name-only <freeze_commit>` showing
    the file and `Path.exists()` returning False. In an unclean working tree where
    the file is simply deleted on disk but not staged, `git diff` against a prior
    commit compares the index (which still has the file) with the working tree only
    when `--cached` is omitted—so the diff output depends on git diff's working-tree
    comparison mode. This is implementation-correct but the test does not explicitly
    validate that the git invocation used (`diff --name-only`) will surface an unstaged
    deletion, which could make the test fragile under certain git configurations.
