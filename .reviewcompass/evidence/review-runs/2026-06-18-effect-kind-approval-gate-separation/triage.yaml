  plain_language_summary: '§3 の対応表で `run_workflow_stage` の effect_kind が「ステージ種別による」とされ、ステージ種別によっては
    irreversible_action になりうる（§3.2・§7 の `approval` gate = irreversible_action、§7-1
    で `run_workflow_stage` の approval を irreversible_action と明記）が、§3.1『effect_kind:
    irreversible_action が必要な操作』の承認ゲート対象リストには `run_workflow_stage` が含まれていない。effect_kind
    と承認ゲートの結びつき（irreversible_action なら必ず承認ゲートを通す）が `run_workflow_stage` 経由の approval
    stage に対して欠落しており、承認ゲートを通すべき操作の列挙が不完全。'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: '§3.1 は『effect_kind: irreversible_action となる操作は実行前に必ず承認ゲートを通す』と宣言したうえで該当
    required_action を列挙している。`run_workflow_stage` がステージ種別によって irreversible_action になりうるのに承認ゲート対象リストから漏れていると、effect_kind
    と承認ゲートの分離原則（irreversible_action ⇒ 承認ゲート必須）に穴が生じ、approval ステージが承認ゲートなしで実行される実装解釈を許してしまう。`run_maintenance`
    には『effect_kind が irreversible_action のものは承認ゲートを通す』という条件付き記述があるのに、`run_workflow_stage`
    には同種の条件付き記述がなく非対称。'
