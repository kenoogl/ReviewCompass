    _cross_feature 判定'
  description: _cross_feature の source 値が新配置ファイルが存在する場合のみ 'cross_feature_namespace'
    を返す。新配置に存在しない場合（旧配置からのフォールバック）は 'legacy_frozen' を返す。設計では _cross_feature は specs
    配下のまま（新配置は存在しない）であるため、read_record が _cross_feature 向けに 'evidence' を返すコードパスは実行不能だが、将来の誤解を招く可能性がある。
