    が一致し、new_path.is_file() が真になると source が 'cross_feature_namespace' となる。ただし legacy_path
    != new_path の条件（False）により重複警告は出ない。動作は正しいが条件ロジックが分かりにくい。
- severity: INFO
  target_location: 'tools/conformance_evaluation/machine_verification.py: _legacy_violations(),
    diff --name-only'
  description: git diff --name-only <freeze_commit> は作業ツリーと freeze_commit を比較し、freeze
    後にコミット済みの変更も検出する。ただし git diff は削除されたファイルも changed に含めるため、frozen_file_changed として正しく報告される（テスト
    test_t012_frozen_record_deletion_is_detected で確認済み）。凍結集合からの削除が 'frozen_file_changed'
    という名称で報告されることは semantics 上やや不正確だが、テストで固定されており、設計内で合意済み（round-1 C5 leave確認）。
  rationale: 削除の場合も changed & frozen に含まれる（diff は削除もリストする）ため実装は正しく機能する。ただし 'frozen_file_changed'
    という理由文字列が変更と削除の両方をカバーしていることをドキュメントで明示するとよい。
