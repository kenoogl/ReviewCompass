  description: 凍結済み旧 `logs/estimation/` を MV-6 のプロンプト内容検査対象に含める実装がない
  rationale: 上流契約では、推定ログの書き込み先は新配置へ切り替えつつ、凍結済み旧推定ログは MV-6 の読み取り対象に含める必要がある。現在の `check_prompt_isolation`
    は渡された prompt を新配置へ書き込んでその prompt だけを検査し、`check_estimation_log_freeze` は旧ログの追加・変更検出だけを行うため、既存の旧ログに
    forbidden path や自律探索禁止条項欠落があっても MV-6 として検出されない。
