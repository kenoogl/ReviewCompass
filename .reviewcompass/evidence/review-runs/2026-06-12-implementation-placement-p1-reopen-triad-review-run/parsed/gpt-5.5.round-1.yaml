  description: 旧配置への未追跡追加を `git ls-files --others --exclude-standard` で検出しているため、ignore
    対象の旧配置ファイルが凍結違反から漏れる
  rationale: 凍結契約は旧 `specs/<feature>/conformance/` および旧 `logs/estimation/` への P1 以降の追加を違反として検出することを要求している。特に
    `logs/` は ignore 対象になりやすく、`--exclude-standard` を付けると ignored な未追跡ログが検査対象から除外され、旧ルートへの新規書き込みを見逃す。未追跡・ignored
    を含むファイルシステム走査、または ignore を無視した git 走査が必要。
- severity: ERROR
  target_location: tools/conformance_evaluation/machine_verification.py::check_prompt_isolation
