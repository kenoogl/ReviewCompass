  plain_language_summary: Rollout 探索は session_meta を `read_meta` で先頭5行に限定して読むが、HASH
    計算は `hashlib.sha256(rollout.read_bytes())` でファイル全体を対象にする。一方 PostToolUse 下書き側が
    `source_sha256` をどう算出しているかはこの diff に含まれず、両者のハッシュ対象範囲（全文 vs 抽出後本文 vs 別正規化）の一致が
    target からは確認できない。算出範囲が食い違えば、正常な終了済み rollout でも常に mismatch となり `previous_draft_in_progress`
    で永久に昇格されない設計欠陥になり得る。
