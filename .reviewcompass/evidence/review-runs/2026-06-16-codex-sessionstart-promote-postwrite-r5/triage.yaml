  plain_language_summary: README とガイドは jq の存在チェックを INITIAL_SETUP に追記したとするが、hook 本体は
    jq 不在時に `jq -r` が失敗して `HOOK_EVENT_NAME` 等が空になり、`ignored_event` を記録して exit 0 する（safe
    no-op）。README の『jq が無い場合は実質的に安全側の no-op』という説明と整合する一方、`ignored_event` という event
    名は『誤登録』を意味する他用途と重複し、jq 不在という別原因を診断ログ上で区別できない。
  final_label: null
