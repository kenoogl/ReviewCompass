    implementation of the same check.
- severity: INFO
  target_location: intent/INTENT.md §3.8, §4.8
  description: 'The intent additions stay at principle level (task classification,
    mechanical uniqueness of current position/next operation, not hiding adjudication
    load in implicit LLM judgment) and avoid implementation detail, satisfying the
    no-overreach criterion. Residual optional improvement: §3.8/§4.8 do not reference
    the source design notes or the workflow-management requirements they flow into,
    so the intent→requirements traceability relies solely on §11.5 and the requirements-side
    由来 entries rather than a TRACEABILITY.md linkage that INTENT.md §10.1/§14 anticipate.'
  rationale: INTENT.md's own completion condition (§14) requires that each feature
    spec be traceable to the intent it implements via TRACEABILITY.md. The new §3.8/§4.8
    intents have no corresponding TRACEABILITY.md entry shown, leaving a minor forward-traceability
    gap for later auditors.
