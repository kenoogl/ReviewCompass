    §2 証跡構造
  description: 'design.md の証跡構造は `proxy-approval.yaml` を記載しており、`make-proxy-approval.py`
    の出力先（`approval_path = run_dir / ''proxy-approval.yaml''`）と完全一致する。`proxy-decisions/<finding-id>.decision.yaml`
    の必須属性 `approved_by: proxy_model` も、`make-proxy-approval.py` が生成する decision dict
    の `approved_by: ''proxy_model''` と一致する。`review_triage.py` の `_proxy_decision_errors`
    が検査する属性（`approved_by`, `finding_id`, `proxy_model_id`, `decision_prompt_path`,
    `selected_option`, `final_label`, `rationale`, `raw_response_path`, `candidate_options`,
    `source_raw_paths`, `rejected_options`）は design.md の必須フィールド記述と一致している。照合根拠：design.md
    証跡構造節、make-proxy-approval.py L112-123、review_triage.py L220-290。不一致なし。'
  rationale: (1) への回答。コード・design 間の命名・属性は厳密一致している。
