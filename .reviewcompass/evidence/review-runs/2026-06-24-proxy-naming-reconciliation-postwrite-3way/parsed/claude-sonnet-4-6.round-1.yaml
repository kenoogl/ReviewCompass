- severity: INFO
  target_location: .reviewcompass/specs/workflow-management/design.md §段集合の静的列挙モデル
    §2
  description: 'proxy approval は `decision_scope: proxy_allowed` の範囲（所見トリアージ・修正方針判断）に限った承認であり、human-only
    approval、commit、push、`spec.json` 更新、phase / gate completion、reopen finalize は許可しない、と明記されている。`review_triage.py`
    の `_proxy_decision_errors` は decision 内の `approved_by` が `proxy_model` であることを要求するが、`_approval_errors`
    は `approval_required=true` の操作に対して同関数を呼ぶ構造になっており、commit/push 等の human-only gate
    は直接 `approved_by: user` を要求する。decision-and-outcome.md §2 の説明「decision_scope が既に防いでいる」と
    design.md の記述は整合する。照合根拠：design.md §proxy_model 判断代行モデル、review_triage.py L260-265、decision-and-outcome.md
    §2。不一致なし。'
  rationale: (3) への回答。proxy_allowed 範囲承認と human_only ブロックの記述は整合している。承認との混同を生む矛盾なし。
