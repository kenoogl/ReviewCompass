  target_location: target.md §2.3「凍結期（P3 まで）の検査範囲」
  description: 旧配置に現れた「新規記録」を違反として検出するとしているが、凍結済み既存記録の判定基準が定義されていない。
  rationale: 旧パス読み取り互換を維持しつつ旧配置への新規書き込みを禁止するには、凍結時点のファイル一覧、許容される既存記録の manifest、または
    cutoff 判定方法が必要である。これがないと MV-1〜MV-3 の機械検査で、旧配置のファイルが既存凍結物なのか違反の新規生成物なのかを再現可能に判定できない。
