  description: 所見 ID 採番の探索範囲が新配置のみなのか、P3 まで読み取り互換対象となる旧配置も含むのかが不明確である。
  rationale: 一括置換により採番手順が新配置配下の最大番号を参照する形になる一方、P3 までは旧配置の凍結済み記録も読み取り対象に含まれる。ID の一意性スコープを明示しないと、新旧配置間で同一
    ID が再利用され、比較結果、handoff、評価記録の参照が曖昧になる可能性がある。
