- severity: INFO
  target_location: §2.2 由来注記（設計方針一覧の配置先項）
  description: 由来注記に PLC-DEC-003〜005・009〜011 の参照が記載されているが、design.md 本文中でこれらの決定番号の定義箇所や参照先ドキュメントへのリンクが明示されていない。
  rationale: 実装担当者が仕様根拠を追跡する際、決定番号のみでは参照先が特定できず、implementation 段での確認コストが増加する可能性がある。INFO
    止まりだが、実装ガイダンスの観点（レビュー観点4）で軽微な補強余地がある。
- severity: INFO
  target_location: §2.3 round-2 注記：読み取り互換の挙動（§12.2）
  description: 「両方に同名記録が存在する場合は新配置を正とし、警告を報告する」とあるが、警告の報告先・報告形式（ログ出力、機械検査結果ファイルへの記録等）が
    design.md 内で未定義のままである。
  rationale: TDD 実装時に警告出力の期待値を定義できないため、実装者がテストケースを自己判断で設計することになる。実装ガイダンスの観点（レビュー観点4）として記録しておく価値がある。severity
    は INFO（実装時に解決可能な範囲）。
- severity: INFO
  target_location: §2.3 round-2 注記：凍結期の検査範囲（§18 機械検査表の直後）
  description: 「新規記録が旧配置に現れた場合は違反として検出する」と明記されており、凍結契約への違反検出は設計上明確である。ただし、違反検出時のエラー分類（ERROR／WARN）や後続処理（CI
    停止条件等）が design.md 内で言及されていない。
  rationale: MV-1〜MV-3 の検査整合（レビュー観点3）として、違反検出の重大度分類が実装に委ねられると、環境差が生じるリスクがある。現状は INFO
    水準だが、implementation phase 着手前に補足注記があると望ましい。
