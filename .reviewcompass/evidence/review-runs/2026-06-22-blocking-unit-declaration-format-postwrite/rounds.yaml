  \ とする\n      status: pending\n  runner_and_workflow:\n    - id: RW-1\n      title:\
  \ post_write_review_flow.py prepare を commit unit ベースにする\n      status: pending\n\
  \    - id: RW-2\n      title: run_review.py に unit / digest 検査を入れる\n      status:\
  \ pending\n    - id: RW-3\n      title: next --json が blocking_unit_required を返せるようにする\n\
  \      status: pending\n    - id: RW-4\n      title: next --json が blocking_unit_in_progress\
  \ を返せるようにする\n      status: pending\n    - id: RW-5\n      title: next --json が commit_unit_stale\
  \ を返せるようにする\n      status: pending\n    - id: RW-6\n      title: next --json が commit_mixing_risk\
  \ を返せるようにする\n      status: pending\n    - id: RW-7\n      title: commit guard に\
  \ work unit / commit unit / evidence binding 検査を追加する\n      status: pending\n  interim_operation:\n\
  \    - id: IO-1\n      title: 機械化完了までの manual blocking unit ルールを明文化する\n      status:\
  \ pending\n    - id: IO-2\n      title: manual blocking unit の宣言形式を決める\n      status:\
  \ pending\n    - id: IO-3\n      title: allowed files の指定を必須にする\n      status: pending\n\
  \    - id: IO-4\n      title: 復帰条件の指定を必須にする\n      status: pending\n    - id: IO-5\n\
  \      title: 親作業の commit を blocking unit 完了まで禁止する\n      status: pending\n  tdd:\n\
  \    - id: TD-1\n      title: COMMIT_MIXING_RISK の red test を追加する\n      status:\
  \ pending\n    - id: TD-2\n      title: STALE_COMMIT_UNIT の red test を追加する\n   \
  \   status: pending\n    - id: TD-3\n      title: EVIDENCE_UNIT_MISMATCH の red test\
  \ を追加する\n      status: pending\n    - id: TD-4\n      title: blocking unit 中の parent\
  \ commit 禁止 red test を追加する\n      status: pending\n    - id: TD-5\n      title:\
  \ red test 固定後、段階的に実装する\n      status: pending\ndecisions: []\n```\n\n\n## Target\
  \ File Contents\n\n### .reviewcompass/guidance/WORKFLOW_NAVIGATION.md\n\ncontent_mode:\
  \ full_text\ncontent_sha256: 8bc438278de29ae9e12621e31a9d1165ac29672cb0e0a9ef76953680aeb5d651\n\
  \n```text\n# ReviewCompass ワークフローナビゲータ共通手引き\n\nこの文書は、`tools/check-workflow-action.py\
  \ next --json` の読み方を定める共通手引きである。\n\n## 1. 最初に実行するコマンド\n\n作業を始める前、または次に何をするかを提案する前に、必ず次を実行する。\n\
  \n```bash\npython3 tools/check-workflow-action.py next --json\n```\n\n出力 JSON の\
  \ `next_action.kind` を、現在の作業順序・優先順位の正本として扱う。記憶、要約、TODO の候補欄だけを段取りの根拠にしない。\n\n`next_action.required_disciplines`\
  \ がある場合は、作業直前にそのファイルだけを読む。セッション開始時に長い規律群を一括で読んで記憶に頼るのではなく、機械判定された場面ごとの短い規律セットで挙動を調整する。対応表は\
  \ `.reviewcompass/guidance/WORKFLOW_DISCIPLINE_MAP.yaml` を正本とし、`next --json` はその内容を機械可読に展開する。\n\
  \n`next_action.required_inputs` がある場合は、規律ではなく作業対象ごとの状態入力として扱う。`id`、`source_type`、`read_policy`\
  \ を確認し、`path` がある場合でもファイル名そのものを一般規律に昇格しない。たとえば持ち越し台帳は、配布先プロジェクトごとに別ファイル、外部台帳、または未配置になり得るため、`unresolved_cross_scope_items`\
  \ のような抽象入力として扱う。\n\n機械可読な判定点では、判定点ごとに 1 本の effective prompt を読む。複数の元資料を直接ばらばらに読ませるのではなく、判定点に必要な規律・入力・次タスク方針を\
  \ 1 本へ束ねた effective prompt を作り、その本文を LLM に読ませる。元資料は `prompt_source_refs` として保持し、実際に読ませた統合プロンプトは\
  \ `effective_prompt_path`、`effective_prompt_sha256`、`effective_prompt_loaded` で記録する。全判定点で同じ巨大な共通プロンプトを使わず、各判定点に必要な短い\
  \ effective prompt を使う。\n\n## 2. 判定結果の共通分岐\n\n<a id=\"resume_in_progress\"></a>\n\
  \n### `resume_in_progress`\n\n`stages/in-progress/` に進行中手続きがある。新しい作業を始めず、`next_action.file`\
  \ に示された進行中ファイルを読む。\n\n<a id=\"parent_resume_pending\"></a>\n\n### `parent_resume_pending`\n\
  \nblocking unit が完了し、戻り先の parent unit へ復帰する必要が残っている。新しい作業を始めず、`next_action.parent_unit_id`\
  \ と `next_action.completed_unit_id` を確認し、まず parent unit の作業文脈へ戻る。\n\n`parent_resume_pending`\
  \ が出ている状態で、利用者から別作業への明示的な割り込み指示があった場合は、開始前に次を実行して、active unit と resume pending の有無を機械的に確認する。\n\
  \n```bash\npython3 tools/check-workflow-action.py work-unit preflight-start \\\n\
  \  --proposed-unit-id <開始候補 unit ID> \\\n  --title \"<開始候補の題名>\" \\\n  --reason\
  \ \"<開始候補の理由>\" \\\n  --json\n```\n\n`start_allowed: false` の場合は、`blocking_reasons`\
  \ を利用者へ示して停止する。理由を見ずに通常 workflow、maintenance、新しい blocking unit へ進まない。\n\n<a id=\"\
  blocking_unit_required\"></a>\n\n### `blocking_unit_required`\n\n別作業として切り出すべき作業が検出されている。通常\
  \ workflow や親作業を続けず、`next_action.proposed_unit` の `unit_id`、`title`、`reason`、`parent_unit_id`、`return_conditions`\
  \ を確認してから、利用者の明示的な開始指示を待つ。\n\n機械化が完全に揃うまでは、blocking unit の開始を暗黙に扱わない。開始前に、少なくとも次を会話上で明示する。\n\
  \n- blocking unit に入ること。\n- 親作業の識別子。\n- blocking unit の目的。\n- blocking unit で変更してよい\
  \ allowed files。\n- 親作業へ戻るための完了条件。\n\n宣言形式は次の形にそろえる。項目名を変えたり、本文中に散らして書いたりしない。\n\n\
  ```text\nblocking unit に入ります\n- unit_id: <blocking unit ID>\n- parent_unit_id: <親作業\
  \ ID>\n- title: <短い題名>\n- reason: <なぜ別作業として切り出すか>\n- allowed_files: <変更してよいファイルまたはディレクトリ>\n\
  - return_conditions: <親作業へ戻るための完了条件>\n```\n\n<a id=\"blocking_unit_in_progress\"\
  ></a>\n\n### `blocking_unit_in_progress`\n\nblocking unit が active である。`next_action.unit_id`\
  \ の作業だけを扱い、親作業の commit、push、post-write verification、TODO 整理へ横滑りしない。\n\n機械化が完全に揃うまでは、作業者は次を手動で守る。\n\
  \n- 作業開始時と再開時に、現在の active blocking unit を確認する。\n- commit 前に、commit unit が active\
  \ blocking unit の `unit_id` と一致することを確認する。\n- blocking unit 完了前に親作業の成果物を同じ commit\
  \ に混ぜない。\n- blocking unit を出るときは、完了条件を満たしたこと、残件、親作業への戻り先を明示する。\n\n<a id=\"reopen_in_progress\"\
  ></a>\n\n### `reopen_in_progress`\n\nreopen 手続きが進行中である。通常ワークフローや post-write-verification\
  \ より優先する。`next_action.file`、`next_step`、`completed_steps`、`pending_gates`、`current_blocker`、`required_action`\
  \ を確認し、`required_action` に従う。\n\n代表的な `required_action`：\n\n- `draft_reopen_classification`：第1過程。種別判定・根拠記録。進行中ファイル発行と\
  \ spec.json フラグ差し戻しは後続操作（`run_reopen_start`・`apply_approved_reopen_plan`）が担う。\n\
  - `repair_canonical_documents`：第2過程。上流フェーズの正本文書修正。\n- `run_reopen_drafting`：第3過程。`next_pending_gate`\
  \ が triad-review でも、同じ phase の drafting 完了が `drafting_completed_gates` または `completed_gates`\
  \ に記録されていないため、先に正本文書を更新する。`next_drafting_gate`、`phase`、`stage: drafting`、`required_feature_scope`\
  \ を確認し、レビューを開始しない。\n- `run_reopen_pending_gate`：第3過程。drafting 完了記録がある、または次 gate\
  \ が triad-review 以外であるため、`next_pending_gate` の gate を実行する。alignment / approval 連鎖の再実施を含む。\n\
  - `wait_for_human_decision`：人間の判断待ち。判断なしに進めない。\n- `finalize_reopen`：第4過程。最終確認、recheck\
  \ クリア、in-progress の完了処理。\n- `repair_workflow_state`：判定不能または状態破損。推測で進めず利用者へ報告する。\n\
  \n<a id=\"maintenance_in_progress\"></a>\n\n### `maintenance_in_progress`\n\n通常ワークフローではなく、ワークフロー制御・運用規律・検査器などの保守作業が進行中である。`next_action.file`\
  \ を読み、`required_action`、`allowed_scope`、`completion_conditions` に従う。通常の `stage`\
  \ や `upstream_recheck` へ戻るのは、maintenance の完了条件を満たし、進行中ファイルを `stages/completed/`\
  \ へ移してからである。\n\n`next_action` と異なる作業へ入る場合、または `next` 判定自体の欠陥を直す場合は、ファイル編集前に `stages/in-progress/maintenance-<日付>-<短い名前>.yaml`\
  \ を作成する。少なくとも `trigger`、`mainline_blocked_by`、`allowed_scope`、`allowed_files`、`completion_conditions`\
  \ を記録し、side track であることを明示する。これを省略すると、本筋の作業順序を守るための修復作業自体が、記録されない手順逸脱になる。\n\n本線\
  \ reopen 中の maintenance 完了 commit は、`stages/completed/maintenance-*.yaml` の `mainline_blocked_by`\
  \ が現在の reopen in-progress ファイルを覆うことで許可される。本線 `stages/in-progress/reopen-*.yaml`\
  \ は、maintenance のためだけに同伴 stage しない。\n\n**maintenance を始める前の事前調査（in-progress YAML\
  \ を作成する前に実施する）**\n\n1. 変更対象ファイルと依存関係を確認し、影響範囲を特定する。\n2. フィーチャー横断の影響がないことを確認する。\n\
  3. 先に解決すべきブロッカー（別の問題）が潜んでいないことを確認する。\n\n事前調査の結果として次の開始条件をすべて満たした場合のみ maintenance\
  \ を始める。\n\n- 変更が局所的である（既存仕様境界を変えず、workflow 機構・承認・状態機械・`next --json` の意味を変えない）。\n\
  - 影響範囲が対象フィーチャーに閉じている。\n\nいずれかを満たさない場合：\n\n- 中核変更（仕様境界・workflow 機構を変える）の場合は reopen\
  \ または新規 workflow として扱う。\n- フィーチャー横断の影響がある場合は利用者にエスカレーションする。\n\n開始条件を満たした場合、in-progress\
  \ YAML を作成した後に最初に次の 3 行を宣言する。\n\n```\n変更分類: 局所\n理由: <影響範囲と既存仕様境界への影響の説明>\n手順: TDD\
  \ 主導 / 文書のみ（lightweight self-check）\n```\n\nコード変更を伴う局所変更は TDD 主導（テスト先行）で進める。文書のみの変更は\
  \ lightweight self-check で確認する。\n\n### `reopen_classification_required`\n\n完了済み\
  \ workflow で、`intent`、feature-partitioning、`requirements`、`design`、`tasks` などの上流正本が後続成果物より新しい。単なる再確認として下流へ進めず、意味変更の有無と\
  \ reopen 種別を分類する。`next_action.reopen_trigger` が候補を示す場合も、分類根拠を保存して `reopen-start`\
  \ へ進む。\n\n<a id=\"post_write_verification\"></a>\n\n### `post_write_verification`\n\
  \n書き込み後検証の対象となる未コミット変更がある。通常ワークフローへ進まず、`next_action.target_files` 全体を対象として検証する。\n\
  \n検証 manifest は `.reviewcompass/post-write-verification/*.yaml` に置く。`target_files`、`target_sha256`、`required_verifiers`、`completed_verifiers`、`unresolved_substantive_findings`\
  \ を記録する。`verifications[]` がある場合、各 verifier は `target_files` 全体と対応する `target_sha256`\
  \ を単一エントリで覆る必要がある。ファイルごとの分業は独立多重チェックではない。\n\nAPI 経由の複数モデル検証を行う場合の標準手順：\n\n```bash\n\
  .venv/bin/python3 tools/api_providers/prepare_post_write_review.py \\\n  --target\
  \ <target-file> \\\n  [--target <target-file-2> ...] \\\n  --source-material .reviewcompass/guidance/API_REVIEW_PROMPT_QUALITY.md\
  \ \\\n  [--source-material <additional-source-material> ...] \\\n  --review-run-dir\
  \ .reviewcompass/evidence/review-runs/<run-id> \\\n  --criteria-id <criteria-id>\
  \ \\\n  --change-summary \"<change-summary>\" \\\n  --review-question \"<review-question>\"\
  \n\n.venv/bin/python3 tools/api_providers/run_review.py \\\n  --variant post_write_verification_google\
  \ \\\n  --target <target-file> \\\n  [--target <target-file-2> ...] \\\n  --phase\
  \ post_write_verification \\\n  --criteria-file .reviewcompass/evidence/review-runs/<run-id>/review-target.md\
  \ \\\n  --prompt-manifest-path .reviewcompass/evidence/review-runs/<run-id>/prompt-manifest.yaml\
  \ \\\n  --review-run-dir .reviewcompass/evidence/review-runs/<run-id>\n\n.venv/bin/python3\
  \ tools/api_providers/review_triage.py list-pending \\\n  --review-run-dir .reviewcompass/evidence/review-runs/<run-id>\n\
  \n.venv/bin/python3 tools/api_providers/review_triage.py decide \\\n  --review-run-dir\
  \ .reviewcompass/evidence/review-runs/<run-id> \\\n  --finding-id <finding-id> \\\
  \n  --final-label must-fix \\\n  --decision-reason \"<reason>\" \\\n  --decision-actor\
  \ human \\\n  --approval-record .reviewcompass/evidence/review-runs/<run-id>/approval.yaml\n\
  \n.venv/bin/python3 tools/api_providers/review_triage.py write-manifest \\\n  --review-run-dir\
  \ .reviewcompass/evidence/review-runs/<run-id> \\\n  --out auto \\\n  --approval-record\
  \ .reviewcompass/evidence/review-runs/<run-id>/approval.yaml\n\n.venv/bin/python3\
  \ tools/check-workflow-action.py next --json\n```\n\nAPI 呼び出し起動手順の正本は、先に `.venv/bin/python3\
  \ tools/api_providers/prepare_post_write_review.py ...` で review-target と prompt\
  \ manifest を生成し、その後 `.venv/bin/python3 tools/api_providers/run_review.py ... --criteria-file\
  \ <review-target.md> --prompt-manifest-path <prompt-manifest.yaml>` を実行することである。外側から\
  \ `zsh -c` で包まない。API key は配布物や設定ファイルへ書かず、利用者の shell 初期化で読み込まれる環境変数から渡す。Claude Code\
  \ などの操縦実行面では、子プロセスの `ANTHROPIC_API_KEY` と `GEMINI_API_KEY` が空文字列へ上書きされることが確認済みである。一方、`OPENAI_API_KEY`\
  \ は同じ確認では上書きされていない。このため `run_review.py` / `run_role.py` entrypoint 内で、環境変数が未設定の場合に\
  \ `~/.zshrc` を読み直して API key を補完する。補完後も key が得られない場合は API key 未設定として fail-closed\
  \ する。\n\n`prepare_post_write_review.py` は `review-target.md`、`review-target.yaml`、`prompt-manifest.yaml`\
  \ を同じ `--review-run-dir` に生成する。`review-target.md` には criteria ID、変更要約、検査質問、target\
  \ files、source materials、target file contents、scope / out-of-scope、finding policy、機微情報チェック結果を含める。`prompt-manifest.yaml`\
  \ には `review_prompt_materials.target_files` と `review_prompt_materials.source_materials`\
  \ を `content_mode: full_text` と `content_sha256` 付きで記録する。機微情報らしい文字列を検出した場合、または prompt\
  \ manifest audit が DEVIATION の場合は fail-closed し、外部 API review へ進まない。\n\n`next_action.target_files`\
  \ が複数ある場合は、`prepare_post_write_review.py` と `run_review.py` の両方で `--target` を複数回指定して同じ\
  \ review-run に束ねる。API review-run の成否確認は、`review-target.md`、`review-target.yaml`、`prompt-manifest.yaml`、`review_summary.md`、`rounds.yaml`、`model-result-summary.yaml`、`raw/`、`parsed/`、`prompts/`、`target-manifest.yaml`\
  \ が同じ `--review-run-dir` に生成され、`rounds.yaml` の `target_files`、`criteria_source_path`、`prompt_manifest_path`、provider、model、prompt/raw/parsed\
  \ path が今回の対象と一致することで行う。\n\nAPI 呼び出しが失敗した場合は、まず上の正本手順を再確認する。`import` エラー、`argparse`\
  \ エラー、引数不一致は起動手順または実装の問題であり、外部送信ポリシーや provider 側障害と混同しない。`ConnectError`、名前解決失敗、接続不能が出た場合は\
  \ sandbox network 制限の可能性を先に疑い、同じ正本コマンドをネットワーク実行が許可された実行面で再実行する。API key 未設定のエラーは\
  \ `~/.zshrc` から対象 provider の環境変数が読み込まれているかを確認する。\n\n`post_write_verification` では\
  \ API 経路の variant を明示する。小規模既定は `--variant post_write_verification_google`、大規模または\
  \ 3 系統検証が必要な場合は `--variant <post-write-api-variant>` として、`config/api-settings.yaml`\
  \ の `context: post_write_verification` かつ API provider だけで構成された variant を選ぶ。CLI\
  \ 経路を含む default variant に暗黙フォールバックしてはいけない。\n\nAPI レビュー結果を得た場合は、raw 参照、モデル別要約、三段階トリアージ（`must-fix`／`should-fix`／`leave-as-is`）を利用者へまとめて提示する。`ERROR`／`CRITICAL`\
  \ または最終判断 `must-fix` の重要件を `decide` する場合、または重要件を含む run から manifest を生成する場合は、承認を記録した\
  \ `--approval-record` が必須である。承認レコードには `approved_by: user` または `approved_by: proxy_model`、`review_run_id`、`summary_presented_to_user:\
  \ true`、`triage_presented_to_user: true`、`approved_finding_ids`、必要に応じて `approved_final_labels`\
  \ を含める。`approved_by: proxy_model` の場合は、`proxy_model_id` と finding ごとの `proxy_decisions`\
  \ を含め、各 decision file が raw response、候補案、採用案、判断理由、最終ラベルを保持する。\n\n`write-manifest\
  \ --out auto` は `.reviewcompass/post-write-verification/post-write-YYYY-MM-DD-NNN.yaml`\
  \ の次番号を作る。manifest は post-write validation の途中記録ではなく、commit 直前の最終封印である。`triage.yaml`\
  \ に `decision_status: human_required` が残る場合、重要件の利用者承認が確認できない場合、または review-run の\
  \ target set に含まれない未コミット post-write target が残る場合は manifest を生成しない。manifest 作成後は対象ファイルを編集せず、stage\
  \ / approval / commit へ直行する。\n\n<a id=\"lightweight_self_check\"></a>\n\n### `lightweight_self_check`\n\
  \n作業中メモ置き場の未コミット変更がある。通常ワークフローへ進まず、`next_action.target_files` を API post-write verification\
  \ ではなく軽量自己精査で確認する。\n\n軽量自己精査の対象は `docs/notes/working/` 配下と、単独変更の `TODO_NEXT_SESSION.md`\
  \ とする。既存の `docs/notes/*.md` は正本寄りメモと作業中メモが混在しているため、従来どおり `post_write_verification`\
  \ 対象とする。`docs/operations/`、`docs/disciplines/`、`docs/reviews/`、`stages/completed/`\
  \ は正本または完了記録として厳格に扱う。front matter や本文 marker による中身判定は初期実装では採用しない。判断に迷う配置は厳格側に倒す。\n\
  \n`TODO_NEXT_SESSION.md` は更新頻度が高い次セッション導線であり、進捗整理・次タスク・現在状態の更新だけなら API review ではなく軽量自己精査で扱う。ただし、同じ未コミット差分に\
  \ strict な `post_write_verification` 対象が含まれる場合は、TODO も同じ strict 検証の `target_files`\
  \ に同梱する。\n\n軽量自己精査では、API review を呼ばず、次だけを確認する。\n\n1. 利用者の指摘内容を落としていないか。\n2. 事実、推測、方針案、未実装事項が区別されているか。\n\
  3. 後で見たときに次の判断材料になるか。\n4. 作業範囲を超えて仕様化していないか。\n5. API review が必要な正本へ昇格していないか。\n\n\
  完了記録は `.reviewcompass/post-write-verification/*.yaml` に置き、`required_verifiers` と\
  \ `completed_verifiers` は `lightweight_self_check` とする。`target_files` と `target_sha256`\
  \ は通常の post-write manifest と同じく対象全体を覆う。\n\n`post_write_verification` 対象と `lightweight_self_check`\
  \ 対象が混在する場合は、`post_write_verification` を優先する。strict 側が完了した後、軽量対象が残っていれば `lightweight_self_check`\
  \ を返す。\n\n<a id=\"post_write_policy_violation\"></a>\n\n### `post_write_policy_violation`\n\
  \npost-write-verification pending 中に禁止変更がある。通常ワークフローへ進まず、`next_action.forbidden_files`\
  \ を報告して停止する。禁止ファイルを勝手に削除・修正してはいけない。\n\n現行実装では、post-write-verification 対象ファイルが未コミット変更に含まれる状態で、`tools/*.py`、`templates/`、または他の\
  \ post-write 対象と混ざった `docs/disciplines/` 配下の変更があると逸脱になる。\n\n<a id=\"post_write_human_decision_required\"\
  ></a>\n\n### `post_write_human_decision_required`\n\nmanifest に未解決の本質的指摘がある。通常ワークフローへ戻らず、`next_action.target_files`\
  \ と `next_action.manifest` を確認し、利用者判断を待つ。\n\n### `stage`\n\n通常ワークフロー上の次タスクが決まっている。`feature`、`phase`、`stage`\
  \ の示す作業だけを扱う。\n\n`stage` が `triad-review` の場合、review-run の開始前に使用 variant と role\
  \ ごとの path／provider／model を確定し、曖昧なまま開始しない。review-run に使うプロンプトは [[llm-as-judge-prompting]]\
  \ の手順（材料揃え → 問い設計 → 選択肢なし分析）で設計する。API review-run 完了後は、proxy_model 判断依頼、実装修正、spec.json\
  \ 更新、フェーズ移行のいずれにも進む前に、raw 参照、モデル別要約、同根所見クラスタ、`must-fix`／`should-fix`／`leave-as-is`\
  \ の三段階トリアージ案、重要件の平易な説明を利用者へ提示して停止する。詳細手順は `.reviewcompass/guidance/SESSION_WORKFLOW_GUIDE.md#3.3-a-2`\
  \ を正本とする。\n\n### `cross_feature_stage`\n\n機能横断段に進む。`feature` は `all_features` になる。`recheck_items`\
  \ がある場合は上流変更の織り込みを含める。`required_inputs` に `unresolved_cross_scope_items` があり、`unresolved_count`\
  \ が 0 より大きい場合は、`read_policy` に従って未消化の持ち越し所見だけを確認する。ReviewCompass では互換情報として `pending_cross_feature_findings`\
  \ も返るが、一般化された判断根拠は `required_inputs` とする。\n\n自律・並列で機能横断段を試行する場合は、通常の review-wave\
  \ 完了判定に入る前に `autonomous-plan` を作成し、`tools/check-workflow-action.py autonomous-plan\
  \ <plan.yaml>` で検査する。計画には `recheck_items` と `stages/feature-dependency.yaml` から分かる依存を明示し、上流\
  \ recheck 対象を下流判断より先に置く。同じ worktree で並列化してよいのは読取調査または差分を残さない確認に限る。新しい依存、暗黙依存、未記録依存、または上流\
  \ recheck の下流反映が必要だと分かった場合、その作業単位は停止し、機能横断段の実施記録に blocked として記録してから統合判断へ戻す。\n\n\
  機能横断段の実施記録は、単一 feature 配下に置かず `.reviewcompass/specs/_cross_feature/reviews/` に置く。標準ファイル名は\
  \ `.reviewcompass/specs/_cross_feature/reviews/{date}-{phase}-{stage}.md` とし、`feature:\
  \ all_features`、対象 phase/stage、確認した feature 範囲、持ち越し件数、recheck 結果、実行した検証コマンド、判断結果を記録する。`_cross_feature`\
  \ は実 feature ではなく、横断段成果物だけの名前空間である。\n\n<a id=\"commit_stop_point\"></a>\n\n### `commit_stop_point`\n\
  \n通常 workflow の phase 終端または reopen 手続き上の停止点に到達している。`required_action: commit_stop_point`\
  \ の場合、次 phase / 次 gate へ進まず、利用者の明示的な commit 指示を待つ。\n\n利用者が commit を指示した直後は、Git index\
  \ への追加（`git add`）や approval record を作る前に `.venv/bin/python3 tools/check-workflow-action.py\
  \ commit-preflight --json` を実行する。`DEVIATION` の場合は何も作らず停止し、理由と次に許可されている action だけを報告する。\n\
  \n通常 workflow では、`intent.approval` または `feature-partitioning.approval` が全 feature\
  \ で完了し、該当 phase の workflow_state または成果物に未コミット変更がある場合に返る。`blocked_by.phase`、`blocked_by.stage`、`blocked_by.dirty_paths`\
  \ を確認する。`commit-preflight` が `OK` を返した後に対象差分を `git add` し、guarded commit の通常手順へ進む。commit\
  \ 後に作業ツリーが clean であれば、同じ停止点を返し続けず次 phase の action へ進む。\n\nreopen 手続きでは、`reopen_in_progress`\
  \ の `required_action: commit_stop_point` として返る。`blocked_by.kind` と `blocked_by.gate`\
  \ を確認し、reopen 手続きファイルを含む停止点 commit を行う。\n\n### `upstream_recheck`\n\n完了済み workflow\
  \ であっても、上流成果物が下流成果物より新しいため、下流へ進む前に再確認が必要である。`upstream_phase`、`phase`、`stage` を確認し、`phase.stage`\
  \ に示された作業を次作業として扱う。たとえば intent 更新後は feature-partitioning の確認、requirements 更新後は design\
  \ の再確認、tasks 更新後は implementation の再確認を先に行う。\n\nこの kind が返った場合、記憶や直前の会話から requirements、design、tasks、implementation\
  \ へ飛ばない。必ず `next_action.phase` と `next_action.stage` に従い、上流から下流へ順に反映する。\n\n<a id=\"\
  feature_definition_required\"></a>\n\n### `feature_definition_required`\n\nfeature\
  \ 一覧が解決できない（`feature-dependency.yaml` が見つからない、または `feature_order` キーが未定義）。対象アプリの初期状態で発生する。エラーではない（verdict\
  \ OK）。\n\n`next_action.reason`（立ち上げ案内の本文）と `current_state.feature_dependency_source`（解決元）を確認する。`feature_dependency_source`\
  \ が null ならファイル自体が探索順（`.reviewcompass/feature-dependency.yaml` → `stages/feature-dependency.yaml`\
  \ → `feature-dependency.yaml`）のどこにも存在せず、ファイルパスが入っていればそのファイルはあるが `feature_order`\
  \ キーが未定義または不正である。前者は分割結果の記録から、後者は既存ファイルへの `feature_order` キーの追記から始める。\n\n新しい作業を始めず、intent\
  \ と feature-partitioning を実施し、承認された分割結果（機能ごとの依存の主張と理由、順序の導出を含む）を `.reviewcompass/feature-dependency.yaml`\
  \ の `feature_order` キーに記録する。記録後に `next` を再実行する。feature 立ち上げの手順は `.reviewcompass/guidance/INITIAL_SETUP_LLM_GUIDE.md`\
  \ を正本とする。\n\nなお、`feature_order` と `depends_on` の整合違反（依存される機能が先に並んでいない、循環依存がある）は本\
  \ kind ではなく `unknown`／DEVIATION（fail-closed）になる。理由に従って `feature-dependency.yaml`\
  \ を修正する。\n\n### `completed`\n\n全 workflow_state が完了している。通常の次タスクはない。\n\n利用者指示により\
  \ maintenance、reopen、または新規 workflow を開始できる。別作業を開始する前には、原則として `work-unit preflight-start`\
  \ を実行し、`start_allowed` と `blocking_reasons` を確認する。maintenance を始める場合は、その後に `maintenance_in_progress`\
  \ の事前調査と開始条件を確認する。\n\n### `unknown`\n\n状態判定できない。推測で進めず、`reasons` と `current_state`\
  \ を利用者へ報告する。\n\n## 3. 共通禁止事項\n\n- `next` を実行せずに次作業を提案しない。\n- `resume_in_progress`、`parent_resume_pending`、`reopen_in_progress`、`post_write_verification`、`post_write_policy_violation`、`post_write_human_decision_required`\
  \ を通常ワークフローより後回しにしない。\n- `lightweight_self_check` を通常ワークフローより後回しにしない。\n- `reopen_classification_required`\
  \ を「再確認で足りる」と独断して下流成果物を更新しない。\n- `next_action` と異なる side track に入る場合、または `next`\
  \ 判定自体を修復する場合は、maintenance in-progress を作らずに編集を始めない。\n- 事前調査を省略して maintenance を始めない。影響範囲・依存関係・ブロッカーの確認が済んでいない状態で\
  \ in-progress YAML を作成しない。\n- spec.json の workflow_state 変更、commit、push は不可逆操作として扱い、対応する\
  \ precheck サブコマンドを実行する。\n- 検証者は `target_files` 全体を見る。ファイルごとの分業を独立多重チェックとして扱わない。\n\
  - 本質的指摘を独断で逐語的指摘に落とさない。迷う場合は利用者へ上げる。\n```\n\n\n## Scope\n\n- Check whether the changed\
  \ target files clearly state the intended contract.\n- Check whether related instructions\
  \ are mutually consistent across targets.\n- Check whether the documented procedure\
  \ is actionable before API review, triage, manifest, or commit steps continue.\n\
  \n## Out Of Scope\n\n- Do not request unrelated refactors or style-only rewrites.\n\
  - Do not judge files that are not listed in Target Files.\n- Do not treat missing\
  \ implementation work as a document defect unless the target text claims it already\
  \ exists.\n\n## Finding Policy\n\n- Report must-fix findings for contradictions,\
  \ missing required gates, or instructions that would allow an unsafe workflow action.\n\
  - Report should-fix findings for ambiguity that could cause repeated manual judgment\
  \ or unnecessary API review loops.\n- Return findings: [] when the target files\
  \ are internally consistent for this review question.\n\n## Sensitive Information\
  \ Check\n\n- status: passed\n- External API review must not proceed if this section\
  \ reports potential secrets.\n"
