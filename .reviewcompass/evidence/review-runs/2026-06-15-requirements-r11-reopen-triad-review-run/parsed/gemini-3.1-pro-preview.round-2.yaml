  target_location: 2. 改訂版 受入基準（Requirement 11） - 3
  description: 未取り込み出典の照合を「保留」してゲートを通過可能とする仕様は、不可逆操作前の検証を無力化する抜け道となり、fail-closed原則に違反している
  rationale: 直前ゲートで「即時照合合格を強制せず確定を保留可能」とした場合、機械的な出典検証が完了していない状態（保留状態）のまま不可逆操作が実行されてしまうと読める。事後に転写が取り込まれてから照合を行い不合格（幻覚や出典欠落）となっても、すでに実行された不可逆操作は取り消せないため、Requirement
    7や受入5が定める「fail-closed」の安全原則が根本的に破綻する。セッション確定順序のデッドロックを回避する目的であっても、検証を後回しにしてゲートを通過させるのではなく、「転写の取り込み（ログのフラッシュやコミット）が完了するまでゲートを通過させずブロックする」仕様とし、AIに先行して転写更新を促す設計でなければならない。
