  target_location: docs/notes/working/2026-06-18-mechanized-workflow-execution-design.md
    §10 Phase 2
  plain_language_summary: The read-only operation registry does not require `approval_required`
    to be returned.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The design defines `approval_required` as an independent operation
    contract attribute in §3.1 and later relies on it in Phase 5 to enforce approval
    gates. However, Phase 2 only lists `canonical_commands / effect_kind / sequence
    / pending_conflicts` as registry output. Without exposing `approval_required`
    in `operation-list --json`, downstream preflight, guards, tests, and refactor
    verification cannot mechanically determine which operations require approval.
  applied_files: []
