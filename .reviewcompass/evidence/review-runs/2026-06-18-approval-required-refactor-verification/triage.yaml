  decision_actor_type: human
  decision_at: null
  decision_reason: 'The mechanized design says `approval_required: true` applies to
    operations such as `spec.json` workflow_state updates, while the integrated design
    explicitly marks some state mutations as approval-free, including `record_human_decision`
    and approval-request setup under `run_reopen_pending_gate`. Because `approval_required`
    is meant to be independent from `effect_kind`, the documents should avoid broad
    statements implying all workflow_state mutations require approval and instead
    make the operation-level allow/require list authoritative.'
