    §5.1; docs/notes/working/2026-06-18-mechanized-workflow-execution-design.md §3.1
    and §10 Phase 5
  plain_language_summary: The approval record verification model is not specified.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: 'The documents separate `record_human_decision` from execution
    of the approved operation, but they do not define the machine-checkable approval
    evidence needed before an `approval_required: true` operation runs. The design
    should specify at minimum how an approval record is bound to the target operation,
    required_action, command/payload, current workflow state or digest, freshness/expiry,
    decision value, and consumed status. Without this, Phase 5 can only check that
    some approval exists, not that the current irreversible operation is the one that
    was approved.'
  applied_files: []
  superseded_by: null
