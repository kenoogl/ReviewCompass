proxy_model_id: chatgpt
finding_id: alpha
adopted_option: 案A
rationale: T-015の「テストの変更は禁止」は実装者に対する強い制約なので、例外はその制約が書かれている箇所に明記するのが最も誤読を防げる。T-020側だけに書くと、T-015のみを読んだ実装者が矛盾と判断するリスクが残る。T-020への参照腐敗リスクはあるが、MWP-0由来の受入変更として必要な例外であり、実装フェーズの混乱防止を優先すべきである。
rejected_options:
  - option: 案B
    reason: T-015側の禁止文がそのまま残るため、T-020を読まない限り例外を把握できず、矛盾の解消として不十分。
  - option: 案C
    reason: どちらを読んでも理解できる利点はあるが、同じ制約関係を2箇所で同期する必要があり、今回の矛盾解消には案Aで十分。
  - option: 別案
    reason: 案Aで必要な明確化を達成できるため、追加の構造変更や別方針は不要。
final_label: must-fix