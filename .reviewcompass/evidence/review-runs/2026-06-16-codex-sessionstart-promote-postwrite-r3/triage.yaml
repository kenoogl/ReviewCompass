    (read_meta)
  plain_language_summary: read_meta only scans the first 5 lines of each rollout (index
    >= 5 break) for the session_meta record. The find_rollout selection relies on
    this to match the target session_id. If a rollout's session_meta were not within
    the first 5 lines, the rollout would not be found and HASH_INFO would report status=unverifiable
    (missing_rollout) → previous_draft_unverifiable, safely declining promotion. This
    is safe-by-default but means a legitimate終了済み rollout with an unusual prefix could
    be silently skipped.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: Verification observer asks whether hash確認不能 stops on the safe side.
    The 5-line scan window is a heuristic; it fails safe (no promotion), consistent
    with the agreed contract, so this is informational rather than a defect.
