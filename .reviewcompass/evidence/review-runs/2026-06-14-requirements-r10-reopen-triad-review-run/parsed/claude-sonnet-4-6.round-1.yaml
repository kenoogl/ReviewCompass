findings:
- severity: WARN
  target_location: Requirement 10 受入基準 1 — 「Requirement 2 の検査スクリプトのサブコマンド、または同等の helper」
  description: 実装の配置形態（サブコマンドか独立 helper か）が「または」で並列に許容されており、design 段で選択の余地が大きすぎる。どちらを優先すべきか、あるいは両者が等価である条件が明示されていない。
  rationale: 要件が複数の実装形態を等価に許容すると、design・tasks フェーズで解釈が分岐し、レビュー時の合否判定基準が曖昧になる。「サブコマンドを基本とし、独立
    helper は ○○ の場合に許容する」程度の優先順序を明記しておくと下流の曖昧さが減る。
- severity: WARN
  target_location: Requirement 10 受入基準 1 — 「機能横断持ち越し所見記録から読み取り」
  description: 機能横断持ち越し所見記録の具体的な保存場所（パス・ファイル名パターン）や形式（YAML・JSON 等）が受入基準内に明記されていない。受入
    5 の「`.reviewcompass/specs/_cross_feature/reviews/` に保存できる形式」とのみ対応するが、読み取り元と書き出し先が分離して記述されており、実装者が入力仕様を確定できない可能性がある。
  rationale: 読み取り元が未定義のままだと実装者がパスを独自に決定し、design レビュー時に仕様との齟齬が生じるリスクがある。要件段階で「どのディレクトリ・どのキー」を読むかを少なくとも正規表現レベルで示すか、参照先ドキュメントを明記する必要がある。
- severity: WARN
  target_location: Requirement 10 受入基準 2 — triage 件数の定義
  description: 「triage の未解決（unresolved）件数・draft 件数・human_required 件数」の各ステータス値がどのフィールド・どのファイル構造から算出されるかが受入基準に示されていない。Requirement
    2 のトリアージ構造への参照が暗黙のままである。
  rationale: 出力項目として列挙するだけでは、実装者が集計ロジックを正しく設計できない。受入 1 で「読み取る」と書かれているデータ源と受入 2 の出力項目を対応表または参照先で接続しないと、TDD
    の「テストケースが書ける状態」にならない。
- severity: WARN
  target_location: Requirement 10 受入基準 3 — JSON 出力スキーマ
  description: JSON 出力について「機械処理用」とのみ述べており、スキーマ（最低限のキー構造・型）が要件段階で未定義である。下流の design
    フェーズでスキーマを策定することは許容されるが、その旨と責任の所在が要件に明示されていない。
  rationale: スキーマ未定義のまま design に委ねると、design レビュー時に「要件に書かれていないから変更不要」と判断される恐れがある。要件として「design
    フェーズで確定すること」と明記するか、最低限の必須キーを受入基準に含める必要がある。
- severity: INFO
  target_location: Requirement 10 受入基準 4 — 「結論不能」の定義
  description: 「必要な記録が解析不能・欠落」という条件は fail-closed の趣旨と整合しているが、「解析不能」の範囲（パース失敗・フォーマット不一致・ファイル欠落など）が具体化されていない。Requirement
    2 受入 4 への参照のみで詳細が委譲されている。
  rationale: 現状でも実装は可能だが、テストシナリオを網羅するうえで「どの状態が結論不能に分類されるか」を列挙または Requirement 2 への明示的参照で補うと、TDD
    時のテストケース設計が容易になる。design フェーズへの宿題として明記するだけでも十分。
- severity: INFO
  target_location: Requirement 10 受入基準 5 — 「保存できる形式とする」
  description: 「保存できる形式とする」という表現は「保存を必須とする」か「保存可能であれば十分か」が曖昧である。自動保存・手動保存・オプションフラグのいずれを想定しているか明示されていない。
  rationale: 要件として「保存機能を持つ」か「保存先に書き出す」かは責務境界（受入 5 の「集計に徹する」）との関係でも重要。書き出し自体が「書き換え」に含まれないことを明示するか、保存の起動条件（オプションフラグ等）を
    requirements 段階で方針として示すと下流の設計判断が安定する。
- severity: INFO
  target_location: 2.2 Change Intent への追記 — 「2026-06-13 記録の R-1 ラベルと併記説明文の食い違い」
  description: R-1 と R-0 の経緯説明が Change Intent に記録されているが、その根拠となる 2026-06-13 記録ドキュメントへの参照パスが示されていない。監査証跡として追跡可能性が低い。
  rationale: 分類変更の根拠ドキュメントが参照できないと、将来の reopen 判定や監査時に判断の再現が困難になる。参照パスを追記するか、reopen
    分類記録ドキュメント内に統合することを検討してよい。
