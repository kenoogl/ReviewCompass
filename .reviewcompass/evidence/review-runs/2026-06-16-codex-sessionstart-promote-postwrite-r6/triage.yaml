    が無い場合 `jq -r '...'` は command-not-found となり、HOOK_EVENT_NAME 等が空文字に落ちる。SESSION_ID
    が空なら `no_current_session_id` で exit 0 になるため結果的に no-op になるが、これは README が「jq が無い場合
    Codex payload を読めず実質的に安全側の no-op になる」と説明している経路に依存する偶発的挙動であり、明示的な jq 存在チェックや診断
    event はない。導入時チェック（INITIAL_SETUP_LLM_GUIDE 手順 5 で jq 確認）に依存している。
