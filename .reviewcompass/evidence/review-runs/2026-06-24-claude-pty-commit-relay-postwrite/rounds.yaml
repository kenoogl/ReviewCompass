  `--approval-source-text-line-stdin` を使う場合、対話端末があれば TTY の対話入力で、対話端末がない非対話実行環境では擬似端末（PTY）relay
  で承認入力を渡し、利用者発話なしに LLM が承認文を生成してはならない。共通手順は操作カードに寄せ、Claude 固有の実行面だけを本節で扱う。


  利用者の指示テキストが許可文言（`コミット`・`承認` など）の場合、直近の利用者発話で明示された commit 指示を承認語として使い、nonce 取得から
  guarded commit 実行まで同一ターンで完結させる。別途承認語の再入力を求めない。


  非対話実行環境（harness）で commit する場合は、`script`・`expect`・Python `pty` のいずれかで擬似端末を割り当て、標準
  wrapper を起動して承認入力待ちになってから、直近の利用者発話で明示された commit 指示の一行を PTY へ流す。承認レコード作成・staged 内容照合・commit
  gate はすべて wrapper 内で通す。これは Codex の `write_stdin` と同じ relay であり、利用者発話を逐語で渡す。wrapper
  を迂回して承認レコードを内部関数で自作する、固定文字列で承認文を作る、`guarded-git-commit.py` や `commit-approval prepare`
  を直接叩いて gate を飛ばす、といった手順は禁止する。


  コミット操作中のテキスト出力は最小化する。ツール実行前後の説明文（「ステージします」「nonce を取得します」等）は省き、完了後に `<コミット番号> コミット完了。`
  の1行だけを出す。詳細はツール出力に委ねる。


  ## 4. post-write-verification の扱い


  Claude は `next_action.target_files` 全体を確認する。複数ファイルがある場合でも、ファイルごとの分業を独立多重チェックとして扱わない。


  外部 API を使う検証は、利用者の明示承認または既に許可された既存コマンドがある場合だけ実行する。実行できない場合は、検証対象、必要な検証者数、実行しようとした手段、実行できない理由を報告して停止する。


  ## 5. Codex 固有資産の扱い


  Codex 用の手引き（`.reviewcompass/guidance/WORKFLOW_NAVIGATION_FOR_CODEX.md`）と `.codex/`
  hook は削除しない。Codex で再検証・比較実行するための adapter 資産として残す。`AGENTS.md` は Codex 専用ではなく、`CLAUDE.md`
  から取り込まれる共通入口の正本である。


  Claude 作業時も、triad-review のモデル名としての `gpt-*`／`gemini-*` や、過去セッション記録内の Codex 記述は履歴・モデル識別子として扱う。

