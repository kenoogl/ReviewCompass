  target_location: .codex/hooks/session-record-promote-previous-draft.sh (find_rollout)
    and templates/hooks/session-record-promote-previous-draft.sh.template
  plain_language_summary: 'The hash verification''s find_rollout() returns a best_match
    only when an expected_sha-matching rollout exists, but when no rollout matches
    it falls back to `best` (the newest non-matching rollout) and returns its actual_sha.
    The caller then compares HASH_STATUS: actual != expected yields ''mismatch'' ->
    previous_draft_in_progress. This is functionally safe, but the ''missing_rollout''
    -> unverifiable path is only reached when find_rollout returns (None, ''''), which
    happens only if NO rollout for the session_id exists at all. When a rollout exists
    for the session_id but its cwd does not match repo, it is skipped and can yield
    (None, '''') = unverifiable; however a same-session-id rollout that simply grew
    yields ''mismatch'' = in_progress. The distinction between in_progress and unverifiable
    is therefore sensitive to whether any candidate rollout survived the cwd filter,
    which is documented as ''in_progress when rollout grew'' but the code path conflates
    ''no matching hash but a candidate exists'' (in_progress) with the intended semantics.
    Verify the test test_missing_rollout_is_unverifiable_and_not_promoted truly exercises
    (None,'''') and not the mismatch branch — it creates a draft with hash ''0''*64
    and NO rollout file, so find_rollout returns (None,'''') -> unverifiable. That
    is consistent. No correctness defect, but the in_progress vs unverifiable boundary
    relies on cwd-filter side effects and is not directly unit-tested for the cwd-mismatch
    case.'
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: The post-write claim in the target asserts a clean separation between
    previous_draft_in_progress (hash mismatch) and previous_draft_unverifiable (hash
    unconfirmable). A same-session rollout that fails the cwd filter collapses into
    the unverifiable path while a grown same-cwd rollout collapses into in_progress;
    this boundary is asserted in docs but not exercised by a dedicated test, so a
    future cwd-filter regression could silently reclassify safety outcomes without
    test coverage.
  applied_files: []
