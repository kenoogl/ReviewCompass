  requirements triad-review の縦方向監査で、審査対象を requirements.md に限定し、design.md/tasks.md
  を参照資料として扱う規律と機械参照マップを追加した


  ## Review Question


  今回の変更は、requirements review の review target/source materials/out of scope を明確にし、上流判断材料から
  requirements.md への意図伝達を検査する規律として十分か。design.md/tasks.md を誤って審査対象に含める余地、既存 design/tasks/implementation
  review 規律への退行、または workflow discipline map との不整合がないかを確認してください。


  ## Target Files


  - docs/operations/SESSION_WORKFLOW_GUIDE.md sha256=dc879a5cc1565096854be2b8ae2120c79593fc0ee4c936b054f9fbf3ccdec246

