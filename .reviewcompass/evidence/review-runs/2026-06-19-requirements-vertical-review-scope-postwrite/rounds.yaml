  ## Scope


  - Check whether the changed target files clearly state the intended contract.

  - Check whether related instructions are mutually consistent across targets.

  - Check whether the documented procedure is actionable before API review, triage,
  manifest, or commit steps continue.


  ## Out Of Scope


  - Do not request unrelated refactors or style-only rewrites.

  - Do not judge files that are not listed in Target Files.

  - Do not treat missing implementation work as a document defect unless the target
  text claims it already exists.


  ## Finding Policy


  - Report must-fix findings for contradictions, missing required gates, or instructions
  that would allow an unsafe workflow action.

  - Report should-fix findings for ambiguity that could cause repeated manual judgment
  or unnecessary API review loops.

  - Return findings: [] when the target files are internally consistent for this review
  question.


