criteria: "# Task Quality Review Criteria: Guidance Relocation Inventory\n\n## Review\
  \ Task\nReview whether the backlog TODO and runtime checklist for `todo-2026-06-23-guidance-relocation-inventory`\
  \ are safe to use as the execution checklist after `task-quality-check audit` returned\
  \ `OK` with a WARN:\n\n- `red test items appear after implementation items: GRC-RT-1`\n\
  \nThe review should decide whether this warning is a blocking task-quality issue,\
  \ and identify any missing checklist or TODO quality defects that would make execution\
  \ unsafe.\n\n## User Review Requirements\n- WARN from task-quality-check should\
  \ be reviewed by API, not bypassed by local judgment.\n- Review the generated review\
  \ materials and judge whether the TODO/checklist may proceed.\n- Do not authorize\
  \ commit, push, file moves, or completion of the work.\n\n## Review Target\nThe\
  \ target file is `.reviewcompass/evidence/review-materials/2026-06-23-guidance-relocation-inventory-task-quality/review-materials.yaml`.\n\
  \nIt contains:\n- The backlog TODO full text.\n- The runtime checklist full text.\n\
  - The task-quality audit result.\n- Main preanalysis generated from the audit.\n\
  - Review questions and decision boundaries.\n\n## Required Checks\n1. Determine\
  \ whether the WARN about `GRC-RT-1` appearing after implementation items is a blocking\
  \ issue for this specific inventory-only TODO.\n2. Check whether the checklist preserves\
  \ the source plan slice `GRC-1` and does not broaden scope into file moves, deletion,\
  \ or consumer reference updates.\n3. Check whether each checklist item is concrete\
  \ enough to execute and verify.\n4. Check whether the red-test / acceptance item\
  \ is sufficient for an inventory/classification-only task.\n5. Check whether the\
  \ checklist can proceed as-is, should be reordered, or needs additional items before\
  \ execution.\n\n## Out Of Scope\n- Do not classify the actual `docs/operations`\
  \ or `docs/disciplines` files.\n- Do not propose file moves, path deletions, or\
  \ consumer reference updates.\n- Do not judge post-write verification, commit readiness,\
  \ or push readiness.\n- Do not treat the generated main preanalysis as authoritative;\
  \ use it only as a hypothesis.\n\n## Finding Policy\nReturn findings only for substantive\
  \ task-quality risks.\n\nUse these severities:\n- `ERROR`: Execution should not\
  \ proceed until fixed.\n- `WARN`: Execution may proceed only after explicit acceptance\
  \ or minor correction.\n- `INFO`: Non-blocking observation.\n\nIf there are no substantive\
  \ findings, return an empty findings list and state that the checklist may proceed.\n\
  \n## Output Contract\nRespond as YAML with this shape:\n\n```yaml\nfindings:\n \
  \ - id: TQ-001\n    severity: ERROR|WARN|INFO\n    summary: short summary\n    evidence:\
  \ specific item IDs or source text\n    recommendation: concrete next action\ndecision:\n\
  \  may_proceed: true|false\n  reason: concise reason\n  required_changes:\n    -\
  \ change, if any\n```\n"
