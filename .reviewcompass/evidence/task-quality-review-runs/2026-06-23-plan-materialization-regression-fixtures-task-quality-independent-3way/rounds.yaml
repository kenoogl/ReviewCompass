criteria: "# Task Quality Review Criteria: Plan Materialization Regression Fixtures\n\
  \n## Review Task\nReview whether the backlog TODO and runtime checklist for\n`todo-2026-06-23-plan-materialization-regression-fixtures`\
  \ /\n`checklist-todo-2026-06-23-plan-materialization-regression-fixtures`\nare safe\
  \ to use as the execution checklist after `task-quality-check audit`\nreturned `OK`\
  \ with a warning.\n\nTask-quality warning:\n\n- `red test items appear after implementation\
  \ items: PTC-RT-1, PTC-RT-2, PTC-RT-3, PTC-RT-4`\n\nThe review should decide whether\
  \ the warning is a blocking task-quality issue,\nand identify any missing checklist\
  \ or TODO quality defects that would make\nexecution unsafe.\n\n## Prompt Construction\
  \ Basis\n- This criteria document is generated from task-quality review materials.\n\
  - The prompt follows the established three-review practice: material review,\n \
  \ independent questions, explicit scope, sensitive-information check, and YAML\n\
  \  result contract.\n- Treat main preanalysis in the materials as a hypothesis to\
  \ inspect, not as an\n  answer to copy.\n\n## User Review Requirements\n- WARN from\
  \ task-quality-check should be reviewed by API, not bypassed by local judgment.\n\
  - Review the generated review materials and judge whether the TODO/checklist may\
  \ proceed.\n- Do not authorize commit, push, file moves, or completion of the work.\n\
  \n## Review Target\nThe target file is\n`.reviewcompass/evidence/review-materials/2026-06-23-plan-materialization-regression-fixtures/review-materials.yaml`.\n\
  \nIt contains:\n- The backlog TODO full text.\n- The runtime checklist full text.\n\
  - The task-quality audit result.\n- Main preanalysis generated from the audit.\n\
  - Review questions and decision boundaries.\n\n## Required Checks\n1. Are checklist\
  \ items concrete, non-overlapping, and sized for execution?\n   Expected output:\
  \ Find missing granularity risks with item IDs and evidence.\n2. Is the checklist\
  \ order suitable for TDD and review-before-implementation flow?\n   Expected output:\
  \ Find ordering risks without treating warnings as automatic failure.\n3. Does the\
  \ checklist preserve the source TODO intent and stated scope?\n   Expected output:\
  \ Find weakened, omitted, or broadened upstream intent.\n4. Do red test items cover\
  \ the task quality risks before implementation work?\n   Expected output: Find missing\
  \ or under-specified red test coverage.\n5. Does the checklist sufficiently cover\
  \ the plan requirement that the guidance\n   relocation plan pattern is represented\
  \ as a regression case?\n\nAlso check whether the checklist can proceed as-is, should\
  \ be reordered, or\nneeds additional items before execution.\n\n## Out Of Scope\n\
  - Do not perform the TODO work itself.\n- Do not implement tests or fixtures.\n\
  - Do not judge post-write verification, commit readiness, or push readiness.\n-\
  \ Do not treat generated main preanalysis as authoritative.\n\n## Finding Policy\n\
  Return findings only for substantive task-quality risks.\n\nUse these severities:\n\
  - `ERROR`: Execution should not proceed until fixed.\n- `WARN`: Execution may proceed\
  \ only after explicit acceptance or minor correction.\n- `INFO`: Non-blocking observation.\n\
  \nIf there are no substantive findings, return an empty findings list and state\n\
  that the checklist may proceed.\n\n## Output Contract\nRespond as YAML with this\
  \ shape:\n\n```yaml\nfindings:\n  - id: TQ-001\n    severity: ERROR|WARN|INFO\n\
  \    summary: short summary\n    evidence: specific item IDs or source text\n  \
  \  recommendation: concrete next action\ndecision:\n  may_proceed: true|false\n\
  \  reason: concise reason\n  required_changes:\n    - change, if any\n```\n"
